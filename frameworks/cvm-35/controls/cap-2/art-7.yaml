id: art-7
family: cap-2
title: "Disseminacao da Politica e Programa de Conscientizacao"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 7. A política de segurança da informação deve ser acessível a todos os
    integrantes da entidade, em linguagem clara e compatível com suas funções
    e responsabilidades.

    Parágrafo único. A entidade deve implementar programa de conscientização
    em segurança da informação, contemplando treinamento periódico de seus
    integrantes sobre as ameaças e vulnerabilidades relevantes para suas
    atividades.
guidance:
  prose: |
    O art. 7 trata de dois aspectos: acessibilidade da PSI e programa de
    conscientizacao.

    **Acessibilidade da PSI:**
    A politica deve estar disponivel para todos os integrantes (funcionarios,
    terceirizados, estagiarios) em formato compreensivel. "Linguagem clara e
    compativel" significa que a versao disponibilizada deve ser adequada ao
    publico — nao basta um documento tecnico de 200 paginas se o publico
    inclui areas nao tecnicas.

    **Programa de conscientizacao (paragrafo unico):**
    Nao basta ter a politica disponivel. A entidade deve conduzir treinamento
    periodico ativo. A CVM verifica:
    - Existencia de programa formal de conscientizacao
    - Periodicidade dos treinamentos (recomendado minimo anual)
    - Cobertura: percentual de integrantes treinados
    - Conteudo: ameacas relevantes para o setor (phishing, engenharia social,
      fraudes em operacoes de mercado)
    - Evidencias: registros de participacao, avaliacoes de conhecimento

    **Consequencias de descumprimento:**
    A ausencia de programa de conscientizacao e frequentemente citada em
    autos de infração da CVM. Incidentes causados por falha humana sem
    programa de treinamento adequado agravam as sancoes.

    **Boas praticas:**
    - Treinamentos segmentados por funcao (traders, backoffice, TI, compliance)
    - Simulacoes de phishing periodicas
    - Comunicacao continua sobre ameacas (newsletters, alertas)
    - Avaliacao de efetividade (testes de conhecimento pos-treinamento)
implementation_guidance:
  platform_engineering:
    prose: |
      **Acessibilidade da PSI:**
      1. Publicar PSI em portal interno (wiki, intranet, GitLab Pages) com
         controle de versao e facil navegacao.
      2. Versoes resumidas por audiencia: executiva, tecnica, operacional.
      3. Notificacao automatica a todos os integrantes quando a PSI e atualizada.
      4. Confirmacao de leitura obrigatoria (aceite digital) rastreada por sistema.

      **Infraestrutura para conscientizacao:**
      5. Plataforma de e-learning integrada com IdP para single sign-on.
      6. Simulador de phishing automatizado com campanhas programadas.
      7. Dashboard de metricas de conscientizacao (cobertura, resultados,
         taxa de clique em phishing simulado).
      8. Integracao com HR para onboarding automatico de novos integrantes
         no programa de treinamento.
    tools:
      - gitlab-pages
      - identity-provider
      - phishing-simulation
      - lms-platform
      - wiki
  devsecops:
    prose: |
      **Conscientizacao para desenvolvedores:**
      1. Treinamento especifico em desenvolvimento seguro (OWASP Top 10,
         secure coding practices).
      2. Security champions program: um membro por equipe de desenvolvimento
         com treinamento avancado em seguranca.
      3. Code review focado em seguranca como ferramenta de aprendizado.
      4. Gamificacao de seguranca: CTF internos, bug bounty interno.

      **Integracao com pipeline:**
      5. Mensagens educativas nos findings de SAST/DAST (link para base de
         conhecimento explicando a vulnerabilidade).
      6. Dashboard de seguranca por equipe para fomentar cultura de seguranca.
      7. Metricas de evolucao: reducao de vulnerabilidades por equipe ao
         longo do tempo como indicador de efetividade da conscientizacao.
    tools:
      - gitlab-sast
      - gitlab-dast
      - secure-coding-platform
      - ctf-platform
  secops:
    prose: |
      **Programa de conscientizacao operacional:**
      1. Calendario anual de treinamentos com temas mensais.
      2. Simulacoes de phishing trimestrais com metricas de evolucao.
      3. Comunicacao de alertas de ameacas relevantes para o setor
         (avisos do CERT.br, ANBIMA, CVM).
      4. Treinamento especifico para equipes de resposta a incidentes.

      **Metricas e evidencias para CVM:**
      5. Registro de todos os treinamentos (data, conteudo, participantes).
      6. Taxa de cobertura: percentual de integrantes que completaram
         treinamento no periodo.
      7. Resultados de avaliacoes de conhecimento pos-treinamento.
      8. Evolucao da taxa de clique em phishing simulado (meta: reducao
         continua).
      9. Relatorio anual de conscientizacao para a diretoria.
    tools:
      - phishing-simulation
      - lms-platform
      - grc-platform
      - siem
