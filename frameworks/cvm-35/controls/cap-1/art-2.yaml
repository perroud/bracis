id: art-2
family: cap-1
title: "Ambito de Aplicacao"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 2. Estão sujeitos às disposições desta Resolução:
    I - intermediários de operações em valores mobiliários;
    II - administradores de carteira de valores mobiliários;
    III - consultores de valores mobiliários;
    IV - analistas de valores mobiliários;
    V - agentes fiduciários;
    VI - securitizadoras;
    VII - administradores de fundos de investimento;
    VIII - custodiantes de valores mobiliários;
    IX - escrituradores de valores mobiliários.

    Parágrafo único. Para os fins desta Resolução, enquadram-se no inciso I as
    entidades administradoras de mercado organizado, as entidades operadoras de
    infraestrutura do mercado financeiro e as corretoras e distribuidoras de valores
    mobiliários.
guidance:
  prose: |
    O art. 2 define o universo de entidades reguladas. A abrangencia e ampla,
    cobrindo praticamente toda a cadeia do mercado de capitais brasileiro.

    **Entidades reguladas:**
    1. **Intermediarios (I):** Corretoras (CTVM), distribuidoras (DTVM), bolsas (B3),
       depositarias centrais, camaras de compensacao.
    2. **Administradores de carteira (II):** Gestoras de patrimonio, wealth management.
    3. **Consultores (III):** Empresas de consultoria em investimentos.
    4. **Analistas (IV):** Pessoas juridicas de analise de valores (research houses).
    5. **Agentes fiduciarios (V):** Representantes dos debenturistas.
    6. **Securitizadoras (VI):** Emissoras de CRI, CRA, FIDC.
    7. **Administradores de FI (VII):** Administradores fiduciarios de fundos.
    8. **Custodiantes (VIII):** Instituicoes de custodia de ativos.
    9. **Escrituradores (IX):** Servicos de escrituracao de ativos.

    **Implicacao pratica:**
    Cada tipo de entidade tem perfil de risco distinto. Uma corretora com acesso
    direto ao pregao eletronico tem exposicao cibernetica muito maior que um
    consultor de valores. O principio da proporcionalidade (art. 3) permite
    adequar os requisitos ao perfil de cada tipo.

    **Paragrafo unico — Infraestrutura de mercado:**
    Inclui entidades criticas como B3, camara de compensacao e depositarias, que
    sao sistemicamente importantes para o funcionamento do mercado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario e classificacao de ativos por tipo de entidade:**
      1. Identificar e documentar todos os ativos de informacao, sistemas e dados
         conforme o tipo de entidade regulada.
      2. Classificar nivel de criticidade baseado na posicao na cadeia do mercado
         (infraestrutura > intermediario > consultor).
      3. Implementar controles proporcionais ao tipo de entidade.

      **Segregacao de ambientes:**
      4. Ambientes segregados para sistemas de negociacao, custodia e registro.
      5. Controles de acesso diferenciados por funcao (front-office, middle, back).
      6. Monitoramento reforçado para sistemas de acesso ao mercado.
    tools:
      - asset-inventory
      - cmdb
      - network-segmentation
      - identity-provider
  devsecops:
    prose: |
      **Controles diferenciados por criticidade:**
      1. Pipelines com gates de seguranca proporcionais a criticidade do sistema.
      2. Sistemas de negociacao e custodia: SAST + DAST + SCA + pentest obrigatorios.
      3. Sistemas internos de menor criticidade: SAST + SCA como baseline minimo.

      **Compliance tracking:**
      4. Tagging de repositorios por tipo de entidade regulada.
      5. Dashboards de conformidade segmentados por tipo de atividade.
      6. Evidencias automatizadas de controles para cada tipo de servico prestado.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - trivy
  secops:
    prose: |
      **Monitoramento proporcional:**
      1. Nivel de monitoramento e alertas proporcional ao tipo de entidade.
      2. Infraestrutura de mercado: monitoramento 24x7 com SOC dedicado.
      3. Intermediarios: monitoramento em horario de mercado + alertas criticos 24x7.
      4. Consultores e analistas: monitoramento basico com alertas de incidentes graves.

      **Inventario regulatorio:**
      5. Mapeamento de todas as obrigacoes especificas por tipo de entidade.
      6. Calendario regulatorio com prazos de reporte para cada tipo.
      7. Controle de certificacoes e habilitacoes exigidas.
    tools:
      - siem
      - grc-platform
      - asset-inventory
