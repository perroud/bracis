id: art-3
family: cap-1
title: "Principio da Proporcionalidade"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 3. A política de segurança da informação e a política de segurança cibernética
    devem ser compatíveis com:
    I - o porte da entidade;
    II - o perfil de risco;
    III - o modelo de negócio;
    IV - a natureza das atividades;
    V - a complexidade dos produtos e serviços oferecidos; e
    VI - a sensibilidade dos dados e informações sob responsabilidade da entidade.

    Parágrafo único. A CVM poderá, a qualquer tempo, solicitar informações adicionais
    sobre a adequação das políticas adotadas, levando em consideração os critérios
    previstos nos incisos I a VI deste artigo.
guidance:
  prose: |
    O art. 3 consagra o principio da proporcionalidade, que e o mecanismo de
    calibragem dos requisitos da resolucao. Nao e uma "carta branca" para fazer
    menos — e uma obrigacao de adequar os controles ao perfil real da entidade.

    **Criterios de proporcionalidade:**
    1. **Porte (I):** Patrimonio sob gestao, numero de clientes, volume de operacoes,
       receita. Corretora top-5 vs. consultor individual.
    2. **Perfil de risco (II):** Exposicao a ameacas ciberneticas baseada em tipo de
       atividade, presenca digital, superficie de ataque.
    3. **Modelo de negocio (III):** Digital-first vs. presencial, B2B vs. B2C,
       white-label vs. marca propria.
    4. **Natureza das atividades (IV):** Negociacao em tempo real vs. consultoria,
       custodia de ativos vs. analise.
    5. **Complexidade (V):** Derivativos exoticos vs. renda fixa simples, fundos
       estruturados vs. fundos de acoes vanilla.
    6. **Sensibilidade dos dados (VI):** Dados financeiros de alta frequencia,
       informacoes privilegiadas, dados pessoais sensiveis.

    **Paragrafo unico — Poder fiscalizatorio:**
    A CVM pode, a qualquer momento, questionar se a proporcionalidade esta
    adequada. Isso significa que a entidade precisa ter a justificativa documentada
    para o nivel de controles adotado.

    **Risco de subdimensionamento:**
    Alegar proporcionalidade para justificar controles insuficientes e risco alto.
    A CVM pode entender que a entidade subestimou seu perfil de risco e aplicar
    sancoes. O onus da prova e da entidade.
implementation_guidance:
  platform_engineering:
    prose: |
      **Framework de proporcionalidade:**
      1. Matriz de classificacao: cruzar tipo de entidade x porte x sensibilidade
         de dados para determinar o nivel de controles obrigatorios.
      2. Definir 3 baselines: basico (consultores, analistas), intermediario
         (gestoras de medio porte), avancado (corretoras, custodiantes, infraestrutura).
      3. Documentar justificativa tecnica para o baseline adotado.

      **Implementacao proporcional:**
      4. Baseline basico: criptografia, controle de acesso, backup, antimalware.
      5. Baseline intermediario: + segmentacao de rede, SIEM, gestao de vulnerabilidades.
      6. Baseline avancado: + SOC 24x7, threat intelligence, pentest continuo, DLP.

      **Evidencias de adequacao:**
      7. Risk assessment anual documentado que justifica o baseline escolhido.
      8. Metricas de cobertura de controles por ativo critico.
      9. Revisao de proporcionalidade quando houver mudanca no modelo de negocio.
    tools:
      - grc-platform
      - risk-management-platform
      - asset-inventory
      - compliance-scanner
  devsecops:
    prose: |
      **Pipelines proporcionais:**
      1. Baseline basico: SAST + secret detection em todo commit.
      2. Baseline intermediario: + DAST + dependency scanning + container scanning.
      3. Baseline avancado: + fuzzing + license compliance + IAST.

      **Configuracao por projeto:**
      4. Templates de pipeline CI/CD por baseline (basico, intermediario, avancado).
      5. Projetos tagueados com nivel de criticidade no GitLab.
      6. Security gates proporcionais: blocking para avancado, warning para basico.

      **Documentacao automatizada:**
      7. Relatorio de cobertura de seguranca por projeto e baseline.
      8. Evidencias de que controles sao proporcionais ao perfil de risco.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
      - semgrep
  secops:
    prose: |
      **Risk assessment continuo:**
      1. Assessment anual de perfil de risco cibernetico da entidade.
      2. Mapeamento de superficie de ataque (ASM) proporcional ao porte.
      3. Benchmarking com peers do mesmo segmento e porte.

      **Monitoramento proporcional:**
      4. Baseline basico: monitoramento de endpoints e alertas de incidentes criticos.
      5. Baseline intermediario: + correlacao de eventos, threat detection.
      6. Baseline avancado: + threat hunting, red teaming, simulacoes de ataque.

      **Documentacao para a CVM (paragrafo unico):**
      7. Dossiê de adequacao atualizado anualmente.
      8. Justificativa tecnica para cada controle nao implementado.
      9. Plano de evolucao quando houver gap identificado.
    tools:
      - grc-platform
      - asm-tool
      - vulnerability-scanner
      - siem
