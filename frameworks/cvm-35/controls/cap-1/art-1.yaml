id: art-1
family: cap-1
title: "Objeto da Resolucao"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 1. Esta Resolução dispõe sobre a política de segurança da informação e a
    política de segurança cibernética a serem adotadas pelos prestadores de serviços
    de valores mobiliários e pelos administradores de carteira de valores mobiliários
    de que tratam, respectivamente, a Resolução CVM n. 21, de 25 de fevereiro de 2021,
    e a Resolução CVM n. 21, de 25 de fevereiro de 2021.

    Parágrafo único. Os prestadores de serviços e administradores de que trata o caput
    devem implementar e manter política de segurança da informação e política de segurança
    cibernética compatíveis com seu porte, perfil de risco, modelo de negócio, natureza
    das operações, complexidade dos produtos e serviços, e sensibilidade dos dados sob
    sua responsabilidade.
guidance:
  prose: |
    O art. 1 define o escopo material da Resolucao CVM 35: politica de seguranca da
    informacao (PSI) e politica de seguranca cibernetica (PSC). Sao duas politicas
    distintas, embora possam ser consolidadas em documento unico.

    **Duas politicas, nao uma:**
    A CVM exige explicitamente duas politicas: PSI (abordagem mais ampla, cobrindo
    confidencialidade, integridade e disponibilidade de informacoes) e PSC (focada
    especificamente em ameacas ciberneticas, deteccao, prevencao e resposta). A PSI
    e mais abrangente; a PSC e um subconjunto especializado.

    **Obrigacao de implementar E manter:**
    "Implementar e manter" significa que nao basta criar o documento. A CVM verifica
    se as politicas sao operacionalizadas na pratica, revisadas periodicamente e
    atualizadas conforme a evolucao do cenario de ameacas.

    **Proporcionalidade (paragrafo unico):**
    O principio de proporcionalidade permite que entidades menores adotem politicas
    menos complexas, desde que adequadas ao seu perfil. Uma corretora de grande porte
    com operacoes internacionais tera exigencias mais rigidas do que um consultor de
    valores mobiliarios independente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Fundacao da politica como codigo:**
      1. Documentar PSI e PSC em formato versionavel (YAML/Markdown) em repositorio Git.
      2. Implementar controles tecnicos que operacionalizam as politicas (criptografia,
         controle de acesso, segmentacao de rede, monitoramento).
      3. Classificacao de ativos por criticidade e sensibilidade, alimentando controles
         proporcionais.

      **Proporcionalidade tecnica:**
      4. Definir baselines de seguranca proporcionais ao porte: baseline minimo para
         entidades pequenas, controles avancados para grandes corretoras e gestoras.
      5. Automatizar enforcement de baselines via Policy-as-Code (OPA, Kyverno).
      6. Inventario de ativos de informacao como base para proporcionalidade.
    tools:
      - opa-gatekeeper
      - kyverno
      - vault
      - asset-inventory
      - git
  devsecops:
    prose: |
      **Operacionalizacao das politicas no pipeline:**
      1. Security gates no CI/CD alinhados a PSI e PSC.
      2. SAST, DAST, SCA como controles minimos obrigatorios para todo software.
      3. Versionamento das politicas com pull request e aprovacao obrigatoria.
      4. Changelog automatico para rastreabilidade de alteracoes nas politicas.

      **Evidencias de implementacao:**
      5. Dashboard de conformidade com status dos controles da PSI e PSC.
      6. Metricas de seguranca que evidenciam a manutencao ativa das politicas.
      7. Audit trail de excecoes aprovadas e justificativas.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
      - sonarqube
  secops:
    prose: |
      **Gestao operacional das politicas:**
      1. Revisao periodica das politicas (minimo anual, conforme art. 6).
      2. Gap analysis entre politicas e controles efetivamente implementados.
      3. Metricas de efetividade: incidentes evitados, tempo de deteccao, cobertura.

      **Auditoria e conformidade:**
      4. Auditoria interna da implementacao da PSI e PSC.
      5. Evidencias documentadas para fiscalizacao da CVM.
      6. Benchmark com peers do setor para validar proporcionalidade.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
