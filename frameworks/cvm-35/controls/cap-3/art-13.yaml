id: art-13
family: cap-3
title: "Relatorio Anual de Seguranca Cibernetica"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 13. A entidade deve elaborar relatório anual sobre a implementação
    do plano de ação e de resposta a incidentes cibernéticos, que deve
    conter, no mínimo:
    I - avaliação da efetividade das ações implementadas;
    II - resumo dos resultados obtidos nos testes de segurança cibernética
    realizados;
    III - resumo dos incidentes cibernéticos ocorridos no período;
    IV - proposição de melhorias e ajustes necessários.

    Parágrafo único. O relatório de que trata o caput deve ser apresentado
    à diretoria da entidade e estar disponível para a CVM.
guidance:
  prose: |
    O art. 13 exige relatorio anual que serve como prestacao de contas da
    efetividade do programa de seguranca cibernetica.

    **Objetivo do relatorio:**
    Nao e apenas um documento burocratico. E o instrumento pelo qual a
    diretoria toma ciencia do estado da seguranca cibernetica e a CVM
    avalia a maturidade da entidade. Deve ser substantivo e baseado em
    dados.

    **I — Efetividade das acoes:**
    Avaliar se as acoes planejadas foram efetivamente implementadas e se
    produziram os resultados esperados. Exemplo: se o plano previa MFA
    em todos os sistemas criticos, o relatorio deve indicar percentual
    de cobertura alcancado e justificar eventuais gaps.

    **II — Resultados de testes:**
    Resumo dos pentests, vulnerability assessments, exercicios de resposta
    a incidentes realizados no periodo. Incluir: escopo, metodologia,
    achados principais, remediacao realizada, achados pendentes.

    **III — Incidentes ocorridos:**
    Panorama dos incidentes do periodo: quantidade, classificacao por
    severidade, tipos predominantes, tempo medio de deteccao e resposta,
    impacto. Incluir incidentes comunicados a CVM (art. 12) e incidentes
    menores.

    **IV — Proposicao de melhorias:**
    Plano de acao para o proximo periodo baseado nos gaps identificados.
    Deve ser concreto: o que sera feito, quando, por quem, com que recurso.

    **Paragrafo unico — Diretoria e CVM:**
    O relatorio deve ser formalmente apresentado a diretoria (nao apenas
    enviado por e-mail) e mantido disponivel para a CVM em caso de
    supervisao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de coleta de dados para relatorio:**
      1. Dashboard anual consolidado com metricas de todas as ferramentas
         de seguranca (SIEM, vulnerability scanner, EDR, SAST, DAST).
      2. Exportacao programada de metricas: vulnerabilidades encontradas/
         remediadas, incidentes detectados/resolvidos, cobertura de controles.
      3. Comparativo year-over-year para evidenciar evolucao.

      **Efetividade (I):**
      4. Status de implementacao de cada controle planejado (implementado,
         parcial, pendente) com evidencia automatizada.
      5. Cobertura de patching por sistema critico.
      6. Status de MFA, criptografia, backup por ativo.

      **Testes (II):**
      7. Integracao com ferramentas de pentest e scanning para importar
         resultados automaticamente.
      8. Tracking de remediacao de findings com SLA compliance.

      **Incidentes (III):**
      9. Relatorio automatico de incidentes do SIEM/SOAR: quantidade,
         severidade, tipo, MTTD, MTTR.
      10. Analise de tendencias de incidentes.
    tools:
      - siem
      - vulnerability-scanner
      - grc-platform
      - compliance-dashboard
      - edr-xdr
  devsecops:
    prose: |
      **Metricas do pipeline para relatorio:**
      1. Total de vulnerabilidades encontradas por SAST, DAST, SCA no periodo.
      2. Vulnerabilidades remediadas vs. abertas (burn-down chart).
      3. MTTR por severidade de vulnerabilidade.
      4. Cobertura de scanning: percentual de repositorios com pipeline de
         seguranca ativo.

      **Resultados de testes (II):**
      5. Resultados de dependency scanning: bibliotecas vulneraveis
         detectadas e atualizadas.
      6. Resultados de container scanning: imagens vulneraveis bloqueadas.
      7. Resultados de secret detection: credenciais expostas detectadas
         e rotacionadas.

      **Melhoria continua (IV):**
      8. Plano de evolucao do pipeline de seguranca para o proximo periodo.
      9. Novas ferramentas ou controles a serem adicionados.
      10. Gaps identificados em cobertura de scanning.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - gitlab-vulnerability-report
  secops:
    prose: |
      **Elaboracao do relatorio anual:**
      1. Template padronizado alinhado aos quatro incisos do art. 13.
      2. Coleta de dados de todas as fontes: SIEM, SOAR, GRC, vulnerability
         scanner, pentest reports, incident tickets.
      3. Deadline interno: relatorio pronto 60 dias antes da data de
         apresentacao a diretoria.

      **Efetividade (I):**
      4. Avaliacao de cada controle planejado vs. implementado.
      5. Metricas de resultado: reducao de incidentes, melhoria de MTTD/MTTR,
         aumento de cobertura.
      6. Benchmarking com frameworks de referencia (NIST CSF, CIS Controls).

      **Testes (II):**
      7. Resumo executivo de todos os pentests e assessments do periodo.
      8. Status de remediacao de findings criticos e altos.
      9. Resultados de exercicios de resposta a incidentes.

      **Incidentes (III):**
      10. Dashboard de incidentes: quantidade, severidade, tipo, tendencia.
      11. Detalhamento de incidentes relevantes (comunicados a CVM).
      12. Licoes aprendidas consolidadas.

      **Melhorias (IV):**
      13. Plano de acao para o proximo periodo com cronograma e responsaveis.
      14. Orcamento necessario para implementacao das melhorias.
      15. Priorizacao baseada em risco residual.

      **Apresentacao a diretoria (paragrafo unico):**
      16. Versao executiva do relatorio para diretoria.
      17. Ata de apresentacao com registro de participantes e deliberacoes.
      18. Copia disponivel para CVM em formato adequado.
    tools:
      - grc-platform
      - siem
      - soar
      - vulnerability-scanner
      - pentest-management
