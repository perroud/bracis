id: art-9
family: cap-3
title: "Requisitos da Politica de Seguranca Cibernetica"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 9. Os prestadores de serviços e os administradores de carteira de que
    trata o art. 2 devem implementar e manter política de segurança cibernética
    formulada com base em princípios e diretrizes que busquem assegurar a
    confidencialidade, a integridade e a disponibilidade dos dados e dos
    sistemas de informação utilizados.

    Parágrafo único. A política de segurança cibernética deve abranger, no
    mínimo, procedimentos e controles voltados a:
    I - detecção de ameaças cibernéticas;
    II - prevenção contra ataques cibernéticos;
    III - redução de vulnerabilidades em sistemas e aplicações;
    IV - resposta e recuperação de incidentes cibernéticos.
guidance:
  prose: |
    O art. 9 marca o inicio do capitulo 3, que trata especificamente da PSC
    (Politica de Seguranca Cibernetica), distinta da PSI do capitulo 2.

    **Diferenca entre PSI (cap. 2) e PSC (cap. 3):**
    A PSI e abrangente (seguranca da informacao em geral). A PSC e focada
    em ameacas ciberneticas — ataques, intrusoes, malware, ransomware,
    DDoS, exfiltracao de dados, comprometimento de sistemas. A PSC deve
    ter controles especificos para o ambiente digital.

    **Triade CIA:**
    A PSC deve proteger confidencialidade (sigilo de dados de investidores
    e operacoes), integridade (dados e sistemas nao podem ser adulterados)
    e disponibilidade (sistemas de negociacao e custodia devem permanecer
    operacionais).

    **Quatro pilares do paragrafo unico:**
    I - Deteccao: capacidade de identificar ameacas em tempo real ou
        proximo ao real (SIEM, IDS, EDR, threat intelligence).
    II - Prevencao: controles que bloqueiam ataques antes de causar dano
         (firewall, WAF, segmentacao, hardening, patching).
    III - Reducao de vulnerabilidades: gestao proativa (scanning,
          pentest, patching, code review, secure development).
    IV - Resposta e recuperacao: plano de resposta a incidentes, playbooks,
         procedimentos de contencao, erradicacao e recuperacao.

    **Expectativa da CVM:**
    A PSC deve ser operacional, nao apenas declaratoria. Deve haver
    ferramentas, equipes e processos que efetivamente implementem os
    quatro pilares.
implementation_guidance:
  platform_engineering:
    prose: |
      **Deteccao (I):**
      1. SIEM centralizado com correlacao de eventos de seguranca.
      2. IDS/IPS em pontos criticos da rede (perimetro, segmentos internos).
      3. EDR/XDR em endpoints e servidores com deteccao comportamental.
      4. Threat intelligence feeds integrados ao SIEM para deteccao proativa.

      **Prevencao (II):**
      5. Firewall next-generation com inspecao de trafego criptografado.
      6. WAF para aplicacoes web expostas (portais de investidores, APIs).
      7. Microsegmentacao de rede para limitar blast radius de ataques.
      8. Zero Trust Architecture para acesso a sistemas criticos.
      9. Hardening automatizado de sistemas (CIS Benchmarks).

      **Reducao de vulnerabilidades (III):**
      10. Vulnerability scanning automatizado semanal.
      11. Patch management centralizado com SLAs por severidade.
      12. Container image scanning em registries.
      13. Infrastructure-as-Code scanning (Checkov, tfsec) para prevenir
          misconfiguration.

      **Resposta e recuperacao (IV):**
      14. Plano de resposta a incidentes documentado e testado.
      15. Runbooks automatizados para contencao de incidentes comuns.
      16. Backup e disaster recovery testados trimestralmente.
      17. Ambiente de recuperacao isolado (clean room) para ransomware.
    tools:
      - siem
      - edr-xdr
      - ids-ips
      - waf
      - firewall-ngfw
      - vulnerability-scanner
      - vault
      - terraform
      - checkov
  devsecops:
    prose: |
      **Deteccao no pipeline (I):**
      1. SAST em cada merge request para detectar vulnerabilidades em codigo.
      2. DAST em ambiente staging para detectar vulnerabilidades em runtime.
      3. Dependency scanning para bibliotecas com CVEs conhecidas.
      4. Container scanning para vulnerabilidades em imagens Docker.
      5. Secret detection para credenciais expostas em codigo.

      **Prevencao no desenvolvimento (II):**
      6. Branch protection com code review obrigatorio.
      7. Security gates bloqueantes para vulnerabilidades criticas e altas.
      8. Signed commits para garantir integridade e autenticidade de codigo.
      9. Supply chain security (SLSA, SBOM) para prevenir ataques de cadeia.

      **Reducao de vulnerabilidades (III):**
      10. Auto-merge de patches de seguranca via Dependabot/Renovate.
      11. SLAs de remediacao integrados ao pipeline (blocking se SLA excedido).
      12. Fuzzing para descoberta de vulnerabilidades nao cobertas por SAST.
      13. License compliance para evitar componentes com licencas inseguras.

      **Resposta (IV):**
      14. Rollback automatizado de deployments com vulnerabilidades criticas.
      15. Feature flags para desabilitar funcionalidades comprometidas.
      16. Canary deployments para limitar impacto de codigo vulneravel.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - semgrep
      - trivy
      - renovate
  secops:
    prose: |
      **Deteccao operacional (I):**
      1. SOC com monitoramento continuo (24x7 para entidades de grande porte).
      2. Regras de correlacao no SIEM especificas para o mercado de capitais
         (manipulacao de ordens, acesso a informacoes privilegiadas).
      3. Threat hunting proativo baseado em IoCs e TTPs relevantes ao setor.
      4. Monitoramento de dark web para dados da entidade.

      **Prevencao operacional (II):**
      5. Gestao de firewalls e WAF com revisao periodica de regras.
      6. Hardening contínuo baseado em benchmarks atualizados (CIS, DISA).
      7. Seguranca de e-mail (SPF, DKIM, DMARC, gateway anti-phishing).

      **Reducao de vulnerabilidades (III):**
      8. Gestao centralizada de vulnerabilidades com SLA tracking.
      9. Priorizacao baseada em contexto de negocio (asset criticality).
      10. Relatorio mensal de postura de vulnerabilidades para diretoria.

      **Resposta e recuperacao (IV):**
      11. Plano de resposta a incidentes com playbooks por tipo de incidente.
      12. Equipe de resposta a incidentes (CSIRT) designada e treinada.
      13. Exercicios de tabletop trimestrais e simulacoes anuais completas.
      14. DR plan testado com RTO/RPO definidos para sistemas criticos.
    tools:
      - siem
      - soar
      - edr-xdr
      - threat-intelligence-platform
      - vulnerability-scanner
      - grc-platform
