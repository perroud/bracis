id: art-21
family: cap-5
title: "Diretor Responsavel pela Seguranca da Informacao e Cibernetica"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 21. A entidade deve designar membro da diretoria ou, quando houver,
    do conselho de administração, como responsável pela política de segurança
    da informação e pela política de segurança cibernética.

    Parágrafo 1. O responsável de que trata o caput deve possuir competência
    técnica e gerencial compatíveis com a função.

    Parágrafo 2. A designação de que trata o caput deve ser comunicada à CVM
    no prazo de 30 (trinta) dias contados da data da designação.
guidance:
  prose: |
    O art. 21 exige a designacao formal de um responsavel pela PSI e PSC no
    nivel de diretoria ou conselho de administracao.

    **Quem pode ser designado:**
    - Membro da diretoria estatutaria ou contratual.
    - Membro do conselho de administracao, quando existir.
    - Nao pode ser terceirizado ou funcionario de nivel inferior. Deve ser
      alguem com poder de decisao e accountability perante a CVM.

    **Paragrafo 1 — Competencia:**
    O designado deve ter competencia tecnica (entender seguranca da informacao
    e cibernetica em nivel suficiente para tomar decisoes) e gerencial
    (capacidade de gestao, lideranca, alocacao de recursos). Na pratica,
    em entidades maiores, e o CTO ou CISO com assento na diretoria. Em
    menores, pode ser um diretor com formacao ou experiencia em tecnologia.
    A CVM pode questionar a adequacao da designacao.

    **Paragrafo 2 — Comunicacao a CVM:**
    A designacao deve ser comunicada a CVM em ate 30 dias. Mudancas de
    responsavel tambem devem ser comunicadas no mesmo prazo. A CVM mantem
    registro de quem e o responsavel em cada entidade.

    **Responsabilidade pessoal:**
    O designado pode ser pessoalmente responsabilizado pela CVM em caso de
    descumprimento das politicas. Isso inclui multas, inabilitacao e outras
    sancoes administrativas. A responsabilidade e compartilhada com a
    diretoria como um todo (art. 20), mas o designado tem responsabilidade
    primaria.

    **Conflito de interesse:**
    O responsavel nao deve acumular funcoes que criem conflito de interesse.
    Exemplo: ser ao mesmo tempo responsavel por seguranca cibernetica e
    por vendas/comercial, onde pressao por resultados pode comprometer
    decisoes de seguranca.
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte tecnico ao diretor responsavel:**
      1. Dashboard executivo personalizado para o diretor responsavel,
         com metricas de seguranca em tempo real.
      2. Alertas criticos encaminhados diretamente ao responsavel
         (incidentes graves, non-compliance critica).
      3. Acesso privilegiado a todas as ferramentas de seguranca para
         supervisao e tomada de decisao.

      **Estrutura de suporte:**
      4. CISO ou equivalente como suporte tecnico direto ao diretor
         responsavel (se o designado nao for o CISO).
      5. Equipe de seguranca com reporte funcional ao diretor responsavel.
      6. Canal direto de comunicacao entre equipe de seguranca e diretoria.

      **Comunicacao a CVM (paragrafo 2):**
      7. Processo formal de comunicacao de designacao/alteracao a CVM.
      8. Alerta automatico 20 dias antes do prazo de 30 dias.
      9. Registro de todas as comunicacoes enviadas a CVM sobre designacao.
    tools:
      - compliance-dashboard
      - siem
      - grc-platform
      - pagerduty
  devsecops:
    prose: |
      **Visibilidade para o diretor responsavel:**
      1. Acesso ao security dashboard do GitLab com visao consolidada
         de todas as vulnerabilidades, incidentes e compliance status.
      2. Relatorio semanal automatizado com resumo de seguranca para
         o diretor responsavel.
      3. Alertas de non-compliance em projetos criticos diretamente
         ao responsavel.

      **Competencia tecnica (paragrafo 1):**
      4. Briefings tecnicos periodicos sobre evolucao das ferramentas
         de seguranca e ameacas emergentes.
      5. Dashboards com metricas traduzidas para linguagem executiva
         (nao apenas tecnica).
      6. Recomendacoes de investimento baseadas em dados do pipeline.
    tools:
      - gitlab-compliance-dashboard
      - gitlab-vulnerability-report
      - gitlab-ci
  secops:
    prose: |
      **Designacao e comunicacao:**
      1. Ata de designacao do diretor responsavel com aprovacao da
         diretoria/conselho.
      2. Comunicacao formal a CVM no prazo de 30 dias (paragrafo 2).
      3. Atualizacao imediata em caso de substituicao.
      4. Registro em sistema de GRC com datas e documentacao.

      **Suporte operacional ao responsavel:**
      5. Briefing semanal de seguranca para o diretor responsavel:
         incidentes, vulnerabilidades criticas, riscos emergentes.
      6. Relatorio mensal detalhado com metricas de seguranca.
      7. Relatorio anual para apresentacao a diretoria (art. 20, IV).

      **Competencia tecnica (paragrafo 1):**
      8. Programa de capacitacao continua para o diretor responsavel:
         cursos, certificacoes, participacao em eventos do setor.
      9. Acesso a threat intelligence e advisories do setor financeiro.
      10. Participacao em foruns de CISOs do mercado de capitais.

      **Responsabilidade e accountability:**
      11. Documentacao formal de todas as decisoes de seguranca
          tomadas ou aprovadas pelo responsavel.
      12. Registro de delegacoes com limites de autoridade.
      13. Evidencia de supervisao ativa (reunioes, revisoes, aprovacoes).
      14. Plano de sucessao para o diretor responsavel.
    tools:
      - grc-platform
      - siem
      - threat-intelligence-platform
      - training-platform
