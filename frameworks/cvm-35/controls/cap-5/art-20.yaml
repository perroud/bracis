id: art-20
family: cap-5
title: "Responsabilidades da Diretoria"
class: CVM-35
baselines: [all]
statement:
  prose: |
    Art. 20. Compete à diretoria da entidade:
    I - aprovar a política de segurança da informação e a política de segurança
    cibernética;
    II - assegurar a conformidade das atividades da entidade com a política de
    segurança da informação e com a política de segurança cibernética;
    III - garantir recursos humanos, tecnológicos e financeiros adequados para
    a implementação e manutenção das políticas;
    IV - receber, no mínimo anualmente, relatório sobre a situação da segurança
    da informação e da segurança cibernética da entidade.
guidance:
  prose: |
    O art. 20 define quatro competencias da diretoria em relacao a seguranca
    da informacao e cibernetica. Esse artigo e fundamental porque coloca a
    responsabilidade no topo da hierarquia — a diretoria nao pode delegar
    a responsabilidade, apenas a execucao.

    **I — Aprovacao das politicas:**
    A PSI e a PSC devem ser formalmente aprovadas pela diretoria. Nao por
    um comite, nao pelo CISO, nao pela area de TI. A diretoria. Isso deve
    ser documentado em ata de reuniao da diretoria com assinaturas.

    **II — Assegurar conformidade:**
    A diretoria e responsavel por garantir que a entidade cumpre as politicas
    aprovadas. Na pratica, isso significa: cobrar relatorios, designar
    responsaveis, reagir a gaps identificados, tomar decisoes sobre riscos
    aceitos.

    **III — Garantir recursos:**
    Recursos humanos (equipe de seguranca, CISO, analistas), tecnologicos
    (ferramentas, infraestrutura) e financeiros (orcamento dedicado).
    A CVM pode questionar se recursos alocados sao suficientes. A entidade
    deve ser capaz de justificar o investimento em seguranca proporcional
    ao seu perfil de risco (art. 3).

    **IV — Relatorio anual:**
    A diretoria deve receber (e nao apenas ter disponivel) relatorio sobre
    o estado da seguranca. Isso se conecta ao art. 13 (relatorio anual).
    A CVM verifica se ha evidencia de que a diretoria efetivamente recebeu,
    discutiu e deliberou sobre o relatorio.

    **Responsabilidade pessoal:**
    Diretores podem ser pessoalmente responsabilizados pela CVM em caso
    de descumprimento. A negligencia na supervisao de seguranca cibernetica
    pode resultar em sancoes individuais (multa, inabilitacao).
implementation_guidance:
  platform_engineering:
    prose: |
      **Aprovacao de politicas (I):**
      1. Workflow de aprovacao de politicas via plataforma de GRC ou Git
         com merge request que exija aprovacao de membros da diretoria.
      2. Assinatura digital das politicas aprovadas com certificado ICP-Brasil.
      3. Versionamento com tag de aprovacao (quem aprovou, quando, versao).

      **Conformidade (II):**
      4. Dashboard executivo de conformidade com as politicas, atualizado
         em tempo real.
      5. Indicadores KRI (Key Risk Indicators) para diretoria: cobertura
         de patching, vulnerabilidades criticas abertas, incidentes por
         periodo, cobertura de MFA.
      6. Alertas automaticos para diretoria quando metricas criticas
         degradam (ex: vulnerabilidade critica sem patch > SLA).

      **Recursos (III):**
      7. Inventario de recursos de seguranca: headcount, ferramentas,
         orcamento vs. planejado.
      8. Benchmarking de investimento em seguranca vs. peers do setor
         (percentual da receita, custo por funcionario).
      9. Plano de capacidade para equipe de seguranca com projecoes.

      **Relatorio anual (IV):**
      10. Relatorio automatizado com dados de todas as ferramentas de
          seguranca, consolidado para audiencia executiva.
      11. Agenda fixa no calendario da diretoria para apresentacao anual.
      12. Ata de reuniao com deliberacoes registradas.
    tools:
      - grc-platform
      - compliance-dashboard
      - siem
      - git
      - digital-signature
  devsecops:
    prose: |
      **Metricas para diretoria (II, IV):**
      1. Security posture dashboard agregando metricas de todos os pipelines:
         vulnerabilidades por severidade, cobertura de scanning, MTTR.
      2. Trend analysis: evolucao da postura de seguranca ao longo do tempo.
      3. Comparativo entre equipes de desenvolvimento para identificar areas
         que necessitam mais recursos (III).

      **Evidencias de conformidade (II):**
      4. Compliance framework do GitLab Ultimate configurado com CVM 35.
      5. Relatorio automatico de projetos em conformidade vs. fora de
         conformidade.
      6. Evidencias de que security gates estao ativas e bloqueantes.

      **Suporte a decisao (I, III):**
      7. Relatorio de ROI de ferramentas de seguranca (vulnerabilidades
         encontradas, tempo economizado, incidentes prevenidos).
      8. Recomendacoes baseadas em dados para investimento em seguranca.
    tools:
      - gitlab-compliance-dashboard
      - gitlab-vulnerability-report
      - gitlab-ci
      - sonarqube
  secops:
    prose: |
      **Governanca executiva:**
      1. Comite de seguranca da informacao com participacao da diretoria,
         reunioes trimestrais no minimo.
      2. Pauta fixa: status de conformidade CVM 35, incidentes do periodo,
         riscos criticos, decisoes necessarias.

      **Aprovacao de politicas (I):**
      3. Processo formal: CISO elabora/revisa -> comite de seguranca
         recomenda -> diretoria aprova -> publicacao.
      4. Ata de aprovacao com registro de deliberacoes e votos.

      **Conformidade (II):**
      5. Relatorio trimestral de conformidade para diretoria.
      6. Escalacao automatica de non-compliance critica para diretoria.
      7. Registro de decisoes de risco aceito com justificativa e prazo.

      **Recursos (III):**
      8. Proposta anual de orcamento de seguranca baseada em risk assessment.
      9. Justificativa de investimento vinculada a requisitos regulatorios.
      10. Monitoramento de execucao orcamentaria vs. aprovado.

      **Relatorio anual (IV):**
      11. Elaboracao do relatorio anual (art. 13) com versao executiva para
          diretoria.
      12. Apresentacao formal com agenda de Q&A.
      13. Registro de ata com deliberacoes e plano de acao aprovado.
      14. Disponibilizacao do relatorio para CVM conforme art. 13, paragrafo unico.
    tools:
      - grc-platform
      - siem
      - compliance-scanner
      - risk-management-platform
