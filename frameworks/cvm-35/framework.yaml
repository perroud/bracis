related_frameworks:
  - framework_id: bacen-4893
    relationship: equivalent-to
    description: >-
      A Resolucao CVM 35 e o analogo da Resolucao BCB 4.893 para o mercado de capitais.
      Ambas tratam de seguranca cibernetica e contratacao de servicos em nuvem, com
      estrutura e requisitos equivalentes, porem direcionadas a entidades reguladas por
      autoridades distintas.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a Resolucao CVM 35 na protecao de dados pessoais tratados por
      participantes do mercado de capitais, exigindo medidas de seguranca, base legal e
      comunicacao de incidentes.
  - framework_id: cnsp-381
    relationship: equivalent-to
    description: "A Resolucao CNSP 381 e o analogo para o mercado segurador, assim como a CVM 35 e para o mercado de capitais e a Bacen 4893 para o sistema financeiro."
  - framework_id: nist-800-53-rev5
    relationship: mapped
    description: "Os controles do NIST 800-53 rev5 oferecem mapeamento detalhado para implementacao tecnica dos requisitos da Resolucao CVM 35."
    mapping_file: "mappings/cvm-35_to_nist-800-53-rev5.yaml"
  - framework_id: iso-27001-2022
    relationship: mapped
    description: "A ISO 27001:2022 fornece o framework de gestao de seguranca da informacao que suporta a conformidade com a Resolucao CVM 35."
    mapping_file: "mappings/cvm-35_to_iso-27001-2022.yaml"
