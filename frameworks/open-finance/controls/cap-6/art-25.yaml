id: art-25
family: cap-6
title: "Responsabilidades dos Participantes"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 25. São responsabilidades dos participantes do Open Finance:

    I - a instituição transmissora de dados é responsável pela autenticação
    do cliente e pela garantia de que o compartilhamento ocorre somente
    mediante consentimento válido;

    II - a instituição receptora de dados é responsável pelo uso adequado
    dos dados recebidos, limitado à finalidade declarada no consentimento;

    III - o iniciador de transação de pagamento é responsável pela
    segurança do ambiente em que o cliente solicita a iniciação e pela
    integridade da ordem de pagamento transmitida;

    IV - todos os participantes são responsáveis por manter a segurança
    de suas interfaces dedicadas e pela comunicação de incidentes de
    segurança ao diretório e ao BCB;

    V - a responsabilidade por danos causados ao cliente é solidária
    entre os participantes envolvidos no compartilhamento, ressalvado
    o direito de regresso.
guidance:
  prose: |
    O art. 25 distribui responsabilidades no ecossistema:

    **Transmissora (data holder):**
    - Autentica o cliente (dono dos dados)
    - Valida consentimento antes de transmitir
    - Garante qualidade e acuracia dos dados
    - Mantem disponibilidade das APIs

    **Receptora (data recipient):**
    - Usa dados apenas para finalidade consentida
    - Nao retransmite dados sem autorizacao
    - Protege dados recebidos conforme LGPD
    - Exclui dados quando consentimento expira/e revogado

    **Iniciador (ITP):**
    - Seguranca do app/site onde cliente solicita pagamento
    - Integridade da ordem de pagamento (nao adulteracao)
    - Nao armazena credenciais do cliente
    - Informa status da transacao ao cliente

    **Responsabilidade solidaria:**
    Em caso de dano ao cliente (vazamento, fraude, erro), TODOS
    os participantes envolvidos respondem solidariamente.
    Na pratica: o cliente processa qualquer um, e depois eles
    discutem regresso entre si.
implementation_guidance:
  platform_engineering:
    prose: |
      **Segregacao de responsabilidades tecnicas:**
      1. Implementar logging detalhado para demonstrar cumprimento
         de responsabilidades (quem fez o que, quando).
      2. Configurar controles de acesso que reflitam o papel exercido
         (transmissor, receptor, iniciador).
      3. Implementar mecanismo de notificacao de incidentes para
         diretorio e BCB.
      4. Garantir que dados recebidos como receptor sao isolados
         e acessiveis apenas para a finalidade consentida.
    tools:
      - logging
      - access-control
      - incident-notification
      - data-isolation
  devsecops:
    prose: |
      **Validacao de segregacao de responsabilidades:**
      1. Testar que dados recebidos nao sao acessados para finalidades
         nao-consentidas (testes de controle de acesso).
      2. Verificar que logs capturam todas as acoes relevantes.
      3. Testar fluxo de notificacao de incidentes.
      4. Validar isolamento de dados entre consentimentos diferentes.
    tools:
      - access-control-tests
      - audit-tests
      - incident-tests
      - gitlab-ci
  secops:
    prose: |
      **Governanca de responsabilidades:**
      1. Documentar formalmente o papel exercido no ecossistema.
      2. Manter evidencias de cumprimento de cada responsabilidade.
      3. Implementar processo de comunicacao de incidentes ao BCB.
      4. Preparar resposta para cenarios de responsabilidade solidaria.
    tools:
      - grc-platform
      - incident-management
      - legal-documentation
