id: art-23
family: cap-6
title: "Estrutura de Governanca do Open Finance"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 23. O Open Finance deve contar com estrutura de governança responsável
    por:

    I - definir e manter as especificações técnicas das interfaces dedicadas,
    incluindo padrões de APIs, segurança, experiência do usuário e testes;

    II - administrar o diretório de participantes, incluindo cadastro,
    atualização e exclusão de instituições e software statements;

    III - definir e monitorar níveis de serviço (SLAs) e métricas de
    desempenho do ecossistema;

    IV - resolver disputas técnicas e operacionais entre participantes;

    V - submeter periodicamente relatórios ao Banco Central do Brasil
    sobre o funcionamento do ecossistema.

    Parágrafo único. A estrutura de governança será definida por meio de
    convenção celebrada entre os participantes, conforme diretrizes do BCB.
guidance:
  prose: |
    O art. 23 define a governanca do ecossistema:

    **Estrutura de governanca (na pratica):**
    A governanca do Open Finance Brasil e exercida pela Estrutura Inicial
    do Open Finance (EIOF), que inclui:
    - Conselho Deliberativo (decisoes estrategicas)
    - Secretariado (operacao do diretorio)
    - Grupos de Trabalho (especificacoes tecnicas)
    - Comite de Resolucao de Disputas

    **Diretorio de participantes:**
    Sistema centralizado que:
    - Cadastra e autentica participantes
    - Emite software statements (SSA)
    - Publica endpoints de cada participante
    - Gerencia certificados e chaves publicas

    **Especificacoes tecnicas:**
    Mantidas no repositorio publico do Open Finance Brasil, incluindo:
    - APIs (OpenAPI specs)
    - Perfil de seguranca (FAPI)
    - Guia de experiencia do usuario
    - Requisitos de testes e conformidade

    **Supervisao do BCB:**
    O BCB supervisiona a governanca e pode intervir em caso de
    falhas sistemicas ou descumprimento da regulamentacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Integracao com governanca:**
      1. Registrar a instituicao no diretorio de participantes.
      2. Configurar integracao com APIs do diretorio para:
         - Discovery de endpoints de outros participantes
         - Publicacao dos proprios endpoints
         - Obtencao de software statements
      3. Implementar processo automatizado de atualizacao de
         especificacoes tecnicas quando novas versoes sao publicadas.
      4. Participar do sandbox do diretorio para validacao.
    tools:
      - directory-integration
      - api-management
      - configuration-management
  devsecops:
    prose: |
      **Alinhamento com especificacoes do diretorio:**
      1. Automatizar download e validacao de novas especificacoes.
      2. Executar suite de conformidade do diretorio em pipeline.
      3. Notificar equipe sobre mudancas em especificacoes.
      4. Manter branches alinhadas com versoes das especificacoes.
    tools:
      - conformance-suite
      - spec-monitoring
      - gitlab-ci
  secops:
    prose: |
      **Governanca e supervisao:**
      1. Participar dos foruns de governanca (GTs, comites).
      2. Acompanhar decisoes do conselho deliberativo que impactem a instituicao.
      3. Manter registro de conformidade com especificacoes vigentes.
      4. Preparar relatorios para o BCB conforme exigido.
    tools:
      - grc-platform
      - regulatory-intelligence
legal_references:
