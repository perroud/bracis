id: art-26
family: cap-6
title: "Supervisao pelo Banco Central do Brasil"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 26. O Banco Central do Brasil exercerá a supervisão do Open Finance,
    competindo-lhe:

    I - avaliar periodicamente o funcionamento do ecossistema e a atuação
    da estrutura de governança;

    II - determinar ações corretivas em caso de descumprimento das
    disposições desta Resolução Conjunta ou das especificações técnicas;

    III - aplicar as sanções previstas na legislação e na regulamentação
    em vigor em caso de infrações;

    IV - definir cronograma de implementação e eventuais prorrogações
    de prazos;

    V - requisitar informações, documentos e dados dos participantes
    e da estrutura de governança para fins de supervisão.
guidance:
  prose: |
    O art. 26 estabelece o papel de supervisor do BCB:

    **Poderes de supervisao:**
    - Avaliacao periodica do ecossistema
    - Acoes corretivas e determinacoes
    - Sancoes administrativas
    - Definicao de cronogramas
    - Requisicao de informacoes

    **Sancoes possiveis:**
    - Advertencia
    - Multa
    - Suspensao de participacao
    - Exclusao do ecossistema
    - Intervencao na governanca

    **Obrigacoes de reporte ao BCB:**
    - Relatorios periodicos da governanca
    - Comunicacao de incidentes graves
    - Dados de metricas e desempenho
    - Informacoes sobre reclamacoes de clientes

    **Cronograma de implementacao (fases):**
    O BCB definiu fases de implementacao progressiva:
    - Fase 1: Dados abertos (2021)
    - Fase 2: Dados cadastrais e transacionais (2021-2022)
    - Fase 3: Iniciacao de pagamento (2022)
    - Fase 4: Demais produtos (2022-2023)
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de reporte regulatorio:**
      1. Implementar coleta automatizada de metricas operacionais
         exigidas pelo BCB (disponibilidade, latencia, erros).
      2. Configurar gerador de relatorios regulatorios periodicos.
      3. Implementar mecanismo de resposta a requisicoes de informacao
         do BCB com prazos configurados.
      4. Manter registros de implementacao por fase com evidencias.
    tools:
      - metrics-collection
      - reporting-engine
      - regulatory-reporting
  devsecops:
    prose: |
      **Evidencias de conformidade:**
      1. Gerar relatorios automatizados de conformidade por fase.
      2. Manter dashboards de metricas acessiveis para auditoria.
      3. Documentar evidencias de implementacao em cada release.
      4. Automatizar coleta de dados para relatorios regulatorios.
    tools:
      - compliance-dashboard
      - metrics-pipeline
      - gitlab-ci
  secops:
    prose: |
      **Relacionamento com supervisor:**
      1. Manter canal de comunicacao com equipe de supervisao do BCB.
      2. Preparar e enviar relatorios periodicos conforme cronograma.
      3. Responder requisicoes de informacao dentro dos prazos.
      4. Acompanhar determinacoes e implementar acoes corretivas.
    tools:
      - grc-platform
      - regulatory-communication
      - action-tracker
legal_references:
  - framework_id: bacen-4893
    articles: ["art-21"]
    relationship: complements
