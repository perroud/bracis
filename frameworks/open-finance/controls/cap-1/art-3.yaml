id: art-3
family: cap-1
title: "Participantes Obrigatorios"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 3. São obrigadas a participar do Open Finance as instituições enquadradas
    nos segmentos S1 e S2, conforme regulamentação do Banco Central do Brasil,
    bem como as demais instituições autorizadas a funcionar pelo BCB que:

    I - sejam classificadas como banco comercial, banco múltiplo com carteira
    comercial, caixa econômica ou cooperativa de crédito de livre admissão de
    associados; e

    II - possuam ativo total superior a limite definido pelo BCB.

    Parágrafo único. As instituições enquadradas nos segmentos S3, S4 e S5 podem
    participar voluntariamente do Open Finance, desde que atendam aos requisitos
    técnicos e de segurança estabelecidos.
guidance:
  prose: |
    O art. 3 define a obrigatoriedade e voluntariedade de participacao:

    **Participantes obrigatorios (S1 e S2):**
    - Bancos de grande porte (ativo total > R$ 100 bilhoes)
    - Bancos de medio-grande porte (ativo total entre R$ 1 bilhao e R$ 100 bilhoes)
    - Inclui: Itau, Bradesco, Santander, BB, Caixa, entre outros

    **Participantes voluntarios:**
    - Bancos de menor porte (S3, S4, S5)
    - Fintechs e instituicoes de pagamento
    - Cooperativas de credito menores
    - Corretoras e distribuidoras

    **Implicacao tecnica:**
    Participantes obrigatorios devem implementar TODAS as APIs do ecossistema.
    Participantes voluntarios podem escolher quais APIs implementar, mas
    devem cumprir integralmente os requisitos de seguranca.
implementation_guidance:
  platform_engineering:
    prose: |
      **Classificacao e perimetro de implementacao:**
      1. Verificar o enquadramento prudencial da instituicao (S1-S5) junto
         ao BCB para determinar obrigatoriedade.
      2. Mapear quais APIs sao obrigatorias conforme o enquadramento e
         quais sao voluntarias.
      3. Dimensionar infraestrutura de APIs conforme volume estimado de
         requisicoes baseado no porte da instituicao.
      4. Planejar capacidade considerando SLAs regulatorios.
    tools:
      - capacity-planning
      - api-gateway
      - kubernetes
  devsecops:
    prose: |
      **Pipeline de conformidade por segmento:**
      1. Configurar pipeline que valide quais APIs estao implementadas
         versus quais sao obrigatorias para o segmento.
      2. Automatizar verificacao de cobertura funcional das APIs.
      3. Implementar dashboards de conformidade por fase de implementacao.
    tools:
      - gitlab-ci
      - compliance-dashboard
  secops:
    prose: |
      **Monitoramento de obrigatoriedade:**
      1. Acompanhar publicacoes do BCB sobre mudancas de segmento e
         novas obrigatoriedades.
      2. Manter registro atualizado do enquadramento prudencial.
      3. Avaliar impacto de fusoes, aquisicoes e crescimento organico
         sobre o enquadramento e obrigatoriedade.
    tools:
      - grc-platform
      - regulatory-intelligence
legal_references:
  - framework_id: bacen-4893
    articles: ["art-1"]
    relationship: complements
