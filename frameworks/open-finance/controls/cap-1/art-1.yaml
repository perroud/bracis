id: art-1
family: cap-1
title: "Objeto e Ambito de Aplicacao"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 1. Esta Resolução Conjunta dispõe sobre a implementação do Sistema Financeiro
    Aberto (Open Finance), estabelecendo os requisitos para o compartilhamento de dados
    e serviços por meio de abertura e integração de sistemas por parte das instituições
    autorizadas a funcionar pelo Banco Central do Brasil.

    Parágrafo único. O Open Finance abrange o compartilhamento padronizado de dados
    de clientes, dados de produtos e serviços, iniciação de transação de pagamento e
    encaminhamento de propostas de crédito entre instituições participantes.
guidance:
  prose: |
    O art. 1 define o escopo do Open Finance Brasil como um ecossistema regulado de
    compartilhamento de dados e servicos financeiros. O conceito abrange:

    **Pilares do Open Finance:**
    1. Dados abertos de produtos e servicos (Open Data) -- informacoes publicas
    2. Dados cadastrais e transacionais de clientes -- mediante consentimento
    3. Iniciacao de transacao de pagamento (ITP) -- via APIs padronizadas
    4. Encaminhamento de propostas de credito -- mediante consentimento

    **Diferenca entre Open Banking e Open Finance:**
    A Resolucao Conjunta n. 1/2020 criou inicialmente o Open Banking. A Resolucao
    Conjunta n. 6/2023 expandiu o escopo para Open Finance, incluindo seguros,
    investimentos, cambio e previdencia, alem dos produtos bancarios originais.

    **Instituicoes abrangidas:**
    Todas as instituicoes autorizadas pelo BCB, com obrigatoriedade variavel
    conforme o porte e segmento (definido nos artigos subsequentes).
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento do perimetro tecnico:**
      1. Catalogar todos os produtos e servicos oferecidos pela instituicao
         e classificar quais estao no escopo do Open Finance.
      2. Mapear os sistemas internos que armazenam dados cadastrais,
         transacionais e de produtos sujeitos a compartilhamento.
      3. Definir a arquitetura de APIs que expora os dados conforme
         especificacoes do diretorio de participantes.
      4. Documentar o perimetro de aplicacao no sistema de GRC com
         referencia explicita a autorizacao BCB.
    tools:
      - api-gateway
      - api-management
      - grc-platform
  devsecops:
    prose: |
      **Compliance-as-code para escopo regulatorio:**
      1. Manter arquivo de configuracao declarando Open Finance como
         framework aplicavel nos repositorios de APIs.
      2. Pipeline de CI/CD deve incluir validacao de conformidade das
         APIs com as especificacoes do diretorio.
      3. Implementar testes automatizados de conformidade com os
         schemas do Open Finance Brasil.
    tools:
      - gitlab-ci
      - openapi-validator
      - policy-as-code
  secops:
    prose: |
      **Gestao do perimetro regulatorio:**
      1. Registrar no sistema de GRC os sistemas no escopo do Open Finance.
      2. Manter inventario atualizado de APIs expostas e consumidas.
      3. Monitorar publicacoes do BCB e do diretorio para atualizacoes
         nas especificacoes tecnicas.
      4. Avaliar impacto regulatorio de novos produtos antes do lancamento.
    tools:
      - grc-platform
      - regulatory-intelligence
