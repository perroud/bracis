id: art-4
family: cap-1
title: "Participantes Voluntarios e Requisitos de Adesao"
class: OPEN-FINANCE
baselines: [participantes-voluntarios]
statement:
  prose: |
    Art. 4. As instituições que participem voluntariamente do Open Finance devem:

    I - atender integralmente aos requisitos técnicos, de segurança e operacionais
    estabelecidos nesta Resolução Conjunta e nas especificações do diretório;

    II - registrar-se no diretório de participantes do Open Finance;

    III - obter certificados digitais emitidos por autoridade certificadora
    credenciada no âmbito da ICP-Brasil, conforme especificações do diretório;

    IV - comprovar capacidade técnica e operacional para atender aos níveis de
    serviço (SLAs) estabelecidos nas especificações.
guidance:
  prose: |
    O art. 4 garante isonomia tecnica e de seguranca entre participantes
    obrigatorios e voluntarios:

    **Requisitos identicos para todos:**
    - Conformidade com especificacoes FAPI (Financial-grade API)
    - Certificados digitais ICP-Brasil para mTLS e assinatura
    - Registro no diretorio centralizado de participantes
    - Capacidade de atender SLAs de disponibilidade e latencia

    **Diferencial do voluntario:**
    - Pode escolher quais escopos de APIs implementar
    - Nao precisa necessariamente ser transmissor de todos os dados
    - Pode iniciar como receptor e expandir gradualmente

    **Barreira de entrada tecnica:**
    O investimento em infraestrutura de seguranca (FAPI, mTLS, HSM para
    certificados) e significativo, independente do porte da instituicao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Checklist de adesao tecnica:**
      1. Provisionar infraestrutura de PKI compativel com ICP-Brasil
         (HSM, gerenciamento de certificados).
      2. Implementar stack FAPI compliant (Authorization Server, Resource
         Server, Client) conforme perfil escolhido.
      3. Registrar software statements no diretorio de participantes.
      4. Configurar ambientes de sandbox e producao conforme
         especificacoes do diretorio.
    tools:
      - hsm
      - certificate-manager
      - api-gateway
      - oauth-server
  devsecops:
    prose: |
      **Validacao de prontidao tecnica:**
      1. Executar suite de testes de conformidade do diretorio em pipeline.
      2. Validar certificados ICP-Brasil em cada deploy.
      3. Automatizar renovacao de certificados antes da expiracao.
      4. Implementar smoke tests contra sandbox do diretorio.
    tools:
      - conformance-suite
      - cert-manager
      - gitlab-ci
  secops:
    prose: |
      **Governanca de adesao:**
      1. Documentar decisao de adesao voluntaria com justificativa de negocio.
      2. Manter inventario de certificados e datas de expiracao.
      3. Monitorar status de registro no diretorio de participantes.
      4. Acompanhar mudancas nas especificacoes que afetem os requisitos
         de adesao.
    tools:
      - grc-platform
      - certificate-monitoring
legal_references:
  - framework_id: bacen-4893
    articles: ["art-3"]
    relationship: complements
