id: art-6
family: cap-2
title: "Dados Cadastrais e Qualificacao do Cliente"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 6. O compartilhamento de dados cadastrais abrange, no mínimo:

    I - dados de identificação da pessoa natural: nome completo, nome social,
    CPF, data de nascimento, estado civil, nacionalidade e documento de
    identificação;

    II - dados de identificação da pessoa jurídica: razão social, nome fantasia,
    CNPJ, data de constituição e porte;

    III - dados de qualificação: endereço, telefone, e-mail, renda ou
    faturamento declarado, profissão ou atividade econômica;

    IV - dados de relacionamento: data de início do relacionamento com a
    instituição, produtos contratados e canais de atendimento utilizados.

    Parágrafo único. Os dados cadastrais devem ser fornecidos conforme
    registrados nos sistemas da instituição transmissora, sem tratamento
    adicional ou enriquecimento.
guidance:
  prose: |
    O art. 6 detalha o escopo minimo de dados cadastrais:

    **Dados de pessoa natural (PF):**
    - Identificacao: nome, CPF, nascimento, documento
    - Qualificacao: endereco, contatos, renda, profissao
    - Relacionamento: data de abertura de conta, produtos

    **Dados de pessoa juridica (PJ):**
    - Identificacao: razao social, CNPJ, constituicao, porte
    - Qualificacao: endereco, contatos, faturamento, CNAE
    - Representantes legais

    **Principio de fidelidade:**
    Os dados devem refletir exatamente o que consta nos sistemas da
    transmissora. Nao e permitido enriquecer, inferir ou modificar
    dados antes da transmissao.

    **Intersecao com LGPD:**
    Todos os dados cadastrais sao dados pessoais nos termos da LGPD,
    exigindo base legal (consentimento) e tratamento proporcional.
implementation_guidance:
  platform_engineering:
    prose: |
      **Modelagem e exposicao de dados cadastrais:**
      1. Mapear campos dos sistemas legados para os schemas padronizados
         do Open Finance (customers/personal e customers/business).
      2. Implementar transformacao de dados sem enriquecimento, garantindo
         fidelidade ao registro original.
      3. Tratar campos opcionais versus obrigatorios conforme especificacao.
      4. Implementar versionamento de schemas para evolucao gradual.
    tools:
      - data-mapping
      - etl-pipeline
      - api-gateway
  devsecops:
    prose: |
      **Validacao de completude e fidelidade:**
      1. Testes automatizados comparando dados da API com fonte original.
      2. Validar que nenhum campo e adicionado ou enriquecido na transformacao.
      3. Verificar conformidade com schemas JSON do diretorio.
      4. Testar cenarios de dados incompletos ou nulos.
    tools:
      - json-schema-validator
      - integration-tests
      - gitlab-ci
  secops:
    prose: |
      **Protecao de dados pessoais cadastrais:**
      1. Criptografar dados cadastrais em repouso e em transito.
      2. Aplicar controles de acesso baseados em consentimento valido.
      3. Registrar log de acesso a dados cadastrais com rastreabilidade.
      4. Monitorar exfiltracao ou acesso anomalo a dados cadastrais.
    tools:
      - encryption
      - access-control
      - siem
      - dlp
legal_references:
  - framework_id: lgpd
    articles: ["art-5", "art-7", "art-18"]
    relationship: complements
