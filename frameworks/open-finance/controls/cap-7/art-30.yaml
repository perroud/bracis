id: art-30
family: cap-7
title: "Testes de Conformidade e Certificacao"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 30. As instituições participantes devem comprovar a conformidade
    de suas interfaces dedicadas por meio de:

    I - execução da suíte de testes de conformidade funcional mantida
    pela estrutura de governança, que valida aderência às especificações
    de APIs;

    II - execução da suíte de testes de conformidade de segurança
    (FAPI Conformance Suite), que valida aderência ao perfil de
    segurança do Open Finance Brasil;

    III - testes de integração em ambiente de sandbox com outros
    participantes antes da entrada em produção;

    IV - evidência de testes de performance demonstrando capacidade
    de atender aos SLAs definidos nas especificações;

    V - renovação periódica dos testes de conformidade conforme
    calendário definido pela estrutura de governança.
guidance:
  prose: |
    O art. 30 exige certificacao de conformidade:

    **Suite de conformidade funcional:**
    - Valida schemas de request e response
    - Verifica completude de campos obrigatorios
    - Testa cenarios de erro padronizados
    - Execucao automatizada contra APIs da instituicao

    **FAPI Conformance Suite (seguranca):**
    - Suite oficial do OpenID Foundation adaptada para Brasil
    - Testa perfil FAPI 1.0 Advanced
    - Valida mTLS, PAR, JAR, PKCE, certificate-bound tokens
    - Resultado: certificacao FAPI

    **Testes de integracao (sandbox):**
    - Testes bilaterais com outros participantes
    - Fluxos completos de consentimento e dados
    - Fluxos de iniciacao de pagamento
    - Validacao de interoperabilidade real

    **Testes de performance:**
    - Demonstrar que APIs suportam carga esperada
    - Validar SLAs de latencia e disponibilidade
    - Testes de estresse e recuperacao

    **Periodicidade:**
    - Conformidade funcional: a cada nova versao de API
    - Conformidade FAPI: anual ou a cada mudanca de perfil
    - Integracao: antes de cada fase de producao
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de testes de conformidade:**
      1. Integrar suite de conformidade funcional ao pipeline de CI/CD.
      2. Configurar FAPI Conformance Suite em ambiente de testes.
      3. Manter ambiente de sandbox para testes bilaterais.
      4. Automatizar testes de performance com cargas representativas.
      5. Armazenar resultados de conformidade como evidencia auditavel.
    tools:
      - conformance-suite
      - fapi-conformance
      - sandbox-environment
      - k6
      - evidence-storage
  devsecops:
    prose: |
      **Pipeline de conformidade:**
      1. Executar testes de conformidade funcional em cada merge request.
      2. Executar FAPI Conformance Suite em releases.
      3. Publicar resultados de conformidade em dashboards.
      4. Bloquear deploy se conformidade falhar (quality gate).
    tools:
      - conformance-pipeline
      - quality-gates
      - gitlab-ci
  secops:
    prose: |
      **Gestao de certificacoes:**
      1. Manter calendario de renovacao de certificacoes.
      2. Armazenar certificados de conformidade como evidencia.
      3. Reportar status de conformidade a governanca.
      4. Acompanhar mudancas nas suites de teste que afetem conformidade.
    tools:
      - certification-management
      - evidence-management
      - grc-platform
legal_references:
