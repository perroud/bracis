id: art-22
family: cap-5
title: "Experiencia do Cliente e Acessibilidade"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 22. As instituições participantes devem assegurar que a jornada do
    cliente no Open Finance atenda aos seguintes requisitos de experiência:

    I - a jornada de consentimento deve ser concluída em tempo razoável,
    conforme limites definidos nas especificações técnicas;

    II - as telas de consentimento devem seguir o guia de experiência do
    usuário definido no âmbito da estrutura de governança;

    III - o cliente deve ter acesso a painel de gerenciamento de
    consentimentos ativos, podendo consultar e revogar a qualquer momento;

    IV - a comunicação com o cliente deve ser acessível a pessoas com
    deficiência, conforme legislação aplicável;

    V - as instituições devem disponibilizar canal de atendimento ao
    cliente para esclarecimento de dúvidas sobre o Open Finance.
guidance:
  prose: |
    O art. 22 define requisitos de UX e acessibilidade:

    **Tempo maximo da jornada:**
    Especificacoes tecnicas definem tempo maximo para conclusao
    da jornada de consentimento (tipicamente 5 minutos do redirect
    ao retorno). Timeout encerra a jornada e exige reinicio.

    **Guia de experiencia (UX Guide):**
    O diretorio publica guia padronizado com:
    - Fluxo de telas obrigatorio
    - Nomenclatura padronizada de permissoes
    - Icones e cores recomendadas
    - Ordem de apresentacao de informacoes

    **Painel de consentimentos:**
    - Lista de consentimentos ativos com detalhes
    - Opcao de revogar individualmente
    - Historico de consentimentos expirados e revogados
    - Informacoes sobre dados compartilhados

    **Acessibilidade:**
    - WCAG 2.1 nivel AA como minimo
    - Leitura de tela (screen readers)
    - Contraste e tamanho de fonte adequados
    - Navegacao por teclado
implementation_guidance:
  platform_engineering:
    prose: |
      **Implementacao de UX conforme guia:**
      1. Seguir guia de experiencia do diretorio para fluxo de telas.
      2. Implementar timeout da jornada conforme especificacao.
      3. Desenvolver painel de gerenciamento de consentimentos (dashboard).
      4. Implementar acessibilidade WCAG 2.1 AA em todas as telas.
      5. Integrar canal de atendimento (chat, telefone) nas telas de consentimento.
    tools:
      - frontend-framework
      - accessibility-tools
      - consent-dashboard
  devsecops:
    prose: |
      **Testes de UX e acessibilidade:**
      1. Executar testes de acessibilidade automatizados (axe, pa11y).
      2. Medir tempo de conclusao da jornada de consentimento.
      3. Validar conformidade com guia de experiencia do diretorio.
      4. Testar com leitores de tela (VoiceOver, NVDA).
    tools:
      - axe
      - pa11y
      - lighthouse
      - cypress
      - gitlab-ci
  secops:
    prose: |
      **Monitoramento de experiencia:**
      1. Acompanhar metricas de abandono na jornada de consentimento.
      2. Monitorar reclamacoes de clientes relacionadas ao Open Finance.
      3. Auditar conformidade com guia de experiencia periodicamente.
      4. Avaliar acessibilidade com testes manuais semestrais.
    tools:
      - analytics
      - customer-feedback
      - accessibility-audit
legal_references:
  - framework_id: lgpd
    articles: ["art-9"]
    relationship: complements
