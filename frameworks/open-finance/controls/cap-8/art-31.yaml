id: art-31
family: cap-8
title: "Cronograma de Implementacao por Fases"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 31. A implementação do Open Finance seguirá cronograma definido
    pelo Banco Central do Brasil, em fases progressivas:

    I - Fase 1: compartilhamento de dados sobre produtos e serviços
    (dados abertos), sem necessidade de consentimento do cliente;

    II - Fase 2: compartilhamento de dados cadastrais e transacionais
    de clientes, mediante consentimento;

    III - Fase 3: serviço de iniciação de transação de pagamento e
    encaminhamento de propostas de crédito;

    IV - Fase 4: demais dados e serviços, incluindo investimentos,
    seguros, previdência e câmbio.

    Parágrafo único. Os prazos específicos de cada fase e as eventuais
    prorrogações serão definidos por normativo complementar do BCB.
guidance:
  prose: |
    O art. 31 define a implementacao progressiva:

    **Fase 1 - Dados abertos (implementada):**
    - Dados publicos de produtos e servicos
    - Sem autenticacao de cliente
    - APIs: /open-banking/discovery/, /open-banking/products-services/

    **Fase 2 - Dados de clientes (implementada):**
    - Dados cadastrais e transacionais
    - Com consentimento FAPI
    - APIs: /open-banking/accounts/, /open-banking/credit-cards/,
      /open-banking/loans/, /open-banking/financings/

    **Fase 3 - Iniciacao de pagamento (implementada):**
    - ITP via PIX
    - Encaminhamento de propostas de credito
    - APIs: /open-banking/payments/

    **Fase 4 - Open Finance completo (em implementacao):**
    - Investimentos: acoes, renda fixa, fundos
    - Seguros: vida, patrimonial, auto
    - Previdencia: aberta e fechada
    - Cambio: operacoes de cambio

    **Historico de prazos:**
    O BCB adiou prazos originais diversas vezes para garantir
    qualidade e seguranca da implementacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Planejamento de implementacao por fase:**
      1. Mapear quais APIs sao obrigatorias em cada fase para o
         perfil de participacao da instituicao.
      2. Implementar APIs em ordem de prioridade (fase 1 -> 4).
      3. Planejar capacidade incremental para cada fase.
      4. Manter roadmap tecnico alinhado com cronograma do BCB.
    tools:
      - project-management
      - roadmap-tools
      - capacity-planning
  devsecops:
    prose: |
      **Entrega incremental por fase:**
      1. Organizar backlog de implementacao por fase.
      2. Validar conformidade de cada fase antes de avancar.
      3. Implementar feature flags para ativacao gradual.
      4. Executar testes de regressao ao adicionar novas fases.
    tools:
      - feature-flags
      - backlog-management
      - regression-tests
      - gitlab-ci
  secops:
    prose: |
      **Acompanhamento regulatorio:**
      1. Monitorar publicacoes do BCB sobre prazos e prorrogacoes.
      2. Manter cronograma de implementacao atualizado.
      3. Reportar progresso de implementacao a diretoria.
      4. Avaliar riscos de nao-cumprimento de prazos.
    tools:
      - regulatory-intelligence
      - project-tracker
      - risk-management
legal_references:
  - framework_id: bacen-4893
    articles: ["art-21"]
    relationship: complements
