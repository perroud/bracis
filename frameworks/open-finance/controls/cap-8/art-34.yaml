id: art-34
family: cap-8
title: "Penalidades e Sancoes"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 34. O descumprimento das disposições desta Resolução Conjunta
    sujeita as instituições participantes às sanções previstas na
    legislação e na regulamentação em vigor, incluindo:

    I - as sanções administrativas previstas na Lei n. 13.506, de 2017,
    aplicáveis pelo Banco Central do Brasil;

    II - as sanções previstas na convenção do Open Finance, definidas
    no âmbito da estrutura de governança;

    III - as sanções previstas na Lei Geral de Proteção de Dados
    (Lei n. 13.709, de 2018), quando o descumprimento envolver
    tratamento irregular de dados pessoais;

    IV - a responsabilidade civil perante os clientes pelos danos
    causados em razão do descumprimento.

    Parágrafo único. A aplicação de sanções pelo BCB não exclui a
    aplicação de sanções pela ANPD, pelo CADE ou por outros órgãos
    competentes.
guidance:
  prose: |
    O art. 34 define o regime sancionatorio:

    **Sancoes administrativas do BCB (Lei 13.506/2017):**
    - Advertencia
    - Multa (ate R$ 2 bilhoes ou 0.5% do faturamento)
    - Suspensao do exercicio de atividades
    - Inabilitacao de administradores
    - Cassacao de autorizacao de funcionamento

    **Sancoes da convencao Open Finance:**
    - Advertencia formal
    - Multa convencional
    - Suspensao temporaria de participacao
    - Exclusao do ecossistema

    **Sancoes LGPD (ANPD):**
    - Advertencia
    - Multa (ate 2% do faturamento, limitado a R$ 50 milhoes)
    - Bloqueio ou eliminacao de dados
    - Suspensao do tratamento de dados

    **Responsabilidade civil:**
    - Danos materiais e morais ao cliente
    - Responsabilidade solidaria entre participantes (art. 25)
    - Inversao do onus da prova (CDC e LGPD)

    **Cumulatividade:**
    As sancoes de diferentes orgaos (BCB, ANPD, CADE) sao cumulativas.
    Uma mesma conduta pode gerar sancoes em multiplas esferas.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mitigacao de riscos sancionatorios:**
      1. Implementar monitoramento continuo de conformidade para
         detectar desvios antes que se tornem violacoes.
      2. Manter logs e evidencias de conformidade para defesa.
      3. Implementar alertas automaticos para riscos de nao-conformidade.
      4. Configurar dashboards de risco regulatorio para diretoria.
    tools:
      - compliance-monitoring
      - evidence-management
      - risk-dashboard
  devsecops:
    prose: |
      **Evidencias de conformidade continua:**
      1. Gerar e armazenar evidencias de testes de conformidade.
      2. Manter historico de resultados de auditorias automatizadas.
      3. Documentar remediacoes de nao-conformidades encontradas.
      4. Publicar relatorio de conformidade tecnica periodico.
    tools:
      - compliance-reports
      - evidence-storage
      - audit-trail
      - gitlab-ci
  secops:
    prose: |
      **Gestao de risco regulatorio:**
      1. Manter mapa de riscos regulatorios atualizado.
      2. Avaliar impacto financeiro potencial de cada risco.
      3. Preparar defesa para eventuais processos sancionatorios.
      4. Monitorar precedentes de sancoes aplicadas pelo BCB e ANPD.
    tools:
      - risk-management
      - legal-tracking
      - grc-platform
