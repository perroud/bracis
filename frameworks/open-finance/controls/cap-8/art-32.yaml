id: art-32
family: cap-8
title: "Comunicacao de Incidentes e Contingencia"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 32. As instituições participantes devem comunicar ao diretório e
    ao Banco Central do Brasil a ocorrência de incidentes relevantes
    relacionados ao Open Finance:

    I - incidentes de segurança que comprometam a confidencialidade,
    integridade ou disponibilidade dos dados compartilhados;

    II - indisponibilidade não-planejada que exceda os limites definidos
    nas especificações técnicas;

    III - vazamento ou acesso não autorizado a dados de clientes
    compartilhados no âmbito do Open Finance;

    IV - falhas que afetem a iniciação de transações de pagamento.

    Parágrafo único. A comunicação deve ser realizada no prazo e no
    formato definidos nas especificações técnicas e na regulamentação
    de segurança cibernética aplicável.
guidance:
  prose: |
    O art. 32 exige comunicacao de incidentes:

    **Tipos de incidentes a comunicar:**
    - Seguranca: invasao, malware, acesso indevido
    - Disponibilidade: downtime acima do tolerado
    - Vazamento: exposicao de dados de clientes
    - Pagamentos: falhas em ITP

    **Prazos de comunicacao:**
    - Incidentes criticos (vazamento, fraude): imediato (ate 1 hora)
    - Incidentes graves (indisponibilidade prolongada): ate 24 horas
    - Incidentes moderados: ate 48 horas

    **Canais de comunicacao:**
    - Diretorio: API de notificacao de incidentes
    - BCB: UNICAD ou canal definido pela supervisao
    - ANPD: se envolver dados pessoais (LGPD art. 48)

    **Plano de contingencia:**
    Cada participante deve ter plano de contingencia especifico para
    Open Finance, incluindo:
    - Fallback para APIs indisponiveis
    - Comunicacao ao cliente sobre indisponibilidade
    - Processo de recuperacao e pos-incidente
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de gestao de incidentes:**
      1. Implementar mecanismo automatico de deteccao de incidentes
         (alertas de disponibilidade, seguranca, erros).
      2. Configurar notificacao automatica ao diretorio via API.
      3. Implementar status page publica para comunicacao ao mercado.
      4. Configurar failover e recuperacao automatica para APIs criticas.
      5. Manter runbooks de resposta a incidentes especificos para Open Finance.
    tools:
      - alertmanager
      - incident-management
      - status-page
      - failover-automation
  devsecops:
    prose: |
      **Preparacao para incidentes:**
      1. Implementar chaos engineering para testar resiliencia de APIs.
      2. Executar exercicios de recuperacao de desastres periodicamente.
      3. Automatizar coleta de evidencias durante incidentes (logs, metricas).
      4. Testar fluxo de comunicacao de incidentes end-to-end.
    tools:
      - chaos-engineering
      - disaster-recovery-tests
      - evidence-collection
      - gitlab-ci
  secops:
    prose: |
      **Resposta a incidentes Open Finance:**
      1. Manter equipe de resposta a incidentes treinada.
      2. Comunicar incidentes nos prazos regulatorios.
      3. Conduzir analise pos-incidente e implementar melhorias.
      4. Reportar ao BCB e ANPD conforme exigido.
    tools:
      - incident-response
      - siem
      - forensics
      - regulatory-reporting
