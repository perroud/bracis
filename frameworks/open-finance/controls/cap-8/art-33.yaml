id: art-33
family: cap-8
title: "Disposicoes Transitorias e Revogacao"
class: OPEN-FINANCE
baselines: [participantes-obrigatorios]
statement:
  prose: |
    Art. 33. Ficam estabelecidas as seguintes disposições transitórias:

    I - as instituições participantes que já implementaram interfaces
    baseadas na Resolução Conjunta n. 1/2020 devem adequar-se às
    disposições da Resolução Conjunta n. 6/2023 nos prazos definidos
    pelo BCB;

    II - os consentimentos concedidos sob a regulamentação anterior
    permanecem válidos até seu vencimento, devendo novos consentimentos
    observar as disposições atualizadas;

    III - a Resolução Conjunta n. 6/2023 consolida e substitui
    disposições da Resolução Conjunta n. 1/2020 no que se refere
    à ampliação do escopo para Open Finance;

    IV - normativos complementares do BCB detalharão os requisitos
    técnicos específicos para novos produtos e serviços incluídos
    no escopo ampliado.
guidance:
  prose: |
    O art. 33 trata da transicao regulatoria:

    **De Open Banking para Open Finance:**
    A Resolucao Conjunta n. 1/2020 criou o Open Banking (bancario).
    A Resolucao Conjunta n. 6/2023 ampliou para Open Finance, incluindo:
    - Investimentos (CVM)
    - Seguros (SUSEP)
    - Previdencia
    - Cambio

    **Consentimentos existentes:**
    Consentimentos ja concedidos continuam validos. Nao e necessario
    revogar e reconsentin. Novos consentimentos devem seguir regras
    atualizadas (incluindo novos escopos disponiveis).

    **Adequacao tecnica:**
    Instituicoes devem atualizar APIs para novos schemas que incluem
    produtos de investimento, seguros, previdencia e cambio conforme
    prazos definidos pelo BCB.

    **Normativos complementares:**
    O BCB emite instrucoes normativas, circulares e comunicados que
    detalham requisitos tecnicos especificos. A resolucao conjunta
    e a norma principal, complementada por normativos tecnicos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plano de migracao e adequacao:**
      1. Mapear diferencas entre especificacoes da Res. Conj. 1/2020
         e da Res. Conj. 6/2023.
      2. Implementar novos endpoints para produtos adicionados ao escopo.
      3. Atualizar schemas de consentimento para incluir novos escopos.
      4. Manter backward compatibility durante periodo de transicao.
      5. Planejar descomissionamento de APIs obsoletas apos transicao.
    tools:
      - migration-planning
      - api-versioning
      - backward-compatibility
  devsecops:
    prose: |
      **Validacao de migracao:**
      1. Testar que consentimentos existentes continuam funcionando.
      2. Validar novos endpoints contra especificacoes atualizadas.
      3. Testar coexistencia de APIs antigas e novas.
      4. Verificar que nenhum dado e perdido na migracao.
    tools:
      - migration-tests
      - regression-tests
      - data-integrity-tests
      - gitlab-ci
  secops:
    prose: |
      **Gestao de transicao regulatoria:**
      1. Acompanhar publicacoes de normativos complementares.
      2. Manter cronograma de adequacao atualizado.
      3. Reportar progresso de adequacao a diretoria.
      4. Avaliar riscos de nao-adequacao dentro dos prazos.
    tools:
      - regulatory-intelligence
      - project-tracker
      - risk-management
legal_references:
  - framework_id: bacen-4893
    articles: ["art-21"]
    relationship: complements
