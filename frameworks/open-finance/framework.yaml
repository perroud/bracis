url: "https://www.bcb.gov.br/estabilidadefinanceira/exibenormativo?tipo=Resolu%C3%A7%C3%A3o+Conjunta&numero=1"
control_families:
  - id: cap-1
    title: "Disposicoes Gerais"
    description: "Escopo de aplicacao, definicoes, participantes obrigatorios e voluntarios do ecossistema Open Finance Brasil"
    articles: "art. 1 ao art. 4"
    control_count: 4
  - id: cap-2
    title: "Compartilhamento de Dados"
    description: "Requisitos para compartilhamento de dados cadastrais, transacionais e de produtos, incluindo escopo de dados e formatos padronizados"
    articles: "art. 5 ao art. 9"
    control_count: 5
  - id: cap-3
    title: "Iniciacao de Pagamento"
    description: "Requisitos para iniciacao de transacao de pagamento (ITP), autenticacao do cliente, confirmacao e liquidacao"
    articles: "art. 10 ao art. 13"
    control_count: 4
  - id: cap-4
    title: "Seguranca e Autenticacao"
    description: "Requisitos de seguranca de APIs: FAPI (Financial-grade API), mTLS, OAuth 2.0, certificados digitais ICP-Brasil e protecao de dados em transito"
    articles: "art. 14 ao art. 18"
    control_count: 5
  - id: cap-5
    title: "Consentimento e Experiencia do Cliente"
    description: "Jornada de consentimento, granularidade, prazo de validade, revogacao, renovacao e experiencia do usuario no compartilhamento"
    articles: "art. 19 ao art. 22"
    control_count: 4
  - id: cap-6
    title: "Governanca e Responsabilidades"
    description: "Estrutura de governanca do ecossistema, convencao, diretorio de participantes, responsabilidades e supervisao pelo BCB"
    articles: "art. 23 ao art. 26"
    control_count: 4
  - id: cap-7
    title: "Interoperabilidade e Padroes Tecnicos"
    description: "APIs REST, versionamento, SLAs de disponibilidade, padroes de mensageria, tratamento de erros e metricas operacionais"
    articles: "art. 27 ao art. 30"
    control_count: 4
  - id: cap-8
    title: "Disposicoes Finais"
    description: "Prazos de implementacao por fase, penalidades, disposicoes transitorias e revogacao"
    articles: "art. 31 ao art. 34"
    control_count: 4 # Errata: o controle art-34 e "Penalidades e Sancoes"
related_frameworks:
  - framework_id: open-insurance
    relationship: equivalent-to
    description: "O Open Insurance (SUSEP) e o analogo do Open Finance para o setor de seguros, com arquitetura tecnica equivalente (FAPI, mTLS, consentimento) adaptada ao mercado segurador."
  - framework_id: lgpd
    relationship: complements
    description: "A LGPD complementa o Open Finance na protecao de dados pessoais compartilhados entre participantes, exigindo base legal (consentimento), finalidade especifica e direitos do titular."
  - framework_id: bacen-4893
    relationship: complements
    description: "A Resolucao CMN 4.893 (seguranca cibernetica) complementa o Open Finance com requisitos de seguranca da informacao para as instituicoes financeiras participantes."
  - framework_id: bcb-85
    relationship: complements
    description: "A Resolucao BCB 85 (seguranca cibernetica para IPs) complementa o Open Finance com requisitos de seguranca para instituicoes de pagamento participantes."
  - framework_id: pix-security
    relationship: implements
    description: "O framework de seguranca do PIX implementa os requisitos de seguranca do Open Finance para o arranjo de pagamentos instantaneos, incluindo APIs de iniciacao de pagamento."
