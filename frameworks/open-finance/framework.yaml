id: open-finance
title: "Resolucao Conjunta BCB/CMN n. 1/2020 e n. 6/2023 -- Open Finance Brasil"
short_title: "Open Finance Brasil"
version: "6/2023 (consolidado)"
publication_date: "2020-05-04"
last_updated: "2023-10-13"
effective_date: "2021-02-01"
authority:
  name: "Banco Central do Brasil / Conselho Monetario Nacional"
  acronym: "BCB/CMN"
  country: "BR"
  url: "https://www.bcb.gov.br"
type: joint-resolution
scope: open-banking
mandatory: true
original_language: pt-br
available_languages: [pt-br]
industries:
