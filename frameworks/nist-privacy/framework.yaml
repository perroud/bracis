id: nist-privacy
title: "NIST Privacy Framework v1.0 — A Tool for Improving Privacy through Enterprise Risk Management"
short_title: "NIST Privacy Framework"
version: "1.0"
publication_date: "2020-01-16"
last_updated: "2020-01-16"

authority:
  name: "National Institute of Standards and Technology"
  acronym: "NIST"
  country: US
  url: "https://www.nist.gov/privacy-framework"

type: framework
scope: privacy
mandatory: false

original_language: en
available_languages:
  - en

industries:
