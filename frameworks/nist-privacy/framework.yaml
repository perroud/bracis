control_families:
  - id: id-p
    title: "Identify-P (ID-P)"
    description: "Develop the organizational understanding to manage privacy risk for individuals arising from data processing."
    control_count: 4
  - id: gv-p
    title: "Govern-P (GV-P)"
    description: "Develop and implement the organizational governance structure to enable an ongoing understanding of the organization's risk management priorities that are informed by privacy risk."
    control_count: 4
  - id: ct-p
    title: "Control-P (CT-P)"
    description: "Develop and implement appropriate activities to enable organizations or individuals to manage data with sufficient granularity to manage privacy risks."
    control_count: 4
  - id: cm-p
    title: "Communicate-P (CM-P)"
    description: >-
      Develop and implement appropriate activities to enable organizations and
      individuals to have a reliable understanding and engage in a dialogue
      about how data are processed and associated privacy risks.
    control_count: 4
  - id: pr-p
    title: "Protect-P (PR-P)"
    description: "Develop and implement appropriate data processing safeguards."
    control_count: 4

related_frameworks:
  - framework_id: nist-csf-v2
