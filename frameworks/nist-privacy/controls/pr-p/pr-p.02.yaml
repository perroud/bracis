id: pr-p.02
family: pr-p
title: "Identity Management, Authentication and Access Control"
class: NIST-PRIVACY

statement:
  prose: >-
    Access to data and devices is limited to authorized individuals, processes, and
    devices, and is managed consistent with the assessed risk of unauthorized access.
    Identities and credentials are managed for authorized users and services.

guidance:
  prose: >-
    Identity management and access control for privacy goes beyond traditional security
    access control by incorporating the principle of least privilege specifically for
    personal data. Access to personal data should be limited to personnel who need it
    for their defined role and authorized processing purpose. Organizations should
    implement role-based or attribute-based access control that considers data
    sensitivity, processing purpose, and the user's role. Multi-factor authentication
    should be required for access to systems containing sensitive personal data.
    Access should be regularly reviewed and promptly revoked when no longer needed.
    Service accounts accessing personal data should be individually identifiable and
    auditable.

references:
  - citation: "NIST Privacy Framework v1.0, PR.AC-P1 through PR.AC-P6"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement purpose-aware access control at the platform layer. Deploy ABAC
      policies that evaluate not only the user's identity and role but also the
      declared processing purpose when granting access to personal data. Enforce
      multi-factor authentication for all access to PII-containing systems. Implement
      just-in-time access provisioning for sensitive data — access is granted for a
      limited duration with explicit justification. Deploy audit logging for all
      personal data access events. Implement automated access reviews that flag stale
      or excessive permissions.
    tools:
      - identity-provider
      - vault
      - opa
      - kubernetes-rbac
      - audit-logging

  devsecops:
    prose: >-
      Enforce access control best practices in application code. Implement authorization
      checks at every data access point — not just at the API gateway. Use parameterized
      queries and ORM access controls to prevent unauthorized data retrieval. Implement
      CI/CD checks that verify authorization middleware is present on all endpoints
      serving personal data. Test access control logic with automated security tests
      that attempt privilege escalation and unauthorized data access.
    tools:
      - gitlab-ci
      - sast
      - dast
      - authorization-testing
      - security-testing

  secops:
    prose: >-
      Monitor access to personal data for anomalies and policy violations. Alert on
      bulk data access, access outside normal hours, or access from unusual locations.
      Conduct periodic access reviews to verify that permissions align with current
      roles and processing needs. Investigate unauthorized access attempts. Track
      privileged access to personal data stores. Generate access control compliance
      reports for privacy audits.
    tools:
      - siem
      - identity-governance
      - access-review-tools
      - audit-logging

