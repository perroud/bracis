id: pr-p.04
family: pr-p
title: "Protective Technology — Logging and Secure Configuration"
class: NIST-PRIVACY

statement:
  prose: >-
    Technical security solutions are managed to ensure the security and resilience of
    data and systems, consistent with the organization's privacy policies. Audit and
    log records are determined, documented, implemented, and reviewed in accordance
    with policy.

guidance:
  prose: >-
    Protective technology encompasses the technical controls that safeguard personal
    data processing systems. This includes secure system configuration baselines,
    comprehensive audit logging, intrusion detection systems, and system maintenance
    practices. Audit logging is particularly important for privacy — logs must capture
    who accessed personal data, when, for what purpose, and what actions were performed,
    while ensuring the logs themselves do not become a privacy risk by containing
    excessive personal data. Systems should be hardened according to industry benchmarks,
    kept current with security patches, and monitored for unauthorized configuration
    changes. Resilience measures should ensure data processing systems can recover from
    disruptions without data loss.

references:
  - citation: "NIST Privacy Framework v1.0, PR.MA-P1, PR.MA-P2, PR.PT-P1 through PR.PT-P5"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive audit logging at the platform layer that captures all
      personal data access and processing events. Ensure logs contain sufficient detail
      for accountability (who, what, when, why) without including the personal data
      itself — log data access events, not data content. Deploy centralized log
      management with immutable storage and defined retention. Implement secure
      configuration baselines for all platform components using CIS benchmarks.
      Deploy automated configuration drift detection and remediation. Implement
      automated patching pipelines for operating systems and platform components.
    tools:
      - elasticsearch
      - fluentd
      - terraform
      - ansible
      - cloud-security-posture

  devsecops:
    prose: >-
      Enforce secure configuration and logging standards through CI/CD. Implement
      IaC scanning (Checkov, tfsec) that validates security configurations against
      baselines. Require structured logging in application code that supports privacy
      audit requirements. Implement linting rules that detect personal data in log
      statements. Use container image scanning to verify base images meet hardening
      standards. Build automated tests that verify audit logging captures required
      events.
    tools:
      - gitlab-ci
      - checkov
      - tfsec
      - container-scanning
      - iac-scanning

  secops:
    prose: >-
      Operate the security monitoring and maintenance program for data processing
      systems. Review audit logs for privacy-relevant events. Monitor for unauthorized
      configuration changes. Manage vulnerability and patch management programs.
      Conduct periodic system hardening assessments. Investigate security events that
      may affect personal data. Generate security posture reports that include privacy-
      relevant metrics.
    tools:
      - siem
      - vulnerability-management
      - patch-management
      - configuration-management

