id: id-p.03
family: id-p
title: "Risk Assessment — Privacy Risk Identification"
class: NIST-PRIVACY

statement:
  prose: >-
    Privacy risks related to the processing of data are identified, including the
    likelihood that the processing could result in problems for individuals and the
    impact on individuals should the problems occur.

guidance:
  prose: >-
    Privacy risk assessment requires organizations to evaluate both the likelihood and
    impact of problematic data actions — actions that cause adverse effects for
    individuals such as embarrassment, discrimination, economic loss, or loss of
    autonomy. Unlike cybersecurity risk assessment focused on threat actors, privacy
    risk assessment examines the inherent risks of data processing operations themselves,
    even when functioning as intended. Organizations should use structured methodologies
    such as privacy impact assessments (PIAs) or data protection impact assessments
    (DPIAs) to systematically identify and evaluate risks. The assessment should consider
    the full data lifecycle from collection through deletion.

references:
  - citation: "NIST Privacy Framework v1.0, ID.RA-P1 through ID.RA-P5"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build privacy risk assessment into the system design lifecycle. Implement
      architecture review gates that require PIAs before new data processing systems
      are deployed. Create reusable PIA templates as code that automatically populate
      system metadata from the infrastructure catalog. Integrate privacy risk scores
      into the service catalog so that high-risk processing systems are flagged for
      enhanced monitoring. Implement automated data flow analysis tools that can detect
      changes in processing patterns that may alter the risk profile.
    tools:
      - backstage-catalog
      - opa
      - terraform
      - data-flow-analysis

  devsecops:
    prose: >-
      Integrate privacy risk checks into the development pipeline. Require PIA
      completion before merging code that introduces new data processing. Use static
      analysis to detect changes in data handling patterns (new PII fields, changed
      retention logic, new third-party data sharing) and trigger PIA updates. Implement
      privacy-focused code review checklists. Track PIA completion status as a merge
      request requirement.
    tools:
      - gitlab-ci
      - sast
      - custom-policy-checks
      - threat-modeling-tools

  secops:
    prose: >-
      Conduct periodic privacy risk assessments across all data processing systems.
      Monitor for changes in processing activities that may alter risk profiles. Maintain
      a privacy risk register that tracks identified risks, their severity, and
      mitigation status. Generate regular privacy risk reports for leadership. Correlate
      privacy incidents with risk assessments to validate and improve the risk
      methodology.
    tools:
      - grc-platform
      - siem
      - risk-register
      - incident-management

