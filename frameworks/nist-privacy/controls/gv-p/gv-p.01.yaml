id: gv-p.01
family: gv-p
title: "Governance Policies, Processes, and Procedures"
class: NIST-PRIVACY

statement:
  prose: >-
    An organizational privacy policy is established and communicated. The privacy
    policy reflects the organization's risk management priorities, organizational
    roles and responsibilities, and applicable legal/regulatory requirements.

guidance:
  prose: >-
    An organizational privacy policy sets the tone from the top for how privacy is
    managed across the enterprise. It should articulate the organization's commitment
    to protecting individual privacy, define the principles guiding data processing
    decisions, establish clear roles and responsibilities, and reference applicable
    legal and regulatory obligations. The policy must be communicated to all workforce
    members and relevant external parties. It should be reviewed and updated regularly
    to reflect changes in the regulatory environment, business operations, and privacy
    risk landscape. The policy should be enforceable and linked to disciplinary
    measures for non-compliance.

references:
  - citation: "NIST Privacy Framework v1.0, GV.PO-P1 through GV.PO-P6"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Encode privacy policy requirements as technical controls in the infrastructure.
      Implement policy-as-code that enforces key privacy policy directives — for example,
      data retention limits, encryption requirements, and access control minimums.
      Deploy OPA/Gatekeeper policies in Kubernetes clusters that enforce privacy-relevant
      configurations. Maintain privacy policy documentation in version-controlled
      repositories alongside the infrastructure code, ensuring changes are tracked and
      auditable.
    tools:
      - opa
      - gatekeeper
      - terraform
      - vault
      - backstage-catalog

  devsecops:
    prose: >-
      Integrate privacy policy compliance checks into CI/CD pipelines. Enforce that
      code changes affecting data processing include privacy impact documentation.
      Implement pre-merge checks that validate adherence to privacy policy requirements
      such as data minimization, purpose limitation, and retention controls. Use merge
      request templates that include privacy policy compliance checklists for changes
      involving personal data.
    tools:
      - gitlab-ci
      - opa
      - custom-policy-checks
      - merge-request-templates

  secops:
    prose: >-
      Monitor compliance with the organizational privacy policy through continuous
      auditing. Generate regular privacy policy compliance reports. Track policy
      exceptions and their justifications. Conduct periodic privacy policy awareness
      assessments. Investigate and document policy violations. Maintain evidence of
      policy communication and acknowledgment by workforce members.
    tools:
      - grc-platform
      - siem
      - audit-logging
      - training-platform

legal_references:
  - framework_id: gdpr
    articles: ["art-24", "art-25"]
    relationship: supports
