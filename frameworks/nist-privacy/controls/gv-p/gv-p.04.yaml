id: gv-p.04
family: gv-p
title: "Monitoring and Review"
class: NIST-PRIVACY

statement:
  prose: >-
    Policies, processes, and procedures for monitoring and reviewing privacy risks on
    an ongoing basis are established and in place. The effectiveness of privacy controls
    and the overall privacy posture are regularly assessed and improved.

guidance:
  prose: >-
    Privacy is not a one-time compliance exercise but an ongoing operational discipline.
    Organizations must establish continuous monitoring mechanisms that track the
    effectiveness of privacy controls, detect emerging privacy risks, and trigger
    corrective actions. Monitoring should cover both technical controls (encryption,
    access controls, data retention enforcement) and organizational controls (policy
    compliance, training completion, incident response readiness). Reviews should be
    conducted at defined intervals and triggered by significant changes in data processing
    activities, regulatory requirements, or privacy incidents. Findings from monitoring
    and reviews should feed back into the risk management process.

references:
  - citation: "NIST Privacy Framework v1.0, GV.MT-P1 through GV.MT-P7"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build continuous privacy monitoring into the platform infrastructure. Deploy
      automated checks that verify privacy control effectiveness — data encryption
      status, access control configurations, retention policy enforcement, and
      anonymization pipeline operation. Implement privacy control dashboards that
      provide real-time visibility into the privacy posture. Use infrastructure
      automation to detect and remediate privacy control drift. Schedule automated
      privacy configuration audits.
    tools:
      - grafana
      - prometheus
      - opa
      - terraform
      - cloud-security-posture

  devsecops:
    prose: >-
      Integrate privacy control monitoring into CI/CD pipelines. Track privacy control
      coverage metrics across the codebase — percentage of data handling code with
      privacy controls, PIA completion rates, privacy test coverage. Implement automated
      privacy regression testing that verifies privacy controls remain effective after
      code changes. Generate privacy posture reports as pipeline artifacts for periodic
      review.
    tools:
      - gitlab-ci
      - sonarqube
      - custom-policy-checks
      - testing-frameworks

  secops:
    prose: >-
      Operate the continuous privacy monitoring program. Generate and distribute regular
      privacy posture reports to stakeholders. Track privacy control effectiveness
      metrics over time to identify trends. Conduct periodic privacy audits and
      assessments. Manage the corrective action process for identified privacy control
      deficiencies. Coordinate annual privacy program reviews with leadership.
    tools:
      - grc-platform
      - siem
      - audit-management
      - reporting-dashboard

