id: gv-p.02
family: gv-p
title: "Risk Management Strategy"
class: NIST-PRIVACY

statement:
  prose: >-
    The organization's risk management priorities are established for managing privacy
    risk. Risk tolerance is determined and clearly expressed so that privacy risks are
    managed consistently with the overall enterprise risk strategy.

guidance:
  prose: >-
    Privacy risk management must be integrated into the organization's overall enterprise
    risk management strategy. The organization should define its privacy risk appetite
    and tolerance levels, considering factors such as the sensitivity of data processed,
    regulatory requirements, reputational considerations, and individual expectations.
    The risk management strategy should specify how privacy risks are identified,
    assessed, responded to, and monitored. It should establish clear escalation paths
    for privacy risks that exceed tolerance levels and define the criteria for accepting,
    mitigating, transferring, or avoiding specific privacy risks.

references:
  - citation: "NIST Privacy Framework v1.0, GV.RM-P1 through GV.RM-P3"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Translate risk tolerance levels into measurable technical thresholds. Define
      platform-level privacy risk indicators such as the volume of unencrypted PII
      transfers, the number of systems without data retention policies, or the percentage
      of services without privacy impact assessments. Implement dashboards that track
      these indicators against defined tolerance thresholds. Use infrastructure
      automation to enforce minimum privacy controls based on data sensitivity
      classification — higher sensitivity data requires stricter technical controls.
    tools:
      - grafana
      - prometheus
      - opa
      - terraform
      - backstage-catalog

  devsecops:
    prose: >-
      Integrate privacy risk metrics into the development workflow. Define privacy risk
      scoring for code changes based on the type and volume of data affected. Implement
      pipeline gates that block deployments exceeding privacy risk thresholds without
      explicit privacy officer approval. Track privacy risk debt alongside technical
      debt. Generate privacy risk trend reports from pipeline data to inform risk
      management strategy updates.
    tools:
      - gitlab-ci
      - custom-policy-checks
      - risk-scoring
      - sonarqube

  secops:
    prose: >-
      Operate a privacy risk monitoring program aligned with the enterprise risk
      management strategy. Track privacy risk indicators against defined tolerance
      levels. Escalate risks exceeding tolerance to appropriate decision-makers.
      Conduct periodic reviews of the privacy risk management strategy effectiveness.
      Maintain a privacy risk register that integrates with the enterprise risk register.
      Report privacy risk posture to leadership on a regular cadence.
    tools:
      - grc-platform
      - risk-register
      - siem
      - reporting-dashboard

