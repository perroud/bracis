id: gv-p.03
family: gv-p
title: "Awareness and Training"
class: NIST-PRIVACY

statement:
  prose: >-
    The organization's workforce and third parties engaged in data processing are
    provided privacy awareness education and are trained to perform their privacy-related
    duties and responsibilities consistent with related policies, processes, procedures,
    and agreements.

guidance:
  prose: >-
    Privacy awareness and training programs must equip all personnel who process personal
    data with the knowledge and skills to fulfill their privacy responsibilities. Training
    should be role-specific: developers need training on privacy-by-design principles
    and secure data handling, administrators need training on access control and data
    retention, and executives need training on privacy risk governance. Third parties
    with access to organizational data should receive training appropriate to their role.
    Training effectiveness should be measured and programs updated based on emerging
    privacy threats, regulatory changes, and lessons learned from privacy incidents.

references:
  - citation: "NIST Privacy Framework v1.0, GV.AT-P1 through GV.AT-P3"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate privacy training requirements into platform access controls. Require
      completion of role-appropriate privacy training before granting access to systems
      that process personal data. Implement automated training assignment based on
      infrastructure roles — personnel with access to production databases containing
      PII must complete data handling training. Use platform tools to deliver just-in-time
      privacy guidance, such as displaying data classification reminders when accessing
      sensitive data stores.
    tools:
      - identity-provider
      - backstage-catalog
      - training-platform
      - vault

  devsecops:
    prose: >-
      Embed privacy training into the developer workflow. Require privacy-by-design
      training for developers working on data processing features. Implement automated
      code review annotations that provide privacy guidance when PII-handling code
      patterns are detected. Create developer-focused privacy documentation in the
      repository (e.g., PRIVACY.md with data handling guidelines). Include privacy
      considerations in code review checklists.
    tools:
      - gitlab-ci
      - training-platform
      - code-review-tools
      - documentation-tools

  secops:
    prose: >-
      Manage the privacy awareness and training program lifecycle. Track training
      completion rates and compliance across the organization. Conduct privacy awareness
      assessments such as phishing simulations targeting data handling scenarios. Generate
      reports on training effectiveness metrics. Coordinate with HR to ensure privacy
      training is part of onboarding and annual recertification. Maintain evidence of
      training delivery for regulatory compliance.
    tools:
      - training-platform
      - grc-platform
      - phishing-simulation
      - hr-systems

