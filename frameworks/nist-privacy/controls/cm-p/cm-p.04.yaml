id: cm-p.04
family: cm-p
title: "Privacy Breach Communication"
class: NIST-PRIVACY

statement:
  prose: >-
    Policies, processes, and procedures for communicating privacy breaches to affected
    individuals and other stakeholders are maintained and used. Breach notification
    obligations are fulfilled in accordance with applicable laws and organizational
    policies.

guidance:
  prose: >-
    Privacy breach communication is a critical obligation that requires organizations
    to notify affected individuals, regulators, and other stakeholders when personal
    data is compromised. Organizations must establish pre-defined breach notification
    procedures that specify who is responsible for notifications, the timeline for
    notification (many jurisdictions require 72 hours), the content of notifications,
    and the channels through which notifications are delivered. Notification content
    should describe the nature of the breach, the categories of data affected, likely
    consequences, and measures taken or proposed to mitigate harm. Organizations should
    maintain breach response templates and conduct regular tabletop exercises to ensure
    readiness.

references:
  - citation: "NIST Privacy Framework v1.0, CM.AW-P7, CM.AW-P8"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build breach detection and notification infrastructure. Implement automated
      anomaly detection that identifies potential data breaches — unusual data access
      patterns, bulk data exports, unauthorized access attempts. Deploy automated
      impact assessment tools that can quickly determine the scope of a breach (how
      many individuals affected, what data categories exposed). Build notification
      delivery infrastructure that can send breach notifications at scale through
      multiple channels (email, SMS, postal). Maintain pre-approved notification
      templates in the platform.
    tools:
      - siem
      - anomaly-detection
      - notification-service
      - incident-management
      - terraform

  devsecops:
    prose: >-
      Implement breach detection capabilities in application code. Build audit logging
      that captures data access events at sufficient granularity to support breach
      investigation. Implement data access anomaly detection in application logic.
      Include breach notification endpoint testing in CI/CD pipelines. Ensure
      application error handling does not expose personal data in error messages
      or logs that could expand a breach scope.
    tools:
      - gitlab-ci
      - sast
      - audit-logging
      - error-handling-testing
      - secret-detection

  secops:
    prose: >-
      Operate the privacy breach response and notification program. Maintain breach
      response plans and playbooks. Conduct regular tabletop exercises. When a breach
      occurs, coordinate the response including containment, investigation, impact
      assessment, notification, and remediation. Track regulatory notification deadlines
      and ensure compliance. Maintain a breach register documenting all incidents and
      outcomes. Coordinate with legal counsel on notification obligations across
      jurisdictions.
    tools:
      - incident-management
      - siem
      - grc-platform
      - breach-notification-tools

