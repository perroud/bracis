id: cm-p.02
family: cm-p
title: "Data Processing Awareness — Privacy Notices"
class: NIST-PRIVACY

statement:
  prose: >-
    Individuals and organizations are provided with notice about how data are processed
    and the associated privacy risks. The notice is provided in a manner that is
    understandable and accessible.

guidance:
  prose: >-
    Privacy notices serve as the primary mechanism for informing individuals about how
    their data is processed. Effective notices must describe the categories of data
    collected, the purposes of processing, the legal basis for processing, data sharing
    practices, retention periods, and individuals' rights. Notices should be layered —
    providing a concise summary with the ability to access more detailed information.
    They must be presented at or before the point of data collection and updated when
    processing practices change. Notices should be accessible to people with
    disabilities, available in relevant languages, and written in plain language
    appropriate for the target audience.

references:
  - citation: "NIST Privacy Framework v1.0, CM.AW-P1 through CM.AW-P8"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized privacy notice management system that serves consistent
      notices across all applications and services. Build notice versioning so that
      changes are tracked and users are notified of updates. Deploy just-in-time notices
      at data collection points through platform-level UI components. Implement
      accessibility standards (WCAG 2.1) for all privacy notices. Provide machine-readable
      notice formats alongside human-readable ones to support automated privacy
      preference enforcement.
    tools:
      - consent-management-platform
      - content-management
      - accessibility-tools
      - api-gateway

  devsecops:
    prose: >-
      Require privacy notice integration as part of feature development. Implement
      pre-merge checks that verify privacy notice presence for features that collect
      or process personal data. Use automated accessibility testing to validate notice
      readability. Maintain a privacy notice component library that developers can
      reuse to ensure consistency. Track notice coverage as a development metric.
    tools:
      - gitlab-ci
      - accessibility-testing
      - component-library
      - custom-policy-checks

  secops:
    prose: >-
      Audit privacy notice accuracy by comparing notice content against actual data
      processing practices. Monitor for data collection points that lack privacy
      notices. Track notice acknowledgment rates. Investigate complaints about
      misleading or incomplete notices. Conduct periodic reviews of notice content
      to ensure alignment with current processing activities and regulatory
      requirements.
    tools:
      - grc-platform
      - web-scanning
      - audit-management
      - complaint-management

