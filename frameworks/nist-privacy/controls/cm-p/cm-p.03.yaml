id: cm-p.03
family: cm-p
title: "Consent Management and Individual Participation"
class: NIST-PRIVACY

statement:
  prose: >-
    Mechanisms for individuals to consent to the processing of their data, where
    appropriate, and to request access to, correction of, or deletion of their data
    are implemented and operational.

guidance:
  prose: >-
    Individual participation mechanisms enable data subjects to exercise control over
    their personal data. This includes obtaining meaningful consent before processing,
    providing data access (portability) upon request, enabling correction of inaccurate
    data, and facilitating data deletion (right to erasure). Consent must be freely
    given, specific, informed, and unambiguous. Organizations should implement
    mechanisms for individuals to withdraw consent as easily as they gave it. Data
    subject request workflows must be documented, with defined response timelines and
    escalation procedures. The organization should verify the identity of requesters
    before fulfilling data access or deletion requests to prevent unauthorized
    disclosure.

references:
  - citation: "NIST Privacy Framework v1.0, CM.AW-P4, CM.AW-P6"
    url: "https://www.nist.gov/privacy-framework"

implementation_guidance:
  platform_engineering:
    prose: >-
      Build data subject request (DSR) infrastructure into the platform. Implement
      consent management APIs that capture, store, and enforce consent preferences
      across all services. Build automated DSR fulfillment pipelines that can locate
      and export an individual's data across all systems (access requests), propagate
      corrections across all data stores, and cascade deletions through primary and
      derived data. Implement identity verification for DSR requesters. Provide
      self-service privacy portals where individuals can manage consent and submit
      requests.
    tools:
      - consent-management-platform
      - identity-verification
      - user-portal
      - data-pipeline
      - api-gateway

  devsecops:
    prose: >-
      Design services to support data subject requests by default. Implement data
      access and deletion APIs for every service that stores personal data. Include
      DSR support as a non-functional requirement in service specifications. Build
      automated tests that verify DSR endpoints function correctly — data export
      completeness, deletion effectiveness, and correction propagation. Ensure consent
      state is checked before data processing in application code.
    tools:
      - gitlab-ci
      - integration-testing
      - api-testing
      - custom-policy-checks

  secops:
    prose: >-
      Operate the data subject request fulfillment process. Track DSR receipt,
      processing, and completion within regulatory timelines. Verify that deletions
      are propagated across all systems including backups and third parties. Investigate
      failed or incomplete DSR fulfillments. Generate DSR metrics reports (volume,
      type, response time, completion rate). Audit consent records for completeness
      and validity.
    tools:
      - grc-platform
      - dsr-management
      - audit-logging
      - reporting-dashboard

