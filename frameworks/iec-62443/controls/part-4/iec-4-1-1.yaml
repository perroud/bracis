id: iec-4-1-1
family: part-4
title: "Secure Product Development Lifecycle"
class: IEC62443
part: "62443-4-1"

statement:
  prose: >-
    The product supplier shall implement a secure product development lifecycle
    that integrates security practices into every phase of development. The
    lifecycle shall include security requirements definition, secure design,
    secure implementation, security verification and validation, defect
    management, patch management, and end-of-life planning for industrial
    automation and control system components.

guidance:
  prose: >-
    The secure product development lifecycle defined in IEC 62443-4-1
    applies to suppliers of IACS components (PLCs, RTUs, DCS, SCADA
    software, HMI applications, network devices). Key considerations
    include: establishing a security development team with defined roles
    and responsibilities; requiring threat modeling during the design phase
    that considers industrial attack scenarios (Purdue model traversal,
    safety system manipulation, sensor spoofing); implementing secure
    coding standards appropriate for embedded systems and real-time
    software; conducting security testing including static analysis,
    dynamic analysis, fuzz testing of industrial protocol parsers, and
    penetration testing; managing security defects with severity
    classification and defined response timelines; maintaining a
    vulnerability handling process aligned with IEC 62443-4-1 requirements;
    providing security advisories and patches to customers with impact
    assessment specific to industrial deployments; implementing supply
    chain security controls for third-party components and libraries;
    providing security hardening guides with product documentation; and
    defining end-of-life security support policies that give customers
    adequate time to migrate.

references:
  - citation: "IEC 62443-4-1:2018, Clause 5 through Clause 12"
    url: "https://webstore.iec.ch/en/publication/33615"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a secure development infrastructure with isolated build
      environments for IACS product compilation. Deploy artifact
      repositories that enforce signing and integrity verification for
      all build outputs. Implement a reproducible build system that
      enables customers to verify firmware integrity. Maintain separate
      development, testing, staging, and production environments that
      mirror target IACS deployment architectures. Deploy hardware-in-
      the-loop (HIL) test environments that allow security testing
      against representative industrial hardware.
    tools:
      - gitlab
      - harbor
      - artifactory
      - jenkins
      - docker

  devsecops:
    prose: >-
      Integrate security testing at every stage of the CI/CD pipeline for
      IACS products. Implement SAST with rules specific to embedded systems
      and real-time software (memory safety, integer overflow, race
      conditions). Deploy fuzz testing for all industrial protocol parsers
      (Modbus, OPC UA, EtherNet/IP, BACnet). Implement SBOM generation
      and vulnerability tracking for all third-party dependencies.
      Enforce peer review for all security-critical code with mandatory
      approval from the security development team. Implement automated
      regression testing for previously discovered vulnerabilities.
      Track security defects separately with SLA-based resolution timelines.
    tools:
      - gitlab-ci
      - coverity
      - polyspace
      - afl-fuzz
      - syft
      - grype

  secops:
    prose: >-
      Establish a Product Security Incident Response Team (PSIRT) with
      defined processes for receiving, triaging, and responding to
      vulnerability reports. Implement coordinated vulnerability disclosure
      procedures aligned with IEC 62443-4-1 and ISO/IEC 29147. Monitor
      public vulnerability databases (NVD, ICS-CERT) for vulnerabilities
      affecting components used in the product. Maintain a customer
      notification system for security advisories. Track and report on
      security defect metrics (time to fix, defect density, vulnerability
      recurrence) for continuous improvement.
    tools:
      - jira
      - defectdojo
      - vulndb
      - github-security-advisories
      - mitre-cve

