id: iec-4-1-2
family: part-4
title: "Security Requirements Definition"
class: IEC62443
part: "62443-4-1"

statement:
  prose: >-
    The product supplier shall define security requirements for the IACS
    component based on the target security levels (SL-T), the seven
    foundational requirements, and the intended deployment environment.
    Security requirements shall be documented, traceable, and verifiable,
    covering all aspects of the component's security functionality and
    assurance.

guidance:
  prose: >-
    Security requirements definition for IACS components must bridge the
    gap between the abstract security levels defined in IEC 62443-3-3
    and concrete, testable requirements for the product. Key considerations
    include: mapping the seven foundational requirements to specific product
    capabilities based on target security levels; defining authentication
    requirements for each SL (SL-1: unique identification; SL-2: role-based
    with passwords; SL-3: multi-factor; SL-4: hardware-backed multi-factor);
    specifying access control granularity requirements per SL; defining
    integrity verification requirements for firmware, configuration, and
    communications; specifying encryption requirements for data at rest
    and in transit; defining network segmentation support requirements
    (VLAN support, firewall integration, protocol filtering); specifying
    logging requirements (event types, detail level, storage capacity,
    export capabilities); defining availability requirements (failover
    time, recovery time, redundancy support); and documenting security
    constraints (protocols that cannot be encrypted due to real-time
    requirements, legacy interoperability needs) with compensating control
    recommendations.

references:
  - citation: "IEC 62443-4-1:2018, Clause 6"
    url: "https://webstore.iec.ch/en/publication/33615"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain a requirements management system that tracks security
      requirements from definition through implementation and verification.
      Create requirement templates for each security level that map
      foundational requirements to specific testable criteria. Implement
      traceability matrices that link security requirements to design
      decisions, code implementations, and test cases. Deploy test
      environments that simulate target security level conditions for
      validation.
    tools:
      - jama-connect
      - polarion
      - gitlab-requirements
      - doors-next
      - jira

  devsecops:
    prose: >-
      Implement security requirements as automated acceptance tests in
      the CI/CD pipeline. Create security test suites for each target
      security level that validate the component meets the foundational
      requirements at the specified level. Track security requirement
      coverage in the pipeline and block releases when coverage falls
      below the threshold. Implement requirements-as-code where security
      requirements are expressed as executable specifications. Automate
      the generation of security verification reports from pipeline
      test results for customer documentation.
    tools:
      - gitlab-ci
      - robot-framework
      - pytest
      - cucumber
      - allure

  secops:
    prose: >-
      Validate security requirements through independent security testing
      and red team exercises. Verify that defined requirements adequately
      address the threat landscape for the product's intended deployment
      environment. Review requirements against current ICS-CERT advisories
      and known attack patterns for similar products. Ensure incident
      response requirements are included and tested. Validate that
      security requirements address the full lifecycle including
      initial deployment, operation, maintenance, and decommissioning.
    tools:
      - burp-suite
      - metasploit
      - nmap
      - wireshark
      - defectdojo

legal_references:
