id: iec-4-2-1
family: part-4
title: "Component Security Requirements (SL-C)"
class: IEC62443
part: "62443-4-2"

statement:
  prose: >-
    The IACS component shall meet the security capability requirements
    defined for its target security level (SL-C). Component-level
    requirements are derived from the system-level foundational requirements
    and specify the concrete security capabilities that a component must
    provide, including identification and authentication, use control,
    system integrity, data confidentiality, restricted data flow, timely
    response to events, and resource availability at the component level.

guidance:
  prose: >-
    IEC 62443-4-2 defines specific component requirements (CRs) derived
    from each foundational requirement at each security level. Key
    considerations include: CR 1.x (IAC) — the component must support
    unique user identification at SL-1, role-based access at SL-2,
    multi-factor authentication at SL-3, and hardware-backed MFA at
    SL-4; CR 2.x (UC) — the component must enforce authorization with
    increasing granularity from role-based at SL-1 to per-object
    permissions at SL-4; CR 3.x (SI) — the component must validate
    input data, verify software integrity on boot, and detect
    unauthorized changes with increasing assurance at higher SLs;
    CR 4.x (DC) — the component must protect credentials at all levels
    and encrypt communications at SL-2 and above; CR 5.x (RDF) — the
    component must support network segmentation with zone boundary
    enforcement at SL-2 and above; CR 6.x (TRE) — the component must
    generate audit events and support centralized logging at SL-2 and
    above; CR 7.x (RA) — the component must support backup and recovery
    with increasing resilience at higher SLs. Each CR includes
    requirement enhancements (REs) that add capabilities at higher SLs.

references:
  - citation: "IEC 62443-4-2:2019"
    url: "https://webstore.iec.ch/en/publication/34421"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a compliance matrix that maps each component requirement
      (CR) and requirement enhancement (RE) to specific implementation
      features. Create automated compliance validation test suites for
      each security level that can be executed against component builds.
      Deploy hardware test beds that represent each target SL environment
      for validation. Implement certificate management infrastructure for
      device authentication at SL-3 and SL-4. Provide hardening scripts
      or configuration profiles for each target security level that
      customers can apply to achieve SL-C compliance.
    tools:
      - robot-framework
      - step-ca
      - ansible
      - testinfra
      - inspec

  devsecops:
    prose: >-
      Create CI/CD pipeline stages that validate component requirements
      for each target security level. Implement security level compliance
      gates that prevent release if the component does not meet the
      requirements for its declared SL-C. Automate the generation of
      SL-C compliance documentation from test results. Track requirement
      coverage metrics per security level in the pipeline dashboard.
      Implement regression test suites that verify previously certified
      capabilities are not degraded by new changes.
    tools:
      - gitlab-ci
      - robot-framework
      - allure
      - pytest
      - sonarqube

  secops:
    prose: >-
      Conduct independent security testing for each claimed security
      level. Verify that the component actually meets the stated SL-C
      requirements through hands-on testing rather than relying solely
      on vendor assertions. Implement a continuous compliance monitoring
      approach that re-validates component security capabilities when
      firmware updates or configuration changes occur. Review component
      security certifications and test reports from accredited labs
      (ISASecure, TUV, Exida) when available.
    tools:
      - nmap
      - metasploit
      - wireshark
      - openvas
      - nessus

