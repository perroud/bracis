id: iec-2-1-4
family: part-2
title: "Security Policy and Procedures"
class: IEC62443
part: "62443-2-1"

statement:
  prose: >-
    The asset owner shall develop, document, approve, and maintain
    cybersecurity policies and procedures that govern the security of the
    industrial automation and control system throughout its lifecycle. Policies
    shall address access control, change management, incident response, patch
    management, backup and recovery, and personnel security specific to the
    IACS environment.

guidance:
  prose: >-
    Security policies and procedures should be tailored to the operational
    technology environment, recognizing that standard IT security policies may
    not directly apply to IACS. Key policy areas include: access control
    policies defining who can access IACS zones, under what conditions, and
    with what authentication requirements aligned to the zone's target security
    level; change management procedures requiring safety impact analysis before
    any changes to control systems; patch management policies that account for
    vendor certification requirements and operational windows; incident
    response procedures coordinated with process safety teams and including
    criteria for when to initiate safe shutdown; backup and recovery procedures
    for PLC programs, HMI configurations, historian databases, and SCADA
    configurations; personnel security policies including background checks
    and role-based training for OT personnel; physical security policies for
    control rooms, wiring closets, and field devices; and portable media
    policies restricting USB and removable storage use in IACS environments.

references:
  - citation: "IEC 62443-2-1:2010, Clause 4.3"
    url: "https://webstore.iec.ch/en/publication/7030"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement policy-as-code to enforce IACS security policies automatically.
      Deploy configuration management tools that enforce approved baselines
      across all devices in each zone. Implement a centralized patch management
      platform that tracks vendor-certified patches, schedules deployment
      during maintenance windows, and validates system stability after
      patching. Deploy backup solutions that automatically capture PLC
      programs, HMI screens, and control system configurations on a schedule
      and after every change. Implement portable media control stations
      (kiosks) that scan removable devices before they enter IACS zones.
    tools:
      - ansible
      - puppet
      - veeam
      - acronis
      - honeywell-forge

  devsecops:
    prose: >-
      Store all security policies and procedures as version-controlled
      documents with approval workflows enforced through merge requests.
      Implement automated policy compliance checks in the CI/CD pipeline
      that verify deployments against the documented security policies.
      Require documented change requests with safety impact analysis as
      a mandatory field before any merge to production branches that target
      IACS environments. Automate the generation of compliance evidence by
      extracting policy adherence data from pipeline logs, approval records,
      and scan results.
    tools:
      - gitlab-ci
      - opa
      - vault
      - pre-commit
      - semgrep

  secops:
    prose: >-
      Monitor policy compliance continuously through automated compliance
      dashboards that track adherence across all IACS zones. Implement
      alerting for policy violations such as unauthorized access attempts,
      unapproved changes, or missed patch windows. Maintain incident
      response runbooks specific to each IACS zone with pre-approved
      containment actions that account for safety implications. Conduct
      regular policy reviews and tabletop exercises to validate that
      procedures are current and effective. Track policy exception requests
      and expiration dates with automated reminders.
    tools:
      - splunk-soar
      - servicenow-secops
      - rapid7-insightconnect
      - qualys-policy

legal_references:
