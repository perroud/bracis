id: iec-2-1-1
family: part-2
title: "Security Management System"
class: IEC62443
part: "62443-2-1"

statement:
  prose: >-
    The asset owner shall establish, implement, maintain and continually improve
    a cybersecurity management system (CSMS) for the industrial automation and
    control system environment. The CSMS shall define the organizational
    structure, policies, activities, responsibilities, practices, procedures,
    processes and resources necessary to manage cybersecurity risk across the
    IACS lifecycle.

guidance:
  prose: >-
    The CSMS should be proportionate to the risk profile of the industrial
    environment and aligned with the organization's overall enterprise risk
    management framework. Key elements include: defining the scope of the CSMS
    covering all IACS assets, zones, and conduits; assigning a senior management
    sponsor with authority and budget for IACS security; establishing a
    cross-functional team that includes OT engineers, IT security staff, and
    process safety personnel; defining roles and responsibilities using RACI
    matrices; creating an asset inventory that covers PLCs, RTUs, HMIs, DCS,
    SCADA servers, network switches, historians, and engineering workstations;
    defining key performance indicators for the CSMS; conducting periodic
    management reviews at least annually; and integrating cybersecurity into
    the management of change (MOC) process for all IACS modifications.

references:
  - citation: "IEC 62443-2-1:2010, Clause 4"
    url: "https://webstore.iec.ch/en/publication/7030"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement a centralized asset management platform that automatically
      discovers and inventories all OT and IT assets within IACS zones and
      conduits. Integrate OT asset data with the CMDB to maintain a single
      source of truth. Deploy network monitoring solutions capable of
      understanding industrial protocols (Modbus, OPC UA, EtherNet/IP,
      PROFINET). Implement infrastructure-as-code for repeatable,
      version-controlled deployment of security configurations across
      zones. Use GitOps workflows to manage and audit changes to
      network segmentation policies and firewall rules between zones.
    tools:
      - nozomi-networks
      - claroty
      - tenable-ot
      - servicenow
      - gitlab

  devsecops:
    prose: >-
      Integrate CSMS policies into the CI/CD pipeline for any software
      deployed to IACS environments. Enforce security gates that validate
      code against IEC 62443 requirements before deployment to OT networks.
      Implement change management workflows requiring dual approval from
      both OT engineering and cybersecurity teams for any changes to
      control system software. Maintain version control for all PLC programs,
      HMI configurations, and SCADA scripts. Automate compliance checks
      against the CSMS policy baseline as part of the merge request process.
    tools:
      - gitlab-ci
      - vault
      - opa
      - pre-commit

  secops:
    prose: >-
      Establish a Security Operations Center (SOC) with OT-specific
      monitoring capabilities. Deploy intrusion detection systems tuned for
      industrial protocol anomalies. Implement continuous monitoring of IACS
      zones with alerts for unauthorized access, configuration changes, and
      abnormal process behavior. Maintain incident response playbooks
      specific to industrial environments that account for safety-critical
      operations and require coordination with process safety teams before
      taking containment actions that could affect physical processes.
    tools:
      - splunk-ot
      - nozomi-vantage
      - claroty-ctd
      - siemplify
      - cortex-xsoar

legal_references:
  - framework_id: nist-800-53-rev5
    articles: ["PM-1", "PM-9", "PM-10", "RA-1"]
    relationship: equivalent-to
  - framework_id: iso-27001-2022
    articles: ["a5.1", "a5.2"]
    relationship: supports
