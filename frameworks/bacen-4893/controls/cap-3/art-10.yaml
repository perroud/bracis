id: art-10
family: cap-3
title: "Comunicacao de Incidentes ao Banco Central"
class: BACEN-4893
statement:
  prose: |
    Art. 10. As instituições referidas no art. 1 devem comunicar ao Banco Central do
    Brasil as ocorrências de incidentes relevantes e as interrupções dos serviços
    relevantes, no prazo definido em regulamentação específica, que configuram situação
    de crise pela instituição.

    § 1º A comunicação de que trata o caput deve conter, no mínimo:
    I - a descrição do incidente;
    II - os efeitos do incidente;
    III - as ações adotadas para o tratamento do incidente;
    IV - o resultado das ações mencionadas no inciso III.

    § 2º As informações de que trata o § 1º devem ser prestadas até que o incidente
    seja encerrado.

    § 3º A comunicação de que trata este artigo não exime a instituição do dever de
    comunicar, nos termos da legislação vigente, a ocorrência de incidentes relevantes a
    outros órgãos e entidades competentes.
guidance:
  prose: |
    O art. 10 estabelece a obrigacao de comunicar incidentes relevantes ao BCB.
    E um dos artigos mais criticos operacionalmente, pois a falha na comunicacao
    pode gerar sancoes regulatorias.

    **Criterios de comunicacao:**
    - Incidentes relevantes (conforme criterios definidos pela instituicao e pelo BCB)
    - Interrupcoes de servicos relevantes
    - Situacoes de crise

    **Conteudo minimo da comunicacao (ss 1):**
    1. Descricao do incidente: o que aconteceu, quando, como foi detectado
    2. Efeitos: impacto em clientes, dados, operacoes, financeiro
    3. Acoes adotadas: contencao, erradicacao, recuperacao
    4. Resultado das acoes: eficacia das medidas, status atual

    **Comunicacao continua (ss 2):**
    A comunicacao nao e unica. Deve ser atualizada ate o encerramento do incidente.
    Na pratica, exige reports de status periodicos ao BCB.

    **Comunicacao a outros orgaos (ss 3):**
    A comunicacao ao BCB nao substitui obrigacoes com outros orgaos:
    - ANPD (se envolver dados pessoais, conforme LGPD art. 48)
    - Policia Federal (se envolver crimes ciberneticos)
    - CVM (se afetar mercado de capitais)
    - SUSEP (se envolver seguros)
    - Titulares de dados (conforme LGPD)

    **Prazo:**
    O prazo e definido em regulamentacao especifica do BCB. Atualmente, a comunicacao
    deve ser feita de forma tempestiva, seguindo orientacoes da Circular BCB.
implementation_guidance:
  platform_engineering:
    prose: |
      **Deteccao automatizada de incidentes relevantes:**
      1. Alerting com thresholds que classificam automaticamente incidentes como
         "relevantes" com base nos criterios regulatorios.
      2. Integracao SIEM -> incident management -> workflow de comunicacao ao BCB.
      3. Dashboards de impacto em tempo real (clientes afetados, servicos impactados,
         dados comprometidos).

      **Automacao da comunicacao:**
      4. Templates pre-aprovados para comunicacao ao BCB com campos obrigatorios.
      5. Workflow automatizado que gera draft de comunicacao ao BCB quando incidente
         e classificado como relevante.
      6. Timeline automatica do incidente para preencher a comunicacao.

      **Monitoramento de interrupcoes:**
      7. SLO monitoring com alertas automaticos quando SLA e violado.
      8. Status page automatizada com registro de interrupcoes.
      9. Metricas de disponibilidade por servico com historico.

      **Comunicacao continua (ss 2):**
      10. Status updates automatizados com periodicidade definida.
      11. Registro cronologico imutavel de todas as acoes durante o incidente.
    tools:
      - incident-management
      - siem
      - monitoring-alerting
      - status-page
      - centralized-logging
  devsecops:
    prose: |
      **Rastreabilidade para comunicacao:**
      1. Audit trail completo de deploys, rollbacks e mudancas durante incidentes.
      2. Git blame e commit history para identificar causa raiz rapidamente.
      3. Artifact provenance para rastrear componentes afetados.

      **Resposta rapida:**
      4. Hotfix pipeline com deploy acelerado para mitigar incidentes.
      5. Rollback automatizado com registro de motivo.
      6. Feature flags para desativar funcionalidades comprometidas.

      **Documentacao para comunicacao:**
      7. Change log automatizado vinculado a comunicacao ao BCB.
      8. Post-mortem com timeline tecnica para subsidiar o relatorio.
      9. Metricas de MTTR para demonstrar capacidade de resposta.
    tools:
      - gitlab-ci
      - feature-flags
      - incident-management
      - artifact-registry
  secops:
    prose: |
      **Processo de comunicacao ao BCB:**
      1. Workflow formal de comunicacao com aprovacoes e SLAs internos.
      2. Templates de comunicacao pre-aprovados pelo juridico e compliance.
      3. Responsavel designado para comunicacao com BCB (CISO ou delegado).
      4. Canal de comunicacao testado periodicamente.

      **Classificacao de relevancia:**
      5. Criterios quantitativos para "incidente relevante" (ex: numero de clientes
         afetados, volume financeiro, duracao de interrupcao).
      6. Matriz de decisao automatizada: comunicar ou nao comunicar ao BCB.
      7. Registro da decisao e justificativa quando nao comunicar.

      **Comunicacao continua:**
      8. Status reports periodicos ao BCB durante incidente aberto.
      9. Relatorio de encerramento com analise de causa raiz e acoes corretivas.
      10. Follow-up de acoes corretivas com evidencias de implementacao.

      **Comunicacao a outros orgaos (ss 3):**
      11. Checklist regulatorio: para cada incidente, verificar obrigacao de
          comunicacao a ANPD, Policia Federal, CVM, SUSEP.
      12. Templates especificos para cada orgao regulador.
      13. Registro centralizado de todas as comunicacoes regulatorias.
    tools:
      - soar
      - siem
      - incident-management
      - grc-platform
      - communication-tools
