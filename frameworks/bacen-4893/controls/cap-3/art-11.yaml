id: art-11
family: cap-3
title: "Relatorio Anual de Incidentes"
class: BACEN-4893
statement:
  prose: |
    Art. 11. As instituições referidas no art. 1 devem elaborar relatório anual sobre a
    implementação do plano de ação e de resposta a incidentes, mencionado no art. 6,
    com data-base de 31 de dezembro.

    Parágrafo único. O relatório de que trata o caput deve abordar, no mínimo:
    I - a efetividade da implementação das ações descritas no art. 6, parágrafo único;
    II - o resumo dos resultados obtidos na implementação das rotinas, dos procedimentos,
    dos controles e das tecnologias voltados à prevenção e à resposta de incidentes;
    III - os incidentes relevantes relacionados com o ambiente cibernético ocorridos no
    período; e
    IV - os resultados dos testes de continuidade de negócios, considerando cenários de
    incidentes.
guidance:
  prose: |
    O art. 11 exige um relatorio anual formal sobre seguranca cibernetica, com data-base
    de 31 de dezembro. E um artefato de auditoria critico e deve ser apresentado ao
    conselho de administracao (art. 17).

    **Data-base:** 31 de dezembro de cada ano. O relatorio deve cobrir o periodo de
    janeiro a dezembro.

    **Conteudo minimo:**

    **I - Efetividade das acoes (art. 6):**
    Avaliacao de progresso do plano de acao. Deve responder: as acoes planejadas foram
    executadas? Se nao, por que? Quais os proximos passos?

    **II - Resultados de controles:**
    Metricas concretas sobre a eficacia dos controles de prevencao e resposta:
    - Numero de vulnerabilidades identificadas e remediadas
    - Tempo medio de deteccao e resposta (MTTD/MTTR)
    - Cobertura de scanning e patching
    - Resultados de testes de penetracao

    **III - Incidentes relevantes:**
    Lista de incidentes relevantes ocorridos no periodo, com:
    - Descricao, impacto, causa raiz
    - Acoes tomadas e resultados
    - Licoes aprendidas

    **IV - Resultados de testes de continuidade:**
    Documentacao dos testes de continuidade de negocios realizados, incluindo
    cenarios simulados, resultados e gaps identificados.

    **Destinatarios:**
    O relatorio deve ser submetido ao conselho de administracao ou diretoria
    (conforme art. 17) e mantido a disposicao do BCB.
implementation_guidance:
  platform_engineering:
    prose: |
      **Coleta automatizada de dados para o relatorio:**
      1. Dashboards anuais com metricas agregadas de seguranca.
      2. Exportacao automatizada de dados de incident management, vulnerability
         scanning e compliance monitoring.
      3. Metricas de disponibilidade de servicos com historico anual.
      4. Inventario de ativos com evolucao ao longo do ano.

      **I - Metricas de efetividade:**
      5. Progresso de implementacao de controles (% completado vs. planejado).
      6. Cobertura de security controls por servico/ambiente.
      7. Tempo de remediacao de configuracoes nao conformes.

      **II - Resultados operacionais:**
      8. Metricas de uptime/SLA por servico critico.
      9. Volume de alertas, false positives rate, alertas acionados.
      10. Cobertura de monitoramento e observabilidade.

      **IV - Testes de continuidade:**
      11. Registro automatizado de chaos engineering experiments.
      12. Resultados de failover tests com RPO/RTO medidos.
      13. Documentacao de game days e lessons learned.
    tools:
      - monitoring-alerting
      - incident-management
      - vulnerability-scanner
      - chaos-engineering
      - reporting-platform
  devsecops:
    prose: |
      **Dados do pipeline para o relatorio:**
      1. Metricas anuais de SAST/DAST/SCA: vulnerabilidades encontradas, corrigidas,
         pendentes por severidade.
      2. MTTR de vulnerabilidades de codigo por severidade.
      3. Cobertura de security scanning no portfolio de aplicacoes.
      4. Evolucao de metricas DORA com perspectiva de seguranca.

      **II - Resultados de controles no desenvolvimento:**
      5. Numero de deploys bloqueados por security gates.
      6. Tempo medio de correcao de vulnerabilidades criticas.
      7. Cobertura de testes de seguranca automatizados.
      8. Supply chain security: vulnerabilidades em dependencias.

      **Automacao do relatorio:**
      9. Pipeline dedicado que agrega dados de todas as fontes (SAST, DAST, SCA,
         container scanning, secret detection) e gera relatorio.
      10. Templates de relatorio versionados no repositorio.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - sonarqube
      - reporting-platform
  secops:
    prose: |
      **Elaboracao do relatorio anual:**
      1. Template padronizado com secoes mapeadas para cada inciso do art. 11.
      2. Coleta de dados do SIEM, SOAR, vulnerability scanner, GRC.
      3. Revisao pelo CISO e aprovacao pelo conselho/diretoria.

      **I - Efetividade das acoes:**
      4. Status de cada acao do plano: concluida, em andamento, atrasada.
      5. Gap analysis: controles planejados vs. implementados.
      6. Recomendacoes para o proximo ciclo.

      **II - Resultados de controles:**
      7. Metricas anuais: MTTD, MTTR, volume de incidentes por tipo.
      8. Resultados de vulnerability scanning e penetration testing.
      9. Cobertura de patching e compliance de hardening.
      10. Resultados de phishing simulation.

      **III - Incidentes relevantes:**
      11. Resumo de cada incidente relevante com causa raiz e acoes.
      12. Analise de tendencias e padroes de incidentes.
      13. Comparacao com periodo anterior (melhoria ou deterioracao).

      **IV - Testes de continuidade:**
      14. Registro de tabletop exercises e simulacoes tecnicas.
      15. Resultados de DR drills com RPO/RTO medidos vs. planejados.
      16. Gaps identificados e plano de correcao.

      **Governanca:**
      17. Apresentacao ao conselho de administracao (art. 17).
      18. Retencao do relatorio por 5 anos (minimo).
      19. Disponibilizacao ao BCB quando solicitado.
    tools:
      - siem
      - soar
      - grc-platform
      - vulnerability-scanner
      - reporting-platform
