id: art-20
family: cap-6
title: "Compartilhamento de Informacoes sobre Incidentes"
class: BACEN-4893
statement:
  prose: |
    Art. 20. As instituições referidas no art. 1 devem instituir mecanismos para o
    compartilhamento de informações sobre incidentes relevantes de que trata o art. 4,
    incisos IV e VII.

    Parágrafo único. O compartilhamento de que trata o caput deve abranger informações
    sobre incidentes relevantes recebidos de empresas prestadoras de serviços a terceiros.
guidance:
  prose: |
    O art. 20 exige mecanismos formais de compartilhamento de informacoes sobre
    incidentes entre instituicoes financeiras. E uma obrigacao de colaboracao setorial.

    **Escopo do compartilhamento:**
    - Incidentes relevantes proprios (art. 4, IV)
    - Incidentes relevantes de terceiros/fornecedores (paragrafo unico)
    - Iniciativas de compartilhamento (art. 4, VII)

    **Por que compartilhar:**
    O setor financeiro e alvo frequente de ataques coordenados. Um ataque a uma
    instituicao pode rapidamente se espalhar para outras. O compartilhamento
    permite:
    - Deteccao precoce de ameacas emergentes
    - Defesa coordenada contra campanhas de ataque
    - Melhoria coletiva da postura de seguranca
    - Reducao do tempo de resposta a incidentes

    **Mecanismos de compartilhamento:**
    Na pratica, isso se materializa por meio de:
    - ISACs (Information Sharing and Analysis Centers): no Brasil, o principal
      e o CIAB/Febraban
    - Foros setoriais de seguranca cibernetica
    - Plataformas de threat intelligence sharing (MISP, STIX/TAXII)
    - Acordos bilaterais entre instituicoes

    **Paragrafo unico — Terceiros:**
    O compartilhamento deve incluir informacoes sobre incidentes de terceiros
    prestadores de servicos. Se um fornecedor sofre um ataque que pode afetar
    outras instituicoes, essa informacao deve ser compartilhada.

    **Cuidados:**
    - O compartilhamento deve respeitar limites de confidencialidade
    - Dados pessoais de clientes nao devem ser compartilhados
    - Indicadores de comprometimento (IoCs) podem ser compartilhados
    - O compartilhamento deve ser anonimizado quando possivel
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de compartilhamento:**
      1. Instancia de MISP (Malware Information Sharing Platform) para
         compartilhamento de IoCs.
      2. Integracao STIX/TAXII para interoperabilidade com outras instituicoes.
      3. Feed automatizado de IoCs do MISP para SIEM e firewalls.
      4. Anonimizacao automatica de dados antes do compartilhamento.

      **Automacao de compartilhamento:**
      5. Workflow automatizado: incidente relevante -> extrair IoCs ->
         anonimizar -> compartilhar via MISP.
      6. Integracao com threat intelligence platforms para consumo de feeds
         de outras instituicoes.
      7. Enrichment automatico de alertas com IoCs compartilhados.

      **Recepcao de informacoes:**
      8. Ingestao automatica de IoCs compartilhados por outras instituicoes.
      9. Correlacao automatica com eventos internos.
      10. Alertas proativos quando IoC compartilhado e detectado internamente.
    tools:
      - misp
      - threat-intelligence
      - siem
      - centralized-logging
      - network-policies
  devsecops:
    prose: |
      **Integracao de threat intelligence no pipeline:**
      1. Verificacao de dependencias contra IoCs compartilhados (malicious packages).
      2. IP/domain blocklists alimentadas por threat intelligence compartilhada.
      3. Alertas para desenvolvedores quando vulnerabilidade explorada ativamente
         e reportada via sharing.

      **Compartilhamento de vulnerabilidades:**
      4. Disclosure responsavel de vulnerabilidades encontradas em software
         compartilhado entre instituicoes.
      5. Alertas de supply chain comprometida via canais de compartilhamento.
      6. CVE tracking com enrichment de threat intelligence setorial.
    tools:
      - threat-intelligence
      - gitlab-dependency-scanning
      - renovate
  secops:
    prose: |
      **Programa de compartilhamento:**
      1. Participacao ativa em ISAC do setor financeiro (CIAB/Febraban).
      2. Representante designado para foros de compartilhamento.
      3. Processo formal de triagem e compartilhamento de informacoes.
      4. Acordos de compartilhamento (NDA) com instituicoes parceiras.

      **Operacionalizacao:**
      5. MISP operacional com feeds de entrada e saida.
      6. Analistas de threat intelligence dedicados ao compartilhamento.
      7. Taxonomia padronizada para classificacao de informacoes (TLP).
      8. Revisao juridica dos limites de compartilhamento.

      **Terceiros (paragrafo unico):**
      9. Clausula contratual obrigando terceiros a reportar incidentes.
      10. Processo de recepcao e triagem de notificacoes de terceiros.
      11. Compartilhamento de informacoes de incidentes de terceiros com
          outras instituicoes (anonimizado).

      **Metricas:**
      12. Volume de informacoes compartilhadas (enviadas e recebidas).
      13. Tempo entre recepcao de IoC e implementacao de controle.
      14. Incidentes prevenidos ou detectados gracas ao compartilhamento.
    tools:
      - misp
      - threat-intelligence
      - siem
      - soar
      - grc-platform
