id: art-12
family: cap-4
title: "Requisitos para Contratacao de Servicos em Nuvem"
class: BACEN-4893
statement:
  prose: |
    Art. 12. As instituições referidas no art. 1 devem assegurar que suas políticas, estratégias
    e estruturas para gerenciamento de riscos previstas na regulamentação em vigor, especificamente
    no tocante aos critérios de decisão quanto à terceirização de serviços, contemplem a
    contratação de serviços relevantes de processamento e armazenamento de dados e de computação
    em nuvem, no País ou no exterior.

    Parágrafo único. As instituições mencionadas no caput devem possuir recursos e competências
    necessários para a gestão dos serviços contratados e para a verificação do cumprimento dos
    requisitos previstos nesta Resolução.
guidance:
  prose: |
    O art. 12 estabelece que a contratacao de servicos em nuvem deve estar inserida no
    framework de gestao de riscos da instituicao, nao como excecao ou caso especial.

    **Integracao com gestao de riscos:**
    A contratacao de cloud nao pode ser uma decisao puramente tecnica ou de custo.
    Deve passar pelo processo formal de gestao de riscos de terceirizacao, incluindo:
    - Avaliacao de risco do provedor
    - Due diligence de seguranca
    - Analise de concentracao de risco
    - Plano de contingencia e exit strategy

    **Abrangencia:**
    - Servicos de processamento de dados (IaaS, PaaS, SaaS)
    - Servicos de armazenamento de dados (object storage, databases, backups)
    - Computacao em nuvem (qualquer modelo de servico)
    - No Pais ou no exterior (com requisitos adicionais para exterior, art. 15)

    **Paragrafo unico — Competencia e recursos:**
    A instituicao nao pode simplesmente terceirizar e "lavar as maos". Deve:
    - Ter equipe capacitada para gerenciar os servicos contratados
    - Monitorar continuamente o provedor
    - Verificar cumprimento dos requisitos regulatorios
    - Manter capacidade de auditoria sobre o provedor

    **Na pratica:**
    Isso significa que adotar cloud nao reduz a responsabilidade da instituicao.
    O BCB pode auditar a instituicao sobre os servicos em nuvem como se fossem
    operados internamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de riscos de cloud:**
      1. Cloud governance framework documentado e implementado.
      2. Cloud Security Posture Management (CSPM) para monitoramento continuo.
      3. FinOps integrado com visao de risco (custo vs. seguranca vs. compliance).
      4. Multi-cloud strategy para evitar concentracao de risco (quando aplicavel).

      **Competencia tecnica (paragrafo unico):**
      5. Equipe de cloud engineering com certificacoes relevantes.
      6. Runbooks para operacao de servicos em nuvem.
      7. Monitoramento de SLAs do provedor com alertas de desvio.
      8. Capacidade de operacao autonoma em caso de falha do provedor.

      **Seguranca em nuvem:**
      9. Landing zone segura com guardrails automatizados.
      10. Account/subscription segmentation por ambiente e workload.
      11. IAM centralizado com federacao de identidades.
      12. Network security com VPC, private endpoints, security groups.
      13. Encryption em transito e em repouso em todos os servicos.
      14. Logging e monitoramento de API calls (CloudTrail, Activity Log).

      **Auditabilidade:**
      15. Asset inventory automatizado de todos os recursos em nuvem.
      16. Configuration management com drift detection.
      17. Compliance reports automatizados (CIS Benchmarks, SOC 2).
    tools:
      - cspm
      - cloud-governance
      - identity-provider
      - centralized-logging
      - asset-inventory
      - compliance-scanner
  devsecops:
    prose: |
      **Seguranca no desenvolvimento para cloud:**
      1. IaC scanning (Checkov, tfsec, KICS) em todo merge request.
      2. Cloud-native security best practices em coding guidelines.
      3. Terraform/Pulumi modules pre-aprovados com seguranca embutida.
      4. GitOps com enforcement de politicas de cloud via OPA/Kyverno.

      **Gestao de credenciais cloud:**
      5. Workload identity (OIDC) ao inves de chaves estaticas.
      6. Least privilege em IAM roles para pipelines de CI/CD.
      7. Rotacao automatica de credenciais cloud.
      8. Secret scanning para chaves de cloud em repositorios.

      **Verificacao de conformidade:**
      9. Policy-as-code que valida configuracoes de cloud no pipeline.
      10. Pre-deploy checks para cloud resources (networking, encryption, IAM).
      11. Drift detection para identificar mudancas fora do pipeline.
    tools:
      - checkov
      - tfsec
      - kics
      - opa-gatekeeper
      - gitlab-secret-detection
      - terraform
      - pulumi
  secops:
    prose: |
      **Monitoramento de cloud:**
      1. Cloud-native SIEM integrado (AWS Security Hub, Azure Sentinel, GCP SCC).
      2. CSPM com alertas de misconfiguration em tempo real.
      3. Cloud Access Security Broker (CASB) para shadow IT.
      4. Monitoramento de API calls anomalas em cloud providers.

      **Auditoria de provedores:**
      5. Revisao anual de certificacoes do provedor (SOC 2, ISO 27001, PCI DSS).
      6. Verificacao de SLAs e incidentes reportados pelo provedor.
      7. Right to audit clause exercida periodicamente.
      8. Avaliacao de risco de concentracao em provedor unico.

      **Competencia operacional:**
      9. Equipe de secops com expertise em cloud security.
      10. Playbooks de resposta a incidentes especificos de cloud.
      11. Exercicios de simulacao de incidentes em cloud.
      12. Exit strategy documentada e testada.
    tools:
      - cspm
      - casb
      - siem
      - cloud-security-hub
      - grc-platform
