id: art-19
family: cap-5
title: "Diretor Responsavel pela Seguranca Cibernetica"
class: BACEN-4893
baselines: [todas-ifs]
statement:
  prose: |
    Art. 19. As instituições referidas no art. 1 devem designar diretor responsável
    pela política de segurança cibernética e pela execução do plano de ação e de resposta
    a incidentes.

    Parágrafo único. O diretor mencionado no caput pode desempenhar outras funções na
    instituição, desde que não haja conflito de interesses, e pode ser o mesmo diretor
    responsável pelo gerenciamento de riscos de que trata o art. 26 da Resolução
    nº 4.557, de 23 de fevereiro de 2017.
guidance:
  prose: |
    O art. 19 cria a figura obrigatoria do diretor responsavel pela seguranca cibernetica.
    Nao e um cargo tecnico — e uma responsabilidade de nivel de diretoria estatutaria.

    **Responsabilidades do diretor:**
    - Responsavel pela politica de seguranca cibernetica (art. 3)
    - Responsavel pela execucao do plano de acao e resposta a incidentes (art. 6)
    - Responde perante o BCB pelo cumprimento da resolucao
    - Pode ser pessoalmente responsabilizado em caso de falhas graves

    **Acumulo de funcoes (paragrafo unico):**
    O diretor pode acumular outras funcoes, desde que:
    1. Nao haja conflito de interesses: o diretor de TI que e responsavel por
       seguranca cibernetica pode ter conflito, pois e quem cobra e quem executa
    2. Pode ser o mesmo diretor de riscos (art. 26 da Resolucao 4.557): isso e
       uma permissao explicita, reconhecendo a sinergia entre gestao de riscos e
       seguranca cibernetica

    **Conflito de interesses:**
    Na pratica, os principais conflitos a evitar sao:
    - Diretor de TI como responsavel por seguranca cibernetica (quem desenvolve
      os sistemas nao deve ser o unico responsavel por audita-los)
    - Diretor comercial como responsavel (interesse comercial pode conflitar com
      requisitos de seguranca)
    - Diretor de operacoes como responsavel (pressao por disponibilidade pode
      conflitar com controles de seguranca)

    **Implicacao pratica:**
    - A instituicao deve formalmente designar o diretor e comunicar ao BCB
    - O diretor deve ter acesso direto ao conselho de administracao
    - O diretor deve ter autoridade para impor controles de seguranca
    - A remuneracao do diretor deve considerar metricas de seguranca cibernetica
    - Em caso de vacancia, a substituicao deve ser imediata
implementation_guidance:
  platform_engineering:
    prose: |
      **Suporte ao diretor responsavel:**
      1. Dashboard executivo exclusivo com visao consolidada de seguranca cibernetica.
      2. Metricas em tempo real: postura de seguranca, incidentes ativos, conformidade.
      3. Risk register cibernetico com status de mitigacao.
      4. Alertas automaticos para o diretor em caso de incidentes criticos.

      **Estrutura de reporte:**
      5. Canal direto de escalonamento de incidentes para o diretor.
      6. Relatorios automatizados periodicos (diario, semanal, mensal).
      7. Integracao com plataforma de GRC para visao de conformidade regulatoria.

      **Segregacao de funcoes (paragrafo unico):**
      8. RBAC com segregacao clara entre funcoes de TI e seguranca.
      9. Logs de acesso do diretor a sistemas criticos para accountability.
      10. Workflow de aprovacao independente para decisoes de seguranca vs. TI.
    tools:
      - grc-platform
      - monitoring-alerting
      - reporting-platform
      - identity-provider
  devsecops:
    prose: |
      **Visibilidade para o diretor:**
      1. Security posture dashboard com metricas de pipeline (SAST, DAST, SCA).
      2. Relatorio de vulnerabilidades abertas por criticidade e SLA de correcao.
      3. Metricas de DORA com perspectiva de seguranca.
      4. Supply chain security status.

      **Governanca no pipeline:**
      5. Processo formal de excecao de security gates com aprovacao do diretor.
      6. Audit trail de todas as decisoes de seguranca no ciclo de desenvolvimento.
      7. Relatorio de seguranca incluido em cada release para revisao do diretor.

      **Plano de resposta a incidentes (art. 6):**
      8. Runbooks de resposta a incidentes com escalonamento ao diretor.
      9. Playbooks de comunicacao de crise com participacao do diretor.
      10. Simulacoes de incidentes com participacao do diretor (minimo anual).
    tools:
      - gitlab-ci
      - sonarqube
      - reporting-platform
      - incident-management
  secops:
    prose: |
      **Suporte operacional ao diretor:**
      1. Relatorio executivo semanal de seguranca cibernetica para o diretor.
      2. Briefing de ameacas relevantes para o setor financeiro.
      3. Status de conformidade com a Resolucao 4893.
      4. Metricas de efetividade dos controles de seguranca.

      **Politica de seguranca cibernetica (art. 3):**
      5. Processo de revisao periodica da politica com participacao do diretor.
      6. Recomendacoes de atualizacao da politica baseadas em evolucao de ameacas.
      7. Suporte na apresentacao da politica ao conselho de administracao (art. 17).

      **Plano de resposta a incidentes (art. 6):**
      8. Execucao do plano sob supervisao do diretor.
      9. Escalonamento imediato ao diretor em incidentes criticos.
      10. Pos-mortem de incidentes com revisao e aprovacao do diretor.
      11. Atualizacao do plano baseada em licoes aprendidas.

      **Conflito de interesses (paragrafo unico):**
      12. Assessment anual de conflito de interesses do diretor.
      13. Documentacao formal da justificativa de acumulo de funcoes.
      14. Revisao pelo conselho sobre adequacao do acumulo.
    tools:
      - grc-platform
      - siem
      - incident-management
      - threat-intelligence
      - reporting-platform
