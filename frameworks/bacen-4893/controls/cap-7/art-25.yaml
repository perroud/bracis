id: art-25
family: cap-7
title: "Revogacao da Resolucao CMN 4.658/2018"
class: BACEN-4893
baselines: [todas-ifs]
statement:
  prose: |
    Art. 25. Fica revogada a Resolução nº 4.658, de 26 de abril de 2018.
guidance:
  prose: |
    O art. 25 revoga a Resolucao CMN 4.658/2018, que era a norma anterior sobre
    seguranca cibernetica e servicos em nuvem para instituicoes financeiras.

    **Historico regulatorio:**
    - Resolucao CMN 4.658/2018: primeira norma especifica de seguranca cibernetica
      do sistema financeiro brasileiro, publicada em 26/04/2018.
    - Resolucao CMN 4.893/2021: substituiu a 4.658 com ajustes e aprimoramentos,
      publicada em 26/02/2021.

    **Principais diferencas entre 4.658 e 4.893:**
    A Resolucao 4.893 manteve a essencia da 4.658, mas introduziu:
    - Maior clareza nos requisitos de contratacao de servicos em nuvem
    - Ajustes nos prazos transitorios
    - Aprimoramento de redacao e estrutura
    - Alinhamento com evolucao do mercado de cloud computing

    **Implicacao pratica:**
    - Toda referencia a Resolucao 4.658 deve ser atualizada para 4.893
    - Politicas internas que mencionam a 4.658 devem ser atualizadas
    - Contratos que referenciam a 4.658 devem ser aditados
    - Treinamentos que mencionam a 4.658 devem ser revisados
    - Materiais de compliance e auditoria devem referenciar a norma vigente

    **Cuidado:**
    Instituicoes que ainda referenciam a 4.658 em documentos oficiais podem
    demonstrar falta de atualizacao regulatoria, o que e um indicador negativo
    em auditoria do BCB.
implementation_guidance:
  platform_engineering:
    prose: |
      **Atualizacao de referencias:**
      1. Busca em todos os repositorios de documentacao por referencias a "4.658".
      2. Atualizacao de politicas-como-codigo que referenciam a norma anterior.
      3. Atualizacao de compliance checks que validam conformidade com a 4.658.
      4. Atualizacao de dashboards e relatorios regulatorios.

      **Rastreabilidade normativa:**
      5. Registro de mapeamento entre artigos da 4.658 e da 4.893.
      6. Historico de evolucao regulatoria no sistema de GRC.
      7. Versionamento de controles com vinculacao a norma vigente.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Atualizacao em pipelines:**
      1. Atualizacao de compliance policies em pipelines que referenciam a 4.658.
      2. Atualizacao de comentarios e documentacao em codigo que mencionam a norma.
      3. Revisao de security gates que validam conformidade com norma revogada.

      **Automacao:**
      4. Script de busca por referencias a "4.658" em repositorios de codigo e IaC.
      5. Merge request para correcao de todas as referencias encontradas.
    tools:
      - gitlab-ci
      - compliance-scanner
  secops:
    prose: |
      **Gestao de mudanca regulatoria:**
      1. Comunicacao formal a todas as areas sobre a revogacao da 4.658.
      2. Treinamento de equipes sobre diferencas entre 4.658 e 4.893.
      3. Atualizacao de todos os documentos oficiais (politicas, procedimentos, manuais).
      4. Revisao de clausulas contratuais que referenciam a norma revogada.

      **Auditoria:**
      5. Verificacao de que nenhum documento oficial referencia a 4.658.
      6. Verificacao de que controles implementados atendem a 4.893 (nao apenas a 4.658).
      7. Evidencia de transicao regulatoria documentada.

      **Retencao:**
      8. Retencao de documentos da era 4.658 como historico.
      9. Documentacao do processo de transicao entre normas.
    tools:
      - grc-platform
      - document-management
      - training-platform
