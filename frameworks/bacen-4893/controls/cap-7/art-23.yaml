id: art-23
family: cap-7
title: "Comunicacao de Contratos Existentes de Nuvem"
class: BACEN-4893
baselines: [todas-ifs]
statement:
  prose: |
    Art. 23. A comunicação de que trata o art. 16, relativa aos serviços de processamento
    e armazenamento de dados e computação em nuvem contratados antes da entrada em vigor
    desta Resolução, deve ser realizada até 23 de outubro de 2019.
guidance:
  prose: |
    O art. 23 estabeleceu o prazo transitorio para comunicacao ao BCB dos contratos de
    servicos de nuvem existentes antes da entrada em vigor da resolucao.

    **Contexto:**
    Quando a resolucao entrou em vigor (26/04/2018, com atualizacao em 2020), muitas
    instituicoes ja possuiam contratos de servicos de nuvem. O art. 16 estabelece a
    obrigacao de comunicacao para novos contratos (60 dias). O art. 23 deu um prazo
    estendido para comunicar os contratos preexistentes.

    **Prazo:**
    23 de outubro de 2019 — aproximadamente 1 ano apos a entrada em vigor.
    Este prazo ja esta vencido.

    **O que deveria ter sido comunicado:**
    Todas as informacoes exigidas pelo art. 16:
    I - Denominacao da empresa contratada
    II - Servicos contratados
    III - Paises e regioes onde os servicos sao prestados e dados armazenados

    **Situacao atual:**
    Instituicoes que nao comunicaram seus contratos preexistentes estao em nao
    conformidade. Qualquer contrato de nuvem nao comunicado ao BCB e uma irregularidade.

    **Implicacao pratica:**
    Em auditoria, o BCB pode solicitar a lista de todos os contratos de nuvem e
    verificar se todos foram devidamente comunicados. Contratos nao comunicados
    podem gerar sancao administrativa e exigencia de regularizacao imediata.
implementation_guidance:
  platform_engineering:
    prose: |
      **Inventario retroativo:**
      1. Inventario completo de todos os contratos de nuvem, incluindo os preexistentes.
      2. Identificacao de contratos nao comunicados ao BCB.
      3. Reconciliacao entre inventario de contratos e comunicacoes realizadas.
      4. Dashboard de status de comunicacao por contrato.

      **Monitoramento continuo:**
      5. Alertas para contratos nao comunicados ou com comunicacao incompleta.
      6. Integracao com cloud asset inventory para detectar servicos nao mapeados.
      7. Verificacao automatica de que todo recurso de nuvem esta vinculado a contrato comunicado.
    tools:
      - cmdb
      - cloud-asset-inventory
      - contract-management
      - compliance-scanner
  devsecops:
    prose: |
      **Rastreabilidade de servicos:**
      1. Mapeamento de todos os servicos de nuvem utilizados em pipelines de CI/CD.
      2. Verificacao de que servicos auxiliares (registries, CI runners, SaaS) estao
         incluidos no inventario de contratos.
      3. Alerta quando novo servico de nuvem e adicionado ao pipeline sem contrato mapeado.

      **Conformidade:**
      4. Verificacao periodica de que todos os servicos de nuvem no pipeline estao
         cobertos por contratos comunicados ao BCB.
      5. Documentacao de servicos de nuvem utilizados por cada projeto/equipe.
    tools:
      - gitlab-ci
      - cloud-asset-inventory
      - compliance-scanner
  secops:
    prose: |
      **Regularizacao de contratos preexistentes:**
      1. Auditoria de todos os contratos de nuvem firmados antes da resolucao.
      2. Verificacao de comunicacao ao BCB para cada contrato.
      3. Plano de regularizacao para contratos nao comunicados.
      4. Comunicacao retroativa ao BCB quando necessario.

      **Gestao contratual:**
      5. Revisao dos contratos preexistentes para inclusao de clausulas exigidas
         pela resolucao (acesso do BCB, requisitos de seguranca).
      6. Adequacao contratual com provedores quando clausulas obrigatorias estao ausentes.
      7. Registro historico de todas as comunicacoes ao BCB.

      **Auditoria:**
      8. Evidencias de comunicacao para todos os contratos (protocolos, datas).
      9. Preparacao para inspecao do BCB com documentacao organizada.
      10. Relatorio de conformidade contratual para o conselho.
    tools:
      - grc-platform
      - contract-management
      - compliance-scanner
      - ticketing-system
