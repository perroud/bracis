id: art-21
family: cap-7
title: "Prazo de Adequacao"
class: BACEN-4893
baselines: [todas-ifs]
statement:
  prose: |
    Art. 21. As instituições referidas no art. 1 que, na data de entrada em vigor desta
    Resolução, não possuírem política de segurança cibernética aprovada na forma do
    art. 17 devem aprová-la até 6 de maio de 2019.

    Parágrafo único. O plano de ação e de resposta a incidentes mencionado no art. 6
    deve ser elaborado e implementado até 24 de outubro de 2019.
guidance:
  prose: |
    O art. 21 estabeleceu os prazos de adequacao para as instituicoes que nao possuiam
    politica de seguranca cibernetica na data de entrada em vigor da resolucao.

    **Cronograma original:**
    - Politica de seguranca cibernetica: aprovacao ate 6 de maio de 2019 (180 dias
      apos a entrada em vigor)
    - Plano de acao e resposta a incidentes: elaboracao e implementacao ate 24 de
      outubro de 2019 (1 ano apos a entrada em vigor)

    **Situacao atual:**
    Ambos os prazos ja estao vencidos. Qualquer instituicao autorizada pelo BCB que
    nao possua politica de seguranca cibernetica e plano de resposta a incidentes
    implementados esta em situacao de nao conformidade.

    **Para novas instituicoes:**
    Instituicoes que obtenham autorizacao de funcionamento apos a entrada em vigor da
    resolucao devem ter a politica e o plano implementados desde o inicio das operacoes.

    **Implicacao pratica:**
    Em auditoria, o BCB verifica:
    1. Se a politica existe e esta aprovada pelo conselho/diretoria
    2. Se o plano de resposta a incidentes esta implementado e testado
    3. Se as datas de aprovacao e implementacao sao compativeis com os prazos
    4. Se a politica e o plano sao revisados periodicamente (art. 7)
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade com prazos:**
      1. Rastreamento de datas de aprovacao da politica e do plano em sistema de GRC.
      2. Alertas automaticos para revisao periodica (art. 7, I).
      3. Versionamento de politica e plano com historico de aprovacoes.
      4. Dashboard de conformidade com datas-chave e status.

      **Para novas instituicoes:**
      5. Template de politica de seguranca cibernetica alinhado a Resolucao 4893.
      6. Template de plano de acao e resposta a incidentes.
      7. Checklist de implementacao com todos os artigos da resolucao.
      8. Automacao de deployment de controles baseline desde o dia um.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
  devsecops:
    prose: |
      **Implementacao desde o inicio:**
      1. Pipeline de CI/CD com security gates desde o primeiro dia de operacao.
      2. Templates de projeto com controles de seguranca embutidos.
      3. Security baseline automatizado para novos repositorios.
      4. SAST, SCA e secret scanning habilitados por padrao em todos os projetos.

      **Evidencias de conformidade:**
      5. Historico de pipeline executions como evidencia de controles implementados.
      6. Logs de security gates para auditoria.
      7. Dashboards de seguranca com historico desde o inicio das operacoes.
    tools:
      - gitlab-ci
      - gitlab-sast
      - gitlab-dependency-scanning
      - gitlab-secret-detection
  secops:
    prose: |
      **Gestao de prazos regulatorios:**
      1. Calendario regulatorio com todos os prazos da Resolucao 4893.
      2. Controle de revisao periodica da politica (minimo anual).
      3. Controle de teste do plano de resposta a incidentes (minimo anual).
      4. Evidencias de aprovacao pelo conselho/diretoria com atas.

      **Avaliacao de conformidade:**
      5. Assessment de conformidade com a resolucao (minimo anual).
      6. Gap analysis com plano de remediacao.
      7. Relatorio de conformidade para o conselho (art. 17, IV).
      8. Preparacao para auditoria do BCB com evidencias organizadas.

      **Retencao de documentos:**
      9. Retencao de todas as versoes da politica e do plano por 5 anos.
      10. Retencao de atas de aprovacao pelo conselho.
      11. Retencao de evidencias de implementacao e testes.
    tools:
      - grc-platform
      - document-management
      - compliance-scanner
