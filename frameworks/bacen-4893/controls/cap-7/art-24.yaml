id: art-24
family: cap-7
title: "Excecoes para Contratos Anteriores a Resolucao"
class: BACEN-4893
baselines: [todas-ifs]
statement:
  prose: |
    Art. 24. O disposto nos arts. 12 a 15 não se aplica aos contratos de serviços de
    processamento e armazenamento de dados e de computação em nuvem vigentes na data de
    entrada em vigor desta Resolução.

    § 1º Na renovação ou na alteração contratual dos contratos de que trata o caput,
    as instituições referidas no art. 1 devem observar o disposto nos arts. 12 a 15.

    § 2º O prazo para adequação de que trata o § 1º é de até 31 de dezembro de 2021.
guidance:
  prose: |
    O art. 24 cria um regime transitorio para contratos de nuvem preexistentes,
    dispensando-os temporariamente dos requisitos dos arts. 12 a 15.

    **Excecao do caput:**
    Contratos vigentes na data de entrada em vigor da resolucao nao precisavam
    atender imediatamente aos requisitos de:
    - Art. 12: Integracao com gestao de riscos
    - Art. 13: Clausulas contratuais obrigatorias
    - Art. 14: Verificacao de capacidade do provedor
    - Art. 15: Requisitos para contratacao no exterior

    **Condicao de ativacao (ss 1):**
    A excecao cessa quando houver:
    - Renovacao do contrato: qualquer renovacao, mesmo automatica, ativa a obrigacao
    - Alteracao contratual: aditivos que modifiquem escopo, prazo ou condicoes

    A partir da renovacao ou alteracao, os arts. 12 a 15 passam a ser obrigatorios.

    **Prazo final (ss 2):**
    Independente de renovacao ou alteracao, o prazo maximo para adequacao era
    31 de dezembro de 2021. Esse prazo ja esta vencido.

    **Situacao atual:**
    Todos os contratos de nuvem, preexistentes ou novos, devem cumprir integralmente
    os arts. 12 a 15. A excecao transitoria expirou. Contratos que nao foram adequados
    estao em nao conformidade.

    **Implicacao pratica:**
    Em auditoria, o BCB verifica:
    1. Se todos os contratos de nuvem atendem aos arts. 12 a 15
    2. Se contratos renovados apos a resolucao foram adequados
    3. Se existe gap contratual (clausulas faltantes do art. 13)
    4. Se due diligence do provedor foi realizada (art. 14)
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de adequacao contratual:**
      1. Inventario de contratos com status de adequacao (adequado/nao adequado).
      2. Mapeamento de clausulas exigidas pelos arts. 12-15 vs. clausulas existentes.
      3. Alertas para contratos com clausulas faltantes.
      4. Tracking de renovacoes contratuais para ativar adequacao.

      **Verificacao de requisitos tecnicos:**
      5. Verificacao automatizada de capacidade do provedor (art. 14): certificacoes,
         SLAs, seguranca.
      6. Monitoramento de conformidade do provedor com requisitos contratuais.
      7. Testes periodicos de requisitos tecnicos (disponibilidade, recuperacao).
    tools:
      - contract-management
      - cmdb
      - compliance-scanner
      - monitoring-alerting
  devsecops:
    prose: |
      **Conformidade tecnica com arts. 12-15:**
      1. Verificacao de que servicos de nuvem utilizados em pipelines atendem aos
         requisitos tecnicos dos arts. 12-15.
      2. IaC policies que validam requisitos de seguranca do provedor.
      3. Documentacao de conformidade tecnica por servico de nuvem utilizado.

      **Rastreabilidade:**
      4. Mapeamento de dependencias de servicos de nuvem por projeto.
      5. Alerta quando servico de nuvem sem contrato adequado e utilizado.
      6. Registro de due diligence tecnica para cada provedor/servico.
    tools:
      - checkov
      - compliance-scanner
      - cloud-asset-inventory
  secops:
    prose: |
      **Auditoria de adequacao contratual:**
      1. Revisao de todos os contratos de nuvem para conformidade com arts. 12-15.
      2. Checklist de clausulas obrigatorias (art. 13) por contrato.
      3. Verificacao de due diligence do provedor (art. 14) para cada contrato.
      4. Verificacao de requisitos para contratos no exterior (art. 15).

      **Plano de remediacao:**
      5. Identificacao de contratos com gaps de conformidade.
      6. Plano de renegociacao contratual com provedores.
      7. Priorizacao por risco: contratos com dados sensiveis primeiro.
      8. Timeline de adequacao com acompanhamento.

      **Evidencias:**
      9. Historico de adequacoes contratuais realizadas.
      10. Comparativo de clausulas antes e depois da adequacao.
      11. Certificacoes e relatorios de auditoria dos provedores (SOC 2, ISO 27001).
      12. Documentacao de justificativa para contratos que nao puderam ser adequados.
    tools:
      - grc-platform
      - contract-management
      - compliance-scanner
      - audit-platform
