id: pci-pin
title: "PCI PIN Security Requirements v3.1 — PIN Transaction Security"
short_title: "PCI PIN v3.1"
version: "3.1"
publication_date: "2022-06-01"
last_updated: "2022-06-01"

authority:
  name: "Payment Card Industry Security Standards Council"
  acronym: "PCI SSC"
  country: US
  url: "https://www.pcisecuritystandards.org/"

type: standard
scope: cybersecurity
mandatory: true

original_language: en
available_languages:
  - en

industries:
  - financial-services
  - retail
  - payment-processing
  - banking
  - fintech

regions:
  - global

techstacks:
  - platform-engineering
  - devsecops
  - secops
  - hardware-security
  - cryptography

baselines:
  - id: pin-acquirer
    title: "Acquirer PIN Processing"
  - id: pin-issuer
    title: "Issuer PIN Processing"
  - id: pin-service-provider
    title: "PIN Service Provider"
  - id: pin-encryption-support-org
    title: "Encryption Support Organization"

goals:
  - id: goal-1
    title: "Secure PIN Management and Processing"
    requirements: [pin-mgmt]
  - id: goal-2
    title: "Protect Cryptographic Keys Used for PIN Processing"
    requirements: [pin-crypto]
  - id: goal-3
    title: "Ensure Secure PIN Transmission"
    requirements: [pin-transport]
  - id: goal-4
    title: "Secure PIN Entry Devices"
    requirements: [pin-device]
  - id: goal-5
    title: "Maintain Secure PIN Operations"
    requirements: [pin-ops]
  - id: goal-6
    title: "Audit and Assess PIN Security Controls"
    requirements: [pin-audit]
  - id: goal-7
    title: "Manage PIN Security Incidents"
    requirements: [pin-incident]

control_families:
  - id: pin-mgmt
    title: "PIN Management"
    description: "Requirements for secure PIN processing, generation, issuance, and lifecycle management to ensure PINs are never exposed in cleartext outside of a secure cryptographic device."
    control_count: 4
  - id: pin-crypto
    title: "PIN Cryptographic Key Management"
    description: "Requirements governing the generation, distribution, storage, rotation, destruction, and overall lifecycle management of cryptographic keys used to protect PINs."
    control_count: 4
  - id: pin-transport
    title: "PIN Transmission Security"
    description: "Requirements for the secure electronic transmission of encrypted PIN blocks between entities, including encryption algorithm requirements and point-to-point security."
    control_count: 3
  - id: pin-device
    title: "PIN Entry Device Security"
    description: "Requirements for the physical and logical security of PIN entry devices (PEDs), including tamper-detection, tamper-response mechanisms, and device lifecycle management."
    control_count: 3
  - id: pin-ops
    title: "PIN Operations Security"
    description: "Requirements for operational procedures, personnel security, and administrative controls that support the secure handling and processing of PINs."
    control_count: 3
  - id: pin-audit
    title: "PIN Audit and Assessment"
    description: "Requirements for monitoring, logging, assessment, and periodic review of PIN security controls and compliance status."
    control_count: 2
  - id: pin-incident
    title: "Incident Management"
    description: "Requirements for detecting, responding to, and recovering from security incidents involving PIN data compromise."
    control_count: 1

related_frameworks:
  - framework_id: pci-dss-v4
    relationship: complements
    mapping_file: "mappings/pci-pin_to_pci-dss-v4.yaml"
