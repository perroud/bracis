id: pin-3
family: pin-mgmt
title: "PIN Block Format Requirements"
class: PCI-PIN

statement:
  prose: >-
    PIN blocks used for the encryption and transmission of PINs must conform to
    approved PIN block formats as defined by ISO 9564. The PIN block format must ensure
    that the PIN is combined with other data elements (such as the PAN) in a manner that
    prevents the extraction of the cleartext PIN without the correct decryption key. Only
    ISO 9564-1 Format 0 (equivalent to ANSI X9.8), Format 1, Format 3, and Format 4 are
    approved for use. Format 4 (ISO 9564-1:2017) is recommended for new implementations
    as it provides enhanced security through AES-based encryption and additional
    randomization.

guidance:
  prose: >-
    PIN block formats define how the cleartext PIN is encoded, padded, and combined with
    other data before encryption. The choice of PIN block format directly impacts
    security: Format 0, while widely deployed, binds the PIN to a specific PAN, which
    creates re-identification risk if the PAN is compromised separately. Format 4
    addresses this by incorporating random data and using AES encryption, making it
    resistant to correlation attacks. Organizations should plan migration to Format 4
    as legacy formats (particularly Format 0) are increasingly vulnerable to attacks
    that exploit the PAN-PIN binding. All PIN translation operations between different
    formats must occur within an SCD.

references:
  - citation: "PCI PIN v3.1, Control Objective 1, PIN Block Formats"
    url: "https://www.pcisecuritystandards.org/"
  - citation: "ISO 9564-1:2017 Financial services — Personal Identification Number management and security"
    url: "https://www.iso.org/standard/68669.html"

implementation_guidance:
  platform_engineering:
    prose: >-
      Configure HSMs to support ISO 9564-1 Format 4 for all new PIN processing
      implementations. Implement PIN block format validation at the HSM API layer to
      reject non-approved formats. Deploy PIN translation services within HSMs that
      can convert between approved formats during inter-network routing. Maintain a
      registry of all connected acquirer and network PIN block format capabilities.
      Plan and execute a phased migration from Format 0 to Format 4 across the payment
      processing infrastructure.
    tools:
      - thales-payshield
      - utimaco-hsm
      - atalla-hsm
      - futurex-hsm
  devsecops:
    prose: >-
      Implement automated tests in CI/CD pipelines that validate PIN block format
      output from payment processing modules. Create test vectors for each approved
      PIN block format and verify encryption output byte-by-byte. Scan code for
      hardcoded PIN block format identifiers and ensure they reference only approved
      formats. Add integration tests that verify PIN translation between Format 0
      and Format 4 produces correct results within the HSM.
    tools:
      - gitlab-sast
      - semgrep
      - custom-test-vectors
  secops:
    prose: >-
      Monitor HSM logs for PIN block format translation operations and alert on any
      attempts to use deprecated or non-approved formats. Track the percentage of
      transactions using each PIN block format to measure migration progress toward
      Format 4. Review quarterly reports on format usage to identify acquirers or
      networks still sending legacy formats.
    tools:
      - splunk
      - elastic-siem
      - grafana

