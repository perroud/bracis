id: pin-11
family: pin-transport
title: "Network Security for PIN Data"
class: PCI-PIN

statement:
  prose: >-
    All network links carrying PIN data must be secured with cryptographic protections that
    ensure confidentiality and integrity of the transmitted data. Network connections between
    PIN processing entities must use authenticated encryption protocols such as TLS 1.2 or
    later, IPsec, or equivalent approved protocols. Mutual authentication must be employed
    to verify the identity of both communicating endpoints before PIN data is transmitted.
    Network segmentation must isolate PIN processing systems from general-purpose networks.
    Wireless networks must not be used for PIN data transmission unless additional
    application-layer encryption of the PIN block is applied and the wireless link uses
    WPA3-Enterprise or equivalent security.

guidance:
  prose: >-
    Network security for PIN data operates at a different layer than PIN block encryption
    but provides essential defense in depth. Even though PINs are encrypted at the
    application layer within PIN blocks, network-layer encryption prevents traffic analysis
    attacks that could identify PIN-carrying messages, correlation attacks that could match
    encrypted PINs to specific cardholders, and man-in-the-middle attacks that could
    redirect PIN data to unauthorized endpoints. Mutual authentication prevents rogue
    endpoints from being inserted into the PIN transmission chain. Network segmentation
    limits the blast radius of a network compromise by ensuring that access to general IT
    systems does not provide access to PIN processing zones.

references:
  - citation: "PCI PIN v3.1, Control Objective 3, Network Security"
    url: "https://www.pcisecuritystandards.org/"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement dedicated network segments (VLANs or physical segments) for PIN processing
      traffic with strict firewall rules permitting only authorized PIN-related
      communications. Deploy TLS 1.3 with mutual certificate authentication for all
      inter-entity PIN data connections. Configure network switches and routers to prevent
      traffic from PIN segments reaching general-purpose networks. Implement microsegmentation
      using software-defined networking (SDN) to further isolate individual PIN processing
      components. Deploy network intrusion detection systems (NIDS) on PIN network segments.
    tools:
      - palo-alto-ngfw
      - cisco-aci
      - kubernetes-network-policies
      - calico
      - cilium
      - mutual-tls
  devsecops:
    prose: >-
      Scan network infrastructure-as-code for compliance with PIN network segmentation
      requirements. Validate TLS configurations across all PIN-carrying endpoints using
      automated scanners. Test mutual authentication by deploying test certificates
      and verifying that connections with invalid certificates are rejected. Run DAST
      scans on PIN processing API endpoints to identify network-level vulnerabilities.
    tools:
      - gitlab-dast
      - scanner-iac-scanning
      - testssl-sh
      - nmap-automated
  secops:
    prose: >-
      Monitor PIN network segments for unauthorized traffic using network detection
      and response (NDR) tools. Alert on any TLS connection degradation (protocol
      downgrade, cipher suite changes, certificate anomalies). Conduct quarterly
      network penetration tests targeting PIN processing segments. Review firewall
      rules monthly to verify no unauthorized paths to PIN processing systems have
      been introduced.
    tools:
      - splunk
      - elastic-siem
      - darktrace
      - palo-alto-cortex-xdr
      - nessus

legal_references:
