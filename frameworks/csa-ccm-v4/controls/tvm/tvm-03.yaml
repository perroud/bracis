id: tvm-03
family: tvm
title: "Vulnerability Remediation Schedule"
class: CSA-CCM-v4

statement:
  prose: >-
    Define and implement a process for the remediation of identified
    vulnerabilities, prioritized based on the risk assessment of each
    vulnerability. Establish and communicate remediation timelines based
    on the severity rating of identified vulnerabilities. Track
    remediation activities and report on compliance with established
    timelines.

guidance:
  prose: >-
    Remediation timelines should be aligned with vulnerability severity
    using a risk-based approach. Recommended SLAs: critical severity
    vulnerabilities should be remediated or mitigated within 24-72
    hours, high severity within 30 days, medium within 90 days, and
    low severity within 180 days. When remediation is not immediately
    possible, compensating controls must be documented and approved.
    Vulnerability prioritization should consider CVSS score,
    exploitability (EPSS), asset exposure, business criticality,
    and threat intelligence context. Remediation tracking should
    include automated notifications for approaching and overdue
    SLAs. Exception requests must include documented risk acceptance,
    compensating controls, and defined expiration dates.

references:
  - citation: "CSA CCM v4.0 TVM-03"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated vulnerability remediation for platform
      components through immutable infrastructure rebuilds with
      patched base images. Deploy automated image rebuild pipelines
      triggered by upstream vulnerability disclosures. Implement
      automated rollout of patched platform components using rolling
      updates and canary deployments. Maintain SLA enforcement
      through automated tracking and escalation of overdue
      vulnerabilities. Provide self-service vulnerability remediation
      tools for development teams including automated dependency
      update workflows.
    tools:
      - renovate
      - dependabot
      - kyverno
      - argo-cd
      - trivy-operator
      - prometheus

  devsecops:
    prose: >-
      Automate vulnerability remediation through dependency update
      bots that create pull requests with security patches. Implement
      SLA enforcement in CI/CD pipelines that block deployment of
      artifacts with overdue vulnerabilities. Track remediation
      velocity metrics as part of engineering KPIs. Prioritize
      vulnerability fixes using risk-based scoring that considers
      exposure, exploitability, and business impact. Implement
      automated rollback capabilities when security patches cause
      regressions. Include vulnerability remediation status in
      service health dashboards.
    tools:
      - dependabot
      - renovate
      - snyk
      - gitlab-ci
      - jira
      - github-security-advisories

  secops:
    prose: >-
      Monitor remediation SLA compliance across all systems and
      generate escalation notifications for approaching and
      overdue deadlines. Produce regular reports for management
      showing vulnerability remediation trends, SLA compliance
      rates, and risk exposure from unresolved vulnerabilities.
      Prioritize monitoring of systems with overdue critical
      vulnerabilities with enhanced detection rules. Validate
      remediation effectiveness through rescanning after
      reported fixes. Track risk acceptance exceptions and
      ensure compensating controls remain effective until
      permanent remediation is completed.
    tools:
      - tenable
      - qualys
      - rapid7
      - servicenow
      - splunk
      - jira

