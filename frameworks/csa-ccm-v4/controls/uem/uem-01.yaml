id: uem-01
family: uem
title: "Endpoint Device Policy"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for the management and security of all endpoint
    devices that connect to or are used to access organizational information
    systems and data. The endpoint device policy shall address device
    provisioning, configuration, monitoring, patching, and
    decommissioning requirements.

guidance:
  prose: >-
    The endpoint device policy should cover all device types including
    corporate-managed desktops and laptops, mobile devices, BYOD devices,
    virtual desktops, and IoT devices. The policy should define minimum
    security configurations including disk encryption, screen lock,
    operating system patching, anti-malware, host-based firewall, and
    EDR agent requirements. Remote wipe capabilities should be mandated
    for devices accessing sensitive data. The policy should address
    endpoint compliance verification as a prerequisite for network and
    application access. Device inventory management should maintain
    an accurate register of all authorized endpoint devices. Special
    considerations for cloud administration from endpoints should
    include requirements for dedicated management workstations for
    privileged operations.

references:
  - citation: "CSA CCM v4.0 UEM-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement device trust verification as a prerequisite for platform
      access using zero-trust network access (ZTNA) solutions. Deploy
      conditional access policies that evaluate device compliance posture
      before granting access to platform services. Integrate endpoint
      compliance data with the identity provider for context-aware
      authentication decisions. Provide virtual desktop infrastructure
      (VDI) for accessing high-sensitivity environments from untrusted
      devices. Enforce that privileged platform administration operations
      require managed, hardened endpoint devices.
    tools:
      - intune
      - jamf
      - zscaler
      - cloudflare-access
      - okta
      - beyond-trust

  devsecops:
    prose: >-
      Enforce endpoint compliance as a prerequisite for accessing code
      repositories and CI/CD systems. Require that development endpoints
      meet minimum security baselines including full disk encryption,
      current OS patching, and EDR agent installation. Implement
      pre-commit hooks that validate the developer environment
      configuration. Use containerized development environments to
      reduce endpoint attack surface. Enforce signed commits from
      verified endpoints.
    tools:
      - intune
      - jamf
      - devcontainers
      - github-codespaces
      - gitpod

  secops:
    prose: >-
      Deploy and monitor EDR agents across all endpoint devices. Implement
      endpoint compliance monitoring with automated alerts for devices
      falling out of compliance. Monitor for indicators of compromise
      on endpoints including unusual process execution, persistence
      mechanisms, and lateral movement attempts. Maintain endpoint
      device inventory with real-time compliance status. Implement
      automated quarantine procedures for compromised or non-compliant
      endpoints. Generate compliance reports showing device policy
      adherence across the organization.
    tools:
      - crowdstrike
      - sentinel-one
      - microsoft-defender
      - carbon-black
      - tanium
      - splunk

