id: log-03
family: log
title: "Security Monitoring and Alerting"
class: CSA-CCM-v4

statement:
  prose: >-
    Identify and monitor security-related events within applications and
    the underlying infrastructure. Define and implement a system to
    generate alerts to responsible stakeholders based on such events and
    corresponding metrics to established thresholds. Security monitoring
    and alerting shall be continuous and capable of detecting known
    threats and anomalous behaviors.

guidance:
  prose: >-
    Security monitoring should provide continuous visibility into the
    security posture of all cloud environments. Detection capabilities
    should cover known threats through signature-based detection, unknown
    threats through behavioral analytics, and misconfiguration-based risks
    through continuous compliance monitoring. Alert severity levels should
    be defined with corresponding response time SLAs. Automated response
    actions should be implemented for high-confidence detections to reduce
    mean time to response. Monitoring scope should include network traffic,
    endpoint activity, identity and access events, application behavior,
    and cloud control plane activity. Alert fatigue should be managed
    through tuning, correlation, and machine learning-based prioritization.

references:
  - citation: "CSA CCM v4.0 LOG-03"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Deploy observability infrastructure that integrates metrics, logs,
      and traces for security analysis. Implement anomaly detection on
      platform health metrics to identify security incidents. Deploy
      runtime security monitoring at the kernel level for container
      workloads. Configure automated alerting with severity-based
      routing to appropriate response teams. Implement SLO-based
      monitoring that detects service degradation indicative of
      security incidents such as DDoS attacks or resource abuse.
      Deploy honeypots and canary tokens within the platform to
      detect lateral movement.
    tools:
      - falco
      - prometheus
      - grafana
      - datadog
      - cilium-hubble
      - alertmanager

  devsecops:
    prose: >-
      Implement security event generation in application code using
      structured logging for security-relevant operations. Deploy
      runtime application self-protection (RASP) capabilities
      integrated with centralized monitoring. Include security
      monitoring validation in deployment checklists to verify
      that new services are properly instrumented. Automate the
      creation of security monitoring rules as part of service
      deployment. Test alert generation through security chaos
      engineering exercises.
    tools:
      - datadog-asm
      - sentry
      - gitlab-ci
      - prometheus
      - grafana

  secops:
    prose: >-
      Operate a security operations center (SOC) or managed detection
      and response (MDR) service with 24/7 monitoring capability.
      Implement SIEM correlation rules, UEBA models, and threat
      intelligence-enriched detection. Define alert triage procedures
      with documented escalation paths. Deploy SOAR for automated
      response to high-confidence detections. Maintain detection
      engineering practices including regular rule testing, false
      positive tuning, and detection gap analysis using frameworks
      like MITRE ATT&CK. Generate metrics on detection coverage,
      mean time to detect (MTTD), and mean time to respond (MTTR).
    tools:
      - splunk
      - elastic-siem
      - chronicle
      - cortex-xsoar
      - crowdstrike
      - sentinel

