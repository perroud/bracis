id: dsp-04
family: dsp
title: "Data Classification"
class: CSA-CCM-v4

statement:
  prose: >-
    Classify data according to its type and sensitivity level to ensure
    that it is protected with the appropriate level of security controls.
    Data classification schemes shall be defined, documented, and applied
    to assets, and reviewed at defined intervals. Classification levels
    shall be clearly communicated to all personnel handling data.

guidance:
  prose: >-
    The data classification scheme should define at minimum four levels:
    public, internal, confidential, and restricted. Each level should have
    clearly defined handling requirements including storage, transmission,
    access control, retention, and disposal procedures. Classification
    criteria should consider regulatory requirements (PII, PHI, PCI data),
    business impact of disclosure, intellectual property value, and
    contractual obligations. Automated data discovery and classification
    tools should be employed to maintain an accurate data inventory.
    Data owners should be assigned for all classified assets with
    responsibility for determining and reviewing classification levels.

references:
  - citation: "CSA CCM v4.0 DSP-04"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement metadata-driven data classification at the platform level
      using tags and labels on all data stores. Enforce classification-based
      access policies through the service mesh and API gateways. Provide
      automated data discovery and classification services that scan
      databases, object stores, and file systems for sensitive data
      patterns. Implement tiered storage and encryption policies based
      on classification level. Enforce data classification labels as
      mandatory metadata on all platform resources through admission
      controllers.
    tools:
      - aws-macie
      - azure-purview
      - gcp-dlp
      - open-policy-agent
      - kyverno
      - backstage

  devsecops:
    prose: >-
      Require data classification annotations in infrastructure-as-code
      and database schemas. Validate that data handling code matches the
      classification level of the data it processes through automated
      policy checks. Implement data classification checks in CI/CD
      pipelines to flag services that access classified data without
      proper controls. Automatically mask or tokenize high-classification
      data in test environments. Include data classification in code
      review checklists.
    tools:
      - checkov
      - semgrep
      - tfsec
      - gitlab-ci
      - sonarqube

  secops:
    prose: >-
      Deploy automated data discovery scanning on a scheduled basis to
      identify unclassified or misclassified data. Monitor access to
      high-classification data with enhanced logging and alerting.
      Implement DLP policies mapped to classification levels to prevent
      unauthorized data movement. Generate regular reports on data
      classification coverage and accuracy. Alert when data classified
      as restricted is accessed outside approved processes or by
      unauthorized personnel.
    tools:
      - aws-macie
      - microsoft-purview
      - splunk
      - netskope
      - varonis

