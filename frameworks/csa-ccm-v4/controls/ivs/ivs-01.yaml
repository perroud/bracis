id: ivs-01
family: ivs
title: "Infrastructure Security Policy"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for infrastructure and virtualization security.
    The infrastructure security policy shall address the purpose, scope,
    roles, responsibilities, management commitment, coordination among
    organizational entities, compliance, and the secure configuration and
    management of infrastructure components including networks, systems,
    and virtualization platforms.

guidance:
  prose: >-
    The infrastructure security policy should address secure configuration
    baselines for all infrastructure components, network segmentation
    requirements, virtualization security controls, hypervisor hardening,
    container security, and cloud infrastructure configuration management.
    The policy must define patch management requirements, vulnerability
    scanning schedules, and configuration compliance monitoring. Cloud-
    specific infrastructure concerns including virtual machine isolation,
    container runtime security, serverless function security, and cloud
    network architecture should be explicitly addressed. The policy should
    mandate infrastructure-as-code practices to ensure consistent,
    auditable, and repeatable infrastructure deployments.

references:
  - citation: "CSA CCM v4.0 IVS-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Define and enforce infrastructure security baselines using
      infrastructure-as-code templates with embedded security controls.
      Implement CIS benchmarks for all cloud provider configurations
      through automated compliance scanning. Deploy admission controllers
      that enforce pod security standards, resource limits, and network
      policies. Maintain hardened base images with automated rebuilds
      on security updates. Implement infrastructure drift detection
      and automated remediation. Use service mesh for zero-trust
      networking between platform components. Enforce node and host
      hardening through immutable infrastructure patterns.
    tools:
      - terraform
      - crossplane
      - kyverno
      - falco
      - cilium
      - prowler

  devsecops:
    prose: >-
      Scan infrastructure-as-code for security misconfigurations before
      deployment. Enforce security baselines through CI/CD pipeline
      checks that validate Terraform plans, Kubernetes manifests, and
      Dockerfiles against organizational policies. Include CIS benchmark
      compliance checks in pipeline stages. Require security review
      approval for infrastructure changes that modify network rules,
      IAM policies, or security group configurations. Implement
      automated container image scanning and signing in build pipelines.
    tools:
      - checkov
      - tfsec
      - trivy
      - kics
      - snyk-iac
      - gitlab-ci

  secops:
    prose: >-
      Continuously monitor infrastructure configurations against security
      baselines. Deploy host-based intrusion detection and file integrity
      monitoring across all infrastructure nodes. Alert on configuration
      drift from approved baselines. Implement cloud security posture
      management (CSPM) to identify and remediate misconfigurations.
      Monitor hypervisor and container runtime events for escape
      attempts or anomalous behavior. Conduct regular infrastructure
      penetration testing and vulnerability assessments.
    tools:
      - prowler
      - wiz
      - prisma-cloud
      - falco
      - wazuh
      - qualys

