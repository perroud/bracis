id: ais-01
family: ais
title: "Application Security"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for application security to provide guidance
    appropriate to the intended use of the application. The application
    security program shall include a defined and documented software
    development lifecycle (SDLC) process that identifies security
    requirements and incorporates security controls throughout all phases,
    including design, development, testing, deployment, and maintenance.

guidance:
  prose: >-
    The application security policy should mandate secure coding practices,
    regular security testing, and security architecture reviews for all
    applications processing or storing cloud customer data. The SDLC
    should incorporate threat modeling during design, static and dynamic
    analysis during development, penetration testing before release, and
    runtime application self-protection in production. The policy must
    address API security, input validation, authentication, authorization,
    session management, cryptographic practices, error handling, and
    logging. Open source and third-party component risks must be assessed
    and managed throughout the application lifecycle.

references:
  - citation: "CSA CCM v4.0 AIS-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Provide golden path templates and scaffolding that embed security
      controls by default in all new services. Deploy API gateways with
      built-in authentication, rate limiting, and input validation for
      all platform-exposed interfaces. Maintain a central secrets management
      system integrated with the service mesh. Enforce container image
      signing and admission control policies to ensure only approved,
      scanned images run in production. Provide shared security libraries
      for common concerns like authentication, authorization, and
      cryptographic operations.
    tools:
      - backstage
      - kong
      - envoy
      - vault
      - sigstore
      - kyverno

  devsecops:
    prose: >-
      Implement mandatory security scanning gates in CI/CD pipelines
      including SAST, DAST, SCA, and container image scanning. Enforce
      pre-commit hooks for secrets detection and basic linting. Require
      threat models for all new features and significant architecture
      changes. Integrate dependency vulnerability scanning with automated
      pull request creation for critical patches. Maintain security unit
      tests alongside functional tests. Block deployments when critical
      or high-severity vulnerabilities are detected.
    tools:
      - semgrep
      - sonarqube
      - snyk
      - trivy
      - zap
      - gitleaks
      - dependabot

  secops:
    prose: >-
      Deploy runtime application security monitoring including WAF, RASP,
      and API security solutions. Configure anomaly detection for
      application behavior patterns such as unusual data access volumes,
      authentication failures, or API abuse. Integrate application security
      events with the SIEM for correlation with infrastructure alerts.
      Maintain incident response playbooks specific to application-layer
      attacks including injection, XSS, and API exploitation. Conduct
      periodic penetration tests and red team exercises targeting
      application attack surfaces.
    tools:
      - cloudflare-waf
      - aws-waf
      - falco
      - datadog-asm
      - burp-suite

