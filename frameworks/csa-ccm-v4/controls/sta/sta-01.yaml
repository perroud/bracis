id: sta-01
family: sta
title: "Supply Chain Governance"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for supply chain management, transparency,
    and accountability. The supply chain policy shall include the purpose,
    scope, roles, responsibilities, and requirements for assessing,
    managing, and monitoring the security posture of supply chain
    participants including cloud service providers, software vendors,
    and third-party integrators.

guidance:
  prose: >-
    The supply chain governance policy should define vendor risk assessment
    requirements, including security questionnaires, penetration test
    results, compliance certifications (SOC 2, ISO 27001, CSA STAR),
    and ongoing monitoring obligations. It should address software
    supply chain security including open source component management,
    software bill of materials (SBOM) requirements, and build integrity
    verification. The policy must cover data processing agreements,
    right-to-audit clauses, incident notification requirements, and
    exit strategies for critical vendors. Cloud service provider
    assessments should evaluate the shared responsibility model
    implementation, data residency controls, and subprocessor
    management. Regular vendor security assessments should be
    conducted based on risk tier classification.

references:
  - citation: "CSA CCM v4.0 STA-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement software supply chain security controls including container
      image signing and verification, SBOM generation for all platform
      components, and dependency vulnerability tracking. Enforce admission
      controls that only allow verified, signed artifacts to run in
      production. Maintain an approved vendor registry for cloud services
      and third-party integrations. Implement automated vendor security
      posture monitoring through integration with vendor risk management
      platforms. Deploy supply chain security frameworks such as SLSA
      for build integrity verification.
    tools:
      - sigstore
      - syft
      - grype
      - kyverno
      - docker-content-trust
      - backstage

  devsecops:
    prose: >-
      Integrate software composition analysis (SCA) into CI/CD pipelines
      to identify vulnerable dependencies. Generate and publish SBOMs
      as part of the build process. Enforce dependency pinning and
      lockfile integrity verification. Implement automated pull request
      creation for dependency security updates. Verify build reproducibility
      and implement provenance attestation. Scan container base images
      for vulnerabilities and enforce approved base image policies.
      Monitor for dependency confusion and typosquatting attacks.
    tools:
      - snyk
      - trivy
      - dependabot
      - renovate
      - syft
      - cosign

  secops:
    prose: >-
      Monitor for supply chain attack indicators including compromised
      package publications, unauthorized dependency changes, and build
      system tampering. Maintain a vendor security assessment schedule
      with risk-based frequency. Track vendor security incidents and
      evaluate impact on organizational risk posture. Monitor vendor
      compliance certifications for expiration or revocation. Implement
      threat intelligence feeds focused on supply chain threats.
      Generate regular reports on third-party risk exposure for
      governance review.
    tools:
      - snyk
      - socket-dev
      - servicenow-vrm
      - bitsight
      - security-scorecard
      - splunk

