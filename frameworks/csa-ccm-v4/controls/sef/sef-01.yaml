id: sef-01
family: sef
title: "Security Incident Management Policy"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for security incident management. The security
    incident management policy shall include the purpose, scope, roles,
    responsibilities, management commitment, coordination among
    organizational entities, and compliance. The policy shall address
    incident detection, triage, response, communication, remediation,
    and post-incident review processes.

guidance:
  prose: >-
    The incident management policy should define incident severity levels
    with corresponding response procedures, escalation timelines, and
    communication requirements. It should address cloud-specific incident
    scenarios including data breaches affecting multiple tenants, cloud
    provider outages, account compromise, and cryptojacking. The policy
    must define coordination procedures with cloud service providers
    during shared-responsibility incidents. Breach notification
    requirements aligned with applicable regulations (GDPR 72-hour
    notification, HIPAA, state breach notification laws) should be
    documented. The policy should mandate post-incident reviews with
    root cause analysis and corrective action tracking. Incident
    response plan testing through tabletop exercises and simulations
    should occur at least annually.

references:
  - citation: "CSA CCM v4.0 SEF-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and initial response
      capabilities at the platform level. Deploy automated containment
      playbooks for common incident types such as compromised container
      isolation, credential revocation, and network quarantine. Maintain
      incident response infrastructure including dedicated communication
      channels, evidence collection systems, and forensic analysis
      environments. Implement break-glass access procedures that
      enable emergency response while maintaining audit trails.
      Pre-provision forensic analysis environments that can be
      activated within defined response time objectives.
    tools:
      - pagerduty
      - opsgenie
      - falco
      - velero
      - teleport
      - kubernetes

  devsecops:
    prose: >-
      Integrate incident response procedures into the software delivery
      lifecycle. Maintain incident response runbooks as code in version
      control alongside service documentation. Implement automated
      rollback capabilities for security incidents related to deployment
      changes. Include security incident simulation in regular testing
      cycles. Maintain pre-built forensic container images for
      investigation activities. Automate evidence preservation as
      part of incident response workflows.
    tools:
      - gitlab-ci
      - argo-cd
      - helm
      - terraform
      - ansible

  secops:
    prose: >-
      Operate an incident response capability with defined roles:
      incident commander, technical lead, communications lead, and
      scribe. Deploy SOAR platforms with automated playbooks for
      initial triage and containment. Maintain forensic investigation
      capabilities including disk imaging, memory analysis, network
      packet capture, and cloud audit log analysis. Implement
      communication templates for internal escalation, management
      notification, and regulatory disclosure. Conduct post-incident
      reviews within defined timeframes and track remediation actions
      to completion. Measure and report on incident response metrics.
    tools:
      - cortex-xsoar
      - thehive
      - velociraptor
      - splunk
      - crowdstrike
      - pagerduty

