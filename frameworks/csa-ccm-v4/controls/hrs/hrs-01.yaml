id: hrs-01
family: hrs
title: "Background Screening Policy"
class: CSA-CCM-v4

statement:
  prose: >-
    Establish, document, approve, communicate, apply, evaluate, and maintain
    policies and procedures for background verification screening of all
    new employees, contractors, and third parties. Background screening
    shall be carried out in accordance with relevant regulations, ethics,
    and contractual constraints, and be proportionate to the data
    classification to be accessed, business requirements, and acceptable
    risk.

guidance:
  prose: >-
    Background screening should be conducted prior to granting access to
    organizational systems and data. The scope of screening should be
    risk-based, with more thorough checks for roles with access to
    sensitive data or critical systems. Screening may include identity
    verification, criminal history checks, employment verification,
    education verification, and credit checks where legally permitted
    and relevant. Re-screening should be conducted periodically for
    roles with elevated access privileges. Third-party personnel with
    access to customer data should be subject to equivalent screening
    requirements. Records of screening completion should be maintained
    while complying with privacy regulations regarding the retention
    of personal data.

references:
  - citation: "CSA CCM v4.0 HRS-01"
    url: "https://cloudsecurityalliance.org/artifacts/cloud-controls-matrix-v4"

implementation_guidance:
  platform_engineering:
    prose: >-
      Integrate HR screening status with the identity provider to
      automate access provisioning workflows. Implement automated
      onboarding pipelines that gate access grants on verified screening
      completion. Enforce role-based access tiers where elevated
      permissions require additional screening verification. Maintain
      screening status as metadata in the identity management system
      to enable automated compliance reporting. Implement automated
      access revocation when screening status expires or is invalidated.
    tools:
      - okta
      - azure-ad
      - keycloak
      - workday
      - sailpoint

  devsecops:
    prose: >-
      Enforce screening verification as a prerequisite in the developer
      onboarding workflow before granting access to code repositories,
      CI/CD systems, and production environments. Implement just-in-time
      access provisioning for production systems that validates current
      screening status. Gate elevated permissions such as deployment
      approval and infrastructure modification rights on verified
      screening completion. Automate periodic access reviews that
      cross-reference screening records with current access levels.
    tools:
      - gitlab-ci
      - github
      - vault
      - teleport

  secops:
    prose: >-
      Monitor for access attempts by personnel with expired or incomplete
      screening. Integrate screening status with SIEM for enhanced
      risk scoring of user activity. Alert on privilege escalation
      requests from users without appropriate screening levels. Generate
      compliance reports showing screening coverage across all
      personnel with system access. Maintain audit trails of screening
      completion dates and access provisioning decisions.
    tools:
      - sailpoint
      - splunk
      - servicenow
      - workday

