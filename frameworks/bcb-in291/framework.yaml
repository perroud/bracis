    articles: "art. 1 ao art. 2"
    control_count: 2
  - id: cap-2
    title: "Da Classificacao de Incidentes"
    description: "Criterios de classificacao de severidade, limiares de materialidade e metodologia de avaliacao de impacto para incidentes ciberneticos"
