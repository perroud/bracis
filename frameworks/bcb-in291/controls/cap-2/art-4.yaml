id: art-4
family: cap-2
title: "Limiares de Materialidade para Notificacao Obrigatoria"
class: BCB-IN291
baselines: [todas-ifs-ips]
statement:
  prose: |
    Art. 4. São de notificação obrigatória ao BCB os incidentes de segurança
    cibernética que, isolada ou cumulativamente, atendam a um ou mais dos seguintes
    limiares de materialidade:

    I - afetem sistemas de informação críticos utilizados no processamento de
    transações financeiras, incluindo sistemas de pagamento instantâneo, transferências
    e liquidação;
    II - resultem em acesso não autorizado a dados de mais de 10.000 (dez mil) clientes;
    III - gerem interrupção ou degradação significativa de serviços financeiros por
    período superior a 2 (duas) horas;
    IV - causem ou possam causar perdas financeiras superiores ao limite estabelecido
    pelo BCB em ato normativo específico;
    V - envolvam o comprometimento de chaves criptográficas, certificados digitais ou
    mecanismos de autenticação de sistemas críticos;
    VI - sejam originados por atores com motivação política, ideológica ou geopolítica,
    ou sejam atribuídos a grupos de ameaça persistente avançada (APT);
    VII - tenham repercussão pública ou potencial de impacto sistêmico no mercado
    financeiro.
guidance:
  prose: |
    O art. 4 operacionaliza o conceito de "incidente relevante" da Resolucao Conjunta
    2/2020 com limiares concretos e verificaveis.

    **Inciso I - Sistemas de transacoes financeiras:**
    Qualquer incidente em sistemas que processam transacoes (PIX, TED, DOC, boletos,
    cartoes, etc.) e automaticamente de notificacao obrigatoria, independente de
    outros limiares. O criterio e o sistema afetado, nao a extensao do dano.

    **Inciso II - 10.000 clientes:**
    O limiar de 10.000 clientes e o piso minimo. Instituicoes de grande porte podem
    adotar limiares mais restritivos internamente. A contagem inclui:
    - Clientes pessoa fisica
    - Clientes pessoa juridica (contados individualmente, nao por CNPJ matriz)
    - Usuarios de servicos (mesmo sem conta formal)
    - Contrapartes em transacoes (para incidentes em sistemas de liquidacao)

    **Inciso III - 2 horas de interrupcao:**
    O periodo de 2 horas e contado de forma continua ou acumulada em janela de 24 horas.
    "Degradacao significativa" inclui lentidao extrema (ex: > 10x o tempo normal de
    resposta) mesmo sem interrupcao total. O criterio e funcional, nao tecnico.

    **Inciso IV - Perdas financeiras:**
    O BCB publica periodicamente o limite em valor. As instituicoes devem monitorar
    publicacoes do BCB para atualizar este limiar em suas politicas internas.
    Perdas "potenciais" (risco materializado mas perda ainda nao confirmada) tambem
    ativam o limiar.

    **Inciso V - Criptografia e autenticacao:**
    Comprometimento de HSMs, CAs internas, certificados de assinatura de transacoes,
    chaves de API de sistemas criticos, credenciais de contas de servico privilegiadas.
    Este inciso e de alta gravidade: o comprometimento de mecanismos de autenticacao
    pode nao ter impacto imediato mas tem potencial devastador.

    **Inciso VI - APT e atores sofisticados:**
    A atribuicao a APT frequentemente e feita na fase de investigacao, nao na deteccao.
    Se a atribuicao ocorre apos a notificacao inicial, o BCB deve ser informado em
    atualizacao subsequente. A simples suspeita de APT justifica notificacao.

    **Inciso VII - Repercussao publica:**
    Um post viral em redes sociais, uma noticia em veiculo de grande circulacao ou
    demandas de outros orgaos reguladores (ANPD, CVM) sobre o incidente ativam
    este criterio.

    **Cumulatividade:**
    A palavra "cumulativamente" no caput confirma que um incidente pode ser de
    notificacao obrigatoria por atingir multiplos limiares. Cada limiar atingido
    deve ser explicitamente identificado na notificacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Avaliacao automatizada de limiares:**
      1. Sistema de avaliacao de materialidade que verifica os sete incisos em
         tempo real:
         - Inciso I: lista de sistemas Tier-1 no CMDB com flag "transacoes-financeiras"
         - Inciso II: query automatica de usuarios unicos afetados via telemetria
         - Inciso III: timer de disponibilidade com alertas em T+30min, T+60min, T+90min,
           T+120min (notificacao obrigatoria ativada)
         - Inciso IV: integracao com sistemas de monitoramento de fraude e perdas
         - Inciso V: monitoring especifico de HSMs, PKI, e credenciais privilegiadas
         - Inciso VI: integracao com feeds de threat intelligence para IOCs de APT
         - Inciso VII: monitoramento de midia e redes sociais
      2. Alerta de "materialidade atingida" com indicacao de qual(is) inciso(s)
         foram ativados, disparando automaticamente o fluxo de notificacao.
      3. Atualizacao em tempo real do dashboard de impacto a medida que dados
         de investigacao chegam.
    tools:
      - siem
      - soar
      - incident-management
      - cmdb
      - threat-intelligence
      - media-monitoring
      - monitoring-alerting
  devsecops:
    prose: |
      **Instrumentacao para limiares no pipeline:**
      1. Todos os sistemas com flag "transacoes-financeiras" (inciso I) devem ter
         runbook de incidente com caminho fast-track para notificacao ao BCB.
      2. Health checks de PKI e certificados com alertas antecipados de expiracao
         e monitoramento de revogacao inesperada (inciso V).
      3. Metricas de disponibilidade com granularidade de 1 minuto para calcular
         precisamente o SLA de 2 horas (inciso III).
      4. Rotacao automatica de segredos para limitar janela de exposicao em caso
         de comprometimento de credenciais (inciso V).
    tools:
      - gitlab-ci
      - secrets-manager
      - pki-monitoring
      - metrics-platform
      - service-catalog
  secops:
    prose: |
      **Avaliacao de materialidade no processo de incidente:**
      1. Checklist de materialidade como primeiro passo formal do processo de
         classificacao, antes de qualquer acao de contencao.
      2. Responsavel designado para avaliar inciso VI (APT): analista de threat
         intelligence com acesso a feeds especializados.
      3. Processo de consulta rapida (< 15 minutos) ao CISO e compliance para
         incisos VII (subjetivo).
      4. Documentacao obrigatoria de qual(is) inciso(s) do art. 4 foram ativados,
         com evidencias para cada um.
      5. Revisao da avaliacao de materialidade a cada atualizacao do incidente:
         incidente inicialmente abaixo do limiar pode cruzar o threshold conforme
         investigacao avanca.
      6. Relatorio mensal de incidentes abaixo do limiar de materialidade para
         analise de tendencias e ajuste de limiares internos.
    tools:
      - incident-management
      - threat-intelligence
      - grc-platform
      - soar
