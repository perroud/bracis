id: art-1
family: cap-1
title: "Ambito de Aplicacao e Objeto da Instrucao Normativa"
class: BCB-IN291
baselines: [todas-ifs-ips]
statement:
  prose: |
    Art. 1. Esta Instrução Normativa estabelece os procedimentos para notificação
    ao Banco Central do Brasil (BCB) de incidentes de segurança cibernética,
    em cumprimento ao disposto na Resolução Conjunta BCB/CMN n. 2, de 22 de
    abril de 2020.

    § 1. Sujeitam-se ao disposto nesta Instrução Normativa:
    I - as instituições financeiras e demais instituições autorizadas a funcionar
    pelo BCB sujeitas à Resolução Conjunta BCB/CMN n. 2/2020;
    II - as instituições de pagamento autorizadas a funcionar pelo BCB.

    § 2. Para fins desta Instrução Normativa, entende-se por incidente de
    segurança cibernética todo evento adverso confirmado que comprometa a
    confidencialidade, integridade ou disponibilidade de sistemas de informação
    ou de dados, com potencial impacto relevante para a instituição, seus clientes
    ou para o sistema financeiro nacional.
guidance:
  prose: |
    O art. 1 delimita o escopo subjetivo e o objeto da instrucao normativa.

    **Escopo subjetivo:**
    A IN 291 abrange todas as instituicoes sujeitas a Resolucao Conjunta 2/2020,
    que inclui bancos, cooperativas de credito, financeiras, corretoras, distribuidoras,
    sociedades de credito, financiamento e investimento, bem como instituicoes de
    pagamento (emissores, credenciadoras, arranjos de pagamento).

    **Definicao operacional de incidente:**
    O ss 2 adota a triade classica de seguranca da informacao (CIA - Confidentiality,
    Integrity, Availability) como criterio base. O qualificador "confirmado" exclui
    eventos suspeitos nao verificados, mas nao exige investigacao forense completa
    antes da notificacao inicial.

    **Relacao com a Resolucao Conjunta 2/2020:**
    A IN 291 e instrumento subordinado e implementador. A Resolucao Conjunta estabelece
    a obrigacao de notificar; a IN detalha como notificar. Violacoes da IN equivalem
    a violacoes da Resolucao Conjunta para fins de sancoes.

    **Pratica importante:**
    A definicao de "potencial impacto relevante" deve ser operacionalizada internamente
    pela instituicao por meio de criterios documentados. A ausencia de criterios
    formais e, por si so, um achado de supervisao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Registro e identificacao de incidentes:**
      1. Sistema de gestao de incidentes com campo de tipo "incidente-cibernetico-bcb"
         para identificar eventos sujeitos a notificacao regulatoria.
      2. CMDB com inventario completo de todos os sistemas das instituicoes abrangidas,
         com identificacao clara de quais pertencem a qual entidade juridica do conglomerado.
      3. Integracao entre SIEM e o sistema de notificacao para correlacionar alertas de
         seguranca com a definicao de incidente do ss 2 (impacto a CIA).
      4. Dashboard de conformidade mostrando em tempo real quais incidentes ativos se
         enquadram no escopo da IN 291.
    tools:
      - siem
      - incident-management
      - cmdb
      - monitoring-alerting
  devsecops:
    prose: |
      **Cobertura de escopo no pipeline:**
      1. Tagging obrigatorio em cada repositorio identificando a entidade juridica
         proprietaria do sistema (IF, IP, ou ambas).
      2. Pipelines de seguranca distintos para sistemas de IFs e IPs, refletindo
         potenciais diferencas regulatorias.
      3. Inventario automatico de sistemas via service catalog integrado ao CMDB
         para garantir que nenhum sistema escape ao escopo de monitoramento.
      4. Security gates diferenciados para sistemas Tier 1 de IFs versus IPs.
    tools:
      - gitlab-ci
      - service-catalog
      - cmdb
      - sast
  secops:
    prose: |
      **Operacionalizacao do escopo:**
      1. Mapeamento formal documentado de todas as entidades juridicas do grupo
         sujeitas a IN 291, aprovado pela diretoria.
      2. Definicao interna de "potencial impacto relevante" com criterios objetivos
         e quantitativos (ex: >= X clientes afetados, sistema Tier 1 impactado).
      3. Treinamento de todos os analistas do SOC na definicao operacional de
         incidente cibernetico da IN 291 versus incidentes operacionais comuns.
      4. Processo de triagem rapida (< 30 minutos) para classificar se um evento
         configura incidente cibernetico sujeito a notificacao.
      5. Registro de decisoes de nao-notificacao com justificativa documentada,
         para evidenciar ao BCB que o escopo foi avaliado.
    tools:
      - soar
      - siem
      - incident-management
      - grc-platform
