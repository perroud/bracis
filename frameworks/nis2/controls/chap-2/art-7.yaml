id: art-7
family: chap-2
title: "National Cybersecurity Strategy"
class: NIS2

statement:
  prose: >-
    Each Member State shall adopt a national cybersecurity strategy that provides
    strategic objectives, the resources necessary to achieve those objectives, and
    appropriate policy and regulatory measures, with a view to achieving and maintaining
    a high level of cybersecurity. The national cybersecurity strategy shall include,
    as a minimum: (a) objectives and priorities of the Member State's cybersecurity
    strategy covering in particular the sectors referred to in Annexes I and II;
    (b) a governance framework to achieve those objectives and priorities, including
    policies on the security of network and information systems; (c) a framework for
    identifying relevant assets and an assessment of cybersecurity risks in that
    Member State; (d) identification of measures ensuring preparedness for, response to,
    and recovery from incidents, including cooperation between the public and private
    sectors; (e) a list of the various authorities and stakeholders involved in the
    implementation of the national cybersecurity strategy; (f) a policy framework for
    enhanced coordination between the competent authorities for the purpose of
    coordinated vulnerability disclosure; (g) a policy on promoting and facilitating
    cybersecurity education, training, and awareness.

guidance:
  prose: >-
    While this article primarily addresses Member States rather than individual
    organizations, entities within scope of NIS 2 must align their cybersecurity
    programs with their Member State's national cybersecurity strategy. Organizations
    should understand their classification (essential vs. important entity), the
    competent authority for their sector, and the national CSIRT they should
    coordinate with for incident response. Organizations operating across multiple
    EU Member States must comply with each Member State's transposition of NIS 2,
    which may vary in specific requirements while maintaining the directive's
    minimum standards.

references:
  - citation: "Directive (EU) 2022/2555, Article 7"
    url: "https://eur-lex.europa.eu/eli/dir/2022/2555"

implementation_guidance:
  platform_engineering:
    prose: >-
      Align platform security architecture with national cybersecurity strategy
      priorities. Map platform services to NIS 2 sector classifications (Annexes I
      and II) to determine entity classification (essential vs. important). Implement
      platform-level controls that meet the minimum cybersecurity requirements
      applicable to the entity's classification. Ensure platform architecture supports
      the incident reporting timelines mandated by the applicable Member State (24-hour
      early warning, 72-hour incident notification, one-month final report). Design
      platform observability to capture the data needed for national authority
      reporting requirements.
    tools:
      - backstage
      - grafana
      - opentelemetry
      - terraform

  devsecops:
    prose: >-
      Implement CI/CD pipeline compliance checks aligned with the national cybersecurity
      strategy's priorities for the organization's sector. Ensure vulnerability
      disclosure processes align with the Member State's coordinated vulnerability
      disclosure framework. Maintain documentation in version control demonstrating
      how the organization's DevSecOps practices align with the national strategy's
      objectives. Tag projects with NIS 2 entity classification metadata to drive
      appropriate security control application.
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-security-policies

  secops:
    prose: >-
      Establish relationships with the relevant national competent authority and
      CSIRT. Maintain current awareness of the Member State's national cybersecurity
      strategy and any updates. Implement procedures for information sharing with
      national authorities as required. Ensure incident response plans reference the
      correct national CSIRT and competent authority contact information. Participate
      in sector-specific cybersecurity exercises organized by national authorities
      where applicable.
    tools:
      - siem
      - incident-management
      - grc-platform

legal_references:
