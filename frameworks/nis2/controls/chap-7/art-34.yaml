id: art-34
family: chap-7
title: "General Conditions for Imposing Administrative Fines"
class: NIS2

statement:
  prose: >-
    Member States shall ensure that the administrative fines imposed on essential and
    important entities pursuant to this Article are effective, proportionate and
    dissuasive, taking into account the circumstances of each individual case.
    For essential entities, Member States shall ensure that the maximum level of
    administrative fines is at least EUR 10 000 000 or at least 2% of the total
    worldwide annual turnover in the preceding financial year of the undertaking to
    which the essential entity belongs, whichever is higher. For important entities,
    Member States shall ensure that the maximum level of administrative fines is at
    least EUR 7 000 000 or at least 1.4% of the total worldwide annual turnover in
    the preceding financial year of the undertaking to which the important entity
    belongs, whichever is higher.

guidance:
  prose: >-
    The fine levels under NIS 2 are modeled on GDPR's enforcement structure, signaling
    that cybersecurity non-compliance is now treated with similar severity to data
    protection violations. Key factors for fine calculation include: (a) the nature,
    gravity, and duration of the infringement; (b) whether the infringement was
    intentional or negligent; (c) actions taken to mitigate damage; (d) the degree
    of responsibility considering technical and organizational measures implemented;
    (e) any previous infringements; (f) the degree of cooperation with the competent
    authority; (g) the categories of personal or non-personal data affected.
    Organizations should use these fine levels in business cases for cybersecurity
    investment, demonstrating the financial risk of non-compliance to management
    bodies (Article 20 governance requirement).

references:
  - citation: "Directive (EU) 2022/2555, Article 34"
    url: "https://eur-lex.europa.eu/eli/dir/2022/2555"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement comprehensive compliance monitoring that provides evidence of
      diligence in meeting NIS 2 requirements, which is relevant to fine mitigation.
      Maintain continuous compliance dashboards tracking adherence to all Article 21
      measures. Implement automated compliance evidence collection that demonstrates
      technical and organizational measures are in place and functioning. Ensure all
      platform changes are auditable through GitOps version control, demonstrating
      responsible change management. Maintain incident response capabilities that
      demonstrate preparedness and ability to minimize impact (relevant to fine
      mitigation factor (c)). Document all cybersecurity investments and their
      rationale to demonstrate proportionate spending.
    tools:
      - grafana
      - backstage
      - argocd
      - terraform

  devsecops:
    prose: >-
      Maintain a comprehensive audit trail of all security activities through CI/CD
      pipeline records. Document security testing coverage, vulnerability remediation
      timelines, and compliance status for all projects. Implement compliance-as-code
      that automatically generates evidence of adherence to Article 21 requirements.
      Track and report on security metrics that demonstrate continuous improvement:
      vulnerability counts trending down, remediation times improving, security test
      coverage increasing. This evidence portfolio demonstrates good faith effort and
      is relevant to fine mitigation.
    tools:
      - gitlab-ci
      - gitlab-security-dashboard
      - gitlab-compliance-framework
      - gitlab-audit-events

  secops:
    prose: >-
      Maintain comprehensive compliance documentation that demonstrates adherence
      to all NIS 2 requirements. This evidence is critical for fine mitigation in
      the event of an incident. Ensure all security policies are documented, approved
      by management, and regularly reviewed. Maintain records of security training
      completion, risk assessments, penetration test results, and incident response
      exercises. Prepare a compliance evidence package that can be provided to
      supervisory authorities during inspections. Establish cooperative relationships
      with the competent authority (cooperation is a fine mitigation factor).
      Calculate the organization's maximum fine exposure and use this in board-level
      risk reporting to support cybersecurity investment decisions.
    tools:
      - archer-grc
      - servicenow-grc
      - drata
      - vanta

