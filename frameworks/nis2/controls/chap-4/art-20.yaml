id: art-20
family: chap-4
title: "Governance"
class: NIS2

statement:
  prose: >-
    Member States shall ensure that the management bodies of essential and important
    entities approve the cybersecurity risk-management measures taken by those entities
    in order to comply with Article 21, oversee its implementation and can be held
    liable for infringements by those entities of that Article. The approval and
    oversight by the management body of the cybersecurity risk-management measures
    shall not affect the liability regimes applicable under national law as regards
    public institutions. Member States shall ensure that the members of the management
    bodies of essential and important entities are required to follow training,
    and shall encourage essential and important entities to offer similar training
    to their employees on a regular basis, in order that they gain sufficient
    knowledge and skills to enable them to identify risks and assess cybersecurity
    risk-management practices and their impact on the services provided by the entity.

guidance:
  prose: >-
    Article 20 establishes personal accountability for management bodies regarding
    cybersecurity. This is a significant escalation from NIS 1, where management
    accountability was not explicitly required. Key implications: (1) the board/C-suite
    must formally approve the cybersecurity risk management measures, (2) management
    must actively oversee implementation (not just delegate), (3) management members
    can be held personally liable for non-compliance, (4) management must undergo
    cybersecurity training. Organizations must establish governance structures that
    demonstrate management engagement with cybersecurity, including regular board
    reporting on cybersecurity posture, documented approval of cybersecurity policies,
    and evidence of management training.

references:
  - citation: "Directive (EU) 2022/2555, Article 20"
    url: "https://eur-lex.europa.eu/eli/dir/2022/2555"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement governance dashboards that provide management with real-time visibility
      into cybersecurity posture. Create executive-level dashboards in Grafana or
      Backstage showing: vulnerability counts by severity, compliance status against
      NIS 2 requirements, incident metrics (MTTR, MTTD), security control coverage,
      and risk register status. Automate the generation of board-level cybersecurity
      reports from platform metrics. Implement approval workflows for major
      cybersecurity decisions (policy changes, risk acceptances, architecture changes)
      that produce auditable records of management approval. Maintain evidence of
      management oversight in version-controlled governance repositories.
    tools:
      - grafana
      - backstage
      - confluence
      - jira

  devsecops:
    prose: >-
      Generate automated compliance reports from CI/CD pipeline data that can be
      presented to management bodies. Track security posture metrics over time:
      vulnerability trends, scanning coverage, mean-time-to-remediation, policy
      compliance rates. Implement compliance-as-code where NIS 2 requirements are
      translated into pipeline policies with automated compliance reporting. Maintain
      a governance-as-code repository where management-approved security policies
      are stored with Git audit trails demonstrating approval (signed commits,
      approved merge requests from management accounts).
    tools:
      - gitlab-ci
      - gitlab-compliance-framework
      - gitlab-security-dashboard

  secops:
    prose: >-
      Prepare quarterly cybersecurity briefings for the management body covering:
      current threat landscape relevant to the entity's sector, cybersecurity
      posture assessment, incident summary and lessons learned, risk register
      updates, compliance status, and investment recommendations. Maintain records
      of management body meetings where cybersecurity was discussed, including
      attendees, decisions, and action items. Track management training compliance,
      ensuring all management body members complete required cybersecurity training
      annually. Document the management body's formal approval of cybersecurity
      risk management measures with signatures and dates.
    tools:
      - archer-grc
      - servicenow-grc
      - confluence
      - training-management

