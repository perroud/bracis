id: art-24
family: chap-4
title: "Use of European Cybersecurity Certification Schemes"
class: NIS2

statement:
  prose: >-
    In order to demonstrate compliance with certain requirements of Article 21,
    Member States may require essential and important entities to use particular
    ICT products, ICT services and ICT processes, certified under European
    cybersecurity certification schemes adopted pursuant to Article 49 of
    Regulation (EU) 2019/881. Member States shall furthermore encourage essential
    and important entities to use qualified trust services.

guidance:
  prose: >-
    Article 24 connects NIS 2 to the EU Cybersecurity Act (Regulation 2019/881),
    which establishes the EU cybersecurity certification framework. While Member
    States "may require" the use of certified products (not mandatory at EU level),
    organizations should monitor their Member State's transposition for specific
    certification requirements. The European Cybersecurity Certification Scheme on
    Common Criteria (EUCC) is the first scheme under this framework. Organizations
    should assess which ICT products and services in their supply chain have EU
    certifications and prioritize certified products where available. This is
    particularly relevant for supply chain security requirements under Article 21(d).

references:
  - citation: "Directive (EU) 2022/2555, Article 24"
    url: "https://eur-lex.europa.eu/eli/dir/2022/2555"
  - citation: "Regulation (EU) 2019/881 (EU Cybersecurity Act)"
    url: "https://eur-lex.europa.eu/eli/reg/2019/881"

implementation_guidance:
  platform_engineering:
    prose: >-
      Maintain an inventory of ICT products and services used in the platform with
      their certification status (EU cybersecurity certification, Common Criteria,
      FIPS 140-2/3, SOC 2). Prioritize products with EU cybersecurity certifications
      where available. Implement supply chain security policies in admission controllers
      that validate container image provenance and signing. Track certification
      expiration dates and plan for migration when certifications lapse. Evaluate
      cloud service providers' compliance with EU certification schemes as part of
      vendor selection. Document certification status of critical platform components
      for compliance evidence.
    tools:
      - backstage-catalog
      - cosign
      - sigstore
      - harbor-registry

  devsecops:
    prose: >-
      Implement software supply chain security practices that align with EU
      certification expectations. Generate SBOMs for all build artifacts and track
      component certifications. Enforce container image signing and signature
      verification in CI/CD pipelines. Use in-toto attestations and SLSA provenance
      to document the build pipeline's integrity. Implement license compliance scanning
      to identify components that may have certification implications. Maintain a
      curated allowlist of approved dependencies and container base images that have
      been evaluated against certification requirements.
    tools:
      - cosign
      - syft
      - gitlab-license-compliance
      - gitlab-dependency-scanning
      - slsa-provenance

  secops:
    prose: >-
      Maintain awareness of EU cybersecurity certification schemes and their
      applicability to the organization's ICT products and services. Monitor ENISA
      publications for new certification schemes and requirements. Conduct annual
      supply chain assessments that evaluate supplier certification status. Document
      decisions to use non-certified alternatives, including risk justification and
      compensating controls. Prepare for potential Member State requirements for
      mandatory certification by inventorying critical ICT components that may be
      subject to future certification mandates.
    tools:
      - archer-grc
      - servicenow-grc
      - vendor-risk-management

