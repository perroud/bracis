id: art-23
family: chap-4
title: "Reporting Obligations"
class: NIS2

statement:
  prose: >-
    Member States shall ensure that essential and important entities notify, without
    undue delay, their CSIRT or, where applicable, their competent authority of any
    significant incident. Where appropriate, the entities concerned shall notify,
    without undue delay, the recipients of their services of significant incidents
    that are likely to adversely affect the provision of those services. Each
    notification shall include: (a) an early warning within 24 hours of becoming
    aware of the significant incident, indicating whether the significant incident
    is suspected of being caused by unlawful or malicious acts or could have a
    cross-border impact; (b) an incident notification within 72 hours of becoming
    aware of the significant incident, updating the information referred to in
    point (a) and indicating an initial assessment of the significant incident,
    including its severity and impact, as well as, where available, the indicators
    of compromise; (c) a final report not later than one month after the submission
    of the incident notification, including a detailed description of the incident,
    including its severity and impact, the type of threat or root cause that is likely
    to have triggered the incident, applied and ongoing mitigation measures, and the
    cross-border impact of the incident, where applicable.

guidance:
  prose: >-
    The reporting obligations under NIS 2 are significantly more stringent than NIS 1.
    Key timelines: 24 hours for early warning, 72 hours for incident notification,
    1 month for final report. A "significant incident" is one that has caused or is
    capable of causing severe operational disruption or financial loss, or has affected
    or is capable of affecting other natural or legal persons by causing considerable
    material or non-material damage. Organizations must have procedures in place to
    detect significant incidents, classify their severity, and submit notifications
    within the mandated timeframes. Failure to report can result in administrative
    fines. The 24-hour early warning is deliberately limited in scope -- it only needs
    to indicate whether the incident is suspected to be malicious and whether it could
    have cross-border impact.

references:
  - citation: "Directive (EU) 2022/2555, Article 23"
    url: "https://eur-lex.europa.eu/eli/dir/2022/2555"

implementation_guidance:
  platform_engineering:
    prose: >-
      Implement automated incident detection and classification capabilities that
      support the 24-hour early warning timeline. Deploy monitoring that can rapidly
      determine: (1) whether an incident affects service availability or data integrity,
      (2) whether indicators suggest malicious activity, (3) whether the incident
      has cross-border implications. Build automated reporting pipelines that pre-populate
      notification templates with data from monitoring systems (affected assets,
      timeline, indicators of compromise). Implement incident severity scoring
      that maps to NIS 2 "significant incident" criteria. Ensure monitoring
      infrastructure itself is resilient so that incident detection is not impaired
      during the incident.
    tools:
      - pagerduty
      - opsgenie
      - grafana
      - opentelemetry
      - falco
      - prometheus-alertmanager

  devsecops:
    prose: >-
      Maintain incident notification templates and procedures in version-controlled
      repositories. Implement automated collection of deployment and pipeline data
      that may be relevant to incident investigation (recent deployments, code changes,
      dependency updates). Ensure CI/CD audit logs are preserved with sufficient
      retention (minimum 1 month beyond incident) to support final report preparation.
      Implement automated evidence collection that snapshots affected system state
      (container images, configurations, logs) when high-severity alerts trigger.
      Build pipeline-driven reporting workflows that generate incident notification
      documents from structured incident data.
    tools:
      - gitlab-audit-events
      - gitlab-ci
      - gitlab-environments

  secops:
    prose: >-
      Establish a documented incident reporting workflow with escalation procedures
      that ensure the 24-hour early warning deadline is met for all significant
      incidents. Pre-establish communication channels with the relevant national
      CSIRT and competent authority. Maintain pre-drafted notification templates
      aligned with each reporting stage (early warning, incident notification,
      final report). Implement automated incident classification that evaluates
      whether an incident meets the "significant incident" threshold. Train the
      SOC team on NIS 2 reporting requirements and conduct quarterly exercises
      that include the notification workflow. Maintain a regulatory notification
      tracker that monitors compliance with all reporting deadlines. Establish
      procedures for notifying service recipients when significant incidents may
      adversely affect service provision.
    tools:
      - splunk-soar
      - thehive
      - pagerduty
      - jira-incident
      - statuspage

