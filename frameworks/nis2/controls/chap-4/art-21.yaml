implementation_guidance:
  platform_engineering:
    prose: >-
      Map each Article 21 requirement to specific platform engineering controls:
      (a) Risk analysis: implement threat modeling for platform architecture, maintain
      platform risk register. (b) Incident handling: deploy automated detection
      (Falco, SIEM), alerting (PagerDuty), and containment capabilities.
      (c) Business continuity: implement multi-region deployments, automated failover,
      backup/restore pipelines (Velero), and disaster recovery testing.
      (d) Supply chain: scan all dependencies (Trivy, Grype), enforce SBOM generation,
      verify image signatures (Cosign), use trusted registries.
      (e) Vulnerability handling: integrate vulnerability scanning at every layer,
      implement coordinated vulnerability disclosure program.
      (f) Effectiveness assessment: deploy compliance dashboards, run automated
      compliance checks, conduct penetration testing.
      (g) Cyber hygiene: enforce secure defaults in platform templates, implement
      admission controllers for security baselines.
      (h) Cryptography: enforce TLS everywhere (service mesh mTLS), manage certificates
      (cert-manager), use KMS for encryption at rest.
      (i) Access control: centralize identity (IdP), enforce RBAC, implement JIT access.
      (j) MFA: enforce MFA at IdP level for all human access.
    tools:
      - falco
      - velero
      - trivy
      - cosign
      - cert-manager
      - istio
      - hashicorp-vault
      - kyverno
      - pagerduty
      - defectdojo

  devsecops:
    prose: >-
      Implement a comprehensive DevSecOps pipeline aligned with Article 21 domains:
      (a) Include security scanning (SAST, DAST, SCA) in all pipelines as risk
      analysis measures. (b) Maintain incident handling runbooks as code with automated
      rollback capabilities. (c) Implement automated backup validation and disaster
      recovery testing in CI/CD. (d) Enforce supply chain security through dependency
      scanning, license compliance, and SBOM generation. (e) Implement vulnerability
      handling workflows directly in GitLab with security policies defining
      remediation SLAs. (f) Generate compliance reports as pipeline artifacts
      measuring effectiveness. (g) Enforce secure coding standards through linting
      and SAST rules. (h) Scan for insecure cryptography usage in code (weak
      algorithms, hardcoded keys). (i) Implement access-as-code for repository
      and environment permissions. (j) Require 2FA for all GitLab accounts with
      push access.
    tools:
      - gitlab-sast
      - gitlab-dast
      - gitlab-dependency-scanning
      - gitlab-container-scanning
      - gitlab-secret-detection
      - gitlab-license-compliance
      - gitlab-security-policies
      - gitlab-compliance-framework
      - semgrep
      - trivy

  secops:
    prose: >-
      Establish a comprehensive security operations program addressing all ten
      Article 21 domains. (a) Conduct annual risk assessments and maintain a risk
      register with treatment plans. (b) Maintain and test incident response plans
      with defined severity levels and escalation paths. (c) Test business continuity
      and disaster recovery plans annually. (d) Conduct supply chain risk assessments
      for critical suppliers and maintain vendor security requirements. (e) Run
      continuous vulnerability management with defined remediation SLAs. (f) Conduct
      annual security assessments (penetration testing, red team exercises) and track
      control effectiveness metrics. (g) Deliver cybersecurity awareness training to
      all employees annually. (h) Review cryptographic implementations against current
      standards (minimum TLS 1.2, AES-256). (i) Conduct quarterly access reviews and
      enforce least privilege. (j) Verify MFA coverage across all critical systems.
      Document all activities for evidence during supervisory inspections.
    tools:
      - splunk
      - elastic-siem
      - qualys
      - tenable
      - knowbe4
      - sailpoint
      - archer-grc

