id: art-21
family: chap-4
title: "Cybersecurity Risk-Management Measures"
class: NIS2

statement:
  prose: >-
    Member States shall ensure that essential and important entities take appropriate
    and proportionate technical, operational and organisational measures to manage the
    risks posed to the security of network and information systems which those entities
    use for their operations or for the provision of their services, and to prevent
    or minimise the impact of incidents on recipients of their services and on other
    services. The measures referred to in paragraph 1 shall be based on an all-hazards
    approach that aims to protect network and information systems and the physical
    environment of those systems from incidents, and shall include at least the
    following: (a) policies on risk analysis and information system security;
    (b) incident handling; (c) business continuity, such as backup management and
    disaster recovery, and crisis management; (d) supply chain security, including
    security-related aspects concerning the relationships between each entity and its
    direct suppliers or service providers; (e) security in network and information
    systems acquisition, development and maintenance, including vulnerability handling
    and disclosure; (f) policies and procedures to assess the effectiveness of
    cybersecurity risk-management measures; (g) basic cyber hygiene practices and
    cybersecurity training; (h) policies and procedures regarding the use of
    cryptography and, where appropriate, encryption; (i) human resources security,
    access control policies and asset management; (j) the use of multi-factor
    authentication or continuous authentication solutions, secured voice, video and
    text communications and secured emergency communication systems within the entity,
    where appropriate.

guidance:
  prose: >-
    Article 21 is the core operational requirement of NIS 2. It mandates a comprehensive
    set of cybersecurity risk-management measures covering ten specific domains. The
    "all-hazards approach" means measures must address not only cyber threats but also
    physical threats, natural disasters, and human errors. The principle of
    proportionality allows measures to be scaled based on the entity's size, the
    likelihood and severity of incidents, and the societal and economic impact of
    potential incidents. However, the ten listed domains (a) through (j) represent
    minimum requirements that all essential and important entities must address.
    Organizations should map these requirements to established frameworks (ISO 27001,
    NIST CSF, CIS Controls) to ensure comprehensive coverage. Compliance with ISO
    27001 can demonstrate substantial alignment with Article 21, but is not
    automatically sufficient.

