id: art-12
family: cap-4
title: "Health Sector Electronic Signature Requirements"
class: ICP-BRASIL
baselines: [healthcare]
statement:
  prose: |
    Art. 12 da Lei 14.063/2020. Os receituários de medicamentos sujeitos a
    controle especial e os atestados médicos em meio eletrônico somente serão
    válidos quando subscritos com assinatura eletrônica qualificada do médico.

    § 1º Admite-se a assinatura eletrônica avançada para os demais atos
    praticados no âmbito da saúde em forma eletrônica, quando aceita pelo
    destinatário.

    § 2º Os prontuários eletrônicos de pacientes em meio eletrônico deverão
    atender aos requisitos de assinatura estabelecidos pela autoridade
    competente.

    § 3º O disposto neste artigo aplica-se a todos os profissionais de saúde
    legalmente habilitados a emitir os referidos documentos.
guidance:
  prose: |
    Article 12 establishes specific signature requirements for the health
    sector, reflecting the critical nature of medical documentation.

    **Mandatory qualified signature (ICP-Brasil):**
    - Controlled substance prescriptions (receituarios de medicamentos
      sujeitos a controle especial)
    - Medical certificates/attestations (atestados medicos)
    - These MUST use ICP-Brasil qualified signatures — no exceptions

    **Advanced signature (accepted for other health acts):**
    - General prescriptions (non-controlled substances)
    - Clinical notes and progress reports
    - Referral letters and medical reports
    - Must be accepted by the recipient

    **Electronic patient records (PEP/prontuario eletronico):**
    - Must follow signature requirements set by the competent authority
      (CFM — Conselho Federal de Medicina)
    - CFM Resolution 2.299/2021 requires qualified signature for PEP
    - Integrates with SBIS (Sociedade Brasileira de Informatica em Saude)
      certification standards

    **Scope of application:**
    Applies to ALL legally authorized health professionals, not just
    physicians. This includes dentists (CRO), nurses (COFEN),
    pharmacists (CFF), and other regulated health professions.

    **Telemedicine context:**
    With the expansion of telemedicine (Lei 13.989/2020, CFM 2.314/2022),
    electronic signatures in healthcare have become critical infrastructure
    for remote consultations, electronic prescriptions, and telehealth
    documentation.
implementation_guidance:
  platform_engineering:
    prose: |
      **Health sector signature infrastructure:**
      1. Implement dual-level signature service for healthcare:
         - Qualified (ICP-Brasil): for controlled substance prescriptions
           and medical certificates — mandatory, no fallback
         - Advanced: for general health documents — with recipient
           acceptance mechanism
      2. Integrate with CFM/CRM (Conselho Regional de Medicina) databases
         to validate prescriber credentials alongside signature verification.
      3. Implement prescription format standards (TISS/TUSS) with embedded
         qualified digital signature for controlled substances.
      4. Deploy electronic patient record system with CFM-compliant
         signature requirements and SBIS certification standards.
      5. Build telemedicine signature workflow supporting remote qualified
         signing via cloud-based ICP-Brasil certificates.
    tools:
      - health-signature-service
      - pki-service
      - prescription-system
      - pep-system
      - telemedicine-platform
  devsecops:
    prose: |
      **Health signature compliance testing:**
      1. Implement test suite that enforces qualified signature for
         controlled substance prescriptions — test that system REJECTS
         simple and advanced signatures for these documents.
      2. Test CFM/CRM credential validation alongside signature
         verification in the prescription workflow.
      3. Validate TISS/TUSS format compliance for prescriptions with
         embedded digital signatures.
      4. Include SBIS certification requirements in the test matrix
         for electronic patient record systems.
    tools:
      - gitlab-ci
      - health-compliance-testing
      - tiss-validation
      - sbis-testing
  secops:
    prose: |
      **Health sector signature operations:**
      1. Monitor controlled substance prescription signing to ensure 100%
         qualified signature compliance — zero tolerance, report violations
         to Vigilancia Sanitaria.
      2. Track health professional certificate lifecycle (e-CPF with CRM/
         CRO/COFEN registration) to prevent use of expired or revoked
         professional credentials.
      3. Implement audit trail for all health document signatures meeting
         CFM data retention requirements (minimum 20 years for PEP).
      4. Coordinate with hospital/clinic CISO on incident response for
         compromised health professional certificates.
    tools:
      - health-compliance-monitoring
      - credential-tracking
      - audit-trail
      - incident-response
