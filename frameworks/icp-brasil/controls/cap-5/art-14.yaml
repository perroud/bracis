id: art-14
family: cap-5
title: "Legal Validity and Cross-Border Recognition"
class: ICP-BRASIL
baselines: [all-sectors]
statement:
  prose: |
    Art. 10 da MP 2.200-2/2001. Consideram-se documentos públicos ou
    particulares, para todos os fins legais, os documentos eletrônicos de
    que trata esta Medida Provisória.

    § 1º As declarações constantes dos documentos em forma eletrônica
    produzidos com a utilização de processo de certificação disponibilizado
    pela ICP-Brasil presumem-se verdadeiros em relação aos signatários,
    na forma do art. 131 da Lei nº 3.071, de 1º de janeiro de 1916 —
    Código Civil.

    Art. 14 da Lei 14.063/2020. Os documentos eletrônicos assinados
    eletronicamente nos termos desta Lei são válidos entre as partes
    signatárias e perante terceiros.

    Parágrafo único. Os documentos assinados com assinatura eletrônica
    qualificada são válidos para todos os fins legais, equiparados a
    documentos com assinatura manuscrita.
guidance:
  prose: |
    Articles 10 (MP 2.200-2) and 14 (Lei 14.063) establish the legal validity
    framework for electronically signed documents in Brazil.

    **Legal validity hierarchy:**
    1. **Qualified signature (ICP-Brasil):** Valid for ALL legal purposes,
       equivalent to handwritten signature. Automatic legal presumption —
       the burden of proof lies with whoever challenges it.
    2. **Advanced signature:** Valid between parties and before third
       parties, but does not carry automatic legal presumption. May need
       additional evidence to prove validity if challenged.
    3. **Simple signature:** Valid between parties when accepted. Lowest
       evidentiary weight but still legally recognized.

    **Cross-border considerations:**
    Brazil is not a signatory to the eIDAS regulation (EU), so ICP-Brasil
    certificates are not automatically recognized in the EU and vice versa.
    However:
    - Bilateral agreements may provide mutual recognition
    - Hague Apostille Convention (Brazil is a member) applies to
      electronic documents with qualified signatures
    - UNCITRAL Model Law on Electronic Signatures principles are
      reflected in Brazilian legislation

    **Evidentiary value:**
    Under Brazilian procedural law (CPC, art. 369), electronic documents
    are admissible as evidence. ICP-Brasil signed documents have enhanced
    evidentiary value due to the legal presumption of authenticity.

    **Long-term validity:**
    For documents requiring preservation beyond the certificate validity
    period, long-term validation mechanisms (LTV) with timestamps are
    essential to maintain legal validity over decades.
implementation_guidance:
  platform_engineering:
    prose: |
      **Legal validity preservation infrastructure:**
      1. Implement long-term validation (LTV) for all signed documents
         by embedding validation data (certificates, CRLs, OCSP responses)
         at signing time per CAdES-A/XAdES-A/PAdES-LTV profiles.
      2. Integrate with ICP-Brasil accredited Timestamp Authority (TSA)
         to provide time-stamped signatures for non-repudiation.
      3. Implement document archiving system that preserves signature
         validity evidence for the legally required retention period.
      4. Build signature re-validation service that can verify documents
         signed years ago using archived validation data.
      5. For cross-border scenarios, implement Apostille-compatible
         document packaging with qualified signature and metadata.
    tools:
      - ltv-service
      - tsa-integration
      - document-archive
      - signature-validator
      - apostille-service
  devsecops:
    prose: |
      **Legal validity testing and assurance:**
      1. Implement automated tests for LTV signature creation and
         verification, including scenarios with expired certificates.
      2. Test timestamp integration end-to-end, verifying TSA response
         format and chain validation.
      3. Include negative tests: verify that tampered documents fail
         validation with appropriate error messages.
      4. Test long-term archival scenarios: create signatures, simulate
         certificate expiration, and verify LTV validation still works.
    tools:
      - gitlab-ci
      - ltv-testing
      - tsa-testing
      - archival-testing
  secops:
    prose: |
      **Legal validity operations and compliance:**
      1. Monitor TSA availability and response quality, maintaining SLA
         records for audit purposes.
      2. Implement document integrity verification on periodic basis for
         archived signed documents (spot-check validation).
      3. Track changes in Brazilian and international legislation affecting
         electronic document legal validity.
      4. Maintain legal opinion/memo documenting the organization's
         electronic signature legal framework for use in disputes.
    tools:
      - tsa-monitoring
      - archive-integrity
      - regulatory-tracking
      - legal-documentation
