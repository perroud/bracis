id: art-9
family: cap-3
title: "Certification Authorities and Registration Authorities"
class: ICP-BRASIL
baselines: [all-sectors]
statement:
  prose: |
    Art. 6º da MP 2.200-2/2001. Às AC, entidades credenciadas a emitir
    certificados digitais vinculando pares de chaves criptográficas ao
    respectivo titular, compete emitir, expedir, distribuir, revogar e
    gerênciar os certificados, bem como colocar à disposição dos usuários
    as listas de certificados revogados e outras informações pertinentes e
    manter registro de suas operações.

    Parágrafo único. O par de chaves criptográficas será gerado sempre pelo
    próprio titular e sua chave privada de assinatura será de seu exclusivo
    controle, uso e conhecimento.

    Art. 7º da MP 2.200-2/2001. Às AR, entidades operacionalmente vinculadas
    a determinada AC, compete identificar e cadastrar usuários na presença
    destes, encaminhar solicitações de certificados às AC e manter registros
    de suas operações.
guidance:
  prose: |
    Articles 6 and 7 of MP 2.200-2/2001 define the roles and responsibilities
    of Certification Authorities (AC) and Registration Authorities (AR) within
    the ICP-Brasil hierarchy.

    **Certification Authorities (AC):**
    - Accredited entities authorized to issue digital certificates
    - Bind cryptographic key pairs to certificate holders
    - Must maintain Certificate Revocation Lists (CRL)
    - Must keep records of all operations (audit trail)
    - Operate under policies defined by CG-ICP-Brasil

    **Critical requirement — key generation:**
    The key pair MUST be generated by the certificate holder themselves.
    The private signing key must remain under the holder's exclusive
    control, use, and knowledge. This means:
    - CAs must NOT generate key pairs on behalf of holders
    - Private keys must never leave the holder's control
    - For A3 certificates: keys generated inside the cryptographic device
    - For A1 certificates: keys generated on the holder's system

    **Registration Authorities (AR):**
    - Operationally linked to a specific CA
    - Perform in-person identity verification
    - Submit certificate requests to the CA
    - Must maintain operation records
    - Can be physical offices or use video-conference validation
      (as authorized by ITI normatives)

    **Compliance implications:**
    Organizations that act as or integrate with CAs/RAs must comply
    with DOC-ICP technical standards for operations, security, and
    audit requirements.
implementation_guidance:
  platform_engineering:
    prose: |
      **CA/RA integration and key management:**
      1. Implement PKCS#11 interface for hardware token (A3) key generation,
         ensuring private keys are generated and stored exclusively on the
         cryptographic device.
      2. For A1 certificates, implement client-side key generation with
         CSR (Certificate Signing Request) workflow — never transmit
         private keys over any network.
      3. Integrate with CA APIs for certificate lifecycle operations:
         issuance request, renewal, revocation, and status checking.
      4. Implement CRL distribution point caching with configurable
         refresh intervals (recommended: every 1 hour for end-entity
         CRLs, every 6 hours for CA CRLs).
      5. Build audit logging for all certificate operations including
         issuance, usage, and revocation events.
    tools:
      - pkcs11-interface
      - key-generation
      - ca-integration-api
      - crl-cache
      - audit-log
  devsecops:
    prose: |
      **Certificate lifecycle testing and compliance:**
      1. Implement automated tests for key generation workflows, verifying
         that private keys never leave the holder's environment.
      2. Test CRL and OCSP checking against revoked certificates to
         ensure proper rejection in all application paths.
      3. Include certificate format validation (X.509v3 profile per
         DOC-ICP standards) in integration testing.
      4. Implement static analysis rules to detect potential private key
         exposure (logging, serialization, network transmission).
    tools:
      - gitlab-ci
      - pki-testing
      - static-analysis
      - secret-detection
  secops:
    prose: |
      **Certificate operations security:**
      1. Maintain certificate inventory with issuing CA, holder identity,
         certificate type (A1/A3), and expiration for all organizational
         certificates.
      2. Implement automated alerts for certificate expiration at 90, 60,
         and 30 days, with escalation at 7 days.
      3. Define and enforce certificate revocation procedures for employee
         termination, role change, or suspected compromise.
      4. Conduct periodic audit of AR identity verification procedures if
         the organization operates as or delegates to an AR.
    tools:
      - certificate-lifecycle
      - pki-inventory
      - alerting-system
      - audit-management
legal_references:
  - framework_id: lgpd
    articles: ["art-46"]
    relationship: complements
