id: art-7
family: cap-2
title: "Equivalence to Handwritten Signature"
class: ICP-BRASIL
baselines: [all-sectors]
statement:
  prose: |
    Art. 7. da Lei 14.063/2020. É obrigatório o uso de assinatura eletrônica
    qualificada:

    I - nos atos de transferência e de registro de bens imóveis, ressalvado
    o disposto na alínea c do inciso II do art. 5º desta Lei;

    II - nos atos assinados perante os registros públicos conforme
    disposto na Lei nº 6.015, de 31 de dezembro de 1973;

    III - nas emissões de notas fiscais eletrônicas, ressalvadas as exceções
    estabelecidas pelo Comitê Gestor do Simples Nacional — CGSN;

    IV - nas transações realizadas nos sistemas de pagamentos de que trata
    o inciso III do caput do art. 6º da Lei nº 12.865, de 9 de outubro de
    2013;

    V - nos demais atos em que seja exigida por ato normativo específico.

    Parágrafo único. A assinatura eletrônica qualificada terá o mesmo efeito
    legal que a assinatura de próprio punho.
guidance:
  prose: |
    Article 7 defines the mandatory use cases for qualified electronic
    signatures and establishes legal equivalence with handwritten signatures.

    **Mandatory qualified signature (ICP-Brasil) use cases:**
    1. **Real estate transactions:** All acts of transfer and registration of
       immovable property (with specific exceptions for advanced signatures).
    2. **Public registry acts:** Acts signed before public registries under
       Lei 6.015/1973 (births, marriages, property registration).
    3. **Electronic tax invoices (NF-e):** Issuance of electronic fiscal
       documents, except for Simples Nacional simplified regime.
    4. **Payment system transactions:** Transactions in regulated payment
       systems under Lei 12.865/2013.
    5. **Other cases:** Any act where specific regulation requires qualified
       signature.

    **Legal equivalence:**
    The qualified electronic signature has the SAME legal effect as a
    handwritten signature. This is a critical provision that eliminates
    the need for physical signature in all contexts where qualified
    electronic signature is used.

    **Practical implications for systems:**
    Any platform processing the above transaction types MUST integrate
    ICP-Brasil qualified signature capabilities. There is no alternative —
    simple or advanced signatures are legally insufficient for these acts.
implementation_guidance:
  platform_engineering:
    prose: |
      **Enforce qualified signature for mandatory use cases:**
      1. Implement document classification engine that identifies
         transactions requiring mandatory qualified signatures per art. 7.
      2. Block submission of real estate, public registry, and NF-e
         documents without valid ICP-Brasil qualified signature.
      3. Integrate with SEFAZ (Secretaria da Fazenda) for NF-e issuance
         using e-CNPJ ICP-Brasil certificates.
      4. Implement payment system integration with qualified signature
         authentication per Lei 12.865/2013 requirements.
      5. Add configurable rules engine for "other cases" where new
         regulations mandate qualified signatures.
    tools:
      - document-classifier
      - signature-gateway
      - nfe-integration
      - payment-system
      - rules-engine
  devsecops:
    prose: |
      **Mandatory signature enforcement testing:**
      1. Create test matrix covering all mandatory use cases from art. 7
         (real estate, public registry, NF-e, payments, other).
      2. Implement negative tests: verify that system rejects simple and
         advanced signatures for mandatory qualified use cases.
      3. Test NF-e signing workflow end-to-end including SEFAZ
         authorization and schema validation.
      4. Automate regression testing when new mandatory use cases are
         added via regulation updates.
    tools:
      - gitlab-ci
      - test-matrix
      - nfe-testing
      - regression-testing
  secops:
    prose: |
      **Compliance monitoring for mandatory qualified signatures:**
      1. Monitor all transactions in mandatory categories to ensure 100%
         qualified signature compliance — zero tolerance for exceptions.
      2. Generate compliance reports showing signature level by
         transaction type for regulatory audit readiness.
      3. Alert immediately on any attempt to process mandatory transactions
         with non-qualified signatures.
      4. Track regulatory changes that add new mandatory qualified
         signature requirements and update system configuration.
    tools:
      - compliance-monitoring
      - regulatory-tracking
      - siem
      - reporting-dashboard
