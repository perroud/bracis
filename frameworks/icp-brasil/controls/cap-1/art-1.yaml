id: art-1
family: cap-1
title: "Scope and Purpose of Electronic Signatures"
class: ICP-BRASIL
baselines: [all-sectors]
statement:
  prose: |
    Art. 1. Esta Lei dispõe sobre o uso de assinaturas eletrônicas em interações
    com entes públicos, em atos de pessoas jurídicas e em questões de saúde, e
    sobre as licenças de programas de computador desenvolvidos por entes públicos,
    com o objetivo de proteger as informações pessoais e sensíveis dos cidadãos
    e de atribuir eficácia probatória e validade jurídica a documentos eletrônicos.

    Parágrafo único. O disposto nesta Lei não se aplica aos processos judiciais,
    que continuam regulados pela legislação processual específica, nem aos
    sistemas de assinatura no âmbito das Forças Armadas.
guidance:
  prose: |
    Article 1 of Lei 14.063/2020 establishes the foundational scope of the
    Brazilian electronic signature framework. It covers three primary domains:

    **Interactions with public entities:**
    Any electronic communication, filing, or transaction between citizens/
    organizations and government bodies (federal, state, municipal).

    **Corporate legal acts:**
    Electronic signatures on corporate documents, contracts, and legal
    instruments executed by legal entities.

    **Health sector:**
    Electronic signatures on medical records, prescriptions, and health
    documents, which have specific requirements under CFM resolutions.

    **Exclusions:**
    Judicial proceedings remain under their own procedural rules (Lei 11.419/2006
    for electronic judicial process). Military systems have their own PKI
    infrastructure and are excluded from the civilian ICP-Brasil hierarchy.

    **Relationship with MP 2.200-2/2001:**
    While Lei 14.063/2020 defines signature levels and their use cases,
    MP 2.200-2/2001 establishes the underlying PKI infrastructure (ICP-Brasil)
    that supports qualified digital signatures.
implementation_guidance:
  platform_engineering:
    prose: |
      **Identify systems requiring electronic signature capabilities:**
      1. Inventory all applications that interact with government entities
         or process documents requiring legal validity.
      2. Classify each system by the signature level required (simple,
         advanced, or qualified) based on the type of interaction.
      3. Implement a centralized signature service or SDK that abstracts
         signature operations, supporting all three levels defined in
         Lei 14.063/2020.
      4. Ensure exclusions are properly documented: judicial process
         integrations and military systems follow separate requirements.
    tools:
      - pki-service
      - api-gateway
      - service-mesh
      - certificate-manager
  devsecops:
    prose: |
      **Integrate signature compliance into development workflows:**
      1. Tag repositories and microservices with metadata indicating
         which signature level they must support.
      2. Add CI/CD pipeline checks that verify signature library versions
         and certificate chain validation before deployment.
      3. Include electronic signature compliance in the Definition of Done
         for any feature that generates or validates signed documents.
      4. Automate testing of signature creation and verification flows
         against all three signature levels in staging environments.
    tools:
      - gitlab-ci
      - compliance-pipeline
      - integration-testing
      - policy-as-code
  secops:
    prose: |
      **Governance and compliance tracking:**
      1. Maintain a registry of all systems in scope of Lei 14.063/2020,
         mapping each to the required signature level.
      2. Establish monitoring for certificate expiration and revocation
         across all production systems using ICP-Brasil certificates.
      3. Create compliance dashboard tracking signature usage, validation
         failures, and certificate lifecycle events.
      4. Define incident response procedures for compromised certificates
         or signature validation failures.
    tools:
      - grc-platform
      - certificate-monitoring
      - compliance-dashboard
      - incident-response
legal_references:
