id: art-2
family: cap-1
title: "Definitions of Electronic and Digital Signatures"
class: ICP-BRASIL
baselines: [all-sectors]
statement:
  prose: |
    Art. 2. Para fins desta Lei, consideram-se:

    I - assinatura eletrônica: os dados em formato eletrônico que se ligam ou
    estão logicamente associados a outros dados em formato eletrônico e que são
    utilizados pelo signatário para assinar, observados os níveis de assinaturas
    apropriados para os atos previstos nesta Lei;

    II - assinatura eletrônica simples: a que permite identificar o seu
    signatário e a que anexa ou associa dados a outros dados em formato
    eletrônico do signatário;

    III - assinatura eletrônica avançada: a que utiliza certificados não
    emitidos pela ICP-Brasil ou outro meio de comprovação da autoria e da
    integridade de documentos em forma eletrônica, desde que admitido pelas
    partes como válido ou aceito pela pessoa a quem for oposto o documento;

    IV - assinatura eletrônica qualificada: a que utiliza certificado digital
    nos termos do § 1º do art. 10 da Medida Provisória nº 2.200-2, de
    24 de agosto de 2001.
guidance:
  prose: |
    Article 2 defines the core taxonomy of electronic signatures in Brazilian
    law, establishing three distinct levels with increasing assurance:

    **Simple electronic signature (assinatura simples):**
    The lowest assurance level. Any mechanism that identifies the signer and
    associates data. Examples include login credentials (username/password),
    email verification, or biometric confirmation via gov.br platform.

    **Advanced electronic signature (assinatura avancada):**
    Intermediate level using certificates NOT issued by ICP-Brasil, or other
    means that prove authorship and integrity. Examples include cloud-based
    signing services, institutional PKI, or blockchain-based signatures.
    Must be accepted by both parties.

    **Qualified electronic signature (assinatura qualificada):**
    The highest assurance level, requiring an ICP-Brasil digital certificate
    as defined in MP 2.200-2/2001. This is the only level that has automatic
    legal presumption of validity equivalent to a handwritten signature.

    **Key distinction:**
    Only qualified signatures (ICP-Brasil) carry automatic legal presumption.
    Advanced and simple signatures are valid when accepted by parties or
    when permitted by specific regulation for the transaction type.
implementation_guidance:
  platform_engineering:
    prose: |
      **Implement multi-level signature architecture:**
      1. Design a signature service that supports all three levels:
         - Simple: OAuth2/OIDC integration with gov.br for identity
         - Advanced: support for non-ICP-Brasil certificates (cloud PKI,
           institutional CAs) with integrity verification
         - Qualified: ICP-Brasil certificate integration with full chain
           validation through AC Raiz
      2. Implement certificate type detection to automatically classify
         incoming signatures by level (simple/advanced/qualified).
      3. Store signature metadata including level classification, timestamp,
         certificate chain, and validation result.
      4. Expose APIs that allow consuming applications to specify the
         minimum required signature level for each operation.
    tools:
      - pki-service
      - identity-provider
      - certificate-validator
      - signature-api
  devsecops:
    prose: |
      **Signature level enforcement in pipelines:**
      1. Implement policy-as-code rules that enforce minimum signature
         levels based on document type and regulatory context.
      2. Create automated tests that validate signature creation and
         verification across all three levels.
      3. Include signature level metadata in audit logs generated by
         CI/CD pipelines for traceability.
      4. Maintain a mapping of document types to required signature
         levels as a configuration artifact versioned in Git.
    tools:
      - gitlab-ci
      - opa-gatekeeper
      - integration-testing
      - audit-logging
  secops:
    prose: |
      **Operational signature level governance:**
      1. Maintain classification matrix mapping business processes to
         required signature levels per Lei 14.063/2020.
      2. Monitor for signature level downgrades (e.g., using simple
         where qualified is legally required).
      3. Alert on invalid or expired certificates used for advanced
         and qualified signatures.
      4. Conduct periodic audits to verify correct signature level
         usage across all organizational processes.
    tools:
      - grc-platform
      - siem
      - compliance-monitoring
      - audit-trail
legal_references:
  - framework_id: gov-digital
    articles: ["art-3"]
    relationship: complements
  - framework_id: pep
    articles: ["art-1", "art-2"]
    relationship: implements
