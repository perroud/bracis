control_families:
  - id: cap-1
    title: "General Provisions and Definitions"
    description: "Scope of application, definitions of electronic and digital signatures, and establishment of the ICP-Brasil public key infrastructure hierarchy"
    articles: "art. 1 to art. 3"
    control_count: 3
  - id: cap-2
    title: "Signature Levels and Requirements"
    description: >-
      Three levels of electronic signatures defined by Lei 14.063/2020: simple
      signature, advanced signature, and qualified signature (ICP-Brasil),
      including equivalence to handwritten signatures
    articles: "art. 4 to art. 7"
    control_count: 4
  - id: cap-3
    title: "ICP-Brasil Infrastructure"
    description: "Root certification authority (AC Raiz), certification authority hierarchy, certificate policies, and ITI governance structure established by MP 2.200-2/2001"
    articles: "art. 8 to art. 10"
    control_count: 3
  - id: cap-4
    title: "Use in Public Administration"
    description: "Mandatory use of electronic signatures in government interactions, health sector requirements for qualified signatures, and integration with gov.br digital identity platform"
    articles: "art. 11 to art. 13"
    control_count: 3
  - id: cap-5
    title: "Validity, Interoperability and Compliance"
    description: "Legal validity of electronic documents, cross-border recognition of digital signatures, and timestamp requirements for long-term preservation"
    articles: "art. 14 to art. 15"
    control_count: 2
related_frameworks:
  - framework_id: gov-digital
    relationship: complements
    description: >-
      Gov-Digital complements ICP-Brasil by establishing the broader digital
      government framework within which electronic signatures and digital
      identity services operate, including the gov.br platform that serves as
      the primary authentication mechanism for simple and advanced signatures.
  - framework_id: lgpd
    relationship: complements
    description: >-
      LGPD complements ICP-Brasil by imposing data protection requirements on
      the processing of personal data associated with digital certificates and
      electronic signature verification, including consent for certificate
      issuance and data minimization in signature metadata.
  - framework_id: pep
    relationship: implements
    description: >-
      PEP (Prontuario Eletronico do Paciente) implements ICP-Brasil requirements
      by mandating qualified digital signatures (ICP-Brasil certificates) for
      authentication and integrity of electronic medical records, as required
      by CFM resolutions.
