id: icp-brasil
title: "Brazilian Electronic Signatures and ICP-Brasil (Lei 14.063/2020 + MP 2.200-2/2001)"
short_title: "ICP-Brasil"
version: "14.063/2020 + MP 2.200-2/2001 (consolidated)"
