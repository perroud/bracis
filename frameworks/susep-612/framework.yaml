control_families:
  - id: title-1
    title: "Disposicoes Gerais"
    description: "Objeto, ambito de aplicacao e definicoes da circular, abrangendo o mercado de seguros, previdencia complementar aberta, capitalizacao e resseguros"
    articles: "art. 1 ao art. 3"
    control_count: 3
  - id: cap-1
    title: "Politica de PLD/FT"
    description: "Requisitos para elaboracao, implementacao e manutencao da politica institucional de prevencao a lavagem de dinheiro e ao financiamento do terrorismo"
    articles: "art. 4 ao art. 7"
    control_count: 4
  - id: cap-2
    title: "Avaliacao Interna de Risco"
    description: "Metodologia de avaliacao interna de risco de lavagem de dinheiro e financiamento do terrorismo, incluindo classificacao de clientes, produtos e canais"
    articles: "art. 8 ao art. 11"
    control_count: 4
  - id: cap-3
    title: "Procedimentos de Identificacao (KYC/KYB)"
    description: "Regras de identificacao e qualificacao de clientes, beneficiarios e contrapartes, incluindo due diligence e verificacao documental"
    articles: "art. 12 ao art. 18"
    control_count: 7
  - id: cap-4
    title: "Registro de Operacoes"
    description: "Obrigacoes de registro e retencao de informacoes sobre operacoes realizadas no mercado de seguros, previdencia e capitalizacao"
    articles: "art. 19 ao art. 22"
    control_count: 4
  - id: cap-5
    title: "Monitoramento e Selecao"
    description: "Procedimentos de monitoramento continuo de operacoes, selecao de operacoes atipicas e criterios de deteccao de atividades suspeitas"
    articles: "art. 23 ao art. 27"
    control_count: 5
  - id: cap-6
    title: "Comunicacao ao COAF"
    description: "Obrigacoes de comunicacao de operacoes suspeitas e automaticas ao Conselho de Controle de Atividades Financeiras"
    articles: "art. 28 ao art. 32"
    control_count: 5
  - id: title-3
    title: "Procedimentos Especiais para Pessoas Politicamente Expostas"
    description: "Regras especificas de due diligence aprimorada, monitoramento e aprovacao de relacionamentos com PEPs e seus relacionados"
    articles: "art. 33 ao art. 36"
    control_count: 4
  - id: title-4
    title: "Disposicoes Finais e Transitorias"
    description: "Prazos de adequacao, penalidades, revogacao de normativos anteriores e disposicoes finais"
    articles: "art. 37 ao art. 40"
    control_count: 4
related_frameworks:
  - framework_id: bcb-3978
    relationship: equivalent-to
    description: >-
      A Resolucao BCB 3.978 e a norma espelho de PLD/FT para o
      sistema financeiro. A Circular SUSEP 612 replica a estrutura e
      os requisitos para o mercado de seguros, previdencia e
      capitalizacao.
  - framework_id: cnsp-381
    relationship: complements
    description: >-
      A Resolucao CNSP 381 trata de seguranca cibernetica no mercado
      de seguros. A SUSEP 612 complementa com requisitos de PLD/FT,
      exigindo que os sistemas de monitoramento e comunicacao estejam
      protegidos.
  - framework_id: lgpd
    relationship: complements
    description: >-
      A LGPD complementa a Circular SUSEP 612 na protecao de dados
      pessoais coletados durante procedimentos de KYC/KYB, exigindo
      base legal e minimizacao no tratamento de dados de clientes e
      beneficiarios.
  - framework_id: susep-638
    relationship: complements
    description: >-
      A Circular SUSEP 638 trata de seguranca cibernetica no mercado
      de seguros, complementando a SUSEP 612 ao proteger os sistemas
      utilizados para monitoramento de PLD/FT e comunicacao ao COAF.
