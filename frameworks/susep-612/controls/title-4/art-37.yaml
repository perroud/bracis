id: art-37
family: title-4
title: "Relatorio Anual de PLD/FT"
class: SUSEP-612
statement:
  prose: |
    Art. 37. As supervisionadas devem elaborar relatório anual, até o último dia
    útil do mês de março do ano seguinte ao período de referência, que contenha,
    no mínimo:
    I - descrição das atividades realizadas no âmbito da prevenção à lavagem de
    dinheiro e ao financiamento do terrorismo;
    II - resultados da avaliação interna de risco de que trata o art. 8;
    III - informações sobre comunicações realizadas ao COAF;
    IV - descrição das ações de capacitação realizadas;
    V - recomendações de aprimoramento dos procedimentos e controles internos.
guidance:
  prose: |
    O art. 37 estabelece a obrigacao de relatorio anual de PLD/FT, documento
    essencial para governanca e transparencia do programa de compliance.

    **Prazo:**
    Ate o ultimo dia util de marco do ano seguinte ao periodo de referencia.
    Exemplo: relatorio do ano-base 2024 deve ser concluido ate marco de 2025.

    **Conteudo minimo (incisos I-V):**

    1. Descricao de atividades (I):
       - Resumo das atividades de compliance PLD/FT realizadas no ano
       - Alteracoes na politica ou procedimentos
       - Implementacao de novos controles ou sistemas
       - Participacao em acoes regulatorias (fiscalizacoes, consultas)
       - Acoes corretivas implementadas

    2. Resultados da AIR (II):
       - Resultado da avaliacao interna de risco mais recente
       - Mudancas no perfil de risco da supervisionada
       - Novos riscos identificados
       - Status de implementacao de acoes mitigadoras

    3. Comunicacoes ao COAF (III):
       - Numero de comunicacoes de suspeita enviadas
       - Numero de comunicacoes automaticas enviadas
       - Comunicacoes negativas (quando aplicavel)
       - Comunicacoes complementares atendidas
       - Analise de tendencias de comunicacoes

    4. Acoes de capacitacao (IV):
       - Treinamentos realizados com publico e conteudo
       - Percentual de colaboradores treinados
       - Resultados de avaliacoes de conhecimento
       - Treinamento de corretores e intermediarios

    5. Recomendacoes de aprimoramento (V):
       - Gaps identificados nos controles
       - Acoes recomendadas com prioridade e prazo
       - Status de implementacao de recomendacoes anteriores
       - Investimentos necessarios em sistemas e pessoas

    **Destinatarios:**
    O relatorio deve ser apresentado a:
    - Diretoria da supervisionada
    - Conselho de administracao (quando existente)
    - Disponibilizado para SUSEP quando requisitado
implementation_guidance:
  platform_engineering:
    prose: |
      **Geracao automatizada do relatorio:**
      1. Template de relatorio anual com secoes correspondentes aos incisos
         I a V pre-estruturadas.
      2. Coleta automatica de dados quantitativos dos sistemas: numero de
         alertas, comunicacoes, treinamentos, clientes classificados, etc.
      3. Dashboard de progresso da elaboracao do relatorio com checklist
         de conteudo obrigatorio.
      4. Comparativo automatico com relatorio do ano anterior para
         identificar evolucao ou regressao.

      **Dados para o relatorio:**
      5. Metricas de PLD/FT coletadas ao longo do ano: alertas gerados e
         tratados, comunicacoes, due diligence, treinamentos.
      6. KPIs de efetividade: taxa de conversao, tempo medio de analise,
         falsos positivos, cobertura de treinamento.
      7. Inventario de acoes realizadas e planejadas com status.
      8. Export em formato PDF com assinatura digital do compliance officer.
    tools:
      - reporting-engine
      - analytics-platform
      - document-management
      - digital-signature
  devsecops:
    prose: |
      **Automacao de coleta de dados:**
      1. Pipeline de coleta de metricas anuais de todos os sistemas de PLD/FT.
      2. Testes de completude: relatorio sem secoes obrigatorias nao pode
         ser finalizado.
      3. Testes de consistencia: dados quantitativos devem ser reconciliaveis
         com sistemas fonte.

      **Versionamento:**
      4. Versoes do relatorio anual versionadas em repositorio.
      5. Historico de alteracoes entre versoes draft e final.
      6. Aprovacao formal no workflow antes de finalizacao.
    tools:
      - gitlab-ci
      - data-pipeline
      - completeness-checks
      - approval-workflows
  secops:
    prose: |
      **Elaboracao do relatorio:**
      1. Calendario de elaboracao com marcos: coleta de dados (janeiro),
         redacao (fevereiro), revisao (marco), aprovacao (marco).
      2. Participacao de todas as areas relevantes: compliance, sinistros,
         subscricao, comercial, TI, RH.
      3. Revisao pelo compliance officer e aprovacao pelo diretor responsavel.

      **Apresentacao e acompanhamento:**
      4. Apresentacao do relatorio a diretoria e conselho de administracao.
      5. Registro em ata da apresentacao e deliberacoes.
      6. Plano de acao para recomendacoes aprovadas com owner e prazo.
      7. Retencao do relatorio por minimo de 10 anos.
    tools:
      - compliance-calendar
      - committee-management
      - action-plan-tracker
      - document-retention
legal_references:
