id: art-39
family: title-4
title: "Prazo de Adequacao"
class: SUSEP-612
statement:
  prose: |
    Art. 39. As supervisionadas terão prazo de cento e oitenta dias, contados da
    data de publicação desta Circular, para se adequarem às disposições nela
    previstas.
    Parágrafo único. As supervisionadas que já possuam procedimentos de prevenção
    à lavagem de dinheiro e ao financiamento do terrorismo implementados devem
    promover os ajustes necessários para atender aos requisitos desta Circular
    no prazo estabelecido no caput.
guidance:
  prose: |
    O art. 39 estabeleceu o prazo de adequacao de 180 dias a partir da publicacao
    (agosto de 2020), resultando em vigencia plena a partir de fevereiro de 2021.

    **Timeline:**
    - Publicacao: 7 de agosto de 2020
    - Prazo de adequacao: 180 dias
    - Vigencia plena: fevereiro de 2021
    Este prazo ja esta exaurido. Todas as supervisionadas devem estar em plena
    conformidade desde fevereiro de 2021.

    **Adequacao para supervisionadas com programa existente (paragrafo unico):**
    Supervisionadas que ja tinham programa de PLD/FT sob a regulamentacao anterior
    devem ter promovido os ajustes necessarios, incluindo:
    - Atualizacao da politica de PLD/FT conforme art. 4
    - Implementacao ou atualizacao da AIR conforme art. 8
    - Adequacao dos procedimentos de KYC conforme arts. 12-18
    - Implementacao de sistema de monitoramento conforme art. 23
    - Adequacao dos procedimentos de comunicacao ao COAF conforme arts. 28-32
    - Implementacao de controles de PEP conforme arts. 33-36

    **Supervisionadas novas:**
    Supervisionadas que iniciaram operacoes apos fevereiro de 2021 devem
    estar em conformidade desde o inicio de suas atividades.

    **Implicacao atual:**
    Como o prazo de adequacao ja expirou, a SUSEP pode aplicar penalidades
    por descumprimento desde fevereiro de 2021. A supervisionada deve ter
    evidencias de que todos os controles estao implementados e funcionando.
implementation_guidance:
  platform_engineering:
    prose: |
      **Conformidade continua:**
      1. Dashboard de conformidade com todos os artigos da Circular indicando
         status de implementacao de cada controle.
      2. Self-assessment periodico (anual) com checklist de todos os
         requisitos da Circular.
      3. Mapeamento de controles tecnicos para cada artigo da Circular
         com evidencias de funcionamento.
      4. Alerta de novos requisitos regulatorios que exijam adequacao
         adicional.
    tools:
      - grc-platform
      - compliance-dashboard
      - self-assessment
      - regulatory-change-management
  devsecops:
    prose: |
      **Conformidade como codigo:**
      1. Testes automatizados de conformidade mapeados para artigos da
         Circular.
      2. Pipeline de validacao continua de controles implementados.
      3. Relatorio de conformidade gerado automaticamente a cada release.
    tools:
      - gitlab-ci
      - compliance-as-code
      - automated-testing
  secops:
    prose: |
      **Manutencao de conformidade:**
      1. Assessment anual de conformidade com todos os artigos da Circular.
      2. Plano de remediacao para gaps identificados com priorizacao.
      3. Evidencias de conformidade organizadas por artigo para
         apresentacao a SUSEP quando solicitado.
      4. Monitoramento de alteracoes regulatorias que impactem a Circular.
    tools:
      - grc-platform
      - remediation-tracker
      - evidence-repository
      - regulatory-intelligence
legal_references:
