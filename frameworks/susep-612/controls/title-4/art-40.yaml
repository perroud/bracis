id: art-40
family: title-4
title: "Revogacoes e Disposicoes Finais"
class: SUSEP-612
statement:
  prose: |
    Art. 40. Ficam revogadas as disposições em contrário, incluindo as circulares
    anteriores que tratavam de procedimentos de prevenção à lavagem de dinheiro no
    âmbito do mercado de seguros.
    Parágrafo único. Esta Circular entra em vigor na data de sua publicação.
guidance:
  prose: |
    O art. 40 revoga normativos anteriores sobre PLD/FT no mercado securitario e
    estabelece a vigencia imediata da Circular.

    **Normativos revogados:**
    A Circular SUSEP 612/2020 revogou e substituiu os seguintes normativos:
    - Circular SUSEP 445/2012 (anterior regulamentacao de PLD/FT)
    - Disposicoes anteriores que tratavam de procedimentos antilavagem
    A revogacao e ampla, cobrindo todas as disposicoes em contrario, o que
    significa que a Circular 612 e o normativo unico e completo para PLD/FT
    no mercado securitario.

    **Vigencia imediata:**
    A Circular entrou em vigor na data de publicacao (7 de agosto de 2020),
    embora o prazo de adequacao fosse de 180 dias (art. 39). Na pratica:
    - De agosto/2020 a fevereiro/2021: periodo de adequacao
    - A partir de fevereiro/2021: exigibilidade plena

    **Relacao com outros normativos vigentes:**
    A Circular 612 nao revoga e deve ser interpretada em conjunto com:
    - Lei 9.613/1998 (Lei de Lavagem): base legal
    - Lei 13.260/2016 (Lei Antiterrorismo): base legal para CFT
    - Resolucao CNSP 381 (seguranca cibernetica): complementar
    - Circular SUSEP 638 (seguranca cibernetica): complementar
    - Regulamentacoes do COAF: orientacoes operacionais
    - LGPD (Lei 13.709/2018): protecao de dados em PLD/FT

    **Atualizacoes futuras:**
    A SUSEP pode editar novas circulares ou resolucoes que alterem ou
    complementem a Circular 612. A supervisionada deve monitorar
    continuamente o Diario Oficial e os canais da SUSEP para
    identificar alteracoes.

    **Implicacao pratica:**
    A supervisionada deve:
    1. Ter a Circular 612 como referencia unica para PLD/FT
    2. Nao se basear em normativos revogados
    3. Monitorar atualizacoes e novas orientacoes da SUSEP e COAF
    4. Manter programa de compliance alinhado com a Circular vigente
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de base regulatoria:**
      1. Repositorio de normativos vigentes que afetam PLD/FT no mercado
         securitario, com a Circular 612 como normativo central.
      2. Mapeamento de dependencias regulatorias: Circular 612 + Lei 9.613
         + LGPD + CNSP 381 + SUSEP 638 + regulamentacoes COAF.
      3. Sistema de alerta para publicacoes no Diario Oficial que mencionem
         SUSEP, PLD/FT, lavagem de dinheiro no contexto securitario.
      4. Versionamento de interpretacoes regulatorias com historico.
    tools:
      - regulatory-library
      - regulatory-change-management
      - alerting-system
      - knowledge-base
  devsecops:
    prose: |
      **Rastreabilidade regulatoria:**
      1. Mapeamento de requisitos da Circular 612 para controles tecnicos
         implementados (traceability matrix).
      2. Testes de conformidade mapeados para artigos especificos.
      3. Atualizacao de testes quando normativos sao alterados.
    tools:
      - gitlab-ci
      - traceability-matrix
      - compliance-tests
  secops:
    prose: |
      **Monitoramento regulatorio:**
      1. Assinatura de publicacoes da SUSEP e COAF para identificar
         alteracoes na Circular 612 ou normativos complementares.
      2. Participacao em consultas publicas da SUSEP sobre PLD/FT.
      3. Atualizacao de politicas e procedimentos quando houver
         alteracao regulatoria.
      4. Comunicacao interna sobre mudancas regulatorias relevantes.
    tools:
      - regulatory-change-management
      - compliance-calendar
      - internal-communications
      - knowledge-base
