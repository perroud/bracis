id: art-38
family: title-4
title: "Penalidades"
class: SUSEP-612
statement:
  prose: |
    Art. 38. O descumprimento das obrigações previstas nesta Circular sujeita as
    supervisionadas e seus administradores às penalidades previstas na legislação
    e regulamentação em vigor, incluindo as sanções previstas na Lei n. 9.613, de
    1998, e na regulamentação editada pelo CNSP e pela SUSEP, sem prejuízo das
    demais responsabilidades administrativas, civis e penais.
guidance:
  prose: |
    O art. 38 estabelece o regime de penalidades por descumprimento, que combina
    sancoes de multiplas esferas juridicas.

    **Esferas de responsabilidade:**

    1. Administrativa (SUSEP):
       Sancoes aplicaveis pela SUSEP como supervisora:
       - Advertencia publica
       - Multa (valores significativos, podem chegar a milhoes de reais)
       - Suspensao do exercicio do cargo
       - Inabilitacao para exercicio de cargo em entidades supervisionadas
       - Cassacao da autorizacao de funcionamento
       O processo administrativo sancionador da SUSEP segue rito proprio
       com direito a defesa e recurso ao CRSNSP.

    2. Lei 9.613/1998 (Lei de Lavagem):
       Sancoes especificas da legislacao antilavagem:
       - Multa pecuniaria (ate o dobro do valor da operacao ou ate R$ 20.000.000)
       - Inabilitacao temporaria (ate 10 anos) para exercicio de cargo de
         administrador em pessoas juridicas obrigadas
       - Cassacao ou suspensao da autorizacao

    3. Criminal:
       Responsabilidade penal de administradores:
       - Crime de lavagem de dinheiro (art. 1 da Lei 9.613) se houver
         participacao direta ou omissao dolosa
       - Crime de desobediencia se houver recusa em fornecer informacoes
         a autoridades
       - Crime de violacao de sigilo (tipping off)

    4. Civil:
       - Acao civil publica pelo Ministerio Publico
       - Acao de reparacao de danos
       - Responsabilidade solidaria de administradores

    **Historico de penalidades no mercado securitario:**
    A SUSEP tem aplicado multas significativas a seguradoras e EAPCs por
    deficiencias em PLD/FT, especialmente:
    - Ausencia ou inadequacao de politica de PLD/FT
    - Deficiencia no sistema de monitoramento
    - Falta de comunicacao ao COAF (omissao)
    - KYC incompleto ou desatualizado
    - Ausencia de treinamento

    **Implicacao pratica:**
    O investimento em compliance de PLD/FT e diretamente proporcional ao
    custo potencial de penalidades. Multas da SUSEP + Lei 9.613 podem
    ser devastadoras para a supervisionada.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de riscos regulatorios:**
      1. Mapeamento de riscos de penalidades por artigo da Circular com
         severidade potencial e probabilidade de deteccao.
      2. Dashboard de conformidade com indicadores de risco de penalidade
         por area de controle.
      3. Simulacao de impacto financeiro de penalidades potenciais para
         priorizacao de investimentos em compliance.
      4. Sistema de gestao de processos administrativos sancionadores com
         prazos e status.

      **Evidencias de conformidade:**
      5. Repositorio centralizado de evidencias de conformidade por artigo
         da Circular para resposta rapida a fiscalizacoes.
      6. Geracao automatica de relatorios de conformidade para auditorias.
      7. Historico de acoes corretivas implementadas apos deficiencias
         identificadas.
    tools:
      - grc-platform
      - compliance-dashboard
      - evidence-repository
      - risk-simulation
  devsecops:
    prose: |
      **Testes de conformidade:**
      1. Testes automatizados de conformidade para cada artigo da Circular
         com verificacao de controles implementados.
      2. Pipeline de compliance-as-code que valida controles a cada release.
      3. Relatorio automatico de status de conformidade por artigo.

      **Rastreabilidade:**
      4. Mapeamento de controles tecnicos para artigos da Circular.
      5. Evidencia automatica de funcionamento de controles (logs, metricas).
      6. Testes de regressao para garantir que controles nao sao desativados.
    tools:
      - gitlab-ci
      - compliance-tests
      - evidence-generation
      - traceability-matrix
  secops:
    prose: |
      **Prevencao de penalidades:**
      1. Assessment periodico de conformidade com todos os artigos da Circular
         com gap analysis e plano de remediacao.
      2. Preparacao para fiscalizacoes: dossie de evidencias por artigo
         pronto para apresentacao.
      3. Simulacao de fiscalizacao (mock exam) anual com participacao de
         consultoria externa.

      **Gestao de processos sancionadores:**
      4. Processo de resposta a autos de infracao da SUSEP com prazos
         e responsaveis.
      5. Acompanhamento de processos administrativos sancionadores em curso.
      6. Analise de precedentes de penalidades no mercado securitario.
      7. Relatorio de exposicao a penalidades para diretoria e conselho.
    tools:
      - grc-platform
      - legal-management
      - evidence-repository
      - reporting-engine
