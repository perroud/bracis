id: art-22
family: cap-4
title: "Disponibilizacao de Registros a Autoridades"
class: SUSEP-612
statement:
  prose: |
    Art. 22. Os registros e documentos referidos nos arts. 19 a 21 devem ser
    mantidos de forma organizada e acessível, podendo ser requisitados pela SUSEP,
    pelo COAF, pelo Ministério Público ou por autoridades policiais e judiciais
    no âmbito de suas competências.
    Parágrafo único. A supervisionada deve atender às requisições de informações
    no prazo e forma estabelecidos pela autoridade requisitante.
guidance:
  prose: |
    O art. 22 estabelece a obrigacao de manter registros organizados e acessiveis
    para autoridades competentes, criando o framework de cooperacao institucional.

    **Autoridades requisitantes:**
    1. SUSEP: supervisora direta do mercado de seguros. Pode requisitar dados em
       acoes de fiscalizacao ordinaria, extraordinaria ou tematica de PLD/FT.
    2. COAF: unidade de inteligencia financeira. Requisita informacoes
       complementares sobre comunicacoes feitas ou sobre clientes/operacoes
       especificos.
    3. Ministerio Publico: no ambito de investigacoes criminais de lavagem de
       dinheiro ou financiamento do terrorismo.
    4. Autoridades policiais: Policia Federal e policia civil em investigacoes
       relacionadas a LD/FT.
    5. Poder Judiciario: ordens judiciais para fornecimento de informacoes.

    **Requisitos de organizacao e acessibilidade:**
    - Registros devem estar organizados de forma que permitam busca por cliente,
      periodo, tipo de operacao, valor e produto.
    - Formato deve ser legivel e compreensivel por auditor externo.
    - Tempo de resposta deve atender ao prazo da autoridade requisitante
      (tipicamente 5 a 30 dias uteis conforme autoridade).
    - Formato eletronico preferencial, com possibilidade de exportacao em
      formatos padronizados.

    **Restricoes de sigilo:**
    A cooperacao com autoridades nao viola sigilo bancario ou sigilo de seguros
    quando feita no ambito de competencia legal da autoridade requisitante.
    A supervisionada nao pode informar ao cliente que seus dados foram
    requisitados (tipping off proibido).

    **Implicacao pratica:**
    A supervisionada deve ter equipe e processos dedicados para atender
    requisicoes de autoridades com agilidade e completude. Atraso ou
    fornecimento incompleto pode resultar em penalidades da SUSEP e
    obstrucao de investigacoes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Portal de requisicoes regulatorias:**
      1. Sistema de gestao de requisicoes de autoridades com workflow de
         recebimento, triagem, coleta, revisao e envio.
      2. Modulo de busca avancada que permita localizar registros por qualquer
         combinacao de criterios: cliente, periodo, tipo, valor, produto.
      3. Funcionalidade de exportacao em formatos padronizados (CSV, XML, PDF)
         conforme requerido pela autoridade.
      4. Controle de acesso restrito ao modulo de requisicoes (somente
         compliance e juridico).

      **Integracao de dados:**
      5. Agregacao de dados de todos os sistemas (emissao, sinistros, financeiro,
         KYC) em repositorio unificado para resposta rapida.
      6. Template de resposta padronizado por autoridade requisitante.
      7. Tracking de prazo de resposta com alertas de proximidade de vencimento.
      8. Registro de todas as requisicoes atendidas e pendentes.
    tools:
      - case-management
      - search-engine
      - export-engine
      - regulatory-request-management
  devsecops:
    prose: |
      **Testes de acessibilidade:**
      1. Testes de busca: registros devem ser localizaveis por qualquer
         combinacao de criterios em tempo aceitavel.
      2. Testes de exportacao: dados exportados devem ser completos e legiveis
         em todos os formatos suportados.
      3. Testes de performance: busca em base de 10 anos deve retornar
         resultados em tempo razoavel (< 60 segundos).

      **Seguranca:**
      4. Testes de controle de acesso: somente usuarios autorizados podem
         acessar modulo de requisicoes.
      5. Audit trail de todas as buscas e exportacoes realizadas.
      6. Protecao contra extracao massiva nao autorizada.
    tools:
      - gitlab-ci
      - performance-tests
      - access-control-tests
      - audit-trail-tests
  secops:
    prose: |
      **Gestao de requisicoes:**
      1. Processo formal de recebimento e tratamento de requisicoes com SLA
         por tipo de autoridade.
      2. Equipe treinada para interpretar e atender requisicoes de diferentes
         autoridades (SUSEP, COAF, MP, PF).
      3. Revisao juridica de escopo da requisicao antes do fornecimento.

      **Controle e rastreabilidade:**
      4. Registro de todas as requisicoes recebidas com: autoridade, data,
         escopo, prazo, status, data de resposta.
      5. Indicadores de performance: tempo medio de resposta por autoridade,
         taxa de atendimento no prazo.
      6. Feedback loop: requisicoes frequentes sobre mesmos temas indicam
         deficiencias no monitoramento proprio.
      7. Relatorio anual de requisicoes atendidas para diretoria.
    tools:
      - regulatory-request-management
      - sla-management
      - compliance-dashboard
      - reporting-engine
