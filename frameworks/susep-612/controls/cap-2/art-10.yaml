id: art-10
family: cap-2
title: "Due Diligence Diferenciada por Risco"
class: SUSEP-612
statement:
  prose: |
    Art. 10. As supervisionadas devem adotar procedimentos de due diligence
    diferenciados em função da classificação de risco dos clientes, aplicando
    procedimentos aprimorados para clientes classificados em categorias de maior
    risco e podendo adotar procedimentos simplificados para clientes classificados
    em categorias de menor risco.
guidance:
  prose: |
    O art. 10 formaliza o principio de proporcionalidade na aplicacao de due
    diligence, permitindo tres niveis de intensidade conforme o risco do cliente.

    **Tres niveis de due diligence:**

    1. Due Diligence Simplificada (SDD):
       Aplicavel a clientes de baixo risco, tipicamente:
       - Seguros obrigatorios (DPVAT substituto, seguro habitacional SFH)
       - Seguros massificados de baixo valor (residencial basico, auto popular)
       - Capitalizacao de pequeno valor (titulos < R$ 1.000)
       Procedimentos simplificados: verificacao basica de identidade, sem
       necessidade de comprovacao de renda.

    2. Due Diligence Padrao (CDD):
       Aplicavel a maioria dos clientes de risco medio:
       - Seguros de vida individuais
       - PGBL/VGBL com aportes regulares compativeis com renda
       - Seguros empresariais de porte medio
       Procedimentos padrao: identificacao completa, verificacao documental,
       comprovacao de renda, screening de PEP e sancoes.

    3. Due Diligence Aprimorada (EDD):
       Obrigatoria para clientes de alto risco:
       - PEPs e seus relacionados
       - Nao-residentes de paises de alto risco
       - VGBL/PGBL com aportes superiores a limites internos
       - Operacoes em especie acima de limites regulatorios
       - Pessoas juridicas com estrutura societaria complexa
       - Beneficiarios de sinistros de alto valor sem vinculo evidente
       Procedimentos aprimorados: toda a CDD mais investigacao aprofundada de
       origem de recursos, visitas presenciais, aprovacao de nivel hierarquico
       superior, monitoramento continuo reforacao.

    **Implicacao pratica no mercado securitario:**
    O produto determina fortemente o nivel minimo de due diligence:
    - Seguros de danos (auto, residencial): SDD geralmente suficiente
    - Seguros de pessoas com acumulacao: CDD minimo, EDD se valor elevado
    - VGBL/PGBL: CDD minimo, EDD conforme valor de aportes
    - Capitalizacao alto valor: EDD recomendada
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de due diligence:**
      1. Workflow engine que define automaticamente o nivel de due diligence
         requerido com base no scoring de risco do cliente e tipo de produto.
      2. Checklist digital diferenciado por nivel (SDD, CDD, EDD) com campos
         obrigatorios e opcionais parametrizaveis.
      3. Integracao com servicos de verificacao: OCR de documentos, validacao
         biometrica, consulta de bases publicas.
      4. Portal de onboarding digital com fluxo adaptativo ao nivel de DD.

      **Automacao de verificacoes:**
      5. Verificacao automatica de CPF/CNPJ, comprovante de endereco (CEP),
         comprovante de renda (quando disponivel digitalmente).
      6. Screening automatico de PEP e sancoes no onboarding e periodicamente.
      7. Validacao de beneficiario final para pessoas juridicas via QSA da
         Receita Federal.
      8. Threshold de escalacao automatica: se cliente que era SDD passa para
         CDD ou EDD, trigger de coleta de dados adicionais.
    tools:
      - kyc-platform
      - workflow-engine
      - ocr-service
      - biometric-verification
      - sanctions-screening
  devsecops:
    prose: |
      **Testes de fluxo de due diligence:**
      1. Testes end-to-end para cada nivel de DD (SDD, CDD, EDD) com cenarios
         reais do mercado securitario.
      2. Testes de transicao entre niveis: cliente que migra de SDD para EDD
         deve ter gap de dados identificado e coletado.
      3. Testes de bloqueio: operacao de alto valor para cliente com DD
         incompleta deve ser bloqueada.

      **Seguranca de dados de DD:**
      4. Criptografia de documentos e dados biometricos coletados na DD.
      5. Controle de acesso granular a dados de DD por nivel e funcao.
      6. Testes de conformidade LGPD para dados coletados na DD.
    tools:
      - gitlab-ci
      - e2e-tests
      - encryption-service
      - access-control-tests
  secops:
    prose: |
      **Monitoramento de completude de DD:**
      1. Dashboard de completude de due diligence por nivel, produto e carteira.
      2. Alertas para clientes com DD incompleta ou vencida (reclassificacao
         sem coleta de dados adicionais).
      3. Processo de remediation para carteira legada com DD abaixo do nivel
         exigido pela classificacao de risco atual.

      **Revisao e qualidade:**
      4. Amostragem periodica de processos de DD para verificar qualidade e
         conformidade.
      5. Revisao de decisoes de SDD para garantir que nao ha clientes de risco
         medio ou alto com DD simplificada.
      6. Relatorio de cobertura de DD para diretoria e auditoria.
      7. Retencao de toda documentacao de DD por minimo de 10 anos apos
         encerramento do relacionamento.
    tools:
      - kyc-platform
      - compliance-dashboard
      - quality-assurance
      - document-retention
