id: art-8
family: cap-2
title: "Avaliacao Interna de Risco de LD/FT"
class: SUSEP-612
statement:
  prose: |
    Art. 8. As supervisionadas devem realizar avaliação interna de risco de lavagem
    de dinheiro e de financiamento do terrorismo com o objetivo de identificar e
    mensurar o risco de utilização de seus produtos e serviços na prática de lavagem
    de dinheiro e de financiamento do terrorismo, contemplando, no mínimo, os
    perfis de risco:
    I - dos clientes;
    II - da supervisionada, incluindo modelo de negócio e área geográfica de atuação;
    III - das operações, produtos e serviços oferecidos, incluindo os canais de
    distribuição utilizados.
guidance:
  prose: |
    O art. 8 estabelece a obrigacao de realizar avaliacao interna de risco (AIR) de
    PLD/FT, documento central que fundamenta toda a estrutura de controles da
    supervisionada.

    **Tres dimensoes de risco obrigatorias:**

    1. Perfil de risco dos clientes (inciso I):
       No mercado securitario, fatores de risco relevantes incluem:
       - PEPs e seus relacionados
       - Nao-residentes, especialmente de paises de alto risco GAFI
       - Pessoas juridicas com estrutura societaria complexa ou opaca
       - Clientes com grande volume de operacoes em especie
       - Beneficiarios de sinistros nao relacionados ao segurado
       - Estipulantes de seguros coletivos com alto turnover de segurados
       - Cedentes de resseguro em jurisdicoes de risco

    2. Perfil de risco da supervisionada (inciso II):
       - Tipo de entidade: seguradora vida vs. nao-vida, EAPC, capitalizadora
       - Modelo de negocio: varejo vs. corporate, individual vs. coletivo
       - Area geografica: operacoes em regioes de fronteira, municipios de alto risco
       - Canais: venda direta vs. corretores, digital vs. presencial
       - Porte: volume de premios e sinistros anuais

    3. Perfil de risco de operacoes/produtos (inciso III):
       Produtos de maior risco no mercado securitario:
       - VGBL/PGBL com aportes elevados e possibilidade de resgate
       - Seguros de vida inteira com valor de resgate (cash value)
       - Titulos de capitalizacao de pagamento unico com valor elevado
       - Seguros com premio unico de alto valor
       - Resseguros com cedentes internacionais
       Canais de maior risco:
       - Venda por corretores nao supervisionados diretamente
       - Canais digitais sem verificacao presencial
       - Parceiros de distribuicao (bancassurance, varejistas)

    **Implicacao pratica:**
    A AIR deve ser documentada, aprovada pela diretoria e revisada no minimo a cada
    2 anos. Toda a estrutura de controles de PLD/FT deve estar fundamentada nos
    riscos identificados na AIR.
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de avaliacao de risco:**
      1. Plataforma de risk assessment com taxonomia especifica para mercado
         securitario, cobrindo as tres dimensoes obrigatorias (cliente, entidade,
         produto/operacao).
      2. Modelo de scoring multidimensional parametrizavel com pesos ajustaveis
         por tipo de fator de risco.
      3. Integracao com dados operacionais: sistema de emissao (premios, produtos),
         sistema de sinistros (pagamentos, beneficiarios), sistema de investimentos
         (aportes, resgates VGBL/PGBL).
      4. Mapa de calor de risco de PLD/FT por produto, canal, geografia e perfil
         de cliente.

      **Automacao da avaliacao:**
      5. Coleta automatica de dados para avaliacao: volumetria de operacoes,
         distribuicao geografica, perfil de clientes, canais utilizados.
      6. Cenarios de stress testing para riscos de PLD/FT.
      7. Comparativo com avaliacoes anteriores para analise de tendencias.
      8. Output da AIR alimenta diretamente parametros do motor de monitoramento.
    tools:
      - risk-assessment-platform
      - scoring-engine
      - analytics-platform
      - heat-map-visualization
  devsecops:
    prose: |
      **Modelo de risco como codigo:**
      1. Modelo de avaliacao de risco versionado em repositorio Git com historico
         de alteracoes em fatores, pesos e thresholds.
      2. Testes unitarios para cada fator de risco e regra de classificacao.
      3. Pipeline de validacao do modelo com backtesting contra dados historicos
         de comunicacoes ao COAF.

      **Qualidade de dados:**
      4. Data quality checks automatizados nos dados que alimentam a AIR.
      5. Testes de integracao para garantir que alteracoes na AIR propagam
         corretamente para parametros de monitoramento.
      6. Documentacao automatica do modelo com descricao de fatores e justificativas.
    tools:
      - gitlab-ci
      - model-registry
      - data-quality-framework
      - backtesting-framework
  secops:
    prose: |
      **Governanca da avaliacao:**
      1. Metodologia de AIR documentada, incluindo fatores de risco, pesos,
         escalas e criterios de classificacao.
      2. Participacao multidisciplinar na AIR: compliance, atuarial, subscricao,
         sinistros, comercial, juridico.
      3. Aprovacao formal pela diretoria e/ou conselho de administracao.

      **Atualizacao e monitoramento:**
      4. Revisao da AIR a cada 2 anos no maximo, ou quando houver mudanca
         material no perfil de risco (novo produto, nova jurisdicao, fusao).
      5. Monitoramento continuo de indicadores que possam alterar o perfil de
         risco entre revisoes formais.
      6. Correlacao da AIR com tipologias publicadas pelo COAF, GAFI e IAIS.
      7. Relatorio executivo da AIR para diretoria e SUSEP quando solicitado.
    tools:
      - grc-platform
      - risk-assessment-tool
      - regulatory-intelligence
      - reporting-engine
