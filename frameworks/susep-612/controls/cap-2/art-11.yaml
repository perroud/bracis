id: art-11
family: cap-2
title: "Atualizacao da Avaliacao Interna de Risco"
class: SUSEP-612
statement:
  prose: |
    Art. 11. A avaliação interna de risco deve ser atualizada com periodicidade
    máxima de dois anos, ou sempre que houver alteração significativa no perfil de
    risco da supervisionada, incluindo o lançamento de novos produtos ou serviços,
    a entrada em novos mercados ou áreas geográficas, ou a ocorrência de eventos
    relevantes que possam impactar o risco de lavagem de dinheiro ou de
    financiamento do terrorismo.
guidance:
  prose: |
    O art. 11 define a frequencia e os gatilhos para atualizacao da avaliacao interna
    de risco, garantindo que o programa de PLD/FT permanca alinhado com o perfil de
    risco real da supervisionada.

    **Periodicidade regular:**
    Atualizacao a cada 2 anos no maximo, contados da ultima avaliacao aprovada.
    Na pratica, a recomendacao e atualizacao anual, especialmente para
    supervisionadas de maior porte e complexidade.

    **Gatilhos de atualizacao extraordinaria:**
    A avaliacao deve ser atualizada imediatamente quando:

    1. Novos produtos ou servicos:
       - Lancamento de novo produto de seguro de vida com acumulacao
       - Novo plano de previdencia (PGBL/VGBL) com caracteristicas inovadoras
       - Novo titulo de capitalizacao de alto valor
       - Novo produto de resseguro ou retrocessao

    2. Novos mercados ou areas geograficas:
       - Expansao para novos estados ou regioes
       - Inicio de operacoes em regioes de fronteira
       - Parcerias com corretores em areas de risco elevado
       - Operacoes de resseguro com novas jurisdicoes

    3. Eventos relevantes:
       - Fusao, aquisicao ou incorporacao
       - Alteracao significativa na base de clientes
       - Tipologias novas publicadas pelo COAF ou GAFI para o setor de seguros
       - Sancoes ou penalidades recebidas de reguladores
       - Comunicacoes ao COAF com resultado positivo (investigacao policial)
       - Mudancas legislativas ou regulatorias relevantes

    **Implicacao pratica:**
    A supervisionada deve ter um processo formal de change management que identifique
    automaticamente eventos que trigam a necessidade de atualizacao da AIR. Nao
    esperar o ciclo bienal quando ocorrer evento trigger.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de trigger de atualizacao:**
      1. Event-driven system que monitora gatilhos de atualizacao da AIR:
         lancamento de produtos (sistema de emissao), novos mercados (sistema
         comercial), eventos regulatorios (feed de regulacao).
      2. Integracao com sistema de gestao de produtos para detectar automaticamente
         lancamento de novos produtos ou alteracoes em produtos existentes.
      3. Integracao com sistema de cadastro para detectar expansao geografica.
      4. Feed de atualizacoes regulatorias (SUSEP, COAF, GAFI) com matching
         automatico contra escopo da supervisionada.

      **Automacao da atualizacao:**
      5. Dados atualizados automaticamente para cada dimensao de risco: perfil
         de clientes, volumetria, distribuicao geografica, mix de produtos.
      6. Comparativo automatico entre AIR atual e dados atualizados para destacar
         gaps e divergencias.
      7. Workflow de aprovacao da AIR atualizada com etapas de revisao, validacao
         e aprovacao pela diretoria.
    tools:
      - event-bus
      - regulatory-change-management
      - product-management-system
      - workflow-engine
  devsecops:
    prose: |
      **Pipeline de atualizacao:**
      1. Pipeline automatizado que compara dados atuais com a ultima AIR aprovada
         e gera relatorio de divergencias.
      2. Testes de consistencia para garantir que alteracoes na AIR propagam para
         parametros de monitoramento e classificacao de clientes.
      3. Versionamento da AIR em repositorio com diff entre versoes.

      **Integracao continua:**
      4. Testes automatizados que verificam se novos produtos lancados estao
         mapeados na AIR e com classificacao de risco atribuida.
      5. Alertas quando novo produto e deployado sem mapeamento na AIR.
    tools:
      - gitlab-ci
      - diff-engine
      - integration-tests
      - alerting-system
  secops:
    prose: |
      **Governanca de atualizacao:**
      1. Processo formal de change management para identificar eventos trigger
         com responsaveis designados em cada area (produtos, comercial, juridico).
      2. Comite de PLD/FT com reuniao periodica para avaliar necessidade de
         atualizacao extraordinaria da AIR.
      3. Documentacao de todas as atualizacoes com justificativa e aprovacao.

      **Monitoramento de triggers:**
      4. Checklist mensal de verificacao de eventos trigger para o compliance
         officer.
      5. Integracao com calendario regulatorio para antecipar mudancas.
      6. Registro de eventos trigger identificados e nao identificados para
         melhoria continua do processo.
      7. Relatorio de atualizacoes da AIR para SUSEP quando solicitado.
    tools:
      - grc-platform
      - change-management
      - compliance-calendar
      - committee-management
legal_references:
