id: art-31
family: cap-6
title: "Sigilo da Comunicacao"
class: SUSEP-612
statement:
  prose: |
    Art. 31. As supervisionadas, seus administradores e colaboradores não podem
    dar ciência ao cliente ou a terceiros sobre a realização de comunicação ao COAF
    ou sobre informações prestadas a autoridades competentes, conforme previsto no
    art. 10 da Lei n. 9.613, de 1998.
guidance:
  prose: |
    O art. 31 estabelece a proibicao absoluta de tipping off, protegendo a
    integridade das comunicacoes ao COAF e das investigacoes decorrentes.

    **Proibicao de tipping off:**
    Nenhum colaborador da supervisionada, de qualquer nivel hierarquico, pode:
    - Informar ao cliente que foi feita comunicacao ao COAF sobre ele
    - Informar ao cliente que seus dados foram fornecidos a autoridades
    - Informar a terceiros (incluindo corretores) sobre a comunicacao
    - Dar indicios diretos ou indiretos da existencia da comunicacao
    - Alterar o padrao de atendimento de forma que sugira investigacao

    **Base legal:**
    Art. 10 da Lei 9.613/1998: "As comunicacoes de boa-fe nao acarretarao
    responsabilidade civil ou administrativa." Complementarmente, o art. 10,
    ss 1 torna crime a revelacao da comunicacao.

    **Contexto do mercado securitario:**
    O risco de tipping off e particularmente elevado em seguros porque:
    - Corretores intermediam o relacionamento e podem questionar motivos de
      bloqueio ou demora no processamento
    - Reguladores de sinistros interagem diretamente com segurados e
      beneficiarios durante investigacao de sinistro
    - Cancelamento de apolice por motivos de PLD/FT precisa de justificativa
      generica para o cliente
    - Equipe de atendimento pode revelar inadvertidamente motivo de bloqueio

    **Boas praticas:**
    - Utilizar justificativas genericas: "verificacao cadastral", "procedimento
      interno de conformidade", "analise adicional requerida"
    - Treinar front office especificamente sobre tipping off
    - Restringir acesso a informacoes sobre comunicacoes ao COAF
    - Segregar equipe de compliance que trata comunicacoes da equipe operacional
    - Registrar em politica interna as orientacoes sobre sigilo

    **Penalidades:**
    Violacao do sigilo pode resultar em:
    - Responsabilidade criminal do colaborador (obstrucao de justica)
    - Sancao administrativa da SUSEP contra a supervisionada
    - Responsabilidade civil por danos causados a investigacao
implementation_guidance:
  platform_engineering:
    prose: |
      **Controle de acesso a comunicacoes:**
      1. Segregacao total dos dados de comunicacoes ao COAF em sistema com
         acesso restrito a equipe de compliance e diretor responsavel.
      2. Criptografia adicional para dados de comunicacoes ao COAF (dupla
         camada de protecao).
      3. Logs de acesso com alertas em tempo real para acessos nao autorizados.
      4. Invisibilidade de status de comunicacao nos sistemas operacionais
         (emissao, sinistros, atendimento) -- operadores nao devem ver se
         cliente tem comunicacao ao COAF.

      **Protecao contra tipping off:**
      5. Justificativas genericas pre-definidas para bloqueios motivados por
         PLD/FT nos sistemas de front office.
      6. Workflow de atendimento que nao revela motivo real de bloqueio ou
         demora.
      7. Alertas para gestor quando operador tenta acessar informacoes
         restritas de PLD/FT.
    tools:
      - access-control
      - encryption-service
      - audit-trail
      - front-office-integration
  devsecops:
    prose: |
      **Testes de segregacao:**
      1. Testes de controle de acesso: operadores de front office, corretores
         e equipe de sinistros NAO devem ter acesso a dados de comunicacoes.
      2. Testes de invisibilidade: telas operacionais nao devem exibir
         indicadores de comunicacao ao COAF.
      3. Testes de logs: todo acesso a dados de comunicacao deve ser registrado.

      **Seguranca:**
      4. Penetration tests especificos para sistema de comunicacoes ao COAF.
      5. Testes de criptografia de dados de comunicacao em repouso e transito.
      6. Testes de segregacao de ambientes (compliance vs. operacional).
    tools:
      - gitlab-ci
      - access-control-tests
      - penetration-tests
      - encryption-tests
  secops:
    prose: |
      **Prevencao de tipping off:**
      1. Treinamento especifico sobre tipping off para TODOS os colaboradores,
         especialmente front office, sinistros e corretores.
      2. Protocolo de comunicacao interna: como informar bloqueio ao cliente
         sem revelar motivo real.
      3. Monitoramento de comportamento: colaboradores que acessam dados de
         PLD/FT sem justificativa funcional.

      **Incidentes de tipping off:**
      4. Processo de investigacao interna para suspeitas de tipping off.
      5. Canal de denuncia anonimo para reportar violacoes de sigilo.
      6. Medidas disciplinares documentadas para violacoes de sigilo.
      7. Comunicacao ao COAF de incidentes de tipping off quando detectados.
    tools:
      - training-platform
      - incident-management
      - whistleblower-channel
      - access-monitoring
