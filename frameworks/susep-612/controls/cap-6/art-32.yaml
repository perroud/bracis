id: art-32
family: cap-6
title: "Manutencao da Relacao Comercial Apos Comunicacao"
class: SUSEP-612
statement:
  prose: |
    Art. 32. A comunicação de operação suspeita ao COAF não exime a supervisionada
    de manter o monitoramento das operações do cliente, devendo as novas operações
    que apresentem indícios de lavagem de dinheiro ou de financiamento do terrorismo
    ser igualmente comunicadas.
    Parágrafo único. A manutenção ou o encerramento da relação comercial após a
    comunicação ao COAF deve ser avaliada pela supervisionada, levando em
    consideração os riscos envolvidos e os objetivos da prevenção à lavagem de
    dinheiro e ao financiamento do terrorismo.
guidance:
  prose: |
    O art. 32 define o comportamento da supervisionada APOS uma comunicacao ao
    COAF, equilibrando monitoramento continuo com decisao sobre manter ou
    encerrar o relacionamento.

    **Obrigacao de monitoramento continuo:**
    A comunicacao ao COAF nao e o fim do processo. Apos comunicar:
    - O monitoramento do cliente deve continuar (e ser reforcado)
    - Novas operacoes suspeitas devem gerar novas comunicacoes
    - A supervisionada deve acumular inteligencia sobre o cliente
    - O COAF pode solicitar informacoes complementares a qualquer momento

    **Decisao sobre manutencao do relacionamento (paragrafo unico):**
    A supervisionada deve avaliar caso a caso se mantem ou encerra o
    relacionamento. Nao ha regra automatica. Fatores a considerar:

    Argumentos para MANTER o relacionamento:
    - Manter monitoramento permite detectar novas operacoes suspeitas
    - Encerramento pode alertar o cliente (tipping off indireto)
    - COAF/autoridades podem solicitar que o relacionamento seja mantido
      para acompanhamento
    - Cancelamento de apolice de vida pode liberar recursos suspeitos
      via devolucao de premio

    Argumentos para ENCERRAR o relacionamento:
    - Risco reputacional de manter cliente suspeito
    - Risco de a supervisionada ser utilizada como instrumento de lavagem
    - Casos graves com tipologia clara de LD/FT
    - Determinacao de autoridades para bloqueio

    **Bloqueio judicial vs. encerramento voluntario:**
    Se houver determinacao judicial de bloqueio, a supervisionada deve:
    - Bloquear a apolice/plano/titulo sem informa-lo ao cliente
    - Manter o produto ativo mas sem permitir movimentacoes
    - Reportar ao juizo qualquer tentativa de movimentacao
    Encerramento voluntario apos comunicacao deve ser avaliado em conjunto
    com area juridica e compliance.

    **Comunicacoes subsequentes:**
    Se o relacionamento e mantido e novas operacoes suspeitas ocorrem:
    - Nova comunicacao ao COAF para cada situacao distinta
    - Referencia a comunicacao anterior para o COAF consolidar o caso
    - Monitoramento reforcado com thresholds mais sensiveis
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao pos-comunicacao:**
      1. Flag no cadastro do cliente indicando que ha comunicacao ao COAF
         ativa (visivel apenas para compliance).
      2. Elevacao automatica do nivel de monitoramento para clientes com
         comunicacao ao COAF (thresholds reduzidos, alertas priorizados).
      3. Workflow de decisao sobre manutencao/encerramento com checklist
         de fatores a considerar e aprovacao do compliance officer.
      4. Linkagem entre comunicacoes do mesmo cliente para referencia
         cruzada no SISCOAF.

      **Controles de bloqueio judicial:**
      5. Modulo de gestao de bloqueios judiciais com integracao com sistema
         de sinistros (bloquear pagamento) e emissao (bloquear alteracoes).
      6. Alertas automaticos quando cliente com bloqueio tenta movimentacao.
      7. Registro de tentativas de movimentacao para reporte ao juizo.
    tools:
      - case-management
      - kyc-platform
      - workflow-engine
      - judicial-block-management
  devsecops:
    prose: |
      **Testes pos-comunicacao:**
      1. Testes de elevacao de monitoramento: apos comunicacao, thresholds
         devem ser automaticamente ajustados.
      2. Testes de bloqueio judicial: operacoes devem ser impedidas quando
         bloqueio ativo.
      3. Testes de linkagem: comunicacoes subsequentes devem referenciar
         comunicacoes anteriores do mesmo cliente.

      **Segregacao:**
      4. Testes de visibilidade: flag de comunicacao ao COAF nao deve ser
         visivel para operadores, somente compliance.
      5. Testes de workflow de encerramento apos comunicacao.
    tools:
      - gitlab-ci
      - e2e-tests
      - access-control-tests
      - workflow-tests
  secops:
    prose: |
      **Acompanhamento pos-comunicacao:**
      1. Lista de clientes com comunicacoes ao COAF ativas com revisao
         periodica (minimo trimestral).
      2. Decisao documentada de manter ou encerrar para cada cliente com
         comunicacao.
      3. Monitoramento reforcado efetivamente implementado e verificado.

      **Cooperacao com autoridades:**
      4. Processo de atendimento a solicitacoes complementares do COAF.
      5. Cooperacao com autoridades policiais e judiciais quando solicitado.
      6. Gestao de bloqueios judiciais com controle de prazos e obrigacoes.
      7. Relatorio de clientes com comunicacoes ativas para diretor
         responsavel.
    tools:
      - case-management
      - regulatory-cooperation
      - judicial-block-management
      - reporting-engine
