id: art-30
family: cap-6
title: "Comunicacao Negativa"
class: SUSEP-612
statement:
  prose: |
    Art. 30. As supervisionadas que não tenham detectado, durante o ano civil,
    operações ou situações suspeitas de lavagem de dinheiro ou de financiamento
    do terrorismo devem comunicar ao COAF a não ocorrência de tais operações
    (comunicação negativa), até o décimo dia útil do mês de janeiro do ano
    seguinte.
guidance:
  prose: |
    O art. 30 estabelece a obrigacao de comunicacao negativa, garantindo que o
    COAF tenha visibilidade de que a supervisionada esta cumprindo seus deveres
    de monitoramento, mesmo quando nao ha operacoes suspeitas a reportar.

    **Objetivo da comunicacao negativa:**
    - Confirmar que a supervisionada tem programa de PLD/FT ativo
    - Demonstrar que o monitoramento esta sendo realizado
    - Evitar que ausencia de comunicacoes seja interpretada como omissao
    - Permitir ao COAF identificar supervisionadas que nunca comunicam
      (potencial deficiencia de monitoramento)

    **Prazo:**
    Ate o 10 dia util de janeiro do ano seguinte ao periodo de referencia.
    Exemplo: para o ano-base 2024, comunicacao ate ~15 de janeiro de 2025.

    **Quando a comunicacao negativa e devida:**
    Somente quando NAO houve nenhuma comunicacao de operacao suspeita (art. 28)
    durante todo o ano civil. Se houve ao menos uma comunicacao de suspeita,
    a comunicacao negativa NAO e necessaria.

    **Nota importante:**
    Comunicacoes automaticas (art. 29) nao substituem a comunicacao negativa.
    Se a supervisionada fez comunicacoes automaticas mas nenhuma comunicacao de
    suspeita durante o ano, deve fazer a comunicacao negativa.

    **Sinal de alerta para reguladores:**
    Comunicacoes negativas recorrentes (varios anos seguidos) em supervisionadas
    de grande porte com produtos de alto risco (VGBL, capitalizacao) podem
    indicar deficiencia no sistema de monitoramento, atraindo atencao da SUSEP.
    A ausencia de suspeitas nao significa necessariamente ausencia de LD/FT.

    **Implicacao pratica:**
    A supervisionada deve ter controle de calendario regulatorio que inclua
    o prazo de comunicacao negativa como obrigacao anual recorrente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Automacao de comunicacao negativa:**
      1. Verificacao automatica em dezembro: se nenhuma comunicacao de
         suspeita (art. 28) foi feita durante o ano civil, flag para
         comunicacao negativa obrigatoria.
      2. Geracao automatica do formulario de comunicacao negativa no
         SISCOAF com dados da supervisionada pre-populados.
      3. Alerta no calendario regulatorio para compliance officer em
         dezembro com status (necessaria ou nao).
      4. Integracao com SISCOAF para envio da comunicacao negativa.
    tools:
      - siscoaf-integration
      - compliance-calendar
      - regulatory-reporting
      - alerting-system
  devsecops:
    prose: |
      **Testes de comunicacao negativa:**
      1. Testes de logica: ano com comunicacoes de suspeita nao deve gerar
         comunicacao negativa.
      2. Testes de logica: ano sem comunicacoes de suspeita deve gerar alerta
         de comunicacao negativa obrigatoria.
      3. Testes de prazo: alerta deve ser gerado com antecedencia suficiente
         para cumprimento do prazo.

      **Integracao:**
      4. Testes de envio de comunicacao negativa ao SISCOAF.
      5. Testes de registro de comunicacao negativa no sistema de compliance.
    tools:
      - gitlab-ci
      - unit-tests
      - integration-tests
  secops:
    prose: |
      **Controle de obrigacoes:**
      1. Calendario regulatorio com prazo de comunicacao negativa.
      2. Verificacao anual do status: comunicacao de suspeita feita? Se nao,
         comunicacao negativa obrigatoria ate 10 dia util de janeiro.
      3. Registro da comunicacao negativa com protocolo do SISCOAF.

      **Analise critica:**
      4. Se a supervisionada esta fazendo comunicacao negativa ha mais de
         2 anos consecutivos, compliance officer deve avaliar se o sistema
         de monitoramento esta calibrado adequadamente.
      5. Comparacao com benchmarks setoriais de comunicacoes ao COAF.
      6. Documentacao da justificativa para ausencia de comunicacoes de
         suspeita.
      7. Relatorio para diretoria sobre status de comunicacao negativa.
    tools:
      - compliance-calendar
      - regulatory-reporting
      - benchmarking-tool
      - audit-management
legal_references:
