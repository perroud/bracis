id: art-6
family: cap-1
title: "Treinamento e Capacitacao"
class: SUSEP-612
statement:
  prose: |
    Art. 6. As supervisionadas devem promover programa de treinamento e capacitação
    de seus colaboradores, incluindo membros da diretoria e do conselho de
    administração, que abranja, no mínimo:
    I - os procedimentos de prevenção à lavagem de dinheiro e ao financiamento
    do terrorismo;
    II - as situações que possam configurar indícios de lavagem de dinheiro ou de
    financiamento do terrorismo, contemplando as especificidades do mercado de
    seguros, previdência complementar aberta, capitalização e resseguros;
    III - as responsabilidades dos colaboradores no âmbito da prevenção à lavagem
    de dinheiro e ao financiamento do terrorismo.
guidance:
  prose: |
    O art. 6 estabelece a obrigacao de treinamento continuo e abrangente em PLD/FT
    para todos os niveis da organizacao, com enfase nas especificidades do mercado
    securitario.

    **Publico-alvo obrigatorio:**
    - Colaboradores operacionais: atendimento, emissao, sinistros, cobranca
    - Corretores e agentes de seguros (quando atuam em nome da supervisionada)
    - Gestores e supervisores de areas de negocio
    - Diretoria estatutaria
    - Conselho de administracao
    O treinamento deve ser proporcional ao papel: front office precisa reconhecer
    indicios; diretoria precisa entender governanca e responsabilidades.

    **Conteudo especifico para mercado securitario (inciso II):**
    Tipologias de lavagem especificas de seguros:
    - Pagamento de premios em especie ou com recursos de origem duvidosa
    - Contratacao e cancelamento rapido de apolices para obter devolucao de premios
    - Resgates antecipados de VGBL/PGBL logo apos aportes significativos
    - Sinistros simulados ou inflacionados para lavagem de valores
    - Utilizacao de titulos de capitalizacao como instrumento de fracionamento
    - Transferencia de apolices entre segurados sem justificativa economica
    - Pagamento de sinistro a beneficiario diferente do segurado original
    - Resseguro com empresas em jurisdicoes de alto risco

    **Frequencia e formato:**
    A Circular nao define frequencia minima, mas a pratica de mercado e:
    - Onboarding: treinamento completo antes de iniciar atividades
    - Reciclagem anual: atualizacao com novas tipologias e regulamentacoes
    - Ad hoc: quando houver alteracao regulatoria significativa

    **Implicacao pratica:**
    Treinamento insuficiente e uma das causas mais frequentes de penalidades da
    SUSEP em materia de PLD/FT. A supervisionada deve manter registros detalhados
    de todos os treinamentos com lista de presenca e avaliacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Plataforma de treinamento:**
      1. LMS (Learning Management System) com modulo especifico de PLD/FT para
         mercado securitario.
      2. Conteudo adaptativo por perfil: front office, subscricao, sinistros,
         compliance, diretoria, conselho.
      3. Avaliacao obrigatoria com nota minima para certificacao.
      4. Registro automatico de conclusao com emissao de certificado.

      **Conteudo e tipologias:**
      5. Base de conhecimento com tipologias de lavagem especificas de seguros,
         previdencia, capitalizacao e resseguro.
      6. Casos praticos baseados em comunicacoes reais ao COAF (anonimizados).
      7. Atualizacao automatica de conteudo quando COAF ou GAFI publicam novas
         tipologias.
      8. Simulacoes interativas de cenarios de PLD/FT no contexto securitario.
    tools:
      - lms-platform
      - knowledge-base
      - content-management
      - assessment-engine
  devsecops:
    prose: |
      **Automacao de treinamento:**
      1. Pipeline de publicacao de conteudo de treinamento com aprovacao do
         compliance officer.
      2. Testes automatizados de integridade do conteudo (links, referencias
         regulatorias, versoes).
      3. Integracao do LMS com sistema de RH para enrollment automatico de
         novos colaboradores.

      **Monitoramento de conformidade:**
      4. Dashboards de aderencia ao treinamento por area, cargo e entidade.
      5. Alertas automaticos para gestores quando colaboradores nao completam
         treinamento no prazo.
      6. Relatorios de conformidade de treinamento para auditoria.
    tools:
      - gitlab-ci
      - lms-integration
      - hr-system-integration
      - compliance-dashboard
  secops:
    prose: |
      **Gestao do programa de treinamento:**
      1. Calendario anual de treinamentos de PLD/FT aprovado pelo diretor
         responsavel.
      2. Mapeamento de colaboradores por nivel de exposicao a risco de PLD/FT
         para definir intensidade do treinamento.
      3. Avaliacao de efetividade do treinamento: testes de conhecimento,
         exercicios praticos, metricas de deteccao pos-treinamento.

      **Registros e evidencias:**
      4. Retencao de registros de treinamento por no minimo 10 anos.
      5. Relatorio anual de treinamento para SUSEP com indicadores: total de
         colaboradores treinados, nota media, taxa de conclusao.
      6. Evidencias de treinamento da diretoria e conselho documentadas em ata.
      7. Extensao do programa a corretores e parceiros quando atuam em nome
         da supervisionada.
    tools:
      - training-management
      - compliance-calendar
      - document-retention
      - reporting-engine
