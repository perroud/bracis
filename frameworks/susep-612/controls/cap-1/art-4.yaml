id: art-4
family: cap-1
title: "Politica Institucional de PLD/FT"
class: SUSEP-612
statement:
  prose: |
    Art. 4. As supervisionadas devem elaborar e implementar política de prevenção à
    lavagem de dinheiro e ao financiamento do terrorismo compatível com seu perfil de
    risco, contemplando, no mínimo:
    I - diretrizes para definição de papéis e responsabilidades no âmbito da prevenção
    à lavagem de dinheiro e ao financiamento do terrorismo;
    II - diretrizes para o tratamento de situações em que não seja possível identificar
    o beneficiário final;
    III - diretrizes para aceitação de clientes e beneficiários;
    IV - procedimentos de due diligence requeridos;
    V - formas de monitoramento, seleção e análise de operações e situações suspeitas;
    VI - diretrizes para comunicação ao COAF;
    VII - comprometimento da alta administração com a efetividade e melhoria contínua
    dos procedimentos.
guidance:
  prose: |
    O art. 4 estabelece o conteudo minimo obrigatorio da politica institucional de
    PLD/FT. E o documento fundacional que sustenta todo o programa de compliance
    antilavagem da supervisionada.

    **Conteudo minimo (incisos I a VII):**

    1. Papeis e responsabilidades (I): definir quem e responsavel por cada etapa do
       processo de PLD/FT -- desde o front office (corretores, agentes) ate o compliance
       officer e a diretoria. No mercado de seguros, inclui corretores, subscritores,
       reguladores de sinistros e equipe de prevencao a fraude.

    2. Beneficiario final (II): procedimentos quando nao e possivel identificar o
       beneficiario final -- situacao frequente em seguros coletivos com estipulante,
       capitalizacao ao portador e resseguro em cadeia.

    3. Aceitacao de clientes (III): criterios de aceitacao e recusa de clientes.
       No mercado securitario, inclui criterios para aceitacao de segurados, beneficiarios
       de apolices, estipulantes de seguros coletivos e cedentes de resseguro.

    4. Due diligence (IV): niveis de verificacao proporcionais ao risco -- simplificada,
       padrao e aprimorada (EDD). Especifico para seguros: due diligence de beneficiarios
       de sinistros, resgatantes de VGBL/PGBL e ganhadores de capitalizacao.

    5. Monitoramento (V): mecanismos de deteccao de operacoes atipicas. No mercado
       securitario: pagamento de premios incompativeis com renda, resgates antecipados
       frequentes, sinistros com indicios de simulacao para lavagem.

    6. Comunicacao ao COAF (VI): criterios e fluxos para comunicacao de operacoes
       suspeitas e automaticas ao COAF via SISCOAF.

    7. Comprometimento da alta administracao (VII): tone from the top -- a diretoria
       e o conselho devem demonstrar comprometimento efetivo, nao apenas formal.

    **Implicacao pratica:**
    A politica deve ser um documento vivo, revisado anualmente, aprovado pela diretoria
    e disseminado a todos os colaboradores e parceiros relevantes.
implementation_guidance:
  platform_engineering:
    prose: |
      **Politica como codigo:**
      1. Codificar regras da politica de PLD/FT em formato executavel (regras de
         negocio parametrizaveis no motor de compliance).
      2. Versionar a politica em repositorio Git com historico completo de alteracoes.
      3. Parametrizacao de thresholds de aceitacao de clientes conforme politica.
      4. Workflow engine para fluxos de aprovacao de clientes de alto risco.

      **Infraestrutura de suporte:**
      5. Portal de compliance com a politica de PLD/FT acessivel a todos os
         colaboradores e parceiros (corretores, agentes).
      6. Modulo de treinamento integrado com verificacao de conclusao.
      7. Base de conhecimento com tipologias de lavagem no mercado securitario.
      8. Sistema de gestao de papeis e responsabilidades com RACI matrix digital.
    tools:
      - rules-engine
      - workflow-engine
      - lms-platform
      - knowledge-base
      - grc-platform
  devsecops:
    prose: |
      **Enforcement automatizado:**
      1. Regras de negocio da politica de PLD/FT implementadas como microservicos
         testados e versionados.
      2. Testes automatizados para cada regra de aceitacao, due diligence e
         monitoramento definida na politica.
      3. Pipeline de validacao de alteracoes na politica com aprovacao obrigatoria
         do compliance officer.

      **Rastreabilidade:**
      4. Logs de todas as decisoes de aceitacao/recusa de clientes com justificativa.
      5. Audit trail de alteracoes em parametros de PLD/FT com identificacao do autor.
      6. Testes de regressao para garantir que alteracoes na politica nao desativem
         controles existentes.
    tools:
      - gitlab-ci
      - audit-trail
      - approval-workflows
      - regression-tests
  secops:
    prose: |
      **Gestao da politica:**
      1. Revisao anual da politica de PLD/FT com participacao do compliance officer,
         diretoria e areas de negocio relevantes.
      2. Aprovacao formal pelo conselho de administracao ou diretoria com registro
         em ata.
      3. Disseminacao da politica atualizada a todos os colaboradores e parceiros
         com confirmacao de leitura.

      **Efetividade dos controles:**
      4. Metricas de conformidade: percentual de funcionarios treinados, percentual
         de clientes com due diligence completa, tempo medio de comunicacao ao COAF.
      5. Auditoria independente da implementacao da politica (minimo anual).
      6. Benchmarking com outras supervisionadas (quando disponivel).
      7. Relatorio anual de efetividade para SUSEP conforme exigido.
    tools:
      - grc-platform
      - training-management
      - audit-management
      - reporting-engine
