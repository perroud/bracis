id: art-5
family: cap-1
title: "Diretor Responsavel por PLD/FT"
class: SUSEP-612
statement:
  prose: |
    Art. 5. As supervisionadas devem indicar ao órgão máximo de administração diretor
    responsável pelo cumprimento das obrigações previstas nesta Circular, que deverá ter
    acesso irrestrito às informações necessárias ao exercício de suas atribuições,
    podendo ser exercido em regime de acumulação, desde que não haja conflito de
    interesse.
guidance:
  prose: |
    O art. 5 estabelece a obrigacao de designar um diretor responsavel por PLD/FT,
    funcao equivalente ao Chief Compliance Officer (CCO) ou Money Laundering Reporting
    Officer (MLRO) em jurisdicoes internacionais.

    **Requisitos do diretor responsavel:**
    - Deve ser diretor estatutario da supervisionada (nao pode ser terceirizado)
    - Indicacao ao orgao maximo de administracao (conselho de administracao ou
      assembleia de socios)
    - Acesso irrestrito a informacoes: pode requisitar dados de qualquer area
    - Acumulacao permitida: pode acumular com outras diretorias desde que sem
      conflito de interesse

    **Conflito de interesse no mercado securitario:**
    E considerado conflito de interesse acumular a diretoria de PLD/FT com:
    - Diretoria comercial/vendas (pressao por metas vs. recusa de clientes)
    - Diretoria de sinistros (conflito entre pagamento rapido e investigacao)
    - Diretoria financeira (conflito entre rentabilidade e bloqueio de operacoes)
    Diretorias compativeis: juridica, riscos, auditoria interna (com ressalvas).

    **Responsabilidades tipicas:**
    - Supervisionar todo o programa de PLD/FT
    - Aprovar comunicacoes ao COAF
    - Reportar ao conselho de administracao sobre efetividade dos controles
    - Interlocutor perante SUSEP, COAF e autoridades em materia de PLD/FT
    - Garantir treinamento adequado de todos os colaboradores

    **Implicacao pratica:**
    A SUSEP pode responsabilizar pessoalmente o diretor designado por falhas no
    programa de PLD/FT. Essa responsabilizacao inclui multas pessoais e inabilitacao.
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de acesso e governanca:**
      1. Perfil de acesso privilegiado no sistema de compliance com visibilidade
         irrestrita de todos os alertas, comunicacoes e decisoes de PLD/FT.
      2. Dashboard executivo para o diretor responsavel com KPIs de PLD/FT:
         alertas abertos, comunicacoes pendentes, clientes bloqueados, treinamentos
         pendentes.
      3. Workflow de escalacao automatica para o diretor responsavel em situacoes
         de alta criticidade (PEP de alto nivel, operacao acima de limites elevados).
      4. Sistema de delegacao formal com registro auditavel para periodos de
         ausencia do diretor responsavel.
    tools:
      - grc-platform
      - executive-dashboard
      - workflow-engine
      - access-management
  devsecops:
    prose: |
      **Controle de acesso e segregacao:**
      1. Implementacao de RBAC com role especifica para diretor de PLD/FT com
         permissoes de leitura irrestrita e aprovacao de comunicacoes.
      2. Logs detalhados de todas as acoes do diretor responsavel no sistema de
         compliance para fins de auditoria.
      3. Testes automatizados para validar que o perfil do diretor tem acesso
         irrestrito a todos os modulos de PLD/FT.

      **Segregacao de funcoes:**
      4. Validacao automatica de conflito de interesse quando perfil do diretor
         e atribuido (verificar acumulacao de funcoes incompativeis).
      5. Alertas quando acesso do diretor responsavel e restringido ou alterado.
    tools:
      - rbac-engine
      - audit-trail
      - access-governance
      - sod-checks
  secops:
    prose: |
      **Governanca da funcao:**
      1. Registro formal da indicacao do diretor responsavel com aprovacao do
         orgao maximo de administracao e comunicacao a SUSEP.
      2. Plano de sucessao para o diretor responsavel com substituto designado.
      3. Avaliacao periodica de conflito de interesse do diretor responsavel.

      **Reporte e transparencia:**
      4. Relatorio mensal do diretor responsavel para a diretoria sobre status
         do programa de PLD/FT.
      5. Relatorio trimestral para o conselho de administracao.
      6. Documentacao de todas as decisoes do diretor responsavel com justificativa.
      7. Participacao do diretor responsavel em comite de PLD/FT periodico.
    tools:
      - grc-platform
      - committee-management
      - reporting-engine
      - compliance-calendar
