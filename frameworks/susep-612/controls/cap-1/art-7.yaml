id: art-7
family: cap-1
title: "Revisao Periodica da Politica e Procedimentos"
class: SUSEP-612
statement:
  prose: |
    Art. 7. A política de prevenção à lavagem de dinheiro e ao financiamento do
    terrorismo, bem como os procedimentos e controles internos, devem ser objeto de
    avaliação periódica pela supervisionada, com periodicidade máxima de dois anos,
    com o objetivo de verificar sua adequação e efetividade.
    Parágrafo único. A avaliação de que trata o caput deve ser documentada em
    relatório interno que contenha, no mínimo, a descrição da metodologia utilizada,
    os resultados obtidos e as recomendações de aprimoramento.
guidance:
  prose: |
    O art. 7 estabelece o ciclo de revisao periodica da politica e dos procedimentos
    de PLD/FT, garantindo que o programa se mantenha atualizado e efetivo.

    **Periodicidade:**
    Revisao a cada 2 anos no maximo. Na pratica, recomenda-se revisao anual
    considerando:
    - Velocidade de evolucao das tipologias de lavagem
    - Frequencia de alteracoes regulatorias da SUSEP e COAF
    - Lancamento de novos produtos ou canais de distribuicao
    - Mudancas no perfil de risco da carteira

    **Escopo da avaliacao:**
    A revisao deve abranger:
    1. Adequacao: os procedimentos cobrem todos os riscos identificados?
    2. Efetividade: os controles estao funcionando conforme desenhado?
    3. Proporcionalidade: os controles sao proporcionais ao risco atual?
    4. Completude: ha gaps em relacao a regulamentacao vigente?

    **Relatorio obrigatorio (paragrafo unico):**
    O relatorio deve conter no minimo:
    - Metodologia utilizada (self-assessment, auditoria interna, consultoria externa)
    - Resultados obtidos (gaps identificados, controles deficientes)
    - Recomendacoes de aprimoramento com prioridade e prazo
    - Status de implementacao das recomendacoes da revisao anterior

    **Metricas de efetividade sugeridas:**
    - Numero de comunicacoes ao COAF vs. alertas gerados (taxa de conversao)
    - Tempo medio entre deteccao de operacao suspeita e comunicacao ao COAF
    - Percentual de clientes com due diligence completa
    - Numero de casos de PLD/FT detectados internamente vs. por reguladores
    - Taxa de falsos positivos no monitoramento automatizado
implementation_guidance:
  platform_engineering:
    prose: |
      **Infraestrutura de avaliacao:**
      1. Plataforma de GRC com modulo de self-assessment integrado, permitindo
         avaliacao estruturada de todos os controles de PLD/FT.
      2. Questionarios parametrizaveis por tipo de controle e area avaliada.
      3. Base de dados de indicadores de efetividade com serie historica para
         analise de tendencias.
      4. Workflow de revisao com etapas de avaliacao, validacao e aprovacao.

      **Automacao de metricas:**
      5. Coleta automatica de KPIs de PLD/FT dos sistemas operacionais:
         alertas, comunicacoes, due diligence, treinamentos.
      6. Dashboard de efetividade atualizado em tempo real.
      7. Comparativo entre ciclos de avaliacao para identificar evolucao ou
         regressao de controles.
      8. Geracao automatica do relatorio exigido no paragrafo unico com dados
         pre-populados dos sistemas.
    tools:
      - grc-platform
      - analytics-dashboard
      - reporting-engine
      - workflow-engine
  devsecops:
    prose: |
      **Automacao de testes de controle:**
      1. Testes automatizados que validam funcionamento de todos os controles
         de PLD/FT: screening, monitoramento, comunicacao, due diligence.
      2. Pipeline de validacao continua que simula cenarios de PLD/FT e verifica
         se os controles detectam corretamente.
      3. Testes de regressao executados a cada alteracao em regras de negocio
         de PLD/FT.

      **Versionamento e rastreabilidade:**
      4. Historico de todas as alteracoes em regras, parametros e thresholds
         de PLD/FT versionado em Git.
      5. Changelog automatico para auditoria de evolucao dos controles.
      6. Correlacao entre alteracoes em controles e resultados de efetividade.
    tools:
      - gitlab-ci
      - compliance-tests
      - regression-tests
      - changelog-automation
  secops:
    prose: |
      **Ciclo de avaliacao:**
      1. Calendario de avaliacao periodica com responsaveis e prazos definidos.
      2. Metodologia de avaliacao documentada e aprovada pelo diretor responsavel.
      3. Participacao de areas de negocio na avaliacao para garantir visao
         operacional.

      **Documentacao e acompanhamento:**
      4. Elaboracao do relatorio de avaliacao conforme requisitos do paragrafo
         unico.
      5. Plano de acao para recomendacoes identificadas com owner e prazo.
      6. Acompanhamento da implementacao das recomendacoes com reports
         periodicos para diretoria.
      7. Retencao do relatorio de avaliacao por minimo de 10 anos.
      8. Disponibilizacao do relatorio para SUSEP quando requisitado.
    tools:
      - grc-platform
      - action-plan-tracker
      - document-retention
      - compliance-calendar
