id: art-34
family: title-3
title: "Due Diligence Aprimorada para PEPs"
class: SUSEP-612
statement:
  prose: |
    Art. 34. As supervisionadas devem aplicar procedimentos de due diligence
    aprimorada para pessoas politicamente expostas, seus representantes,
    familiares e estreitos colaboradores, incluindo, no mínimo:
    I - obtenção de aprovação de nível hierárquico superior para o início ou
    manutenção do relacionamento;
    II - adoção de medidas para identificar a origem do patrimônio e dos
    recursos envolvidos nas operações;
    III - monitoramento reforçado e contínuo das operações realizadas.
guidance:
  prose: |
    O art. 34 estabelece os procedimentos especificos de EDD (Enhanced Due
    Diligence) para PEPs, que sao obrigatorios e nao podem ser dispensados.

    **Due diligence aprimorada para PEPs (incisos I-III):**

    1. Aprovacao de nivel hierarquico superior (I):
       - Inicio do relacionamento: aprovacao obrigatoria antes da emissao de
         apolice ou adesao a plano
       - Manutencao: revisao periodica (anual) com reaprovacao formal
       - Nivel hierarquico: minimo gerencia de compliance, idealmente
         compliance officer ou diretor responsavel
       No mercado securitario:
       - Corretor nao pode aceitar PEP sem aprovacao previa da supervisionada
       - Emissao automatica de apolice deve ser bloqueada para PEPs
       - Processo de sinistro de PEP deve ter aprovacao adicional

    2. Origem do patrimonio e recursos (II):
       Verificacao aprofundada:
       - Declaracao de renda e patrimonio com documentacao suporte
       - Verificacao de patrimonio compativel com cargo publico exercido
       - Origem dos recursos para pagamento de premios (contracheque,
         declaracao de IR, escritura de imoveis vendidos)
       - Cruzamento com informacoes publicas de patrimonio (quando PEP
         e obrigado a declarar)
       No mercado securitario:
       - Fonte de recursos para aportes em VGBL/PGBL
       - Capacidade de pagamento de premios de seguro de vida de alto valor
       - Origem de recursos para aquisicao de capitalizacao

    3. Monitoramento reforcado (III):
       - Thresholds de monitoramento mais sensiveis que para clientes comuns
       - Revisao de alertas com prioridade maxima
       - Monitoramento de midia adversa (investigacoes, denuncias, processos)
       - Monitoramento de alteracoes patrimoniais e operacionais

    **Familiares e estreitos colaboradores:**
    Os mesmos procedimentos de EDD aplicam-se a:
    - Conjuge/companheiro(a) do PEP
    - Filhos e pais do PEP
    - Socios comerciais do PEP
    - Pessoas que sabidamente se beneficiam da relacao com o PEP
    O desafio e identificar essas relacoes, especialmente estreitos colaboradores.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de EDD para PEPs:**
      1. Workflow automatizado de aprovacao hierarquica: quando PEP e
         identificado, sistema bloqueia emissao e cria tarefa de aprovacao
         para nivel hierarquico superior.
      2. Formulario de EDD especifico para PEPs com campos obrigatorios:
         cargo, jurisdicao, periodo, origem de patrimonio, origem de
         recursos, justificativa para contratacao.
      3. Integracao com fontes de informacao patrimonial: portais de
         transparencia, declaracoes publicas de bens.
      4. Monitoramento automatico de midia adversa para PEPs da carteira
         (alertas de noticias, processos judiciais, investigacoes).

      **Controles de produto:**
      5. Bloqueio de emissao automatica para PEPs em todos os canais.
      6. Validacao de que EDD esta completa antes de qualquer operacao.
      7. Elevacao automatica de monitoramento para PEPs e relacionados.
      8. Dashboard de exposicao a PEPs por produto, valor e jurisdicao.
    tools:
      - kyc-platform
      - workflow-engine
      - adverse-media-monitoring
      - public-records-integration
  devsecops:
    prose: |
      **Testes de EDD para PEPs:**
      1. Testes de bloqueio: emissao de apolice para PEP sem aprovacao
         hierarquica deve ser impedida.
      2. Testes de completude: EDD sem campos obrigatorios nao pode ser
         aprovada.
      3. Testes de workflow: escalacao correta para nivel hierarquico
         superior.

      **Monitoramento:**
      4. Testes de elevacao de monitoramento: PEP deve ter thresholds
         diferenciados aplicados automaticamente.
      5. Testes de midia adversa: integracao com fontes de noticias
         funcionando e gerando alertas.
    tools:
      - gitlab-ci
      - e2e-tests
      - workflow-tests
      - integration-tests
  secops:
    prose: |
      **Gestao de PEPs:**
      1. Revisao anual de todos os relacionamentos com PEPs com
         reaprovacao formal pelo nivel hierarquico superior.
      2. Verificacao periodica de origem de patrimonio para PEPs com
         operacoes significativas.
      3. Monitoramento de midia adversa com tratamento prioritario de
         alertas sobre PEPs da carteira.

      **Reporte:**
      4. Relatorio semestral de exposicao a PEPs para diretoria com:
         numero de PEPs, produtos contratados, valores envolvidos.
      5. Lista de aprovacoes hierarquicas concedidas e revisadas.
      6. Casos de recusa ou encerramento de relacionamento com PEPs.
      7. Incidentes de PEPs nao identificados (detectados em revisao).
    tools:
      - pep-management
      - approval-management
      - adverse-media-monitoring
      - reporting-engine
