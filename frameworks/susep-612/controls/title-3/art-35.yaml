id: art-35
family: title-3
title: "PEPs Estrangeiros"
class: SUSEP-612
statement:
  prose: |
    Art. 35. As supervisionadas devem aplicar, no mínimo, os mesmos procedimentos
    previstos no art. 34 para pessoas politicamente expostas estrangeiras, adotando
    cautelas adicionais proporcionais ao risco de lavagem de dinheiro e de
    financiamento do terrorismo associado à jurisdição de origem.
guidance:
  prose: |
    O art. 35 estende os controles de PEP para PEPs estrangeiros, exigindo cautelas
    adicionais proporcionais ao risco da jurisdicao de origem.

    **PEPs estrangeiros no mercado securitario:**
    Cenarios tipicos:
    - Diplomatico estrangeiro residente no Brasil que contrata seguro de vida
    - Politico estrangeiro com investimento em VGBL no Brasil
    - Familiar de PEP estrangeiro com seguro patrimonial no Brasil
    - Empresa controlada por PEP estrangeiro com seguros empresariais

    **Cautelas adicionais por jurisdicao:**

    1. Paises de alto risco GAFI (lista cinza/negra):
       - Due diligence maxima (EDD intensiva)
       - Aprovacao de diretor responsavel (nao apenas gerente)
       - Verificacao de origem de patrimonio com documentacao do pais de
         origem (quando possivel)
       - Monitoramento em tempo real (nao apenas periodico)
       - Comunicacao proativa ao COAF independente de suspeita
       Paises atuais na lista do GAFI devem ser consultados regularmente.

    2. Paises com deficiencias estrategicas:
       - EDD padrao para PEPs
       - Aprovacao hierarquica conforme art. 34
       - Monitoramento reforcado

    3. Paises de baixo risco (GAFI, OCDE):
       - EDD padrao para PEPs
       - Procedimentos do art. 34 integralmente aplicaveis

    **Desafio de verificacao internacional:**
    Verificar informacoes de PEPs estrangeiros e significativamente mais
    dificil que PEPs brasileiros:
    - Bases de PEP internacionais podem estar desatualizadas
    - Verificacao de patrimonio em jurisdicoes opacas e impossivel
    - Documentos de identidade estrangeiros sao mais dificeis de validar
    - Cooperacao judicial internacional e lenta
    A supervisionada deve utilizar bases de PEP internacionais confiaveis
    (World-Check, Dow Jones, Refinitiv) e fontes de midia internacional.

    **Implicacao pratica:**
    PEPs estrangeiros de jurisdicoes de alto risco devem ser tratados com
    o nivel maximo de due diligence. Em muitos casos, a recusa do
    relacionamento pode ser a decisao mais prudente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Screening de PEPs estrangeiros:**
      1. Integracao com bases de PEP internacionais: World-Check, Dow Jones
         Watchlist, LexisNexis, Refinitiv com cobertura global.
      2. Classificacao automatica de risco por jurisdicao baseada em listas
         GAFI, indice de percepcao de corrupcao (Transparencia Internacional)
         e indices de risco de LD/FT.
      3. Matching multilinguistico com suporte a transliteracao (ex: nomes
         em arabe, cirilico, chines).
      4. Elevacao automatica de nivel de EDD para PEPs de jurisdicoes de
         alto risco.

      **Controles diferenciados:**
      5. Workflow de aprovacao com nivel hierarquico proporcional ao risco
         da jurisdicao: gerente para baixo risco, compliance officer para
         medio, diretor responsavel para alto risco GAFI.
      6. Integracao com fontes de midia adversa internacionais (alem das
         nacionais).
      7. Verificacao de sancoes internacionais: ONU, OFAC, UE, UK HMT.
      8. Dashboard de exposicao a PEPs estrangeiros por jurisdicao e risco.
    tools:
      - international-pep-screening
      - sanctions-screening
      - adverse-media-global
      - jurisdiction-risk-engine
  devsecops:
    prose: |
      **Testes internacionais:**
      1. Testes de matching multilinguistico com nomes em diferentes scripts.
      2. Testes de classificacao de jurisdicao com atualizacao de listas GAFI.
      3. Testes de workflow diferenciado por nivel de risco de jurisdicao.

      **Atualizacao de bases:**
      4. Pipeline de atualizacao de bases de PEP internacionais com
         monitoramento de freshness.
      5. Testes de integracao com fontes de sancoes internacionais.
      6. Testes de cobertura: verificar que paises de alto risco estao
         adequadamente cobertos pelas bases.
    tools:
      - gitlab-ci
      - multilingual-tests
      - integration-tests
      - coverage-tests
  secops:
    prose: |
      **Gestao de PEPs estrangeiros:**
      1. Lista dedicada de PEPs estrangeiros na carteira com classificacao
         de risco por jurisdicao.
      2. Monitoramento de alteracoes nas listas GAFI com reclassificacao
         de PEPs estrangeiros afetados.
      3. Revisao semestral de PEPs estrangeiros de alto risco.

      **Cooperacao internacional:**
      4. Processo para responder a solicitacoes de autoridades estrangeiras
         (via COAF).
      5. Monitoramento de sancoes internacionais com acao imediata de
         bloqueio quando aplicavel.
      6. Relatorio de exposicao internacional para diretoria e SUSEP.
      7. Participacao em forums setoriais internacionais (IAIS, GAFI).
    tools:
      - pep-management
      - sanctions-compliance
      - regulatory-cooperation
      - reporting-engine
legal_references:
