id: art-33
family: title-3
title: "Identificacao de Pessoas Politicamente Expostas"
class: SUSEP-612
statement:
  prose: |
    Art. 33. As supervisionadas devem adotar procedimentos que permitam identificar,
    entre seus clientes, as pessoas politicamente expostas (PEP), bem como seus
    representantes, familiares e estreitos colaboradores, previamente ao início do
    relacionamento e de forma contínua durante todo o período de vigência do
    relacionamento.
guidance:
  prose: |
    O art. 33 estabelece a obrigacao de screening de PEP como controle continuo
    e nao apenas pontual, refletindo a recomendacao 12 do GAFI.

    **Categorias de PEP no Brasil:**
    Conforme definicoes do COAF e art. 2 desta Circular:
    - Chefes de Estado e de Governo
    - Politicos de alto nivel (senadores, deputados, governadores, prefeitos)
    - Altos funcionarios do governo (ministros, secretarios)
    - Oficiais superiores das Forcas Armadas
    - Membros de tribunais superiores
    - Dirigentes de empresas publicas e sociedades de economia mista
    - Dirigentes de partidos politicos
    - Diplomatas de alto nivel

    **Relacionados que tambem exigem controles:**
    - Representantes: procuradores, mandatarios com poderes amplos
    - Familiares: conjuges, companheiros, filhos, pais, irmaos
    - Estreitos colaboradores: socios em negocios, pessoas que se beneficiam
      de relacao proxima com o PEP

    **Screening continuo:**
    A obrigacao de identificacao de PEP e CONTINUA:
    - No onboarding: screening antes da contratacao
    - Durante o relacionamento: screening periodico (minimo mensal)
    - Em eventos: quando PEP assume cargo publico, cliente existente deve
      ser reclassificado
    - Na saida do cargo: monitoramento por 5 anos apos deixar funcao

    **Risco de PEP no mercado securitario:**
    PEPs podem utilizar produtos securitarios para:
    - Ocultar patrimonio em VGBL/PGBL (fora de inventario ate 2023)
    - Planejamento sucessorio com beneficiarios designados fora de heranca
    - Seguros de vida com acumulacao como reserva financeira
    - Titulos de capitalizacao para movimentacao de valores
    - Seguros em nome de familiares ou interpostas pessoas

    **Implicacao pratica:**
    A supervisionada deve ter base de PEP atualizada e sistema de matching
    automatizado. PEP nao e proibido de contratar seguros, mas exige EDD e
    monitoramento reforcado.
implementation_guidance:
  platform_engineering:
    prose: |
      **Sistema de screening de PEP:**
      1. Integracao com bases de PEP nacionais (CGU, TSE, Portal da Transparencia)
         e internacionais (World-Check, Dow Jones, LexisNexis).
      2. Motor de matching com fuzzy logic para lidar com variacoes de nomes
         (acentos, abreviacoes, nomes compostos, aliases).
      3. Screening automatico no onboarding: antes da emissao de apolice ou
         adesao a plano, screening contra bases de PEP.
      4. Screening periodico batch: toda a base de clientes contra bases de
         PEP atualizadas (minimo mensal).

      **Gestao de resultados:**
      5. Workflow de resolucao de matches: true positive, false positive,
         pendente de revisao.
      6. Classificacao automatica de tipo de PEP (direto, familiar, estreito
         colaborador) e nivel de risco associado.
      7. Integracao com motor de risco para reclassificacao automatica de
         clientes identificados como PEP.
      8. Historico de screening com data, base utilizada e resultado.
    tools:
      - pep-screening-platform
      - fuzzy-matching-engine
      - kyc-platform
      - risk-scoring-engine
  devsecops:
    prose: |
      **Testes de screening:**
      1. Testes de matching com variacoes de nomes (acentos, iniciais,
         nomes do meio, aliases).
      2. Testes de false positive e false negative com base de testes
         conhecidos.
      3. Testes de performance: screening batch de toda a base deve
         completar dentro do SLA.

      **Atualizacao de bases:**
      4. Pipeline de atualizacao de bases de PEP com verificacao de
         integridade e completude.
      5. Testes de integracao com fontes de PEP (APIs, arquivos, web).
      6. Monitoramento de freshness das bases de PEP.
    tools:
      - gitlab-ci
      - matching-tests
      - performance-tests
      - data-pipeline-tests
  secops:
    prose: |
      **Gestao de PEPs:**
      1. Lista consolidada de clientes identificados como PEP (direto ou
         relacionado) com tipo, cargo, jurisdicao e nivel de risco.
      2. Revisao periodica de matches pendentes e falsos positivos.
      3. Atualizacao de status quando PEP deixa cargo (inicio do periodo
         de 5 anos de monitoramento continuado).

      **Monitoramento reforcado de PEPs:**
      4. Monitoramento diferenciado para PEPs com thresholds mais sensiveis.
      5. Revisao anual de todos os relacionamentos com PEPs.
      6. Relatorio de exposicao a PEPs para diretoria e conselho.
      7. Comparacao com benchmarks setoriais de exposicao a PEPs.
    tools:
      - pep-management
      - compliance-dashboard
      - risk-monitoring
      - reporting-engine
