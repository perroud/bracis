id: art-36
family: title-3
title: "Periodo de Monitoramento Apos Saida do Cargo"
class: SUSEP-612
statement:
  prose: |
    Art. 36. Os procedimentos previstos nos arts. 33 a 35 devem ser aplicados
    pelo período mínimo de cinco anos após a data em que a pessoa deixou de ser
    considerada pessoa politicamente exposta.
guidance:
  prose: |
    O art. 36 define o cool-down period de 5 anos apos o PEP deixar o cargo
    publico, durante o qual todos os controles de EDD devem permanecer ativos.

    **Logica do periodo de 5 anos:**
    - A influencia e os riscos associados a PEPs nao cessam imediatamente
      com a saida do cargo
    - Recursos de origem ilicita obtidos durante o mandato podem ser lavados
      nos anos seguintes
    - Relacionamentos e influencia politica perduram apos o mandato
    - Alinhamento com padrao GAFI (Recomendacao 12) e pratica internacional

    **Contagem do prazo:**
    - Data de inicio: data em que o PEP deixou o cargo (encerramento de mandato,
      exoneracao, aposentadoria, demissao)
    - Data de termino: 5 anos apos a data de inicio
    - Durante todo o periodo: todos os controles dos arts. 33-35 permanecem ativos

    **Implicacao no mercado securitario:**
    Considerando que:
    - Um mandato de governador dura 4 anos (com possibilidade de reeleicao)
    - Mais 5 anos de cool-down
    - Mais 10 anos de retencao de documentos
    A supervisionada pode precisar manter controles de PEP e documentacao por
    ate 19+ anos para um unico relacionamento.

    **Desafio operacional:**
    - Monitorar quando PEP deixou cargo (nem sempre e publico imediatamente)
    - Manter screening ativo por 5 anos apos saida
    - Atualizar bases de PEP com datas de saida de cargo
    - Reclassificar ex-PEP apos transcurso dos 5 anos

    **Reclassificacao apos 5 anos:**
    Apos os 5 anos, o ex-PEP pode ser reclassificado para risco normal SE:
    - Nao houver indicios de LD/FT durante o periodo
    - Nao houver comunicacoes ao COAF pendentes ou ativas
    - Perfil operacional seja compativel com perfil pos-cargo
    A reclassificacao deve ser documentada e aprovada pelo compliance officer.
implementation_guidance:
  platform_engineering:
    prose: |
      **Gestao de ciclo de vida de PEP:**
      1. Campo de "data de saida do cargo" no cadastro de PEP com calculo
         automatico da data de termino do cool-down (5 anos).
      2. Alerta automatico quando PEP atinge marco de 5 anos para avaliacao
         de reclassificacao.
      3. Manutencao automatica de todos os controles de EDD durante o
         cool-down period.
      4. Workflow de reclassificacao pos-cool-down com checklist de
         verificacao e aprovacao do compliance officer.

      **Monitoramento de saida de cargo:**
      5. Integracao com bases de PEP que registram saida de cargo.
      6. Monitoramento de midia para identificar quando PEPs conhecidos
         deixam cargos.
      7. Atualizacao periodica de status de PEPs na base de clientes.
    tools:
      - pep-lifecycle-management
      - kyc-platform
      - workflow-engine
      - pep-screening-platform
  devsecops:
    prose: |
      **Testes de cool-down:**
      1. Testes de calculo de data de termino do cool-down para diferentes
         cenarios (mandato, exoneracao, aposentadoria).
      2. Testes de manutencao de controles: EDD deve permanecer ativa durante
         todo o cool-down.
      3. Testes de reclassificacao: apos 5 anos, workflow de reclassificacao
         deve ser disponibilizado.

      **Automacao:**
      4. Testes de alertas: notificacao ao compliance officer quando PEP
         atinge 5 anos.
      5. Testes de que reclassificacao prematura (antes de 5 anos) e
         bloqueada pelo sistema.
    tools:
      - gitlab-ci
      - unit-tests
      - workflow-tests
      - date-calculation-tests
  secops:
    prose: |
      **Gestao do cool-down:**
      1. Lista de ex-PEPs em periodo de cool-down com data de saida do
         cargo e data prevista de reclassificacao.
      2. Revisao anual de ex-PEPs em cool-down para verificar se perfil
         permanece compativel.
      3. Processo de reclassificacao formal apos 5 anos com documentacao
         completa.

      **Controles durante cool-down:**
      4. Manutencao de monitoramento reforcado durante todo o periodo.
      5. Midia adversa: monitoramento de noticias sobre ex-PEPs.
      6. Verificacao de novos cargos: ex-PEP que assume novo cargo
         relevante reinicia contagem.
      7. Relatorio de ex-PEPs em cool-down para compliance officer.
    tools:
      - pep-management
      - compliance-calendar
      - adverse-media-monitoring
      - reporting-engine
legal_references:
  - framework_id: bcb-3978
    articles: ["art-36"]
    relationship: equivalent-to
