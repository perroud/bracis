id: art-25
family: cap-5
title: "Analise de Operacoes Selecionadas"
class: SUSEP-612
statement:
  prose: |
    Art. 25. As operações selecionadas conforme os critérios de que trata o art. 24
    devem ser analisadas no prazo máximo de quarenta e cinco dias, contados da data
    da seleção, com o objetivo de:
    I - confirmar ou descartar a suspeita de lavagem de dinheiro ou de financiamento
    do terrorismo;
    II - fundamentar a decisão de comunicar ou não ao COAF;
    III - documentar a análise realizada e a decisão adotada.
guidance:
  prose: |
    O art. 25 estabelece o prazo e os objetivos da analise de alertas gerados pelo
    sistema de monitoramento, criando o workflow de investigacao.

    **Prazo de 45 dias:**
    Contados da data em que o alerta foi gerado (selecao), a supervisionada tem
    no maximo 45 dias para:
    1. Analisar o alerta
    2. Decidir se configura suspeita de LD/FT
    3. Decidir sobre comunicacao ao COAF
    4. Documentar a analise e decisao

    Prazos menores devem ser aplicados internamente para alertas de alta prioridade.
    Na pratica, recomenda-se:
    - Alertas urgentes (PEP, alto valor, especie): 5 dias uteis
    - Alertas altos: 10 dias uteis
    - Alertas medios: 20 dias uteis
    - Alertas baixos: 45 dias

    **Processo de analise:**

    1. Confirmacao ou descarte (inciso I):
       O analista deve investigar o alerta utilizando:
       - Dados cadastrais do cliente (KYC)
       - Historico operacional completo
       - Fontes externas (midia adversa, bases publicas)
       - Contato com area de negocio para contexto operacional
       - Consulta ao corretor/intermediario quando aplicavel
       A conclusao deve ser uma das tres: suspeita confirmada (comunicar ao COAF),
       suspeita descartada (arquivar com justificativa), ou insuficiencia de
       informacoes (solicitar dados adicionais e revisitar).

    2. Fundamentacao da decisao (inciso II):
       A decisao de comunicar ou nao deve ser fundamentada com:
       - Analise dos fatos e operacoes
       - Contexto do relacionamento do cliente
       - Tipologias de LD/FT aplicaveis
       - Documentos e evidencias consultados
       Decisoes de NAO comunicar devem ser tao bem fundamentadas quanto decisoes
       de comunicar, pois a SUSEP pode questionar ambas.

    3. Documentacao (inciso III):
       Dossie completo com:
       - Descricao do alerta e regra que o gerou
       - Dados do cliente e operacoes analisadas
       - Fontes consultadas e resultados
       - Analise do analista
       - Decisao e justificativa
       - Aprovacao do supervisor/compliance officer
       O dossie deve ser retido por 10 anos.
implementation_guidance:
  platform_engineering:
    prose: |
      **Workflow de investigacao:**
      1. Sistema de case management com workflow estruturado: triagem, analise,
         revisao, decisao, comunicacao (quando aplicavel).
      2. Controle de SLA automatico com alertas de proximidade do prazo de
         45 dias e escalacao automatica quando prazo excede 80%.
      3. Interface de analise com visao 360 do cliente: dados cadastrais,
         historico operacional, alertas anteriores, comunicacoes ao COAF,
         midia adversa.
      4. Templates de analise por tipo de alerta para padronizar investigacao.

      **Ferramentas de investigacao:**
      5. Busca em fontes externas integrada: midia adversa, processos judiciais,
         listas de sancoes atualizadas.
      6. Grafos de relacionamento entre clientes, beneficiarios, intermediarios
         e operacoes.
      7. Timeline de operacoes do cliente para visualizacao de padroes.
      8. Modulo de documentacao com campos estruturados e texto livre.
    tools:
      - case-management
      - investigation-platform
      - graph-analytics
      - adverse-media-screening
  devsecops:
    prose: |
      **Testes de workflow de investigacao:**
      1. Testes end-to-end do fluxo: alerta > triagem > analise > decisao >
         comunicacao.
      2. Testes de SLA: alerta proximo do prazo de 45 dias deve gerar
         escalacao automatica.
      3. Testes de completude: caso nao pode ser fechado sem campos
         obrigatorios preenchidos.

      **Qualidade da analise:**
      4. Metricas de qualidade por analista: tempo medio, taxa de comunicacao,
         consistencia de decisoes.
      5. Amostragem de decisoes de nao-comunicacao para revisao de qualidade.
      6. Audit trail completo de cada passo da investigacao.
    tools:
      - gitlab-ci
      - e2e-tests
      - quality-metrics
      - audit-trail
  secops:
    prose: |
      **Gestao de casos:**
      1. Dashboard de casos abertos com status, prazo restante e prioridade.
      2. Alocacao de casos por competencia do analista e balanceamento de
         carga de trabalho.
      3. Processo de escalacao para casos complexos que exijam envolvimento
         do compliance officer ou juridico.

      **Revisao e qualidade:**
      4. Revisao de qualidade de amostra de casos (minimo 10% dos casos
         fechados sem comunicacao ao COAF).
      5. Feedback loop: resultados de comunicacoes ao COAF (RIF - Relatorio
         de Inteligencia Financeira) alimentam melhoria de regras.
      6. Treinamento continuo de analistas com tipologias novas e casos reais.
      7. Relatorio mensal de backlog, SLA e efetividade para compliance officer.
    tools:
      - case-management
      - quality-assurance
      - training-management
      - reporting-engine
