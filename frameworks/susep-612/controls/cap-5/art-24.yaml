id: art-24
family: cap-5
title: "Selecao de Operacoes Atipicas"
class: SUSEP-612
statement:
  prose: |
    Art. 24. As supervisionadas devem definir critérios de seleção de operações e
    situações que possam configurar indícios de lavagem de dinheiro ou de
    financiamento do terrorismo, incluindo, no mínimo:
    I - operações incompatíveis com o patrimônio, a atividade econômica ou a
    capacidade financeira do cliente;
    II - operações com valores significativos em espécie;
    III - operações que apresentem atipicidade em relação aos parâmetros de
    normalidade do mercado de seguros, previdência ou capitalização;
    IV - operações realizadas ou tentadas que, por sua natureza, possam estar
    relacionadas a lavagem de dinheiro ou ao financiamento do terrorismo.
guidance:
  prose: |
    O art. 24 detalha os criterios minimos de selecao de operacoes atipicas que
    devem alimentar o sistema de monitoramento do art. 23.

    **Criterios de selecao por inciso:**

    1. Incompatibilidade patrimonial (I):
       Regras especificas para mercado securitario:
       - Premio anual > X% da renda anual declarada
       - Aporte em VGBL/PGBL > X% do patrimonio declarado
       - Capital segurado de vida > X vezes a renda anual
       - Titulo de capitalizacao > X% da renda mensal
       Thresholds devem ser calibrados pela supervisionada conforme AIR.

    2. Operacoes em especie (II):
       - Qualquer pagamento de premio em especie (altamente atipico no mercado)
       - Solicitacao de resgate ou sinistro em especie
       - Operacoes em especie acima do threshold de R$ 50.000 (art. 20)
       - Fracionamento de operacoes em especie

    3. Atipicidade de mercado (III):
       Padroes que desviam do comportamento normal do mercado:
       - Contratacao e cancelamento rapido (free look abusivo)
       - Resgate antecipado com aceitacao de penalidade significativa
       - Multiplas transferencias de titularidade
       - Portabilidade em cadeia entre instituicoes
       - Seguro de vida com capital segurado desproporcionalmente alto sem
         justificativa economica (planejamento sucessorio documentado)
       - Sinistro frequente em segurado sem historico
       - Premio unico de alto valor em produto de acumulacao

    4. Natureza da operacao (IV):
       Cenarios que por sua propria natureza levantam suspeita:
       - Operacao em nome de terceiro sem justificativa
       - Tentativa de operacao que e abandonada apos solicitacao de dados
       - Cliente que demonstra conhecimento incomum de limites regulatorios
       - Operacao com estrutura incomum sem justificativa economica
       - Relutancia em fornecer informacoes de KYC

    **Obrigacao de documentar criterios:**
    A supervisionada deve ter os criterios de selecao formalmente documentados,
    aprovados pelo compliance officer e revisados periodicamente.
implementation_guidance:
  platform_engineering:
    prose: |
      **Catalogo de regras de selecao:**
      1. Biblioteca de regras de monitoramento com cenarios especificos para
         cada inciso do art. 24, parametrizaveis por produto, canal e perfil.
      2. Regras de incompatibilidade patrimonial com thresholds por faixa de
         renda e tipo de produto.
      3. Regras de atipicidade de mercado baseadas em benchmarks estatisticos
         (media, desvio padrao, percentis da carteira).
      4. Regras de natureza suspeita baseadas em tipologias do COAF e GAFI
         para mercado de seguros.

      **Motor de deteccao:**
      5. Execucao automatica de todas as regras em 100% das operacoes.
      6. Scoring de alerta composito: quanto mais regras acionadas, maior
         a prioridade.
      7. Deteccao de padroes temporais: sequencias de operacoes suspeitas
         ao longo do tempo.
      8. Whitelist parametrizavel para excecoes documentadas e aprovadas.
    tools:
      - rules-engine
      - transaction-monitoring-system
      - pattern-detection
      - statistical-analysis
  devsecops:
    prose: |
      **Testes de regras de selecao:**
      1. Testes para cada regra do catalogo com cenarios de deteccao e
         nao-deteccao.
      2. Testes de threshold: valores exatamente no limite, acima e abaixo.
      3. Testes de combinacao: cenarios que acionam multiplas regras
         simultaneamente.

      **Governanca de regras:**
      4. Versionamento de regras em repositorio Git com historico de
         alteracoes.
      5. Pipeline de validacao de novas regras com backtesting antes de
         implantacao em producao.
      6. Processo de aprovacao para criacao, alteracao e desativacao de regras.
    tools:
      - gitlab-ci
      - unit-tests
      - backtesting-pipeline
      - approval-workflows
  secops:
    prose: |
      **Revisao de criterios:**
      1. Revisao semestral dos criterios de selecao com participacao de
         compliance, atuarial e areas de negocio.
      2. Atualizacao de criterios quando COAF ou GAFI publicam novas
         tipologias para mercado securitario.
      3. Calibracao de thresholds baseada em metricas de efetividade
         (falsos positivos, taxa de deteccao).

      **Documentacao e auditoria:**
      4. Catalogo de regras documentado com justificativa regulatoria para
         cada regra.
      5. Registro de todas as alteracoes em criterios com aprovacao do
         compliance officer.
      6. Auditoria independente da adequacao dos criterios (minimo anual).
      7. Relatorio de efetividade dos criterios para diretoria.
    tools:
      - rules-management
      - compliance-analytics
      - audit-management
      - reporting-engine
