id: art-26
family: cap-5
title: "Monitoramento Reforcado para Produtos de Alto Risco"
class: SUSEP-612
statement:
  prose: |
    Art. 26. As supervisionadas devem adotar procedimentos de monitoramento
    reforçado para operações envolvendo:
    I - produtos de seguro de vida com componente de acumulação ou investimento;
    II - planos de previdência complementar aberta com possibilidade de resgate;
    III - títulos de capitalização de pagamento único ou de grande valor;
    IV - operações de resseguro com cedentes ou retrocessionários sediados em
    jurisdições de maior risco.
guidance:
  prose: |
    O art. 26 estabelece monitoramento reforcado para os produtos de maior risco
    de PLD/FT no mercado securitario, alinhado com as recomendacoes da IAIS
    (International Association of Insurance Supervisors) e do GAFI.

    **Produtos de maior risco por inciso:**

    1. Seguro de vida com acumulacao (I):
       - Seguro de vida inteira (whole life) com valor de resgate
       - Seguros unit-linked ou universal life
       - Seguros dotais (endowment)
       Risco: funcionam como instrumento de investimento, permitindo deposito
       de grandes valores e resgate posterior com aparencia de legitimidade.
       Monitoramento reforcado: aportes, resgates parciais e totais, alteracao
       de beneficiarios, relacao valor de resgate vs. premios pagos.

    2. Previdencia complementar aberta (II):
       - VGBL (Vida Gerador de Beneficio Livre)
       - PGBL (Plano Gerador de Beneficio Livre)
       - Planos tradicionais com resgate
       Risco: VGBL e o principal instrumento de lavagem via mercado de seguros
       brasileiro. Permite aportes elevados, tributacao diferenciada (tabela
       regressiva) e resgate a qualquer momento com tributacao reduzida apos
       10 anos.
       Monitoramento reforcado: valor de aportes vs. renda, frequencia de
       aportes extraordinarios, resgates antecipados, portabilidade em cadeia.

    3. Capitalizacao de alto valor (III):
       - Titulos de pagamento unico (PM) de valor elevado
       - Titulos de pagamento mensal (PP) com acumulacao significativa
       Risco: pagamento unico permite deposito rapido de grandes valores.
       Resgate apos carencia minima com perda parcial pode ser aceitavel para
       quem quer lavar dinheiro.
       Monitoramento reforcado: valor de aquisicao, frequencia de compra,
       resgates antecipados, transferencia de titularidade.

    4. Resseguro de alto risco (IV):
       - Cedentes de jurisdicoes de alto risco GAFI
       - Retrocessao com cadeias complexas
       - Resseguro fronting (seguradora local cede 100% para ressegurador)
       Risco: operacoes de resseguro podem ser utilizadas para transferencia
       transfronteirica de valores sem controle cambial.
       Monitoramento reforcado: volume cedido por jurisdicao, concentracao em
       cedentes especificos, operacoes com estrutura incomum.
implementation_guidance:
  platform_engineering:
    prose: |
      **Modulos de monitoramento reforcado por produto:**
      1. Modulo VGBL/PGBL: monitoramento de aportes (valor, frequencia,
         origem), resgates (valor, timing, destino), portabilidade (origem,
         destino, frequencia), relacao aporte vs. renda declarada.
      2. Modulo seguro vida com acumulacao: monitoramento de premios,
         valor de resgate vs. premios pagos, alteracao de beneficiarios,
         cancelamento com devolucao.
      3. Modulo capitalizacao: monitoramento de aquisicoes (valor, frequencia),
         resgates (timing, penalidade aceita), transferencias de titularidade.
      4. Modulo resseguro: monitoramento de cessoes por jurisdicao, volume
         por cedente, estrutura de retrocessao.

      **Thresholds diferenciados:**
      5. Parametros de alerta mais sensiveis para produtos de alto risco
         (thresholds menores, janelas temporais menores).
      6. Monitoramento em near-real-time para operacoes de alto valor em
         produtos de alto risco.
      7. Alertas compositos que consideram comportamento cross-product
         (mesmo cliente com VGBL + capitalizacao + seguro vida).
      8. Dashboard de exposicao por produto de alto risco para compliance.
    tools:
      - transaction-monitoring-system
      - product-specific-rules
      - real-time-monitoring
      - cross-product-analytics
  devsecops:
    prose: |
      **Testes de monitoramento reforcado:**
      1. Testes para cada cenario de risco por produto (VGBL, capitalizacao,
         vida com acumulacao, resseguro).
      2. Testes de threshold diferenciado: mesma operacao com threshold
         normal vs. reforcado.
      3. Testes cross-product: cenarios que envolvem multiplos produtos.

      **Calibracao continua:**
      4. Backtesting de regras de monitoramento reforcado contra comunicacoes
         historicas ao COAF.
      5. Analise de falsos positivos por produto para calibracao de thresholds.
      6. Pipeline de deploy de novas regras com validacao em staging.
    tools:
      - gitlab-ci
      - backtesting-framework
      - staging-environment
      - regression-tests
  secops:
    prose: |
      **Monitoramento operacional:**
      1. Equipe de analistas especializados em produtos de alto risco com
         treinamento especifico em tipologias de VGBL, capitalizacao e
         resseguro.
      2. SLA diferenciado para alertas de produtos de alto risco (tempo
         menor de analise).
      3. Escalacao automatica para compliance officer em alertas de alto
         valor em produtos de alto risco.

      **Efetividade e calibracao:**
      4. Metricas de efetividade por produto: taxa de conversao, falsos
         positivos, tempo de analise.
      5. Revisao trimestral de regras de monitoramento reforcado.
      6. Benchmarking com tipologias do COAF e GAFI especificas para
         seguros e previdencia.
      7. Relatorio de exposicao por produto de alto risco para diretoria.
    tools:
      - case-management
      - analytics-dashboard
      - specialist-training
      - reporting-engine
