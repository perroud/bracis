id: art-16
family: cap-3
title: "Atualizacao Cadastral Periodica"
class: SUSEP-612
statement:
  prose: |
    Art. 16. As supervisionadas devem manter atualizadas as informações cadastrais
    de seus clientes, adotando procedimentos periódicos de atualização compatíveis
    com a classificação de risco de cada cliente:
    I - clientes de maior risco: atualização no mínimo anual;
    II - clientes de risco médio: atualização no mínimo a cada dois anos;
    III - clientes de menor risco: atualização no mínimo a cada cinco anos.
guidance:
  prose: |
    O art. 16 define a frequencia minima de atualizacao cadastral conforme nivel
    de risco do cliente, essencial para manter a efetividade dos controles de PLD/FT.

    **Frequencia por nivel de risco:**

    1. Alto risco -- anual (inciso I):
       Clientes que exigem atencao constante:
       - PEPs e seus relacionados
       - Nao-residentes de paises de risco
       - Clientes com historico de operacoes atipicas
       - Grandes fortunas com VGBL/PGBL de alto valor
       - Pessoas juridicas com estrutura complexa

    2. Risco medio -- bienal (inciso II):
       Maioria dos clientes individuais:
       - Segurados de vida com acumulacao de valor moderado
       - Participantes de planos de previdencia com aportes regulares
       - Empresas de porte medio com seguros compativeis

    3. Baixo risco -- quinquenal (inciso III):
       Clientes de menor exposicao:
       - Segurados de seguros massificados (auto, residencial)
       - Capitalizacao de pequeno valor
       - Seguros obrigatorios

    **Desafio operacional no mercado securitario:**
    Diferentemente do setor bancario, onde o cliente interage frequentemente
    com a instituicao, no mercado de seguros o cliente pode nao ter contato
    por anos (vigencia plurianual, renovacao automatica). A supervisionada
    deve ter estrategia proativa de atualizacao:
    - Campanhas de atualizacao cadastral no vencimento/renovacao de apolice
    - Atualizacao no momento do sinistro ou resgate
    - Enriquecimento automatico via bases publicas (quando permitido)
    - Contato ativo para clientes de alto risco

    **Consequencia de cadastro desatualizado:**
    Cliente com cadastro desatualizado nao pode ter operacoes processadas ate
    regularizacao. Na pratica, a supervisionada deve bloquear:
    - Renovacao de apolice com cadastro vencido conforme classificacao
    - Pagamento de sinistro sem verificacao atualizada do beneficiario
    - Resgate de VGBL/PGBL sem confirmacao de dados cadastrais
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de atualizacao cadastral:**
      1. Sistema de gestao de ciclo de vida cadastral com alertas automaticos
         por nivel de risco: 12 meses (alto), 24 meses (medio), 60 meses (baixo).
      2. Workflow de atualizacao cadastral com etapas de notificacao ao cliente,
         coleta de dados, verificacao e aprovacao.
      3. Integracao com canais de comunicacao (email, SMS, app, corretor) para
         solicitar atualizacao cadastral de forma proativa.
      4. Enriquecimento automatico de dados via bases publicas (Receita Federal,
         bureaus de credito) para complementar atualizacao.

      **Controles de bloqueio:**
      5. Bloqueio automatico de operacoes quando cadastro esta vencido conforme
         classificacao de risco.
      6. Grace period configuravel por tipo de operacao e nivel de risco.
      7. Escalacao automatica quando cliente nao responde a solicitacao de
         atualizacao dentro do prazo.
      8. Dashboard de cobertura de atualizacao cadastral por carteira.
    tools:
      - kyc-platform
      - workflow-engine
      - communication-platform
      - data-enrichment
  devsecops:
    prose: |
      **Testes de ciclo cadastral:**
      1. Testes unitarios para calculo de data de vencimento cadastral por
         nivel de risco.
      2. Testes de bloqueio: operacao com cadastro vencido deve ser impedida.
      3. Testes de notificacao: alertas disparados nos prazos corretos.

      **Automacao:**
      4. Pipeline de enriquecimento de dados com validacao de qualidade.
      5. Testes de integracao com bases publicas de atualizacao.
      6. Monitoramento de taxa de sucesso de atualizacao automatica.
    tools:
      - gitlab-ci
      - unit-tests
      - integration-tests
      - data-pipeline-tests
  secops:
    prose: |
      **Monitoramento de conformidade:**
      1. Dashboard de vencimento cadastral com projecao de 30, 60 e 90 dias.
      2. Relatorio de clientes com cadastro vencido por nivel de risco e
         carteira.
      3. Processo de escalacao para clientes de alto risco com cadastro vencido
         ha mais de 30 dias.

      **Gestao de remediation:**
      4. Plano de acao para carteira legada com cadastros desatualizados.
      5. Priorizacao de atualizacao por nivel de risco e exposicao.
      6. Metricas de conformidade: percentual de clientes com cadastro
         atualizado por nivel de risco.
      7. Relatorio periodico para diretoria e SUSEP sobre status de
         atualizacao cadastral.
    tools:
      - compliance-dashboard
      - remediation-tracker
      - reporting-engine
      - kyc-platform
