id: art-18
family: cap-3
title: "Responsabilidade de Corretores e Intermediarios"
class: SUSEP-612
statement:
  prose: |
    Art. 18. As supervisionadas que utilizem corretores de seguros, agentes ou
    outros intermediários para a distribuição de seus produtos devem:
    I - assegurar que os procedimentos de identificação e qualificação de clientes
    sejam aplicados pelos intermediários em nome da supervisionada;
    II - manter a responsabilidade pela adequação dos procedimentos de PLD/FT
    aplicados pelos intermediários;
    III - verificar periodicamente a conformidade dos procedimentos aplicados
    pelos intermediários com os requisitos desta Circular.
guidance:
  prose: |
    O art. 18 trata da responsabilidade da supervisionada pelos procedimentos de
    PLD/FT executados por intermediarios -- questao central no mercado securitario,
    onde a distribuicao por corretores e dominante.

    **Cadeia de distribuicao no mercado securitario:**
    A venda de seguros envolve tipicamente:
    - Corretores de seguros (pessoa fisica ou juridica, habilitados pela SUSEP)
    - Agentes autorizados (bancos no bancassurance, varejistas)
    - Correspondentes de seguros
    - Estipulantes de seguros coletivos
    - Plataformas digitais de distribuicao
    Em todos os casos, a responsabilidade regulatoria por PLD/FT permanece com
    a supervisionada (seguradora, EAPC, capitalizadora).

    **Obrigacoes da supervisionada (incisos I a III):**

    1. Garantir aplicacao de KYC pelos intermediarios (I):
       - Treinamento dos corretores em procedimentos de PLD/FT
       - Formularios padronizados de coleta de dados
       - Sistemas de onboarding acessiveis aos corretores
       - Validacao dos dados coletados pelo corretor

    2. Responsabilidade solidaria (II):
       - A supervisionada nao pode se eximir alegando falha do corretor
       - Due diligence do proprio intermediario (KYI - Know Your Intermediary)
       - Contratos com clausulas especificas de compliance PLD/FT
       - Poder de auditoria sobre os procedimentos do intermediario

    3. Verificacao periodica (III):
       - Auditoria periodica de amostra de operacoes intermediadas
       - Verificacao de qualidade dos dados coletados por corretores
       - Avaliacao de conformidade dos processos de KYC do intermediario
       - Testes de controle (mystery shopping, revisao de dossies)

    **Risco de corretores no contexto de PLD/FT:**
    Corretores representam risco significativo porque:
    - Sao o primeiro ponto de contato com o cliente
    - Podem facilitar operacoes de lavagem por comissao ou negligencia
    - Podem falsificar ou omitir informacoes de KYC
    - Podem operar em areas de alto risco sem supervisao direta
    - Corretores independentes nao estao sob controle direto da supervisionada
implementation_guidance:
  platform_engineering:
    prose: |
      **Portal de intermediarios:**
      1. Portal dedicado para corretores e intermediarios com acesso ao sistema
         de onboarding de clientes, garantindo coleta padronizada de dados de KYC.
      2. API de onboarding que valida dados em tempo real, independentemente
         de quem coleta (front office direto ou intermediario).
      3. Modulo de cadastro e due diligence de intermediarios (KYI - Know Your
         Intermediary) com screening de PEP, sancoes e historico regulatorio.
      4. Scoring de risco do intermediario baseado em: historico de conformidade,
         volume de operacoes, area geografica, incidencia de alertas.

      **Controles de qualidade:**
      5. Validacao automatica de completude e consistencia dos dados de KYC
         coletados pelo intermediario antes de aceitacao.
      6. Amostragem automatica de propostas intermediadas para revisao de
         qualidade.
      7. Dashboard de conformidade por intermediario com indicadores de
         qualidade de dados.
      8. Bloqueio de intermediario com taxa de nao-conformidade acima do
         threshold.
    tools:
      - broker-portal
      - kyc-platform
      - intermediary-risk-scoring
      - quality-assurance-engine
  devsecops:
    prose: |
      **Testes de integracao com intermediarios:**
      1. Testes do fluxo de onboarding via portal de intermediarios end-to-end.
      2. Testes de validacao: dados incompletos enviados por intermediario devem
         ser rejeitados.
      3. Testes de bloqueio de intermediario com compliance deficiente.

      **Seguranca do portal:**
      4. Autenticacao forte para acesso de intermediarios (MFA obrigatorio).
      5. Controle de acesso granular: intermediario so ve seus proprios clientes.
      6. Logs de todas as acoes de intermediarios para auditoria.
    tools:
      - gitlab-ci
      - e2e-tests
      - mfa-tests
      - access-control-tests
  secops:
    prose: |
      **Auditoria de intermediarios:**
      1. Programa de auditoria periodica de intermediarios com amostragem
         proporcional ao risco e volume.
      2. Revisao de qualidade de dados de KYC coletados por cada intermediario.
      3. Mystery shopping para testar aderencia dos corretores aos procedimentos.

      **Gestao de intermediarios:**
      4. Due diligence de intermediarios antes da contratacao e periodicamente
         (anual para alto risco).
      5. Treinamento obrigatorio de PLD/FT para todos os intermediarios com
         certificacao.
      6. Processo de descredenciamento de intermediarios que nao atendem
         requisitos de compliance.
      7. Relatorio de conformidade de intermediarios para diretoria e SUSEP.
    tools:
      - audit-management
      - broker-management
      - training-management
      - compliance-reporting
