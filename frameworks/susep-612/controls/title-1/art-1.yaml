id: art-1
family: title-1
title: "Objeto da Circular"
class: SUSEP-612
statement:
  prose: |
    Art. 1. Esta Circular dispõe sobre os procedimentos a serem adotados pelas
    sociedades seguradoras, entidades abertas de previdência complementar, sociedades
    de capitalização e resseguradores locais, visando a prevenção e o combate aos
    crimes de lavagem de dinheiro ou ocultação de bens, direitos e valores, bem como
    ao financiamento do terrorismo, em conformidade com a Lei n. 9.613, de 3 de
    março de 1998, e demais normas aplicáveis.
guidance:
  prose: |
    O art. 1 define o escopo objetivo e subjetivo da Circular SUSEP 612, estabelecendo
    o universo de entidades obrigadas e os crimes visados pela regulamentacao.

    **Entidades obrigadas (escopo subjetivo):**
    Quatro categorias de entidades supervisionadas pela SUSEP:
    1. Sociedades seguradoras: empresas que operam seguros de vida, nao-vida, saude
       suplementar e previdencia
    2. Entidades abertas de previdencia complementar (EAPCs): planos PGBL, VGBL e
       similares
    3. Sociedades de capitalizacao: titulos de capitalizacao (sorteio e poupanca)
    4. Resseguradores locais: empresas sediadas no Brasil que aceitam resseguro

    **Crimes visados (escopo objetivo):**
    - Lavagem de dinheiro: ocultar ou dissimular a natureza, origem, localizacao,
      disposicao, movimentacao ou propriedade de bens, direitos ou valores provenientes
      de infracoes penais (Lei 9.613/1998)
    - Financiamento do terrorismo: prover fundos para atos terroristas (Lei 13.260/2016)

    **Base legal:**
    A Circular implementa no ambito securitario as obrigacoes da Lei 9.613/1998 (Lei de
    Lavagem de Dinheiro), conforme alterada pela Lei 12.683/2012, e as recomendacoes
    do GAFI/FATF para o setor de seguros.

    **Implicacao pratica:**
    Toda entidade supervisionada pela SUSEP, independentemente de porte ou volume de
    operacoes, deve implementar integralmente os procedimentos desta Circular. Nao ha
    dispensa por porte, mas a proporcionalidade e permitida na avaliacao de risco.
implementation_guidance:
  platform_engineering:
    prose: |
      **Mapeamento de escopo regulatorio:**
      1. Inventario de todas as entidades do grupo economico supervisionadas pela SUSEP,
         identificando quais estao sujeitas a esta Circular.
      2. Classificacao de cada entidade por tipo (seguradora, EAPC, capitalizacao,
         ressegurador) para aplicacao de controles proporcionais.
      3. Registro centralizado de produtos e operacoes que se enquadram no escopo de
         PLD/FT: seguros de vida com acumulacao, PGBL/VGBL, titulos de capitalizacao
         com resgate, operacoes de resseguro de grande porte.

      **Infraestrutura de compliance:**
      4. Plataforma centralizada de gestao de compliance PLD/FT com modulo especifico
         para mercado securitario.
      5. Integracao com sistemas core de seguros (emissao, sinistros, cobranca) para
         captura automatica de dados relevantes para monitoramento.
      6. API gateway dedicado para comunicacao com sistemas do COAF (SISCOAF).
      7. Data lake regulatorio segregado com dados de KYC, operacoes e alertas de PLD/FT,
         com retencao minima de 10 anos conforme exigencia legal.
    tools:
      - grc-platform
      - data-lake
      - api-gateway
      - compliance-engine
  devsecops:
    prose: |
      **Rastreabilidade regulatoria no desenvolvimento:**
      1. Documentacao dos requisitos de PLD/FT acessivel a todas as equipes de
         desenvolvimento que trabalham com sistemas de seguros.
      2. Checklist de compliance PLD/FT integrado ao processo de code review para
         funcionalidades que tratam dados de clientes ou transacoes.
      3. Testes automatizados que validam integracao com SISCOAF e envio de comunicacoes.

      **Pipeline com controles regulatorios:**
      4. Verificacao automatica de que novos produtos ou canais de distribuicao estao
         mapeados no escopo de PLD/FT antes de deploy em producao.
      5. Feature flags para ativacao gradual de novos controles de monitoramento.
      6. Testes de regressao especificos para logicas de deteccao de operacoes atipicas.
    tools:
      - gitlab-ci
      - feature-flags
      - compliance-tests
      - integration-tests
  secops:
    prose: |
      **Gestao do escopo regulatorio:**
      1. Inventario atualizado de todas as entidades supervisionadas e seus produtos
         no escopo de PLD/FT.
      2. Revisao anual do escopo regulatorio para identificar novos produtos, canais
         ou operacoes que exijam controles adicionais.
      3. Monitoramento de alteracoes regulatorias da SUSEP, COAF e GAFI que impactem
         os procedimentos de PLD/FT.

      **Auditoria de conformidade:**
      4. Assessment anual de conformidade com todos os capitulos da Circular.
      5. Gap analysis com plano de remediacao priorizado por risco.
      6. Relatorio de conformidade para diretoria e conselho de administracao.
      7. Retencao de evidencias de conformidade por periodo minimo de 10 anos.
    tools:
      - grc-platform
      - regulatory-change-management
      - audit-management
      - document-retention
