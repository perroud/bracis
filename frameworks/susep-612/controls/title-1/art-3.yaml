id: art-3
family: title-1
title: "Abordagem Baseada em Risco"
class: SUSEP-612
statement:
  prose: |
    Art. 3. As supervisionadas devem adotar procedimentos e controles internos de
    prevenção à lavagem de dinheiro e ao financiamento do terrorismo compatíveis com
    seu porte, volume de operações, complexidade dos produtos e serviços oferecidos,
    perfil de risco dos clientes e áreas geográficas de atuação, adotando abordagem
    baseada em risco.
guidance:
  prose: |
    O art. 3 consagra a abordagem baseada em risco (Risk-Based Approach - RBA) como
    principio norteador de todos os procedimentos de PLD/FT no mercado securitario.

    **Principio da proporcionalidade:**
    A Circular nao exige controles uniformes para todas as entidades. Os procedimentos
    devem ser proporcionais a cinco fatores:
    1. Porte da supervisionada: grandes seguradoras vs. pequenas capitalizadoras
    2. Volume de operacoes: quantidade e valor de premios, sinistros e resgates
    3. Complexidade dos produtos: VGBL com aportes significativos vs. seguro auto basico
    4. Perfil de risco dos clientes: PEPs, nao-residentes, grandes fortunas
    5. Areas geograficas: regioes de fronteira, paises de alto risco GAFI

    **Alinhamento com GAFI/FATF:**
    A RBA e a recomendacao central do GAFI para o setor de seguros (Recomendacao 1).
    No mercado securitario, os riscos de LD/FT sao particularmente elevados em:
    - Seguros de vida com componente de investimento (unit-linked, VGBL)
    - Titulos de capitalizacao com valores elevados de resgate
    - Resseguros com cadeias complexas de retrocessao
    - Seguros com pagamento de premio unico de alto valor

    **Implicacao pratica:**
    Uma seguradora que opera exclusivamente em seguros de automoveis tem perfil de
    risco de PLD/FT substancialmente diferente de uma EAPC que administra VGBL de
    grandes fortunas. Os controles devem refletir essa diferenca, mas ambas devem
    ter politica e procedimentos formais.
implementation_guidance:
  platform_engineering:
    prose: |
      **Motor de risco de PLD/FT:**
      1. Engine de scoring de risco parametrizavel com fatores especificos do mercado
         securitario: tipo de produto, valor de premio, forma de pagamento, perfil do
         cliente, geografia.
      2. Modelo de dados que suporte classificacao de risco em multiplas dimensoes:
         cliente, produto, canal, geografia, operacao.
      3. Calibracao diferenciada por tipo de entidade (seguradora vida vs. nao-vida,
         EAPC, capitalizadora, ressegurador).

      **Infraestrutura de proporcionalidade:**
      4. Configuracao de thresholds de monitoramento ajustaveis por perfil de risco
         da entidade e do produto.
      5. Regras de escalacao automatica baseadas no nivel de risco apurado.
      6. Dashboard de distribuicao de risco por carteira, produto e geografia.
      7. Backtesting periodico do modelo de risco com dados reais de comunicacoes
         ao COAF e investigacoes.
    tools:
      - risk-scoring-engine
      - rules-engine
      - analytics-platform
      - ml-pipeline
  devsecops:
    prose: |
      **Testes de modelo de risco:**
      1. Testes unitarios para todas as regras de scoring de risco com cenarios
         especificos do mercado securitario.
      2. Testes de integracao para fluxos de classificacao de risco end-to-end
         (onboarding, operacao, monitoramento).
      3. Testes de performance para garantir que o scoring nao impacte o tempo
         de emissao de apolices ou processamento de sinistros.

      **Versionamento de modelos:**
      4. Modelos de risco versionados em repositorio Git com historico de alteracoes.
      5. Pipeline de validacao de modelos com backtesting automatizado.
      6. Processo de aprovacao para alteracoes em parametros de risco com segregacao
         de funcoes (quem desenvolve nao aprova).
    tools:
      - gitlab-ci
      - model-registry
      - backtesting-framework
      - approval-workflows
  secops:
    prose: |
      **Governanca do modelo de risco:**
      1. Revisao anual da metodologia de avaliacao de risco com participacao do
         compliance officer e da diretoria.
      2. Documentacao formal da metodologia com justificativa para cada fator de
         risco e respectivo peso.
      3. Validacao independente do modelo de risco por auditoria interna ou externa.

      **Monitoramento da efetividade:**
      4. Metricas de efetividade do modelo: taxa de falsos positivos, taxa de
         deteccao, tempo medio de analise por alerta.
      5. Comparacao com benchmarks setoriais (quando disponiveis via SUSEP ou
         associacoes de classe).
      6. Relatorio periodico para diretoria sobre efetividade dos controles de
         PLD/FT com indicadores quantitativos.
      7. Ajuste de parametros baseado em tipologias divulgadas pelo COAF e GAFI.
    tools:
      - grc-platform
      - risk-analytics
      - model-validation
      - reporting-engine
