id: cond-4
family: conditions
title: "Condition 4: Further Processing Limitation"
class: POPIA
statement:
  prose: |
    The further processing of personal information must be compatible with the purpose
    for which it was originally collected (Section 15). Compatibility is assessed against
    specific criteria including the relationship between the original and further purpose,
    the nature of the information, and the consequences for the data subject.
  parts:
    - id: cond-4-a
      label: "15(1)"
      prose: |
        Further processing of personal information must be compatible with the purpose
        for which it was collected in terms of Section 13.
    - id: cond-4-b
      label: "15(3)"
      prose: |
        In determining whether further processing is compatible, the responsible party
        must take account of: (a) the relationship between the purpose and the further
        purpose; (b) the nature of the information; (c) the consequences of the intended
        further processing; (d) the manner in which the information was collected; and
        (e) any contractual rights and obligations between the parties.
guidance:
  prose: |
    Further Processing Limitation prevents "purpose creep" — using personal information
    collected for one purpose for an unrelated purpose without new consent or justification.

    Key considerations:

    - **Compatibility test:** Further processing must be assessed against the five
      criteria in Section 15(3). The closer the further purpose is to the original, the
      more likely it is compatible.

    - **Exemptions (Section 15(3)):** Further processing is always compatible if it is
      for historical, statistical, or research purposes (with adequate safeguards), or
      if the data subject consented to the further processing.

    - **Internal analytics:** Using customer data for internal analytics may be
      compatible if the analytics purpose is closely related to the original collection
      purpose. Using it for an entirely different business line is likely incompatible.

    - **Data sharing:** Sharing PI with third parties for a new purpose almost always
      requires fresh consent or a new lawful basis.

    - **Documentation:** The compatibility assessment must be documented and retained
      as part of the accountability obligation (Condition 1).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement purpose-binding enforcement — data tagged for purpose A cannot be
         accessed by services operating under purpose B without explicit compatibility
         assessment approval.
      2. Build a compatibility assessment workflow tool that guides teams through the
         Section 15(3) criteria before any new use of existing PI.
      3. Implement data access gates that require purpose declaration and validation
         before granting access to personal information stores.
      4. Create a purpose lineage tracker that shows the chain of purposes from
         original collection through all subsequent uses.
    tools:
      - purpose-binding-engine
      - compatibility-assessment-workflow
      - data-access-gateway
      - purpose-lineage-tracker
  devsecops:
    prose: |
      1. Enforce purpose declarations in code — any service accessing PI must declare
         its purpose, validated against the purpose registry.
      2. Detect unauthorized cross-purpose data access in code review and CI/CD.
      3. Test purpose-binding enforcement as part of integration testing.
      4. Flag data pipeline changes that route PI to new consumers without compatibility
         assessment.
    tools:
      - purpose-declaration-enforcer
      - cross-purpose-detector
      - purpose-binding-tests
      - pipeline-audit
  secops:
    prose: |
      1. Monitor data access patterns for anomalous cross-purpose usage.
      2. Alert on new data consumers accessing existing PI stores.
      3. Audit compatibility assessments for completeness and validity.
      4. Track and report on purpose evolution across the data lifecycle.
    tools:
      - data-access-monitor
      - anomaly-detector
      - assessment-auditor
      - purpose-tracker
legal_references:
  - framework_id: gdpr
    articles: ["art. 5(1)(b)", "art. 6(4)"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art. 6 (I)", "art. 6 (II)"]
    relationship: equivalent-to
