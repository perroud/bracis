id: cond-7
family: conditions
title: "Condition 7: Security Safeguards"
class: POPIA
statement:
  prose: |
    The responsible party must secure the integrity and confidentiality of personal
    information in its possession or under its control by taking appropriate, reasonable
    technical and organisational measures to prevent loss, damage, unauthorised
    destruction, or unlawful access (Sections 19-22).
  parts:
    - id: cond-7-a
      label: "19(1)"
      prose: |
        A responsible party must secure the integrity and confidentiality of personal
        information in its possession or under its control by taking appropriate,
        reasonable technical and organisational measures to prevent loss of, damage to,
        or unauthorised destruction of personal information, and unlawful access to or
        processing of personal information.
    - id: cond-7-b
      label: "19(2)"
      prose: |
        In order to give effect to subsection (1), the responsible party must take
        reasonable measures to: (a) identify all reasonably foreseeable internal and
        external risks; (b) establish and maintain appropriate safeguards; (c) regularly
        verify that safeguards are effectively implemented; and (d) ensure safeguards are
        continually updated in response to new risks or deficiencies.
    - id: cond-7-c
      label: "19(3)"
      prose: |
        The responsible party must have due regard to generally accepted information
        security practices and procedures which may apply to it generally or be required
        in terms of specific industry or professional rules and regulations.
    - id: cond-7-d
      label: "20"
      prose: |
        An operator or anyone processing personal information on behalf of a responsible
        party must process such information only with the knowledge or authorization of
        the responsible party, treat it as confidential, and establish and maintain
        security measures as referred to in Section 19.
    - id: cond-7-e
      label: "21"
      prose: |
        The responsible party must, in terms of a written contract, ensure that an
        operator which processes personal information on its behalf establishes and
        maintains security measures as referred to in Section 19.
    - id: cond-7-f
      label: "22"
      prose: |
        Where there are reasonable grounds to believe that personal information has been
        accessed or acquired by any unauthorised person, the responsible party must notify
        the Regulator and the data subject (unless the identity cannot be established),
        as soon as reasonably possible.
guidance:
  prose: |
    Security Safeguards is the most technically prescriptive condition. It requires a
    risk-based approach to security with continuous verification and improvement.

    Key requirements:

    - **Risk assessment (19(2)(a)):** Formally identify all foreseeable risks to PI —
      internal threats (insider access, human error) and external threats (cyberattacks,
      physical theft).

    - **Safeguards (19(2)(b)):** Implement appropriate technical and organisational
      measures. "Appropriate" is judged by: the nature of the data, the risks identified,
      industry standards, and the cost of implementation.

    - **Verification (19(2)(c)):** Regularly test and verify that safeguards work.
      Penetration testing, vulnerability scanning, and audit are required — not optional.

    - **Continuous improvement (19(2)(d)):** Security is not a one-time activity.
      Safeguards must be updated as new risks emerge.

    - **Industry standards (19(3)):** Reference ISO 27001/27002, NIST CSF, CIS Controls,
      or other recognized frameworks. "Generally accepted" means industry standard, not
      minimum viable.

    - **Operator contracts (21):** Written contracts with all operators (processors)
      must require equivalent security measures.

    - **Breach notification (22):** Linked to Chapter 8 — notify the Regulator and data
      subjects of unauthorized access as soon as reasonably possible.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement encryption at rest (AES-256) and in transit (TLS 1.3) for all
         personal information stores and communications.
      2. Deploy identity and access management (IAM) with least-privilege RBAC, MFA
         enforcement, and just-in-time access for sensitive PI.
      3. Implement data loss prevention (DLP) controls to prevent unauthorized
         exfiltration of personal information.
      4. Build automated backup and disaster recovery for all PI stores with tested
         restore procedures.
      5. Implement network segmentation to isolate PI processing systems.
      6. Deploy intrusion detection/prevention systems (IDS/IPS) on PI processing
         infrastructure.
    tools:
      - encryption-service
      - iam-mfa
      - dlp-platform
      - backup-dr
      - network-segmentation
      - ids-ips
  devsecops:
    prose: |
      1. Run SAST, DAST, SCA, and container scanning on every build — zero critical
         vulnerabilities in PI-processing code.
      2. Implement secret detection in CI/CD to prevent credential leaks.
      3. Enforce IaC security scanning — no misconfigured storage, databases, or
         network rules touching PI.
      4. Conduct regular penetration testing (at least annually, quarterly for
         high-risk systems).
      5. Implement security regression testing for PI access controls.
    tools:
      - sast-scanner
      - dast-scanner
      - sca-scanner
      - container-scanner
      - secret-detection
      - iac-scanner
      - pentest-platform
  secops:
    prose: |
      1. Monitor all access to PI stores with SIEM correlation and alerting.
      2. Implement behavioral analytics (UEBA) to detect anomalous PI access patterns.
      3. Maintain a vulnerability management program with SLAs tied to data sensitivity.
      4. Run tabletop exercises and incident response drills for PI breach scenarios.
      5. Track operator security compliance through continuous monitoring.
    tools:
      - siem
      - ueba
      - vulnerability-management
      - incident-response-platform
      - vendor-security-monitor
