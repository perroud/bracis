id: cond-5
family: conditions
title: "Condition 5: Information Quality"
class: POPIA
statement:
  prose: |
    The responsible party must take reasonably practicable steps to ensure that the
    personal information is complete, accurate, not misleading, and updated where
    necessary, having regard to the purpose for which the information was collected
    or is further processed (Section 16).
  parts:
    - id: cond-5-a
      label: "16(1)"
      prose: |
        The responsible party must take reasonably practicable steps to ensure that the
        personal information that is collected is complete, accurate, not misleading, and
        updated where necessary.
    - id: cond-5-b
      label: "16(2)"
      prose: |
        In determining what steps are reasonably practicable, regard must be had to the
        purpose for which the personal information is collected or further processed.
guidance:
  prose: |
    Information Quality places an active obligation on the responsible party to maintain
    the accuracy and completeness of personal information. This is not merely about
    accepting corrections from data subjects — it requires proactive data quality
    management.

    Key considerations:

    - **Proportionality:** The effort required is proportional to the purpose. Medical
      records require higher accuracy standards than marketing preferences.

    - **Proactive updates:** The responsible party must take steps to keep data current.
      This includes periodic verification, data validation at input, and processes for
      detecting stale or inaccurate data.

    - **Not misleading:** Data must not be presented or stored in a way that could lead
      to incorrect conclusions about the data subject. Partial data that creates a
      misleading picture violates this condition.

    - **Decision-making impact:** Where personal information is used for decisions
      affecting the data subject (credit scoring, employment, insurance), higher
      accuracy standards apply.

    - **Correction mechanisms:** Systems must support efficient correction of inaccurate
      data, with changes propagated to all downstream systems and any third parties to
      whom the data was disclosed.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data validation at all collection points — input validation, format
         checks, completeness validation.
      2. Build automated data quality monitoring that detects anomalies, stale records,
         and inconsistencies across systems.
      3. Implement a master data management (MDM) strategy for personal information to
         ensure a single source of truth.
      4. Create self-service data correction portals where data subjects can review and
         update their information.
      5. Implement change propagation — corrections to PI must cascade to all systems
         holding copies of that data.
    tools:
      - data-validation-framework
      - data-quality-monitor
      - master-data-management
      - self-service-portal
      - change-propagation-service
  devsecops:
    prose: |
      1. Enforce input validation rules in CI/CD — reject code that stores PI without
         validation.
      2. Implement automated data quality tests in the test suite.
      3. Test correction propagation workflows end-to-end.
      4. Scan for hardcoded or stale PI in test fixtures and seed data.
    tools:
      - validation-enforcer
      - data-quality-tests
      - propagation-tests
      - test-data-scanner
  secops:
    prose: |
      1. Monitor data quality metrics and alert on degradation.
      2. Audit correction request processing times and completion rates.
      3. Track data freshness across systems and flag stale records.
      4. Verify propagation completeness after correction events.
    tools:
      - quality-metrics-dashboard
      - correction-audit
      - freshness-tracker
      - propagation-verifier
