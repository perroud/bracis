id: cond-1
family: conditions
title: "Condition 1: Accountability"
class: POPIA
statement:
  prose: |
    The responsible party must ensure that the conditions set out in Chapter 3, and all
    the measures that give effect to such conditions, are complied with at the time of
    the determination of the purpose and means of the processing and for the duration
    of the processing (Section 8).
  parts:
    - id: cond-1-a
      label: "8(1)"
      prose: |
        The responsible party must ensure compliance with the conditions for the lawful
        processing of personal information as set out in this Chapter.
    - id: cond-1-b
      label: "8(2)"
      prose: |
        Compliance must be ensured at the time of the determination of the purpose and
        means of the processing and for the duration of the processing.
guidance:
  prose: |
    Accountability under POPIA means the responsible party (data controller) bears the
    burden of demonstrating compliance with all eight conditions for lawful processing.
    This is not a passive obligation — it requires proactive governance.

    In practice for engineering teams:

    - **Governance framework:** Establish a formal data protection governance structure
      with defined roles (Information Officer, Deputy Information Officers).

    - **Documentation:** Maintain a comprehensive register of all processing activities,
      including purposes, categories of data subjects, retention periods, and security
      measures.

    - **Privacy Impact Assessments (PIAs):** Conduct PIAs before deploying new systems
      or features that process personal information.

    - **Training:** Ensure all personnel who process personal information are trained
      on POPIA obligations.

    - **Audit trail:** Maintain evidence of compliance decisions, consent records,
      policy approvals, and incident responses.

    - **Third-party management:** Ensure operators (processors) are contractually bound
      to POPIA obligations and are regularly audited.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a centralized data processing registry (ROPA equivalent) that
         automatically discovers and catalogs personal information flows.
      2. Build privacy impact assessment (PIA) workflows into the SDLC — no feature
         touching PI ships without a completed PIA.
      3. Implement role-based access controls (RBAC) with Information Officer and
         Deputy Information Officer roles defined in IAM.
      4. Create automated compliance dashboards that track adherence to all eight
         conditions across systems.
      5. Maintain an immutable audit log of all processing activity decisions and
         consent state changes.
    tools:
      - data-catalog
      - pia-workflow
      - iam-rbac
      - compliance-dashboard
      - audit-log
  devsecops:
    prose: |
      1. Integrate privacy compliance checks into CI/CD pipelines — reject deployments
         that introduce new PI processing without documented purpose.
      2. Implement automated data flow analysis in code review to detect undocumented
         personal information collection.
      3. Enforce policy-as-code for data retention, access controls, and encryption
         requirements.
      4. Generate compliance evidence artifacts automatically as part of the build
         process.
    tools:
      - privacy-linter
      - data-flow-analyzer
      - policy-as-code
      - compliance-reporter
  secops:
    prose: |
      1. Monitor and alert on unauthorized access to personal information stores.
      2. Maintain continuous compliance monitoring against all eight POPIA conditions.
      3. Implement automated evidence collection for regulatory audits.
      4. Track and report on third-party operator compliance status.
    tools:
      - siem
      - compliance-monitor
      - audit-evidence-collector
      - vendor-risk-management
