id: cond-8
family: conditions
title: "Condition 8: Data Subject Participation"
class: POPIA
statement:
  prose: |
    A data subject may request a responsible party to confirm whether or not it holds
    personal information about the data subject, and may request access to, correction
    of, or deletion of that information (Sections 23-25).
  parts:
    - id: cond-8-a
      label: "23(1)"
      prose: |
        A data subject, having provided adequate proof of identity, has the right to
        request a responsible party to confirm, free of charge, whether or not the
        responsible party holds personal information about the data subject, and to
        request the record or a description of the personal information held.
    - id: cond-8-b
      label: "24(1)"
      prose: |
        A data subject may, in the prescribed manner, request a responsible party to
        correct or delete personal information about the data subject in its possession
        or under its control that is inaccurate, irrelevant, excessive, out of date,
        incomplete, misleading, or obtained unlawfully.
    - id: cond-8-c
      label: "24(2)"
      prose: |
        A data subject may, in the prescribed manner, request a responsible party to
        destroy or delete a record of personal information about the data subject that
        the responsible party is no longer authorised to retain in terms of Section 14.
    - id: cond-8-d
      label: "25"
      prose: |
        A responsible party must give effect to the right of access, correction, or
        deletion and inform the data subject of any action taken, or provide reasons
        if it refuses the request, and inform the data subject of the right to lodge
        a complaint with the Regulator.
guidance:
  prose: |
    Data Subject Participation is the mechanism through which individuals exercise
    control over their personal information. It covers three core rights: access,
    correction, and deletion.

    Key requirements:

    - **Identity verification (23(1)):** Before fulfilling any request, the responsible
      party must verify the data subject's identity. The verification process must be
      proportionate — not so burdensome that it deters legitimate requests.

    - **Access right (23):** Data subjects can request confirmation of whether PI is
      held, and access to that PI. The response must include a description of the
      information, the purpose of processing, third parties with access, and the
      categories of PI involved.

    - **Correction right (24(1)):** Data subjects can request correction of inaccurate,
      misleading, or incomplete information. The responsible party must also notify
      third parties who received the incorrect information.

    - **Deletion right (24(2)):** Data subjects can request deletion of PI that the
      responsible party is no longer authorized to retain. This is narrower than GDPR's
      "right to erasure" — it applies when retention authorization has expired.

    - **Response obligations (25):** The responsible party must act on valid requests,
      inform the data subject of actions taken (or reasons for refusal), and advise of
      the right to complain to the Information Regulator.

    - **Timeframe:** Requests must be processed within a reasonable time (POPIA does
      not specify an exact deadline, but the Information Regulator expects prompt
      response — typically 30 days by convention).
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a Data Subject Request (DSR) portal where data subjects can submit
         access, correction, and deletion requests with identity verification.
      2. Implement automated data discovery — when a DSR is received, automatically
         locate all PI across all systems for that data subject.
      3. Build data export capabilities (machine-readable format) for access requests.
      4. Implement correction propagation — corrections must cascade to all systems
         and third parties holding copies of the data.
      5. Build deletion workflows with verification — confirm all copies are removed
         across all systems, including backups (within retention cycles).
      6. Implement DSR tracking dashboards with SLA monitoring.
    tools:
      - dsr-portal
      - data-discovery-engine
      - data-export-service
      - correction-propagation
      - deletion-workflow
      - dsr-tracker
  devsecops:
    prose: |
      1. Test DSR workflows end-to-end in CI/CD — access, correction, and deletion
         paths must be verified automatically.
      2. Validate identity verification flows for security and proportionality.
      3. Test data discovery completeness — verify that all PI stores are covered.
      4. Implement automated regression tests for deletion completeness.
    tools:
      - dsr-test-suite
      - identity-verification-tests
      - discovery-completeness-tests
      - deletion-verification-tests
  secops:
    prose: |
      1. Monitor DSR processing times and alert on SLA breaches.
      2. Audit identity verification processes for security and compliance.
      3. Verify deletion completeness through periodic audits.
      4. Track and report on DSR volumes, types, and outcomes for the Information
         Regulator.
    tools:
      - dsr-sla-monitor
      - verification-auditor
      - deletion-auditor
      - dsr-analytics
