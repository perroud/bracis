id: cond-3
family: conditions
title: "Condition 3: Purpose Specification"
class: POPIA
statement:
  prose: |
    Personal information must be collected for a specific, explicitly defined, and lawful
    purpose related to a function or activity of the responsible party. The data subject
    must be made aware of that purpose, and records must not be retained longer than
    necessary (Sections 13-14).
  parts:
    - id: cond-3-a
      label: "13(1)"
      prose: |
        Personal information must be collected for a specific, explicitly defined, and
        lawful purpose related to a function or activity of the responsible party.
    - id: cond-3-b
      label: "13(2)"
      prose: |
        Steps must be taken in accordance with Section 18 to ensure that the data subject
        is aware of the purpose of the collection of the information.
    - id: cond-3-c
      label: "14(1)"
      prose: |
        Records of personal information must not be retained any longer than is necessary
        for achieving the purpose for which the information was collected or subsequently
        processed, unless retention is required or authorized by law, required by a
        contract, or the data subject has consented.
    - id: cond-3-d
      label: "14(2)"
      prose: |
        The responsible party must destroy or delete a record of personal information, or
        de-identify it as soon as reasonably practicable after the responsible party is no
        longer authorized to retain the record.
guidance:
  prose: |
    Purpose Specification requires that personal information collection has a clear,
    documented, and lawful purpose, and that data is not kept indefinitely.

    Key operational requirements:

    - **Explicit purpose definition:** Every data collection point must have a documented
      purpose statement. Vague purposes like "business improvement" or "analytics" are
      insufficient.

    - **Purpose awareness:** Data subjects must be informed of the collection purpose
      at or before the time of collection (linked to Condition 6: Openness).

    - **Retention limitation:** Data must be destroyed, deleted, or de-identified once
      the purpose is fulfilled and no legal retention requirement exists.

    - **De-identification:** Where possible, de-identify personal information for
      secondary uses like analytics, rather than retaining identifiable records.

    - **Retention schedules:** Establish and enforce data retention schedules that map
      each category of personal information to its purpose and maximum retention period.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a purpose registry — every PI field must be linked to a declared
         purpose with a defined retention period.
      2. Build automated data retention enforcement — scheduled jobs that destroy,
         delete, or de-identify records that have exceeded their retention period.
      3. Implement de-identification services (anonymization, pseudonymization) that
         can be applied to data no longer needed in identifiable form.
      4. Create data lifecycle management dashboards showing retention compliance
         status across all systems.
      5. Implement purpose-binding metadata at the storage layer to prevent purpose
         creep.
    tools:
      - purpose-registry
      - data-retention-enforcer
      - de-identification-service
      - data-lifecycle-dashboard
  devsecops:
    prose: |
      1. Validate that every new data collection endpoint has a corresponding purpose
         declaration in the purpose registry.
      2. Test retention enforcement jobs as part of CI/CD — verify that expired data
         is actually purged.
      3. Implement automated checks for orphaned personal information (data without
         active purpose).
      4. Scan database schemas for PI fields without retention policies.
    tools:
      - purpose-validator
      - retention-test-suite
      - orphan-data-scanner
      - schema-compliance-checker
  secops:
    prose: |
      1. Monitor retention enforcement execution and alert on failures.
      2. Audit data stores for personal information retained beyond declared periods.
      3. Track de-identification operations and verify completeness.
      4. Generate retention compliance reports for regulatory submissions.
    tools:
      - retention-monitor
      - data-audit-platform
      - de-identification-verifier
      - compliance-reporter
legal_references:
