id: cond-6
family: conditions
title: "Condition 6: Openness"
class: POPIA
statement:
  prose: |
    The responsible party must maintain documentation of all processing operations and
    must notify the data subject when collecting personal information, providing specific
    details about the processing (Sections 17-18).
  parts:
    - id: cond-6-a
      label: "17"
      prose: |
        A responsible party must maintain the documentation of all processing operations
        under its responsibility as referred to in Section 14 or 51 of the Promotion of
        Access to Information Act, 2000 (Act No. 2 of 2000).
    - id: cond-6-b
      label: "18(1)"
      prose: |
        If personal information is collected, the responsible party must take reasonably
        practicable steps to ensure that the data subject is aware of: (a) the information
        being collected and the source if not collected directly; (b) the name and address
        of the responsible party; (c) the purpose for which it is collected; (d) whether
        the supply is voluntary or mandatory and the consequences of failure to provide;
        (e) any law authorizing or requiring the collection; (f) whether the responsible
        party intends to transfer the information to a third country and the level of
        protection afforded; (g) any further information necessary for reasonable
        processing.
guidance:
  prose: |
    Openness is POPIA's transparency condition. It requires both documentation of
    processing activities and proactive notification to data subjects.

    Key requirements:

    - **Processing documentation (Section 17):** Maintain a comprehensive record of all
      processing operations. This is similar to GDPR's Record of Processing Activities
      (ROPA). Must be available to the Information Regulator on request.

    - **Collection notification (Section 18):** At the time of collection, the data
      subject must be informed of seven specific items. This is typically implemented
      through privacy notices, collection notices, and terms of service.

    - **Practical implementation:** Privacy notices must be clear, concise, and in
      language the data subject can understand. Lengthy legal documents that no one
      reads do not satisfy the "reasonably practicable steps" requirement.

    - **Layered notices:** Use layered privacy notices — a short notice at the point
      of collection with links to the full privacy policy.

    - **Third-country transfers:** If data will be transferred outside South Africa,
      this must be disclosed at collection time (linked to Chapter 9).

    - **PAIA manual:** The responsible party must maintain a manual under the Promotion
      of Access to Information Act (PAIA) that includes POPIA processing documentation.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement a centralized Record of Processing Activities (ROPA) that auto-discovers
         and catalogs all PI processing operations across systems.
      2. Build a privacy notice management system — templated notices that are versioned,
         presented at collection points, and linked to consent records.
      3. Implement just-in-time collection notices at every data collection point (forms,
         APIs, mobile apps) showing the seven required Section 18 disclosures.
      4. Create a public-facing privacy center where data subjects can access all
         privacy-related information.
      5. Automate PAIA manual generation from the processing registry.
    tools:
      - ropa-registry
      - privacy-notice-manager
      - collection-notice-engine
      - privacy-center
      - paia-manual-generator
  devsecops:
    prose: |
      1. Validate that every data collection endpoint has an associated privacy notice
         in the CI/CD pipeline.
      2. Test that collection notices contain all seven Section 18 required elements.
      3. Verify privacy notice versioning — ensure data subjects see the correct version.
      4. Scan for PI collection points that bypass the notice system.
    tools:
      - notice-validator
      - section-18-checker
      - notice-version-tester
      - collection-point-scanner
  secops:
    prose: |
      1. Monitor for new PI collection endpoints deployed without corresponding notices.
      2. Audit privacy notice delivery and acknowledgment rates.
      3. Track ROPA completeness and currency.
      4. Generate compliance reports for Information Regulator submissions.
    tools:
      - collection-monitor
      - notice-audit
      - ropa-tracker
      - regulatory-reporter
legal_references:
