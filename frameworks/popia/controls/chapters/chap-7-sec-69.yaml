id: chap-7-sec-69
family: chapters
title: "Supervision by Information Regulator"
class: POPIA
statement:
  prose: |
    The Information Regulator is responsible for the supervision of the enforcement of
    POPIA. Responsible parties must cooperate with the Regulator, register with the
    Regulator, and appoint an Information Officer (Sections 39-56).
  parts:
    - id: sec-39
      label: "39(1)"
      prose: |
        The Information Regulator established by Section 39 of POPIA is independent and
        subject only to the Constitution and the law. The Regulator must exercise its
        powers and perform its functions without fear, favour, or prejudice.
    - id: sec-55
      label: "55(1)"
      prose: |
        Every responsible party must appoint an Information Officer, and the head of a
        private body as defined in the Promotion of Access to Information Act is deemed
        to be the Information Officer.
    - id: sec-55-a
      label: "55(2)"
      prose: |
        A responsible party may appoint one or more Deputy Information Officers to act
        on behalf of the Information Officer.
    - id: sec-56
      label: "56"
      prose: |
        The Information Officer of a private body must register with the Regulator
        before any processing commences or within one year of the commencement of the
        relevant section.
guidance:
  prose: |
    The Information Regulator is South Africa's data protection authority. Organizations
    must establish a formal relationship with the Regulator through registration and
    the appointment of an Information Officer.

    Key obligations:

    - **Information Officer (Section 55):** Every responsible party must appoint an
      Information Officer. For private bodies, the head of the organization is deemed
      the Information Officer by default. In practice, this role is often delegated to
      a senior executive or the DPO equivalent.

    - **Deputy Information Officers (Section 55(2)):** Large organizations should
      appoint Deputy Information Officers for each business unit or function.

    - **Registration (Section 56):** The Information Officer must be registered with
      the Information Regulator. Registration is a prerequisite for lawful processing.

    - **Cooperation:** Responsible parties must cooperate with Regulator investigations,
      audits, and assessments. Obstruction of the Regulator is an offence.

    - **Compliance framework:** The Regulator has issued guidance notes and enforcement
      notices. Organizations must monitor these publications and ensure compliance.

    - **PAIA alignment:** POPIA's Information Officer role overlaps with the PAIA
      Information Officer/Deputy Information Officer role. Organizations must ensure
      alignment between POPIA and PAIA obligations.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement Information Officer and Deputy Information Officer roles in IAM with
         appropriate access to compliance dashboards, processing registers, and DSR
         management tools.
      2. Build regulatory correspondence tracking — log all communications with the
         Information Regulator, including registration, complaints, and assessments.
      3. Implement a regulatory publication monitoring system to track new guidance
         notes, enforcement notices, and codes of conduct from the Regulator.
      4. Create compliance dashboards accessible to the Information Officer showing
         real-time status across all POPIA conditions.
    tools:
      - iam-officer-roles
      - regulatory-correspondence-tracker
      - regulatory-publication-monitor
      - compliance-dashboard
  devsecops:
    prose: |
      1. Ensure Information Officer contact details are embedded in all privacy notices
         and collection points — validate this in CI/CD.
      2. Test that compliance reporting generates accurate data for Regulator submissions.
      3. Implement automated checks that the Information Officer registration is current.
    tools:
      - privacy-notice-validator
      - compliance-report-tester
      - registration-checker
  secops:
    prose: |
      1. Monitor for Regulator enquiries and ensure timely response.
      2. Maintain audit-ready evidence packages for Regulator assessments.
      3. Track Information Officer and Deputy Information Officer appointment and
         registration status.
      4. Generate periodic compliance status reports for the Information Officer.
    tools:
      - regulator-enquiry-tracker
      - audit-readiness-platform
      - officer-registration-tracker
      - compliance-reporter
