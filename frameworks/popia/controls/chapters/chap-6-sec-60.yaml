id: chap-6-sec-60
family: chapters
title: "Rights of Data Subjects"
class: POPIA
statement:
  prose: |
    Data subjects have the right to be notified that their personal information is being
    collected, to access their personal information, to request correction or deletion,
    to object to processing, and to submit complaints to the Information Regulator.
    These rights are exercisable subject to limitations in POPIA and other legislation
    (Sections 5, 11(3), 23-25).
  parts:
    - id: sec-5
      label: "5"
      prose: |
        Every data subject has the right to have their personal information processed
        in accordance with the conditions for the lawful processing of personal
        information as referred to in Chapter 3, including the right to: (a) be notified
        that personal information is being collected or that it has been accessed or
        acquired by an unauthorised person; (b) establish whether a responsible party
        holds personal information and request access; (c) request correction, destruction,
        or deletion of personal information; (d) object to the processing of personal
        information; (e) not be subject to a decision based solely on automated processing;
        and (f) submit a complaint to the Regulator.
    - id: sec-5-e
      label: "5(1)(e)"
      prose: |
        The data subject has the right not to be subject, under certain circumstances,
        to a decision which is based solely on the basis of the automated processing of
        personal information intended to provide a profile of such person.
    - id: sec-71
      label: "71(1)"
      prose: |
        Subject to the provisions of this section, a data subject may not be subject to
        a decision which results in legal consequences for him, her, or it, or which
        affects him, her, or it to a substantial degree, based solely on the basis of
        the automated processing of personal information intended to provide a profile.
guidance:
  prose: |
    POPIA grants data subjects a comprehensive set of rights. While many overlap with
    Condition 8 (Data Subject Participation), this control addresses the broader rights
    framework, including the right against automated decision-making.

    Key rights:

    - **Notification (5(a)):** Right to know when PI is collected and when a breach
      occurs. Implemented through Condition 6 (Openness) and Chapter 8 (Breach
      Notification).

    - **Access (5(b)):** Right to confirm whether PI is held and to access it.
      Detailed in Condition 8.

    - **Correction and deletion (5(c)):** Right to correct inaccurate PI and delete
      PI when retention is no longer authorized. Detailed in Condition 8.

    - **Objection (5(d)):** Right to object to processing on reasonable grounds.
      Detailed in Condition 2 (Section 11(3)).

    - **Automated decision-making (5(e), 71):** Right not to be subject to decisions
      with legal or substantial effects based solely on automated processing. This is
      directly relevant to AI/ML systems, credit scoring, and algorithmic decision-making.

    - **Complaint (5(f)):** Right to lodge a complaint with the Information Regulator
      if the responsible party fails to respect data subject rights.

    The automated decision-making provision (Section 71) is critical for organizations
    using AI/ML. Any automated decision with legal or substantial effects must include
    human oversight.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a comprehensive data subject rights portal covering all six rights
         (notification, access, correction/deletion, objection, automated decision-making,
         complaint).
      2. Implement human-in-the-loop controls for all automated decision-making systems
         that produce legal or substantial effects on data subjects.
      3. Build explainability interfaces for automated decisions — data subjects must
         be able to understand the logic of automated profiling.
      4. Implement objection processing workflows with automatic processing cessation
         and escalation paths.
      5. Create a complaint management system that tracks complaints from receipt
         through resolution and Regulator interactions.
    tools:
      - data-subject-rights-portal
      - human-in-the-loop-engine
      - ai-explainability-interface
      - objection-workflow
      - complaint-management-system
  devsecops:
    prose: |
      1. Validate that all AI/ML models with decision-making capabilities include
         human override mechanisms before deployment.
      2. Test explainability outputs for all automated profiling systems.
      3. Implement automated tests for data subject rights workflows (access,
         correction, deletion, objection).
      4. Enforce human-in-the-loop requirements through deployment gates.
    tools:
      - ai-model-validator
      - explainability-tester
      - rights-workflow-tests
      - deployment-gate-hitl
  secops:
    prose: |
      1. Monitor automated decision-making systems for decisions made without human
         oversight where required.
      2. Track data subject complaint volumes and resolution times.
      3. Audit objection processing for completeness and timeliness.
      4. Generate rights exercise reports for the Information Regulator.
    tools:
      - automated-decision-monitor
      - complaint-tracker
      - objection-auditor
      - rights-reporter
