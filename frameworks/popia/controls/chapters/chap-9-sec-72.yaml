id: chap-9-sec-72
family: chapters
title: "Transborder Information Flows"
class: POPIA
statement:
  prose: |
    A responsible party in the Republic may not transfer personal information about a data
    subject to a third party in a foreign country unless specific conditions are met,
    including adequate protection, consent, contractual necessity, or binding corporate
    rules (Section 72).
  parts:
    - id: sec-72-1-a
      label: "72(1)(a)"
      prose: |
        A responsible party in the Republic may not transfer personal information about
        a data subject to a third party who is in a foreign country unless the third party
        is subject to a law, binding corporate rules, or binding agreement which provide
        an adequate level of protection that effectively upholds principles for reasonable
        processing of the information that are substantially similar to the conditions
        for the lawful processing set out in Chapter 3, and includes provisions that are
        substantially similar to Section 72.
    - id: sec-72-1-b
      label: "72(1)(b)"
      prose: |
        Transfer is permitted if the data subject consents to the transfer.
    - id: sec-72-1-c
      label: "72(1)(c)"
      prose: |
        Transfer is permitted if the transfer is necessary for the performance of a
        contract between the data subject and the responsible party.
    - id: sec-72-1-d
      label: "72(1)(d)"
      prose: |
        Transfer is permitted if the transfer is necessary for the conclusion or
        performance of a contract concluded in the interest of the data subject between
        the responsible party and a third party.
    - id: sec-72-1-e
      label: "72(1)(e)"
      prose: |
        Transfer is permitted if the transfer is for the benefit of the data subject and
        it is not reasonably practicable to obtain the consent of the data subject, and
        if it were reasonably practicable, the data subject would be likely to give it.
guidance:
  prose: |
    POPIA restricts the transfer of personal information outside South Africa. This
    directly affects cloud infrastructure, SaaS services, and any processing by
    third parties in foreign jurisdictions.

    Key considerations:

    - **Adequacy (72(1)(a)):** The recipient country/party must have laws, binding
      corporate rules (BCRs), or binding agreements providing "substantially similar"
      protection to POPIA Chapter 3. The Information Regulator has not yet published a
      formal adequacy list, but GDPR-adequate countries are generally considered
      adequate.

    - **Cloud infrastructure:** If personal information is stored or processed in cloud
      regions outside South Africa, this constitutes a transborder transfer. Cloud
      providers must demonstrate adequate protection through contracts (standard
      contractual clauses equivalent).

    - **SaaS services:** Every SaaS product that processes PI must be assessed for
      data residency. Where data leaves South Africa, a transfer mechanism must be in
      place.

    - **Binding corporate rules (BCRs):** For multinational organizations, BCRs can
      provide a mechanism for intra-group transfers. BCRs must be substantially similar
      to POPIA conditions.

    - **Consent:** The data subject can consent to the transfer, but this must be
      informed consent — the data subject must be aware of the destination country
      and the level of protection (linked to Condition 6: Openness, Section 18(1)(f)).

    - **Practical approach:** Data localization (keeping PI in South African cloud
      regions) is the simplest compliance path. Where transfer is necessary, use
      standard contractual clauses or equivalent binding agreements.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data residency controls — configure cloud infrastructure to keep PI
         in South African (or adequacy-assessed) regions by default.
      2. Build a data transfer impact assessment (DTIA) workflow that evaluates every
         cross-border PI transfer against Section 72 requirements.
      3. Implement transfer mechanism management — track which transfers rely on
         adequacy, consent, contractual necessity, or BCRs.
      4. Build data flow mapping that automatically detects cross-border PI transfers
         (including through third-party services and APIs).
      5. Implement geo-fencing for PI storage — prevent PI from being replicated to
         non-adequate jurisdictions.
    tools:
      - data-residency-controls
      - dtia-workflow
      - transfer-mechanism-tracker
      - data-flow-mapper
      - geo-fencing-engine
  devsecops:
    prose: |
      1. Validate cloud resource region configurations in IaC — reject deployments
         that place PI in non-assessed jurisdictions.
      2. Scan third-party service configurations for data residency compliance.
      3. Test data flow mapping completeness — verify all cross-border paths are
         identified and assessed.
      4. Implement CI/CD checks that flag new external API integrations for DTIA
         review.
    tools:
      - iac-region-validator
      - third-party-residency-scanner
      - data-flow-tests
      - api-integration-flagger
  secops:
    prose: |
      1. Monitor for unauthorized cross-border PI transfers in real time.
      2. Audit cloud provider compliance with data residency commitments.
      3. Track transfer mechanism validity — ensure contracts, BCRs, and consents
         remain current.
      4. Generate cross-border transfer reports for the Information Regulator.
    tools:
      - transfer-monitor
      - cloud-residency-auditor
      - mechanism-validity-tracker
      - transfer-reporter
