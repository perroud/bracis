id: chap-5-sec-57
family: chapters
title: "Codes of Conduct"
class: POPIA
statement:
  prose: |
    The Information Regulator may issue codes of conduct applicable to categories of
    responsible parties for the purpose of providing practical guidance on the application
    of POPIA. Responsible parties, or bodies representing responsible parties, may submit
    codes of conduct to the Regulator for approval (Sections 60-66).
  parts:
    - id: sec-60
      label: "60(1)"
      prose: |
        The Regulator may, on the application of any body which represents the interests
        of a category of responsible parties, or of its own initiative, issue or approve
        codes of conduct for the purpose of contributing to the proper application of
        POPIA in respect of specific sectors or processing activities.
    - id: sec-61
      label: "61"
      prose: |
        A code of conduct must at least specify the application of the conditions for
        the lawful processing of personal information set out in Chapter 3 to a specific
        sector, and may contain stricter conditions.
    - id: sec-65
      label: "65"
      prose: |
        A code of conduct that has been issued or approved by the Regulator is binding
        on the responsible parties to which it applies.
guidance:
  prose: |
    Codes of Conduct provide sector-specific guidance on POPIA compliance. While POPIA
    is the baseline, codes of conduct can impose stricter requirements for specific
    industries.

    Key considerations:

    - **Sector relevance:** Monitor the Information Regulator's publications for codes
      of conduct applicable to your industry. Codes have been anticipated for financial
      services, healthcare, direct marketing, and credit bureaus.

    - **Binding nature:** Once issued or approved, codes of conduct are legally binding
      on the responsible parties they cover. Non-compliance with an applicable code is
      equivalent to non-compliance with POPIA itself.

    - **Industry leadership:** Organizations can proactively develop codes of conduct
      through industry bodies and submit them to the Regulator for approval. This
      demonstrates accountability (Condition 1) and can influence sector standards.

    - **Compliance baseline:** Codes of conduct should be treated as an additional
      compliance layer on top of POPIA's base conditions. Systems must be configurable
      to enforce both POPIA base requirements and sector-specific code requirements.

    - **Evolution:** Codes of conduct will evolve as the Information Regulator issues
      guidance. Compliance systems must be adaptable to accommodate new codes.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a configurable compliance rule engine that can layer sector-specific
         code of conduct requirements on top of base POPIA conditions.
      2. Implement a regulatory change monitoring system that tracks Information
         Regulator publications for new codes of conduct.
      3. Create compliance profiles per business unit/sector that map to applicable
         codes of conduct.
      4. Build audit evidence collection aligned with code of conduct requirements.
    tools:
      - compliance-rule-engine
      - regulatory-monitor
      - compliance-profiles
      - audit-evidence-collector
  devsecops:
    prose: |
      1. Implement configurable compliance checks in CI/CD that can be extended with
         code of conduct-specific rules.
      2. Test compliance rule engine configuration for accuracy against published codes.
      3. Version control code of conduct compliance rules alongside application code.
    tools:
      - configurable-compliance-checks
      - code-of-conduct-test-suite
      - compliance-rules-vcs
  secops:
    prose: |
      1. Monitor compliance against applicable codes of conduct in real time.
      2. Alert on regulatory changes — new codes of conduct or amendments.
      3. Generate code of conduct-specific compliance reports.
    tools:
      - code-compliance-monitor
      - regulatory-change-alerts
      - sector-compliance-reporter
legal_references:
  - framework_id: gdpr
    articles: ["art. 40", "art. 41"]
    relationship: equivalent-to
  - framework_id: lgpd
    articles: ["art. 50"]
    relationship: equivalent-to
