id: chap-3-sec-26
family: chapters
title: "Special Personal Information"
class: POPIA
statement:
  prose: |
    The processing of special personal information — including religious or philosophical
    beliefs, race or ethnic origin, trade union membership, political persuasion, health
    or sex life, biometric information, and criminal behaviour — is prohibited unless a
    specific exemption applies (Sections 26-33).
  parts:
    - id: sec-26-a
      label: "26(a)"
      prose: |
        A responsible party may not process personal information concerning the religious
        or philosophical beliefs, race or ethnic origin, trade union membership, political
        persuasion, health or sex life, or biometric information of a data subject.
    - id: sec-26-b
      label: "27"
      prose: |
        The prohibition on processing special personal information does not apply if:
        processing is carried out with the consent of the data subject; processing is
        necessary for the establishment, exercise, or defense of a right or obligation
        in law; processing is necessary to comply with an obligation of international
        public law; processing is for historical, statistical, or research purposes with
        appropriate safeguards; or the information has deliberately been made public by
        the data subject.
    - id: sec-26-c
      label: "32"
      prose: |
        The processing of biometric information is prohibited unless the processing is
        carried out with the consent of the data subject, or is necessary for the
        purposes of identification, authentication, or verification.
    - id: sec-26-d
      label: "33"
      prose: |
        A responsible party may only process personal information concerning criminal
        behaviour or alleged criminal behaviour of a data subject under the control of
        an authority or when authorised by the responsible party's rules.
guidance:
  prose: |
    Special Personal Information receives the highest level of protection under POPIA.
    The default position is prohibition — processing is only permitted under specific
    exemptions.

    Categories of special PI:
    - Religious or philosophical beliefs
    - Race or ethnic origin
    - Trade union membership
    - Political persuasion
    - Health or sex life
    - Biometric information
    - Criminal behaviour (separate regime under Section 33)

    Key considerations for engineering teams:

    - **Default deny:** Systems must not process special PI unless an explicit exemption
      is documented and verified.

    - **Biometrics (Section 32):** Biometric data (fingerprints, facial recognition,
      retinal scans) can only be processed with consent or for identification/
      authentication/verification purposes. Biometric data used for access control is
      permitted; biometric data used for profiling is not.

    - **Health data:** Particularly relevant for healthcare, insurance, and employee
      wellness systems. Requires explicit consent and enhanced security.

    - **Race/ethnicity:** Relevant for B-BBEE compliance in South Africa. Processing
      for statutory compliance purposes is permitted under Section 27.

    - **Enhanced safeguards:** Where special PI is processed under an exemption,
      additional technical and organisational safeguards are required beyond the
      baseline Condition 7 requirements.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement data classification that automatically identifies and tags special
         personal information with the highest sensitivity level.
      2. Build enhanced access controls for special PI — separate encryption keys,
         additional authentication factors, restricted role access.
      3. Implement exemption management — every processing activity involving special
         PI must have a documented and approved exemption before access is granted.
      4. Build biometric data handling pipelines with template-only storage (never
         store raw biometric data — store derived templates only).
      5. Implement field-level encryption for special PI columns in databases.
    tools:
      - data-classification-engine
      - enhanced-access-controls
      - exemption-manager
      - biometric-template-processor
      - field-level-encryption
  devsecops:
    prose: |
      1. Implement automated special PI detection in CI/CD — flag any code that
         introduces fields matching special PI categories.
      2. Validate that special PI access paths include exemption verification.
      3. Test that biometric data is stored as templates, not raw data.
      4. Enforce enhanced encryption standards for special PI in IaC validation.
    tools:
      - special-pi-detector
      - exemption-validator
      - biometric-storage-checker
      - encryption-validator
  secops:
    prose: |
      1. Monitor all access to special PI stores with real-time alerting.
      2. Audit exemption validity and expiration on a regular cadence.
      3. Implement enhanced breach detection for special PI data stores.
      4. Generate special PI processing reports for regulatory compliance.
    tools:
      - special-pi-monitor
      - exemption-auditor
      - enhanced-breach-detection
      - regulatory-reporter
