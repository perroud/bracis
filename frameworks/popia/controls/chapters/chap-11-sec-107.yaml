id: chap-11-sec-107
family: chapters
title: "Offences and Penalties"
class: POPIA
statement:
  prose: |
    POPIA establishes criminal offences for violations including obstruction of the
    Information Regulator, unlawful processing of account numbers, and failure to comply
    with enforcement notices. Penalties include fines of up to R10 million or imprisonment
    for up to 10 years, or both (Sections 100-106).
  parts:
    - id: sec-100
      label: "100"
      prose: |
        A responsible party that fails to comply with an enforcement notice issued by the
        Regulator under Section 95 commits an offence.
    - id: sec-101
      label: "101"
      prose: |
        Any person who hinders, obstructs, or unlawfully influences the Regulator or a
        person acting on behalf of or under the direction of the Regulator in the
        performance of his or her duties commits an offence.
    - id: sec-104
      label: "104"
      prose: |
        Any person who knowingly or recklessly, without the consent of the responsible
        party, obtains or discloses the account number of a data subject, or procures
        the disclosure of the account number to another person, commits an offence.
    - id: sec-105
      label: "105"
      prose: |
        Any person who knowingly or recklessly, without the consent of the responsible
        party, obtains or discloses personal information, or procures the disclosure of
        personal information to another person, commits an offence unless the disclosure
        is required by law or made in the course of duty.
    - id: sec-106
      label: "106"
      prose: |
        Any person convicted of an offence under this Act is liable to a fine not
        exceeding R10 million, or to imprisonment for a period not exceeding 10 years,
        or to both a fine and imprisonment. In the case of a juristic person, the fine
        may be imposed and directors or officers who participated in the commission of
        the offence may be personally liable.
guidance:
  prose: |
    POPIA's penalties are among the most severe in African data protection law, combining
    criminal liability (imprisonment) with significant financial penalties.

    Key risk areas:

    - **Enforcement notice non-compliance (100):** Failing to comply with a Regulator
      enforcement notice is a criminal offence. This means that regulatory interactions
      must be taken seriously and deadlines met.

    - **Obstruction (101):** Hindering a Regulator investigation is a separate offence.
      Organizations must cooperate fully with regulatory audits and investigations.

    - **Account number protection (104):** Special protection for account numbers
      (banking, financial). Unauthorized disclosure is a criminal offence even if
      other PI is not involved.

    - **Unauthorized disclosure (105):** Knowingly or recklessly disclosing PI without
      authorization is a criminal offence. This applies to individual employees, not
      just the organization.

    - **Personal liability (106):** Directors and officers can be held personally liable
      if they participated in or authorized the offence. This is not limited to
      corporate liability.

    - **Financial penalty:** Up to R10 million (approximately USD 550,000 at 2024
      exchange rates). While lower than GDPR's percentage-of-turnover model, the
      criminal liability component (up to 10 years imprisonment) is significantly
      more severe.

    - **Civil liability:** In addition to criminal penalties, Section 99 provides for
      civil damages. Data subjects can sue for actual damages suffered as a result of
      POPIA violations.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement comprehensive access controls and audit logging for all PI — every
         access must be attributable to an authorized individual and purpose.
      2. Build account number (financial data) protection with enhanced controls —
         separate encryption, restricted access, and real-time monitoring.
      3. Implement data loss prevention (DLP) to detect and prevent unauthorized PI
         disclosure, especially account numbers.
      4. Build regulatory compliance tracking — ensure enforcement notice deadlines
         are tracked and met.
      5. Implement insider threat detection for unauthorized PI access and disclosure.
    tools:
      - audit-logging
      - financial-data-protection
      - dlp-platform
      - enforcement-tracker
      - insider-threat-detection
  devsecops:
    prose: |
      1. Enforce secret detection to prevent account numbers and PI from appearing in
         code, logs, or configuration.
      2. Implement access control testing — verify that only authorized roles can access
         PI and account numbers.
      3. Test audit logging completeness for PI access events.
      4. Scan for PI exposure in application logs, error messages, and debug output.
    tools:
      - secret-detection
      - access-control-tests
      - audit-log-verifier
      - log-pi-scanner
  secops:
    prose: |
      1. Monitor for unauthorized PI and account number access in real time with
         automated escalation.
      2. Implement behavioral analytics to detect anomalous data access patterns that
         could indicate unauthorized disclosure.
      3. Maintain evidence preservation capabilities for potential criminal proceedings.
      4. Track enforcement notice compliance deadlines with executive escalation.
      5. Conduct regular insider threat assessments.
    tools:
      - siem
      - ueba
      - evidence-preservation
      - enforcement-deadline-tracker
      - insider-threat-platform
