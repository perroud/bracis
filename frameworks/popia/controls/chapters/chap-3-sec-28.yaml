id: chap-3-sec-28
family: chapters
title: "Personal Information of Children"
class: POPIA
statement:
  prose: |
    The processing of personal information of a child (under 18 years of age) is
    prohibited unless a specific exemption applies. Where processing is permitted,
    the consent of a competent person (parent, guardian, or other person with authority)
    is generally required (Section 34-38).
  parts:
    - id: sec-34
      label: "34"
      prose: |
        Personal information of a child may not be processed unless it is carried out
        with the prior consent of a competent person; is necessary for the establishment,
        exercise, or defence of a right or obligation in law; is necessary to comply with
        an obligation of international public law; is for historical, statistical, or
        research purposes with appropriate safeguards; or the information has been
        deliberately made public by the child with the consent of a competent person.
    - id: sec-35
      label: "35"
      prose: |
        A child is defined as a natural person under the age of 18 years who is not
        legally competent, without the assistance of a competent person, to take any
        action or decision in respect of any matter concerning him or her.
    - id: sec-38
      label: "38"
      prose: |
        The Information Regulator may, by notice in the Gazette, exempt categories of
        responsible parties from the prohibition on processing children's personal
        information where the processing is in the public interest and appropriate
        safeguards are in place.
guidance:
  prose: |
    Children's personal information receives heightened protection under POPIA. The
    age threshold is 18 years (higher than GDPR's 16 years).

    Key considerations:

    - **Age threshold:** Under 18, unless the child is legally competent. South African
      law recognizes some competence for children over 12 in certain contexts, but
      POPIA uses 18 as the default.

    - **Competent person consent:** A parent, guardian, or other person with legal
      authority must consent. Systems must verify both the child's age and the
      competent person's authority.

    - **Age verification:** Responsible parties must implement age verification
      mechanisms. Self-declaration alone is generally insufficient for high-risk
      processing.

    - **Limited exemptions:** The exemptions are narrow — mostly legal necessity,
      research, and public interest.

    - **Education sector:** Schools and educational platforms processing children's
      data must operate under explicit consent from parents/guardians or under a
      specific legal basis.

    - **Gaming and social media:** Particularly relevant for online services aimed at
      or accessible to children. Age gates and parental consent mechanisms are
      mandatory.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Implement age verification at registration/onboarding — collect date of birth
         and apply age gate logic to determine whether competent person consent is needed.
      2. Build parental/guardian consent workflows — verifiable consent from a competent
         person before any processing of a child's PI.
      3. Implement enhanced data minimization for children — collect the absolute minimum
         PI necessary.
      4. Build age-appropriate privacy notices — clear, simple language understandable
         by children and their parents.
      5. Implement automatic data deletion when a child turns 18 (unless the now-adult
         provides their own consent).
    tools:
      - age-verification-service
      - parental-consent-workflow
      - data-minimization-enforcer
      - age-appropriate-notice-engine
      - age-triggered-deletion
  devsecops:
    prose: |
      1. Validate age verification logic in CI/CD — test boundary conditions (under 18,
         exactly 18, over 18).
      2. Test parental consent workflows for completeness and security.
      3. Verify that children's data receives enhanced protection in access controls.
      4. Scan for child PI processing paths that bypass consent verification.
    tools:
      - age-verification-tests
      - consent-workflow-tests
      - access-control-verifier
      - consent-bypass-scanner
  secops:
    prose: |
      1. Monitor for children's PI processed without verified competent person consent.
      2. Audit age verification effectiveness — check for circumvention patterns.
      3. Track and report on children's data processing for regulatory compliance.
      4. Implement enhanced breach response procedures for children's data.
    tools:
      - children-pi-monitor
      - age-verification-auditor
      - children-data-reporter
      - enhanced-breach-response
legal_references:
