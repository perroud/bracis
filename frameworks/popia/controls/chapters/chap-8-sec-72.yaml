id: chap-8-sec-72
family: chapters
title: "Breach Notification"
class: POPIA
statement:
  prose: |
    Where there are reasonable grounds to believe that the personal information of a data
    subject has been accessed or acquired by any unauthorised person, the responsible party
    must notify the Information Regulator and the data subject as soon as reasonably
    possible after the discovery of the compromise (Section 22).
  parts:
    - id: sec-22-1
      label: "22(1)"
      prose: |
        Where there are reasonable grounds to believe that the personal information of a
        data subject has been accessed or acquired by any unauthorised person, the
        responsible party must notify the Regulator and the data subject, unless the
        identity of such data subject cannot be established.
    - id: sec-22-2
      label: "22(2)"
      prose: |
        The notification must be made as soon as reasonably possible after the discovery
        of the compromise, taking into account the legitimate needs of law enforcement
        or any measures reasonably necessary to determine the scope of the compromise
        and to restore the integrity of the responsible party's information system.
    - id: sec-22-3
      label: "22(3)"
      prose: |
        The notification to the data subject must be in writing and communicated by mail,
        email, placement on the responsible party's website, or publication in the news
        media, and must include: a description of the possible consequences; a description
        of the measures taken or to be taken to address the security compromise; a
        recommendation regarding measures the data subject can take to mitigate the
        possible adverse effects; and the identity of the unauthorised person, if known.
    - id: sec-22-4
      label: "22(4)"
      prose: |
        The Regulator may direct a responsible party to publicise a compromise in any
        manner specified if the Regulator has reasonable grounds to believe that publicity
        would protect a data subject who may be affected by the compromise.
    - id: sec-22-5
      label: "22(5)"
      prose: |
        A delay in notification may only be permitted if requested by the South African
        Police Service, the State Security Agency, or the Regulator to determine the
        scope of the compromise or to prevent obstruction of a criminal investigation.
guidance:
  prose: |
    POPIA's breach notification requirements are mandatory and apply to any unauthorized
    access or acquisition of personal information. Unlike GDPR, there is no risk-based
    threshold — all breaches must be reported.

    Key requirements:

    - **Dual notification:** Both the Information Regulator AND the affected data
      subjects must be notified. There is no exemption for low-risk breaches.

    - **Timing:** "As soon as reasonably possible" — POPIA does not specify a fixed
      deadline (unlike GDPR's 72 hours), but unreasonable delay is an offence. Best
      practice is to aim for 72 hours.

    - **Content requirements (22(3)):** Notifications must include: consequences,
      remedial measures taken, recommended mitigation actions for data subjects, and
      the identity of the unauthorized person if known.

    - **Communication method:** Written notification via mail, email, website, or news
      media. For large-scale breaches, website and media publication may be required.

    - **Law enforcement delay:** Notification may be delayed only at the request of
      SAPS, SSA, or the Regulator, and only for investigation purposes.

    - **Operator obligation:** If an operator (processor) discovers a breach, it must
      notify the responsible party immediately. The responsible party then notifies the
      Regulator and data subjects.

    - **Regulator-directed publicity (22(4)):** The Regulator can order the responsible
      party to publicize the breach if it considers public awareness necessary.
implementation_guidance:
  platform_engineering:
    prose: |
      1. Build a breach detection and response platform that automates the workflow
         from detection to Regulator and data subject notification.
      2. Implement anomaly detection on PI stores to identify potential unauthorized
         access in near real-time.
      3. Build notification templates compliant with Section 22(3) requirements —
         pre-approved by legal, ready for rapid deployment.
      4. Implement a breach register that logs all incidents, notifications, and
         Regulator interactions with full audit trail.
      5. Build automated data subject notification capabilities — email, SMS, and
         website publication channels.
    tools:
      - breach-response-platform
      - anomaly-detection
      - notification-template-engine
      - breach-register
      - multi-channel-notification
  devsecops:
    prose: |
      1. Implement breach simulation testing — regularly test the end-to-end breach
         notification workflow.
      2. Validate notification templates contain all Section 22(3) required elements.
      3. Test Regulator notification API integrations (when available).
      4. Include breach response runbook validation in CI/CD.
    tools:
      - breach-simulation
      - notification-validator
      - regulator-integration-tests
      - runbook-validator
  secops:
    prose: |
      1. Implement 24/7 breach detection monitoring with automated escalation.
      2. Maintain breach response playbooks with defined roles, communication plans,
         and notification timelines.
      3. Conduct quarterly breach response tabletop exercises.
      4. Track breach notification timelines and ensure "as soon as reasonably possible"
         compliance.
      5. Coordinate with operators (processors) on breach notification obligations.
    tools:
      - siem
      - incident-response-platform
      - tabletop-exercise-tool
      - breach-timeline-tracker
      - operator-notification-coordinator
