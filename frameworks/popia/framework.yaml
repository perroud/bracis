control_families:
  - id: conditions
    title: "Conditions for Lawful Processing"
    description: "Eight conditions that must be satisfied for the lawful processing of personal information (Chapter 3)"
    sections: "sec. 8 to sec. 25"
    control_count: 8
  - id: chapters
    title: "Key Chapters and Provisions"
    description: >-
      Additional obligations including special personal information,
      children's data, codes of conduct, data subject rights,
      supervision, breach notification, transborder flows, and
      offences
    sections: "sec. 26 to sec. 115"
    control_count: 8
related_frameworks:
  - framework_id: gdpr
    relationship: equivalent-to
    description: >-
      POPIA shares foundational principles with the EU General Data
      Protection Regulation (GDPR), including conditions for lawful
      processing, data subject rights, breach notification, and
      cross-border transfer restrictions.
    mapping_file: "mappings/popia_to_gdpr.yaml"
  - framework_id: lgpd
    relationship: equivalent-to
    description: >-
      Brazil's LGPD and South Africa's POPIA are both comprehensive
      data protection laws inspired by the GDPR, sharing similar
      principles around lawful processing bases, data subject rights,
      and supervisory authority oversight.
    mapping_file: "mappings/popia_to_lgpd.yaml"
  - framework_id: pipeda
    relationship: equivalent-to
    description: "Canada's PIPEDA and POPIA both establish conditions for lawful processing of personal information in the private sector, with comparable accountability and consent frameworks."
    mapping_file: "mappings/popia_to_pipeda.yaml"
  - framework_id: iso-27701
    relationship: complements
    description: "ISO 27701 provides a privacy information management system (PIMS) that can be used to demonstrate compliance with POPIA's security safeguards and accountability conditions."
    mapping_file: "mappings/popia_to_iso27701.yaml"
