id: popia
title: "Protection of Personal Information Act, 2013 (Act No. 4 of 2013) — POPIA"
short_title: "POPIA"
version: "Act 4/2013"
publication_date: "2013-11-19"
last_updated: "2021-07-01"
effective_date: "2021-07-01"
authority:
  name: "Information Regulator (South Africa)"
  acronym: "IR"
  country: "ZA"
  url: "https://inforegulator.org.za/"
type: law
